name: Benchmark PHP master fixed PGO vs direct builder on Windows

on:
  workflow_dispatch:
    inputs:
      fixed-artifact-run-id:
        description: Reuse fixed-PGO build artifact from a previous workflow run ID
        required: true
        default: "23948736178"
      direct-builder-artifact-run-id:
        description: Reuse direct builder artifact from a previous workflow run ID
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build-direct-builder:
    name: Build PHP master with published builder action
    if: ${{ inputs['direct-builder-artifact-run-id'] == '' }}
    runs-on: windows-2022
    timeout-minutes: 150
    steps:
      - name: Checkout test app
        uses: actions/checkout@v6

      - name: Build PHP master with shivammathur/php-windows-builder/php@master
        uses: shivammathur/php-windows-builder/php@master
        with:
          php-version: master
          arch: x64
          ts: ts
          github-token: ${{ github.token }}

      - name: Prepare direct builder artifact
        shell: pwsh
        run: |
          $zip = Get-ChildItem artifacts -Filter 'php-*.zip' |
            Where-Object { $_.Name -notmatch 'src|devel|debug|test' } |
            Sort-Object Name |
            Select-Object -First 1

          if ($null -eq $zip) {
            throw 'Could not find a runtime zip in artifacts/'
          }

          $extractDir = Join-Path $env:RUNNER_TEMP 'direct-builder-extract'
          $dest = Join-Path $env:RUNNER_TEMP 'php-master-direct-builder'

          if (Test-Path $extractDir) {
            Remove-Item $extractDir -Recurse -Force
          }

          if (Test-Path $dest) {
            Remove-Item $dest -Recurse -Force
          }

          Expand-Archive -LiteralPath $zip.FullName -DestinationPath $extractDir -Force

          $phpExe = Get-ChildItem $extractDir -Filter php.exe -Recurse | Select-Object -First 1
          if ($null -eq $phpExe) {
            throw "Could not find php.exe after extracting $($zip.Name)"
          }

          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          Copy-Item -Path (Join-Path $phpExe.Directory.FullName '*') -Destination $dest -Recurse -Force

      - name: Smoke test direct builder artifact
        shell: pwsh
        run: |
          $php = Join-Path $env:RUNNER_TEMP 'php-master-direct-builder\php.exe'
          $meta = & $php -n -r "echo PHP_VERSION, ' ', PHP_ZTS ? 'TS' : 'NTS', ' ', ZEND_VM_KIND;"
          if ($LASTEXITCODE -ne 0) {
            throw 'Direct builder PHP smoke test failed'
          }

          Write-Host $meta

      - name: Upload direct builder artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-master-direct-builder-build
          path: ${{ runner.temp }}/php-master-direct-builder
          if-no-files-found: error

  benchmark:
    name: Benchmark fixed PGO vs direct builder build
    if: ${{ inputs['fixed-artifact-run-id'] != '' && (needs.build-direct-builder.result == 'success' || needs.build-direct-builder.result == 'skipped') }}
    needs:
      - build-direct-builder
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      FIXED_ARTIFACT_RUN_ID: ${{ inputs['fixed-artifact-run-id'] }}
      DIRECT_BUILDER_ARTIFACT_RUN_ID: ${{ inputs['direct-builder-artifact-run-id'] }}
      BENCHMARK_ITERATIONS: 5
      PHPBENCH_ITERATIONS: 5
      K6_DURATION: 15s
      K6_VUS: 10
    steps:
      - name: Checkout test app
        uses: actions/checkout@v6

      - name: Setup PHP for Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: intl, mbstring
          tools: composer
          coverage: none

      - name: Download fixed PGO build from previous run
        uses: actions/download-artifact@v4
        with:
          name: php-master-msvc-pgo-build
          path: C:\php-master-fixed-pgo
          repository: ${{ github.repository }}
          run-id: ${{ env.FIXED_ARTIFACT_RUN_ID }}
          github-token: ${{ github.token }}

      - name: Download direct builder build from current run
        if: ${{ env.DIRECT_BUILDER_ARTIFACT_RUN_ID == '' }}
        uses: actions/download-artifact@v4
        with:
          name: php-master-direct-builder-build
          path: C:\php-master-direct-builder

      - name: Download direct builder build from previous run
        if: ${{ env.DIRECT_BUILDER_ARTIFACT_RUN_ID != '' }}
        uses: actions/download-artifact@v4
        with:
          name: php-master-direct-builder-build
          path: C:\php-master-direct-builder
          repository: ${{ github.repository }}
          run-id: ${{ env.DIRECT_BUILDER_ARTIFACT_RUN_ID }}
          github-token: ${{ github.token }}

      - name: Install application dependencies
        shell: pwsh
        run: |
          composer install --no-progress --prefer-dist --optimize-autoloader
          composer require --dev phpbench/phpbench:^1.6 --no-interaction --no-progress
          composer run-script post-install-cmd --no-interaction

      - name: Install k6
        shell: pwsh
        run: |
          if (Get-Command k6 -ErrorAction SilentlyContinue) {
            k6 version
            exit 0
          }

          choco install k6 -y --no-progress
          k6 version

      - name: Prepare benchmark configuration
        shell: pwsh
        run: |
          $baselinePhp = Get-ChildItem 'C:\php-master-fixed-pgo' -Filter php.exe -Recurse | Select-Object -First 1 -ExpandProperty FullName
          $customPhp = Get-ChildItem 'C:\php-master-direct-builder' -Filter php.exe -Recurse | Select-Object -First 1 -ExpandProperty FullName

          foreach ($php in @($baselinePhp, $customPhp)) {
            if ([string]::IsNullOrWhiteSpace($php) -or !(Test-Path $php)) {
              throw "Missing php.exe at $php"
            }
          }

          $hostPhp = (Get-Command php -ErrorAction Stop).Source

          $baselineDir = Split-Path -Parent $baselinePhp
          $customDir = Split-Path -Parent $customPhp
          $baselinePhpBenchBin = 'phpbench-fixed-pgo.exe'
          $customPhpBenchBin = 'phpbench-direct-builder.exe'
          $baselinePhpBenchPath = Join-Path $baselineDir $baselinePhpBenchBin
          $customPhpBenchPath = Join-Path $customDir $customPhpBenchBin

          function Get-BenchmarkConfig {
            param(
              [string]$PhpDir,
              [string]$JitMode
            )

            function Find-ExtensionPath {
              param(
                [string]$SearchDir,
                [string]$FileName,
                [switch]$Optional
              )

              $candidates = @(
                (Join-Path $SearchDir "ext\$FileName"),
                (Join-Path $SearchDir $FileName)
              )

              foreach ($candidate in $candidates) {
                if (Test-Path $candidate) {
                  return $candidate
                }
              }

              $found = Get-ChildItem $SearchDir -Filter $FileName -Recurse | Select-Object -First 1 -ExpandProperty FullName
              if (![string]::IsNullOrWhiteSpace($found)) {
                return $found
              }

              if ($Optional) {
                return $null
              }

              throw "Missing required extension $FileName under $SearchDir"
            }

            $mbstring = Find-ExtensionPath -SearchDir $PhpDir -FileName 'php_mbstring.dll'
            $intl = Find-ExtensionPath -SearchDir $PhpDir -FileName 'php_intl.dll'
            $openssl = Find-ExtensionPath -SearchDir $PhpDir -FileName 'php_openssl.dll'
            $sqlite3 = Find-ExtensionPath -SearchDir $PhpDir -FileName 'php_sqlite3.dll' -Optional
            $pdoSqlite = Find-ExtensionPath -SearchDir $PhpDir -FileName 'php_pdo_sqlite.dll'
            $opcache = Find-ExtensionPath -SearchDir $PhpDir -FileName 'php_opcache.dll' -Optional

            $mbstringPosix = $mbstring -replace '\\', '/'
            $intlPosix = $intl -replace '\\', '/'
            $opensslPosix = $openssl -replace '\\', '/'
            $extensionPaths = @($opensslPosix, $mbstringPosix, $intlPosix)

            if ($null -ne $sqlite3) {
              $extensionPaths += ($sqlite3 -replace '\\', '/')
            }

            $extensionPaths += ($pdoSqlite -replace '\\', '/')

            $config = [ordered]@{
              'date.timezone' = 'UTC'
              'display_errors' = 1
              'error_reporting' = 32767
              'memory_limit' = '1G'
              'extension' = $extensionPaths
              'opcache.enable' = 1
              'opcache.enable_cli' = 1
              'opcache.jit_buffer_size' = '128M'
              'opcache.jit' = $JitMode
            }

            if ($null -ne $opcache) {
              $config['zend_extension'] = ($opcache -replace '\\', '/')
            }

            return $config
          }

          function Write-BenchmarkIni {
            param(
              [hashtable]$Config,
              [string]$IniPath
            )

            $lines = @()

            foreach ($entry in $Config.GetEnumerator()) {
              $values = @($entry.Value)

              foreach ($value in $values) {
                if ($entry.Key -eq 'zend_extension') {
                  $lines += ('zend_extension="{0}"' -f $value)
                } elseif ($entry.Key -eq 'extension') {
                  $lines += ('extension="{0}"' -f $value)
                } else {
                  $lines += ('{0}={1}' -f $entry.Key, $value)
                }
              }
            }

            Set-Content -Path $IniPath -Value $lines
          }

          $baselineOffConfig = Get-BenchmarkConfig -PhpDir $baselineDir -JitMode 'off'
          $baselineTracingConfig = Get-BenchmarkConfig -PhpDir $baselineDir -JitMode 'tracing'
          $customOffConfig = Get-BenchmarkConfig -PhpDir $customDir -JitMode 'off'
          $customTracingConfig = Get-BenchmarkConfig -PhpDir $customDir -JitMode 'tracing'

          $baselineIni = Join-Path $env:RUNNER_TEMP 'fixed-pgo-bench.ini'
          $customIni = Join-Path $env:RUNNER_TEMP 'direct-builder-bench.ini'
          $benchmarkAppLocal = Join-Path (Join-Path $PWD.Path 'config') 'app_local.php'
          $benchmarkDbPath = ((Join-Path $PWD.Path 'tmp\benchmark.sqlite') -replace '\\', '/')

          New-Item -ItemType Directory -Path (Join-Path $PWD.Path 'tmp') -Force | Out-Null

          Write-BenchmarkIni -Config $baselineOffConfig -IniPath $baselineIni
          Write-BenchmarkIni -Config $customOffConfig -IniPath $customIni

          $appLocalLines = @(
            '<?php',
            'declare(strict_types=1);',
            '',
            'use Cake\Database\Driver\Sqlite;',
            'use function Cake\Core\env;',
            '',
            'return [',
            "    'debug' => false,",
            "    'Security' => [",
            "        'salt' => env('SECURITY_SALT', '__BENCHMARK_SALT__'),",
            '    ],',
            "    'Datasources' => [",
            "        'default' => [",
            "            'driver' => Sqlite::class,",
            ("            'database' => '{0}'," -f $benchmarkDbPath),
            "            'host' => null,",
            "            'username' => null,",
            "            'password' => null,",
            "            'url' => null,",
            '        ],',
            "        'test' => [",
            "            'driver' => Sqlite::class,",
            ("            'database' => '{0}'," -f $benchmarkDbPath),
            "            'host' => null,",
            "            'username' => null,",
            "            'password' => null,",
            "            'url' => null,",
            '        ],',
            '    ],',
            '];'
          )

          Set-Content -Path $benchmarkAppLocal -Value $appLocalLines
          Copy-Item -Path $baselinePhp -Destination $baselinePhpBenchPath -Force
          Copy-Item -Path $customPhp -Destination $customPhpBenchPath -Force

          "BASELINE_PHP=$baselinePhp" >> $env:GITHUB_ENV
          "CUSTOM_PHP=$customPhp" >> $env:GITHUB_ENV
          "HOST_PHP=$hostPhp" >> $env:GITHUB_ENV
          "BASELINE_INI=$baselineIni" >> $env:GITHUB_ENV
          "CUSTOM_INI=$customIni" >> $env:GITHUB_ENV
          "BASELINE_PHPBENCH_BIN=$baselinePhpBenchBin" >> $env:GITHUB_ENV
          "CUSTOM_PHPBENCH_BIN=$customPhpBenchBin" >> $env:GITHUB_ENV
          "BASELINE_PHPBENCH_OFF_CONFIG=$($baselineOffConfig | ConvertTo-Json -Compress -Depth 4)" >> $env:GITHUB_ENV
          "BASELINE_PHPBENCH_TRACING_CONFIG=$($baselineTracingConfig | ConvertTo-Json -Compress -Depth 4)" >> $env:GITHUB_ENV
          "CUSTOM_PHPBENCH_OFF_CONFIG=$($customOffConfig | ConvertTo-Json -Compress -Depth 4)" >> $env:GITHUB_ENV
          "CUSTOM_PHPBENCH_TRACING_CONFIG=$($customTracingConfig | ConvertTo-Json -Compress -Depth 4)" >> $env:GITHUB_ENV
          $baselineDir >> $env:GITHUB_PATH
          $customDir >> $env:GITHUB_PATH

      - name: Smoke test both PHP executables
        shell: pwsh
        run: |
          $baselineMeta = & $env:BASELINE_PHP -n -r "echo PHP_VERSION, ' ', PHP_ZTS ? 'TS' : 'NTS', ' ', ZEND_VM_KIND;"
          if ($LASTEXITCODE -ne 0) {
            throw 'Fixed PGO PHP smoke test failed'
          }

          $customMeta = & $env:CUSTOM_PHP -n -r "echo PHP_VERSION, ' ', PHP_ZTS ? 'TS' : 'NTS', ' ', ZEND_VM_KIND;"
          if ($LASTEXITCODE -ne 0) {
            throw 'Direct builder PHP smoke test failed'
          }

          $baselinePhpBenchCommand = Get-Command $env:BASELINE_PHPBENCH_BIN -ErrorAction Stop
          $customPhpBenchCommand = Get-Command $env:CUSTOM_PHPBENCH_BIN -ErrorAction Stop

          $baselineExtensions = & $env:BASELINE_PHP -c $env:BASELINE_INI -r "echo (int)extension_loaded('mbstring'), (int)extension_loaded('intl'), (int)extension_loaded('Zend OPcache');"
          if ($LASTEXITCODE -ne 0 -or $baselineExtensions -ne '111') {
            throw "Fixed PGO benchmark ini did not load required extensions: $baselineExtensions"
          }

          $customExtensions = & $env:CUSTOM_PHP -c $env:CUSTOM_INI -r "echo (int)extension_loaded('mbstring'), (int)extension_loaded('intl'), (int)extension_loaded('Zend OPcache');"
          if ($LASTEXITCODE -ne 0 -or $customExtensions -ne '111') {
            throw "Direct builder benchmark ini did not load required extensions: $customExtensions"
          }

          $baselineSqliteExtensions = & $env:BASELINE_PHP -c $env:BASELINE_INI -r "echo (int)extension_loaded('sqlite3'), (int)extension_loaded('pdo_sqlite');"
          if ($LASTEXITCODE -ne 0 -or $baselineSqliteExtensions -notin @('11', '01')) {
            throw "Fixed PGO benchmark ini did not load SQLite extensions: $baselineSqliteExtensions"
          }

          $customSqliteExtensions = & $env:CUSTOM_PHP -c $env:CUSTOM_INI -r "echo (int)extension_loaded('sqlite3'), (int)extension_loaded('pdo_sqlite');"
          if ($LASTEXITCODE -ne 0 -or $customSqliteExtensions -notin @('11', '01')) {
            throw "Direct builder benchmark ini did not load SQLite extensions: $customSqliteExtensions"
          }

          Write-Host $baselineMeta
          Write-Host $customMeta
          Write-Host ('Resolved host PHP: {0}' -f $env:HOST_PHP)
          Write-Host ('Resolved fixed PGO PHPBench binary: {0}' -f $baselinePhpBenchCommand.Source)
          Write-Host ('Resolved direct builder PHPBench binary: {0}' -f $customPhpBenchCommand.Source)

      - name: Run benchmarks
        shell: pwsh
        run: |
          $iterations = [int]$env:BENCHMARK_ITERATIONS
          $phpBenchIterations = [int]$env:PHPBENCH_ITERATIONS
          $resultsDir = Join-Path $env:RUNNER_TEMP 'benchmark-results'
          New-Item -ItemType Directory -Path $resultsDir -Force | Out-Null

          $timeBenchmarks = @(
            @{
              Name = 'vm-jit-off'
              Args = @('-d', 'opcache.jit=off', '.github/benchmarks/vm.php', '50000')
            },
            @{
              Name = 'vm-jit-tracing'
              Args = @('-d', 'opcache.jit=tracing', '.github/benchmarks/vm.php', '50000')
            },
            @{
              Name = 'cake-bootstrap-jit-off'
              Args = @('-d', 'opcache.jit=off', '.github/benchmarks/cake_bootstrap.php', '150')
            },
            @{
              Name = 'cake-bootstrap-jit-tracing'
              Args = @('-d', 'opcache.jit=tracing', '.github/benchmarks/cake_bootstrap.php', '150')
            }
          )

          function Invoke-TimeBenchmarkSuite {
            param(
              [string]$Label,
              [string]$PhpExe,
              [string]$IniFile,
              [string]$OutputFile
            )

            $suite = @()

            foreach ($benchmark in $timeBenchmarks) {
              $times = @()

              for ($run = 1; $run -le $iterations; $run++) {
                $args = @('-c', $IniFile) + $benchmark.Args
                $watch = [System.Diagnostics.Stopwatch]::StartNew()
                $previousScanDir = $env:PHP_INI_SCAN_DIR

                try {
                  $env:PHP_INI_SCAN_DIR = ''
                  $output = & $PhpExe @args 2>&1
                  $exitCode = $LASTEXITCODE
                } finally {
                  if ($null -eq $previousScanDir) {
                    Remove-Item Env:PHP_INI_SCAN_DIR -ErrorAction SilentlyContinue
                  } else {
                    $env:PHP_INI_SCAN_DIR = $previousScanDir
                  }
                }

                $watch.Stop()

                if ($exitCode -ne 0) {
                  $outputText = ($output | Out-String).Trim()
                  if (![string]::IsNullOrWhiteSpace($outputText)) {
                    Write-Host $outputText
                  }
                  throw ('{0} failed benchmark ''{1}'' on run {2}' -f $Label, $benchmark.Name, $run)
                }

                $times += [Math]::Round($watch.Elapsed.TotalMilliseconds, 2)
              }

              $stats = $times | Measure-Object -Average -Minimum -Maximum
              $suite += [pscustomobject]@{
                php = $Label
                benchmark = $benchmark.Name
                runs_ms = $times
                avg_ms = [Math]::Round($stats.Average, 2)
                min_ms = [Math]::Round($stats.Minimum, 2)
                max_ms = [Math]::Round($stats.Maximum, 2)
              }
            }

            $suite | ConvertTo-Json -Depth 4 | Set-Content -Path $OutputFile
            return $suite
          }

          function Invoke-PhpBenchMetric {
            param(
              [string]$Label,
              [string]$PhpBinary,
              [string]$PhpConfig,
              [string]$BenchmarkName,
              [string]$OutputFile,
              [string]$XmlFile
            )

            $args = @(
              'vendor/bin/phpbench',
              'run',
              '.github/benchmarks/phpbench',
              '--progress=none',
              '--report=default',
              '--filter',
              'SyntheticCliBench::benchCompositeWorkload',
              '--dump-file',
              $XmlFile,
              '--iterations',
              $phpBenchIterations,
              '--revs',
              '1',
              '--warmup',
              '1',
              '--php-binary',
              $PhpBinary,
              '--php-config',
              $PhpConfig,
              '--php-disable-ini'
            )

            $output = & $env:HOST_PHP @args 2>&1
            if ($LASTEXITCODE -ne 0) {
              $outputText = ($output | Out-String).Trim()
              if (![string]::IsNullOrWhiteSpace($outputText)) {
                Write-Host $outputText
              }
              throw ('{0} failed benchmark ''{1}''' -f $Label, $BenchmarkName)
            }

            [xml]$xml = Get-Content -Path $XmlFile -Raw
            $variant = $xml.phpbench.suite.benchmark.subject.variant
            if ($null -eq $variant -or $null -eq $variant.stats) {
              throw ('Missing PHPBench stats for {0}' -f $BenchmarkName)
            }

            $meanUs = [double]$variant.stats.mean
            $opsPerSecond = [Math]::Round(1000000 / $meanUs, 2)

            $result = [pscustomobject]@{
              php = $Label
              benchmark = $BenchmarkName
              unit = 'ops/s'
              value = $opsPerSecond
              mean_us = [Math]::Round($meanUs, 2)
              revs = [int]$variant.revs
              iterations = $phpBenchIterations
            }

            $result | ConvertTo-Json -Depth 4 | Set-Content -Path $OutputFile
            return $result
          }

          function Wait-ForHttp {
            param(
              [string]$Url,
              [int]$Attempts = 30
            )

            $probeBody = Join-Path $resultsDir ('http-probe-{0}.txt' -f ([System.Guid]::NewGuid().ToString('N')))
            $lastStatusCode = ''

            for ($attempt = 1; $attempt -le $Attempts; $attempt++) {
              if (Test-Path $probeBody) {
                Remove-Item $probeBody -Force
              }

              $statusCode = & curl.exe --silent --show-error --location --output $probeBody --write-out '%{http_code}' --max-time 5 $Url
              $exitCode = $LASTEXITCODE

              if ($exitCode -eq 0 -and $statusCode -eq '200') {
                if (Test-Path $probeBody) {
                  Remove-Item $probeBody -Force
                }
                return
              }

              $lastStatusCode = $statusCode
              Start-Sleep -Seconds 1
            }

            if (Test-Path $probeBody) {
              Write-Host ('Last HTTP probe status for {0}: {1}' -f $Url, $lastStatusCode)
              Get-Content $probeBody -TotalCount 80 | Write-Host
            }

            throw "Timed out waiting for $Url"
          }

          function Start-PhpHttpServer {
            param(
              [string]$PhpExe,
              [string]$IniFile,
              [string]$JitMode,
              [int]$Port,
              [string]$Label
            )

            $stdout = Join-Path $resultsDir ('{0}-{1}-stdout.log' -f $Label, $Port)
            $stderr = Join-Path $resultsDir ('{0}-{1}-stderr.log' -f $Label, $Port)
            $docroot = Join-Path $PWD.Path 'webroot'
            $router = Join-Path $PWD.Path 'webroot\index.php'
            $url = 'http://127.0.0.1:{0}/benchmark' -f $Port
            $args = @(
              '-c',
              $IniFile,
              '-d',
              ('opcache.jit={0}' -f $JitMode),
              '-S',
              ('127.0.0.1:{0}' -f $Port),
              '-t',
              $docroot,
              $router
            )

            $previousScanDir = $env:PHP_INI_SCAN_DIR
            $previousDebug = $env:DEBUG
            $previousFullBaseUrl = $env:APP_FULL_BASE_URL

            try {
              $env:PHP_INI_SCAN_DIR = ''
              $env:DEBUG = 'false'
              $env:APP_FULL_BASE_URL = ('http://127.0.0.1:{0}' -f $Port)
              $process = Start-Process -FilePath $PhpExe -ArgumentList $args -WorkingDirectory $PWD.Path -RedirectStandardOutput $stdout -RedirectStandardError $stderr -PassThru
            } finally {
              if ($null -eq $previousScanDir) {
                Remove-Item Env:PHP_INI_SCAN_DIR -ErrorAction SilentlyContinue
              } else {
                $env:PHP_INI_SCAN_DIR = $previousScanDir
              }

              if ($null -eq $previousDebug) {
                Remove-Item Env:DEBUG -ErrorAction SilentlyContinue
              } else {
                $env:DEBUG = $previousDebug
              }

              if ($null -eq $previousFullBaseUrl) {
                Remove-Item Env:APP_FULL_BASE_URL -ErrorAction SilentlyContinue
              } else {
                $env:APP_FULL_BASE_URL = $previousFullBaseUrl
              }
            }

            try {
              Wait-ForHttp -Url $url
            } catch {
              if (!$process.HasExited) {
                Stop-Process -Id $process.Id -Force
              }

              if (Test-Path $stdout) {
                Get-Content $stdout | Write-Host
              }

              if (Test-Path $stderr) {
                Get-Content $stderr | Write-Host
              }

              throw
            }

            return [pscustomobject]@{
              Process = $process
              Url = $url
              StdOut = $stdout
              StdErr = $stderr
            }
          }

          function Stop-PhpHttpServer {
            param(
              [pscustomobject]$Server
            )

            if ($null -ne $Server -and $null -ne $Server.Process -and !$Server.Process.HasExited) {
              Stop-Process -Id $Server.Process.Id -Force
            }
          }

          function Invoke-HttpRpsMetric {
            param(
              [string]$Label,
              [string]$PhpExe,
              [string]$IniFile,
              [int]$Port,
              [string]$OutputFile
            )

            $server = $null

            try {
              $server = Start-PhpHttpServer -PhpExe $PhpExe -IniFile $IniFile -JitMode 'off' -Port $Port -Label $Label
              $summaryFile = Join-Path $resultsDir ('{0}-http-rps-k6.json' -f $Label)

              $env:K6_TARGET = $server.Url
              $env:K6_NEEDLE = 'CakePHP benchmark'

              $output = & k6 run --vus $env:K6_VUS --duration $env:K6_DURATION --summary-export $summaryFile .github/benchmarks/http_rps.js 2>&1
              if ($LASTEXITCODE -ne 0) {
                $outputText = ($output | Out-String).Trim()
                if (![string]::IsNullOrWhiteSpace($outputText)) {
                  Write-Host $outputText
                }
                throw ('{0} failed benchmark ''http-rps''' -f $Label)
              }

              $summary = Get-Content -Path $summaryFile -Raw | ConvertFrom-Json
              $rateMetric = $summary.metrics.http_reqs
              $durationMetric = $summary.metrics.http_req_duration
              $rate = if ($null -ne $rateMetric.values) { [double]$rateMetric.values.rate } else { [double]$rateMetric.rate }
              $p95 = if ($null -ne $durationMetric.values) { [double]$durationMetric.values.'p(95)' } else { [double]$durationMetric.'p(95)' }

              $result = [pscustomobject]@{
                php = $Label
                benchmark = 'http-rps'
                unit = 'req/s'
                value = [Math]::Round($rate, 2)
                p95_ms = [Math]::Round($p95, 2)
                vus = [int]$env:K6_VUS
                duration = $env:K6_DURATION
              }

              $result | ConvertTo-Json -Depth 4 | Set-Content -Path $OutputFile
              return $result
            } finally {
              Stop-PhpHttpServer -Server $server
            }
          }

          function Format-Rate {
            param(
              [double]$Value
            )

            if ($Value -ge 1000000) {
              return ('{0}M' -f [Math]::Round($Value / 1000000, 2))
            }

            if ($Value -ge 1000) {
              return ('{0}K' -f [Math]::Round($Value / 1000, 2))
            }

            return [Math]::Round($Value, 2).ToString()
          }

          $baselineResults = Invoke-TimeBenchmarkSuite -Label 'fixed-pgo' -PhpExe $env:BASELINE_PHP -IniFile $env:BASELINE_INI -OutputFile (Join-Path $resultsDir 'fixed-pgo-time.json')
          $customResults = Invoke-TimeBenchmarkSuite -Label 'direct-builder' -PhpExe $env:CUSTOM_PHP -IniFile $env:CUSTOM_INI -OutputFile (Join-Path $resultsDir 'direct-builder-time.json')

          $baselineThroughputResults = @(
            (Invoke-PhpBenchMetric -Label 'fixed-pgo' -PhpBinary $env:BASELINE_PHPBENCH_BIN -PhpConfig $env:BASELINE_PHPBENCH_OFF_CONFIG -BenchmarkName 'phpbench-no-jit' -OutputFile (Join-Path $resultsDir 'fixed-pgo-phpbench-no-jit.json') -XmlFile (Join-Path $resultsDir 'fixed-pgo-phpbench-no-jit.xml')),
            (Invoke-PhpBenchMetric -Label 'fixed-pgo' -PhpBinary $env:BASELINE_PHPBENCH_BIN -PhpConfig $env:BASELINE_PHPBENCH_TRACING_CONFIG -BenchmarkName 'phpbench-jit' -OutputFile (Join-Path $resultsDir 'fixed-pgo-phpbench-jit.json') -XmlFile (Join-Path $resultsDir 'fixed-pgo-phpbench-jit.xml')),
            (Invoke-HttpRpsMetric -Label 'fixed-pgo' -PhpExe $env:BASELINE_PHP -IniFile $env:BASELINE_INI -Port 8091 -OutputFile (Join-Path $resultsDir 'fixed-pgo-http-rps.json'))
          )

          $customThroughputResults = @(
            (Invoke-PhpBenchMetric -Label 'direct-builder' -PhpBinary $env:CUSTOM_PHPBENCH_BIN -PhpConfig $env:CUSTOM_PHPBENCH_OFF_CONFIG -BenchmarkName 'phpbench-no-jit' -OutputFile (Join-Path $resultsDir 'direct-builder-phpbench-no-jit.json') -XmlFile (Join-Path $resultsDir 'direct-builder-phpbench-no-jit.xml')),
            (Invoke-PhpBenchMetric -Label 'direct-builder' -PhpBinary $env:CUSTOM_PHPBENCH_BIN -PhpConfig $env:CUSTOM_PHPBENCH_TRACING_CONFIG -BenchmarkName 'phpbench-jit' -OutputFile (Join-Path $resultsDir 'direct-builder-phpbench-jit.json') -XmlFile (Join-Path $resultsDir 'direct-builder-phpbench-jit.xml')),
            (Invoke-HttpRpsMetric -Label 'direct-builder' -PhpExe $env:CUSTOM_PHP -IniFile $env:CUSTOM_INI -Port 8092 -OutputFile (Join-Path $resultsDir 'direct-builder-http-rps.json'))
          )

          $baselineMeta = & $env:BASELINE_PHP -n -r "echo PHP_VERSION, '|', PHP_ZTS ? 'TS' : 'NTS', '|', ZEND_VM_KIND;"
          $customMeta = & $env:CUSTOM_PHP -n -r "echo PHP_VERSION, '|', PHP_ZTS ? 'TS' : 'NTS', '|', ZEND_VM_KIND;"

          $baselineSource = $env:FIXED_ARTIFACT_RUN_ID
          $customSource = if ([string]::IsNullOrWhiteSpace($env:DIRECT_BUILDER_ARTIFACT_RUN_ID)) { 'current run' } else { $env:DIRECT_BUILDER_ARTIFACT_RUN_ID }

          $summaryLines = @(
            '# PHP master Windows benchmark',
            '',
            ('- Baseline: {0}' -f $baselineMeta),
            ('- Custom: {0}' -f $customMeta),
            ('- Fixed PGO artifact source: {0}' -f $baselineSource),
            ('- Direct builder artifact source: {0}' -f $customSource),
            ('- Iterations per benchmark: {0}' -f $iterations),
            ('- PHPBench iterations: {0}' -f $phpBenchIterations),
            ('- HTTP throughput benchmark: built-in server with k6 ({0} VUs for {1})' -f $env:K6_VUS, $env:K6_DURATION),
            '',
            '## Time-based benchmarks (lower is better)',
            '',
            '| Benchmark | Fixed PGO avg (ms) | Direct builder avg (ms) | Delta | Speedup |',
            '| --- | ---: | ---: | ---: | ---: |'
          )

          foreach ($baselineResult in $baselineResults) {
            $customResult = $customResults | Where-Object benchmark -EQ $baselineResult.benchmark

            if ($null -eq $customResult) {
              throw ('Missing custom result for {0}' -f $baselineResult.benchmark)
            }

            $delta = [Math]::Round((($baselineResult.avg_ms - $customResult.avg_ms) / $baselineResult.avg_ms) * 100, 2)
            $speedup = [Math]::Round($baselineResult.avg_ms / $customResult.avg_ms, 2)
            $deltaLabel = if ($delta -ge 0) { ('+{0}%' -f $delta) } else { ('{0}%' -f $delta) }
            $summaryRow = '| {0} | {1} | {2} | {3} | {4}x |' -f $baselineResult.benchmark, $baselineResult.avg_ms, $customResult.avg_ms, $deltaLabel, $speedup

            $summaryLines += $summaryRow
          }

          $summaryLines += @(
            '',
            '## Throughput benchmarks (higher is better)',
            '',
            '| Benchmark | Fixed PGO | Direct builder | Delta | Speedup |',
            '| --- | ---: | ---: | ---: | ---: |'
          )

          foreach ($baselineResult in $baselineThroughputResults) {
            $customResult = $customThroughputResults | Where-Object benchmark -EQ $baselineResult.benchmark

            if ($null -eq $customResult) {
              throw ('Missing custom throughput result for {0}' -f $baselineResult.benchmark)
            }

            $delta = [Math]::Round((($customResult.value - $baselineResult.value) / $baselineResult.value) * 100, 2)
            $speedup = [Math]::Round($customResult.value / $baselineResult.value, 2)
            $deltaLabel = if ($delta -ge 0) { ('+{0}%' -f $delta) } else { ('{0}%' -f $delta) }
            $summaryRow = '| {0} | {1} {2} | {3} {4} | {5} | {6}x |' -f $baselineResult.benchmark, (Format-Rate -Value $baselineResult.value), $baselineResult.unit, (Format-Rate -Value $customResult.value), $customResult.unit, $deltaLabel, $speedup

            $summaryLines += $summaryRow
          }

          Set-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summaryLines

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: php-master-fixed-pgo-vs-direct-builder-benchmarks
          path: ${{ runner.temp }}/benchmark-results
          if-no-files-found: error
