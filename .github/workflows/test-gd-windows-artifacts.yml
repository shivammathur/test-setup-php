name: Test GD Windows PHP artifacts

on:
  push:
  workflow_dispatch:
    inputs:
      run-id:
        description: php-windows-builder run ID containing the merged artifacts
        required: true
        default: "28612131370"

permissions:
  actions: read
  contents: read

jobs:
  gd-userland:
    name: GD userland artifact checks
    runs-on: windows-2025-vs2026
    env:
      PHP_WINDOWS_BUILDER_RUN_ID: ${{ inputs.run-id || '28612131370' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download PHP builder artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "$env:PHP_WINDOWS_BUILDER_RUN_ID" `
            --repo shivammathur/php-windows-builder `
            --name artifacts `
            --dir artifacts
          Get-ChildItem -Path artifacts -File | Sort-Object Name | Format-Table Name, Length

      - name: Test GD userland behavior
        shell: pwsh
        run: .\.github\scripts\Test-GdArtifacts.ps1 -ArtifactsDir artifacts
