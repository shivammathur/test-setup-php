                  $m->getX();
                  $m->getX();
              }
          }

          function runCaseB(): void
          {
              $o1 = new C;
              unset($o1->x);
              $o2 = new C;
              $a = [$o1, $o2, $o2];

              for ($i = 0; $i < 8; $i++) {
