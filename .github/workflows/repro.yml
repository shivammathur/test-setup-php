name: iis-pr-21710-repro

on:
  workflow_dispatch:
  push:
    branches:
      - test-pr-21710

permissions:
  contents: read

jobs:
  repro:
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      SITE_NAME: PhpJitRepro
      APP_POOL: PhpReproPool
      BASE_URL: 'http://127.0.0.1:8085'
    steps:
      - name: Set job paths
        shell: pwsh
        run: |
          "ROOT=${{ runner.temp }}\iis-pr-21710-repro" >> $env:GITHUB_ENV
          "SITE_ROOT=${{ runner.temp }}\iis-pr-21710-repro\site" >> $env:GITHUB_ENV
          "LOG_DIR=${{ runner.temp }}\iis-pr-21710-repro\logs" >> $env:GITHUB_ENV
          "PHP_DIR=${{ runner.temp }}\iis-pr-21710-repro\php-artifact" >> $env:GITHUB_ENV
          "PHP_ERROR_LOG=${{ runner.temp }}\iis-pr-21710-repro\logs\php-repro-errors.log" >> $env:GITHUB_ENV

      - name: Download repro artifact
        uses: actions/download-artifact@v4
        with:
          name: artifacts
          repository: php/php-windows-builder
          run-id: 24851804919
          path: ${{ runner.temp }}\php-repro-artifacts
          github-token: ${{ secrets.PAT }}

      - name: Enable IIS
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($feature in 'IIS-WebServerRole','IIS-WebServer','IIS-CommonHttpFeatures','IIS-DefaultDocument','IIS-StaticContent','IIS-ApplicationDevelopment','IIS-CGI') {
            if ((Get-WindowsOptionalFeature -Online -FeatureName $feature).State -ne 'Enabled') {
              Enable-WindowsOptionalFeature -Online -FeatureName $feature -All -NoRestart | Out-Null
            }
          }
          Import-Module WebAdministration
          Start-Service WAS -ErrorAction SilentlyContinue
          Start-Service W3SVC -ErrorAction SilentlyContinue

      - name: Create IIS site and repro.php
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $appCmd = Join-Path $env:windir 'System32\inetsrv\appcmd.exe'
          New-Item -ItemType Directory -Force -Path $env:ROOT, $env:SITE_ROOT, $env:LOG_DIR, (Join-Path $env:ROOT 'opcache') | Out-Null
          $reproPhp = @'
          <?php
          if (function_exists('bzcompress')) { bzcompress('codex'); }
          if (function_exists('curl_version')) { curl_version(); }
          if (function_exists('mb_strlen')) { mb_strlen('codex'); }
          
          class HotValue {
              public $x = true;
              public function __get($name) { return null; }
              public function getX() { return $this->x; }
          }
          
          function hotFetchObj(): void {
              $a = new HotValue;
              $b = new HotValue;
              $b->x = false;
              $c = new HotValue;
              unset($c->x);
              $items = [$a, $b, $c];
          
              for ($i = 0; $i < 4096; $i++) {
                  $m = $items[$i % 3];
                  $m->getX();
                  $m->getX();
              }
          }
          
          class BaseModel {
              public $incrementing = true;
              public function __get($name) { return null; }
              public function getIncrementing() { return $this->incrementing; }
              public function getCasts(): array {
                  return $this->getIncrementing() ? ['id' => 'int'] : [];
              }
              public function hasCast(string $key): bool {
                  return array_key_exists($key, $this->getCasts());
              }
          }
          
          class ModelA extends BaseModel {}
          class ModelB extends BaseModel {}
          class ModelC extends BaseModel { public $incrementing = false; }
          
          $classes = [ModelA::class, ModelB::class, ModelC::class];
          
          for ($round = 0; $round < 25; $round++) {
              hotFetchObj();
              for ($i = 0; $i < 8000; $i++) {
                  $m = new ($classes[$i % 3])();
                  if (($i % 7) === 0) {
                      unset($m->incrementing);
                  }
                  @$m->getIncrementing();
                  @$m->getCasts();
                  @$m->hasCast('id');
              }
          }
          
          header('Content-Type: text/plain');
          echo "OK\n";
          echo 'php=' . PHP_VERSION . "\n";
          '@
          Set-Content -LiteralPath (Join-Path $env:SITE_ROOT 'repro.php') -Value $reproPhp.TrimStart() -Encoding ASCII
          & icacls $env:ROOT '/grant' 'IIS_IUSRS:(OI)(CI)M' '/T' '/C' | Out-Null
          & $appCmd add site "/name:$env:SITE_NAME" "/bindings:http/*:8085:" "/physicalPath:$env:SITE_ROOT" | Out-Null
          & $appCmd set config $env:SITE_NAME -section:system.webServer/handlers /accessPolicy:Read,Script /commit:apphost | Out-Null
          & $appCmd set config $env:SITE_NAME -section:system.webServer/defaultDocument "/+files.[value='repro.php']" /commit:apphost | Out-Null

      - name: Install PHP repro build
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $artifactRoot = '${{ runner.temp }}\php-repro-artifacts'
          $zip = Get-ChildItem -LiteralPath $artifactRoot -File | Where-Object {
            $_.Name -match '^php-\d+\.\d+\.\d+.*-nts-Win32-vs17-x64\.zip$'
          } | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $zip) {
            throw 'Could not find the NTS x64 PHP zip in the repro artifact.'
          }
          Write-Host "Using repro zip: $($zip.Name)"
          Expand-Archive -LiteralPath $zip.FullName -DestinationPath $env:PHP_DIR -Force

      - name: Write php.ini with JIT
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $extensionDir = (Join-Path $env:PHP_DIR 'ext').Replace('\', '/')
          $errorLog = $env:PHP_ERROR_LOG.Replace('\', '/')
          $fileCache = (Join-Path $env:ROOT 'opcache').Replace('\', '/')
          @"
          [PHP]
          extension_dir="$extensionDir"
          date.timezone=UTC
          memory_limit=512M
          max_execution_time=120
          display_errors=Off
          log_errors=On
          error_log="$errorLog"
          cgi.fix_pathinfo=1
          
          extension=bz2
          extension=com_dotnet
          extension=curl
          extension=fileinfo
          extension=mbstring
          extension=odbc
          extension=openssl
          extension=pdo_sqlite
          extension=sqlite3
          extension=zip
          
          zend_extension=opcache
          
          [opcache]
          opcache.enable=1
          opcache.enable_cli=0
          opcache.memory_consumption=128
          opcache.interned_strings_buffer=16
          opcache.max_accelerated_files=20000
          opcache.file_cache="$fileCache"
          opcache.file_cache_only=0
          opcache.file_cache_consistency_checks=0
          opcache.jit_buffer_size=128M
          opcache.jit=1255
          opcache.jit_hot_loop=0
          opcache.jit_hot_func=1
          opcache.jit_hot_return=0
          opcache.jit_hot_side_exit=1
          opcache.jit_max_side_traces=8
          "@ | Set-Content -LiteralPath (Join-Path $env:PHP_DIR 'php.ini') -Encoding ASCII

      - name: Configure IIS FastCGI
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $appCmd = Join-Path $env:windir 'System32\inetsrv\appcmd.exe'
          $phpCgi = Join-Path $env:PHP_DIR 'php-cgi.exe'
          Import-Module WebAdministration
          & $appCmd add apppool "/name:$env:APP_POOL" | Out-Null
          & $appCmd set app "/app.name:$env:SITE_NAME/" "/applicationPool:$env:APP_POOL" | Out-Null
          & $appCmd set config -section:system.webServer/fastCgi "/+[fullPath='$phpCgi',instanceMaxRequests='10000']" /commit:apphost | Out-Null
          & $appCmd set config -section:system.webServer/fastCgi "/+[fullPath='$phpCgi'].environmentVariables.[name='PHPRC',value='$env:PHP_DIR']" /commit:apphost | Out-Null
          & $appCmd set config -section:system.webServer/fastCgi "/+[fullPath='$phpCgi'].environmentVariables.[name='PHP_FCGI_MAX_REQUESTS',value='10000']" /commit:apphost | Out-Null
          & $appCmd set config $env:SITE_NAME -section:system.webServer/handlers "/+[name='PHP-Repro-FastCGI',path='*.php',verb='GET,HEAD,POST',modules='FastCgiModule',scriptProcessor='$phpCgi',resourceType='Either',requireAccess='Script']" /commit:apphost | Out-Null
          Restart-WebAppPool -Name $env:APP_POOL

      - name: Run curl repro and log errors
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $start = Get-Date
          $failures = 0
          $statuses = @()
          $sample = $null
          1..10 | ForEach-Object {
            $i = $_
            $headers = Join-Path $env:ROOT "repro-$i.headers.txt"
            $body = Join-Path $env:ROOT "repro-$i.body.txt"
            $url = '{0}/repro.php?run={1}' -f $env:BASE_URL, $i
            $status = & curl.exe -sS -D $headers -o $body -w '%{http_code}' $url
            $bodyText = Get-Content -LiteralPath $body -Raw -ErrorAction SilentlyContinue
            $statuses += $status
            Write-Host "run=$i status=$status"
            if ($bodyText) {
              Write-Host ($bodyText.Trim())
            }
            if ($status -ne '200' -or $bodyText -notmatch '^OK') {
              $failures++
              if (-not $sample) {
                $sample = $bodyText
              }
            }
          }
          $events = @(Get-WinEvent -FilterHashtable @{ LogName = 'Application'; StartTime = $start } -ErrorAction SilentlyContinue | Where-Object {
            $_.ProviderName -in @('Application Error', 'Windows Error Reporting') -and $_.Message -match 'php-cgi\.exe|php8\.dll'
          })
          Write-Host "statuses=$($statuses -join ',')"
          if (Test-Path -LiteralPath $env:PHP_ERROR_LOG) {
            Write-Host 'PHP error log'
            Get-Content -LiteralPath $env:PHP_ERROR_LOG -Tail 40 | Write-Host
          } else {
            Write-Host 'No PHP error log found.'
          }
          if ($events.Count -gt 0) {
            Write-Host 'PHP crash events'
            $events | Select-Object -First 5 | Format-List TimeCreated, ProviderName, Id, LevelDisplayName, Message | Out-String | Write-Host
          } else {
            Write-Host 'No PHP crash events found.'
          }
          if ($failures -eq 0 -and $events.Count -eq 0) {
            throw 'The repro build did not reproduce the IIS failure in this run.'
          }

  test-fix:
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      SITE_NAME: PhpJitRepro
      APP_POOL: PhpReproPool
      BASE_URL: 'http://127.0.0.1:8085'
    steps:
      - name: Set job paths
        shell: pwsh
        run: |
          "ROOT=${{ runner.temp }}\iis-pr-21710-fix" >> $env:GITHUB_ENV
          "SITE_ROOT=${{ runner.temp }}\iis-pr-21710-fix\site" >> $env:GITHUB_ENV
          "LOG_DIR=${{ runner.temp }}\iis-pr-21710-fix\logs" >> $env:GITHUB_ENV
          "PHP_DIR=${{ runner.temp }}\iis-pr-21710-fix\php-artifact" >> $env:GITHUB_ENV
          "PHP_ERROR_LOG=${{ runner.temp }}\iis-pr-21710-fix\logs\php-artifact-errors.log" >> $env:GITHUB_ENV

      - name: Download PHP artifact
        uses: actions/download-artifact@v4
        with:
          name: artifacts
          repository: shivammathur/php-windows-builder
          run-id: 24851225899
          path: ${{ runner.temp }}\php-pr-artifacts
          github-token: ${{ secrets.PAT }}

      - name: Enable IIS
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($feature in 'IIS-WebServerRole','IIS-WebServer','IIS-CommonHttpFeatures','IIS-DefaultDocument','IIS-StaticContent','IIS-ApplicationDevelopment','IIS-CGI') {
            if ((Get-WindowsOptionalFeature -Online -FeatureName $feature).State -ne 'Enabled') {
