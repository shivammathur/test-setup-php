              echo "jit-disabled\n";
              echo 'php=' . PHP_VERSION . "\n";
              exit(1);
          }

          class C {
              public $x = true;

              public function __get($name)
              {
                  return null;
              }

              public function getX()
              {
                  return $this->x;
              }
          }

