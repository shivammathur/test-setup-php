name: iis-pr-21710-repro

on:
  workflow_dispatch:
  push:
    branches:
      - test-pr-21710

permissions:
  contents: read

env:
  ARTIFACT_NAME: artifacts
  PATCHED_RUN_ID: 24851225899

jobs:
  repro:
    runs-on: windows-2022
    timeout-minutes: 45
    env:
      SITE_NAME: PhpJitRepro
      APP_POOL: PhpReproPool
      BASE_URL: "http://127.0.0.1:8085"
    steps:
      - name: Set job paths
        shell: pwsh
        run: |
          "ROOT=${{ runner.temp }}\iis-pr-21710-repro" >> $env:GITHUB_ENV
          "SITE_ROOT=${{ runner.temp }}\iis-pr-21710-repro\site" >> $env:GITHUB_ENV
          "LOG_DIR=${{ runner.temp }}\iis-pr-21710-repro\logs" >> $env:GITHUB_ENV
          "PHP_ERROR_LOG=${{ runner.temp }}\iis-pr-21710-repro\logs\php-errors.log" >> $env:GITHUB_ENV

      - name: Enable IIS
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($feature in 'IIS-WebServerRole','IIS-WebServer','IIS-CommonHttpFeatures','IIS-StaticContent','IIS-DefaultDocument','IIS-ApplicationDevelopment','IIS-CGI') {
            if ((Get-WindowsOptionalFeature -Online -FeatureName $feature).State -ne 'Enabled') {
              Enable-WindowsOptionalFeature -Online -FeatureName $feature -All -NoRestart | Out-Null
            }
          }
          Import-Module WebAdministration
          Start-Service WAS -ErrorAction SilentlyContinue
          Start-Service W3SVC -ErrorAction SilentlyContinue

      - name: Install PHP 8.4 baseline
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: none

      - name: Resolve PHP directory
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $phpCgi = (Get-Command php-cgi.exe).Source
          $phpDir = Split-Path -Parent $phpCgi
          "PHP_DIR=$phpDir" >> $env:GITHUB_ENV
          $version = & (Join-Path $phpDir 'php.exe') -r "echo PHP_VERSION;"
          Write-Host "Baseline PHP version: $version"
          if ($version -notmatch '^8\.4\.') {
            throw "Expected a PHP 8.4 build, got $version"
          }
          $threadSafety = & (Join-Path $phpDir 'php.exe') -r "echo PHP_ZTS ? 'ts' : 'nts';"
          if ($threadSafety -ne 'nts') {
            throw "Expected an NTS build, got $threadSafety"
          }

      - name: Create IIS site and repro.php
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $appCmd = Join-Path $env:windir 'System32\inetsrv\appcmd.exe'
          New-Item -ItemType Directory -Force -Path $env:ROOT, $env:SITE_ROOT, $env:LOG_DIR | Out-Null
          $reproPhp = @'
          <?php
          declare(strict_types=1);

          $jitStatus = function_exists('opcache_get_status') ? opcache_get_status(false) : false;
          $jit = is_array($jitStatus) && isset($jitStatus['jit']) && is_array($jitStatus['jit']) ? $jitStatus['jit'] : [];
          if (empty($jit['enabled']) || empty($jit['on'])) {
              http_response_code(500);
              header('Content-Type: text/plain');
              echo "jit-disabled\n";
              echo 'php=' . PHP_VERSION . "\n";
              exit(1);
          }

          class C {
              public $x = true;

              public function __get($name)
              {
                  return null;
              }

              public function getX()
              {
                  return $this->x;
              }
          }

          function runCaseA(): void
          {
              $o1 = new C;
              $o2 = new C;
              $o2->x = false;
              $o3 = new C;
              unset($o3->x);
              $a = [$o1, $o2, $o3];

              for ($i = 0; $i < 8; $i++) {
                  $m = $a[$i % 3];
                  $m->getX();
                  $m->getX();
              }
          }

          function runCaseB(): void
          {
              $o1 = new C;
              unset($o1->x);
              $o2 = new C;
              $a = [$o1, $o2, $o2];

              for ($i = 0; $i < 8; $i++) {
                  $m = $a[$i % 3];
                  $m->getX();
                  $m->getX();
              }
          }

          for ($round = 0; $round < 256; $round++) {
              runCaseA();
              runCaseB();
          }

          header('Content-Type: text/plain');
          echo "OK\n";
          echo 'run=' . (isset($_GET['run']) ? (int) $_GET['run'] : 0) . "\n";
          echo 'jit_enabled=' . (!empty($jit['enabled']) ? '1' : '0') . "\n";
          echo 'jit_on=' . (!empty($jit['on']) ? '1' : '0') . "\n";
          echo 'jit_kind=' . ($jit['kind'] ?? '0') . "\n";
          echo 'php=' . PHP_VERSION . "\n";
          '@
          Set-Content -LiteralPath (Join-Path $env:SITE_ROOT 'repro.php') -Value $reproPhp.TrimStart() -Encoding ASCII
          & icacls $env:ROOT '/grant' 'IIS_IUSRS:(OI)(CI)M' '/T' '/C' | Out-Null
          & $appCmd add site "/name:$env:SITE_NAME" "/bindings:http/*:8085:" "/physicalPath:$env:SITE_ROOT" | Out-Null
          & $appCmd add apppool "/name:$env:APP_POOL" | Out-Null
          & $appCmd set apppool "$env:APP_POOL" /processModel.maxProcesses:1 /failure.rapidFailProtection:false /recycling.periodicRestart.time:00:00:00 | Out-Null
          & $appCmd set app "/app.name:$env:SITE_NAME/" "/applicationPool:$env:APP_POOL" | Out-Null
          & $appCmd set config $env:SITE_NAME -section:system.webServer/handlers /accessPolicy:Read,Script /commit:apphost | Out-Null

      - name: Write php.ini with JIT
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $extensionDir = (Join-Path $env:PHP_DIR 'ext').Replace('\', '/')
          $errorLog = $env:PHP_ERROR_LOG.Replace('\', '/')
          $phpExe = Join-Path $env:PHP_DIR 'php.exe'
          $modules = & $phpExe -m
          if ($modules -contains 'Zend OPcache') {
            $zendOpcacheLine = '; Zend OPcache is built in'
          } elseif (Test-Path -LiteralPath (Join-Path $env:PHP_DIR 'ext\\php_opcache.dll')) {
            $zendOpcacheLine = 'zend_extension=php_opcache.dll'
          } elseif (Test-Path -LiteralPath (Join-Path $env:PHP_DIR 'php_opcache.dll')) {
            $zendOpcacheLine = 'zend_extension=php_opcache.dll'
          } else {
            $zendOpcacheLine = 'zend_extension=opcache'
          }
          @"
          [PHP]
          extension_dir="$extensionDir"
          date.timezone=UTC
          display_errors=1
          html_errors=0
          log_errors=1
          error_log="$errorLog"
          memory_limit=512M
          max_execution_time=120
          output_buffering=0
          cgi.fix_pathinfo=1
          $zendOpcacheLine

          [opcache]
          opcache.enable=1
          opcache.enable_cli=0
          opcache.validate_timestamps=1
          opcache.revalidate_freq=0
          opcache.file_update_protection=0
          opcache.memory_consumption=128
          opcache.max_accelerated_files=10000
          opcache.interned_strings_buffer=16
          opcache.jit_buffer_size=64M
          opcache.jit=tracing
          opcache.jit_hot_loop=0
          opcache.jit_hot_func=2
          opcache.jit_hot_return=0
          opcache.jit_hot_side_exit=1
          opcache.jit_max_side_traces=16
          "@ | Set-Content -LiteralPath (Join-Path $env:PHP_DIR 'php.ini') -Encoding ASCII

      - name: Configure IIS FastCGI
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $appCmd = Join-Path $env:windir 'System32\inetsrv\appcmd.exe'
          $phpCgi = Join-Path $env:PHP_DIR 'php-cgi.exe'
          & $appCmd set config -section:system.webServer/fastCgi "/+[fullPath='$phpCgi',maxInstances='1',instanceMaxRequests='100000']" /commit:apphost | Out-Null
          & $appCmd set config -section:system.webServer/fastCgi "/+[fullPath='$phpCgi'].environmentVariables.[name='PHPRC',value='$env:PHP_DIR']" /commit:apphost | Out-Null
          & $appCmd set config -section:system.webServer/fastCgi "/+[fullPath='$phpCgi'].environmentVariables.[name='PHP_FCGI_MAX_REQUESTS',value='100000']" /commit:apphost | Out-Null
          & $appCmd set config $env:SITE_NAME -section:system.webServer/handlers "/+[name='PHP-Repro-FastCGI',path='repro.php',verb='GET,HEAD,POST',modules='FastCgiModule',scriptProcessor='$phpCgi',resourceType='Either',requireAccess='Script']" /commit:apphost | Out-Null

      - name: Run curl repro and log errors
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $start = Get-Date
          $failures = 0
          $statuses = @()
          $sample = $null
          1..240 | ForEach-Object {
            $i = $_
            $headers = Join-Path $env:ROOT "repro-$i.headers.txt"
            $body = Join-Path $env:ROOT "repro-$i.body.txt"
            $url = '{0}/repro.php?run={1}' -f $env:BASE_URL, $i
            $status = & curl.exe -sS -D $headers -o $body -w '%{http_code}' $url
            $bodyText = Get-Content -LiteralPath $body -Raw -ErrorAction SilentlyContinue
            $statuses += $status
            Write-Host "run=$i status=$status"
            if ($i -eq 1) {
              Write-Host 'First response'
              Write-Host $bodyText
            }
            if ($status -ne '200' -or $bodyText -notmatch '^OK' -or $bodyText -notmatch 'jit_on=1') {
              $failures++
              if (-not $sample) {
                $sample = $bodyText
              }
            }
            Start-Sleep -Milliseconds 25
          }
          $events = @(Get-WinEvent -FilterHashtable @{ LogName = 'Application'; StartTime = $start } -ErrorAction SilentlyContinue | Where-Object {
            $_.ProviderName -in @('Application Error', 'Windows Error Reporting') -and $_.Message -match 'php-cgi\.exe|php8\.dll'
          })
          Write-Host "statuses=$($statuses -join ',')"
          if ($sample -match 'Parse error|Fatal error') {
            throw "The generated repro script is invalid: $sample"
          }
          if ($sample) {
            Write-Host 'Failure sample'
            Write-Host $sample
          }
          if (Test-Path -LiteralPath $env:PHP_ERROR_LOG) {
            Write-Host 'PHP error log'
            Get-Content -LiteralPath $env:PHP_ERROR_LOG -Tail 40 | Write-Host
          } else {
            Write-Host 'No PHP error log found.'
          }
          if ($events.Count -gt 0) {
            Write-Host 'PHP crash events'
            $events | Select-Object -First 5 | Format-List TimeCreated, ProviderName, Id, LevelDisplayName, Message | Out-String | Write-Host
          } else {
            Write-Host 'No PHP crash events found.'
          }
          if ($failures -eq 0 -and $events.Count -eq 0) {
            throw 'The PHP 8.4 baseline did not reproduce the IIS failure.'
          }

  test-fix:
    runs-on: windows-2022
    timeout-minutes: 45
    env:
      SITE_NAME: PhpJitRepro
      APP_POOL: PhpReproPool
      BASE_URL: "http://127.0.0.1:8085"
    steps:
      - name: Set job paths
        shell: pwsh
        run: |
          "ROOT=${{ runner.temp }}\iis-pr-21710-fix" >> $env:GITHUB_ENV
          "SITE_ROOT=${{ runner.temp }}\iis-pr-21710-fix\site" >> $env:GITHUB_ENV
          "LOG_DIR=${{ runner.temp }}\iis-pr-21710-fix\logs" >> $env:GITHUB_ENV
          "PHP_DIR=${{ runner.temp }}\iis-pr-21710-fix\php-artifact" >> $env:GITHUB_ENV
          "PHP_ERROR_LOG=${{ runner.temp }}\iis-pr-21710-fix\logs\php-errors.log" >> $env:GITHUB_ENV

      - name: Enable IIS
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($feature in 'IIS-WebServerRole','IIS-WebServer','IIS-CommonHttpFeatures','IIS-StaticContent','IIS-DefaultDocument','IIS-ApplicationDevelopment','IIS-CGI') {
            if ((Get-WindowsOptionalFeature -Online -FeatureName $feature).State -ne 'Enabled') {
              Enable-WindowsOptionalFeature -Online -FeatureName $feature -All -NoRestart | Out-Null
            }
          }
          Import-Module WebAdministration
          Start-Service WAS -ErrorAction SilentlyContinue
          Start-Service W3SVC -ErrorAction SilentlyContinue

      - name: Download patched PHP artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          repository: shivammathur/php-windows-builder
          run-id: ${{ env.PATCHED_RUN_ID }}
          path: ${{ runner.temp }}\php-pr-artifacts
          github-token: ${{ secrets.PAT }}

      - name: Install patched PHP
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $artifactRoot = '${{ runner.temp }}\php-pr-artifacts'
          $zip = Get-ChildItem -LiteralPath $artifactRoot -Recurse -File | Where-Object {
            $_.Name -match '^php-\d+\.\d+\.\d+.*-nts-Win32-vs17-x64\.zip$'
          } | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $zip) {
            throw 'Could not find the patched NTS x64 PHP zip in the downloaded artifact.'
          }
          Write-Host "Using artifact zip: $($zip.FullName)"
          Expand-Archive -LiteralPath $zip.FullName -DestinationPath $env:PHP_DIR -Force
          $version = & (Join-Path $env:PHP_DIR 'php.exe') -r "echo PHP_VERSION;"
          Write-Host "Patched artifact PHP version: $version"
          $threadSafety = & (Join-Path $env:PHP_DIR 'php.exe') -r "echo PHP_ZTS ? 'ts' : 'nts';"
          if ($threadSafety -ne 'nts') {
            throw "Expected an NTS build, got $threadSafety"
          }

