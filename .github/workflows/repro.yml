        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $appCmd = Join-Path $env:windir 'System32\inetsrv\appcmd.exe'
          New-Item -ItemType Directory -Force -Path $env:ROOT, $env:SITE_ROOT, $env:LOG_DIR, (Join-Path $env:ROOT 'opcache') | Out-Null
          $reproPhp = @'
