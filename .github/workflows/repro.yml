        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $appCmd = Join-Path $env:windir 'System32\inetsrv\appcmd.exe'
          $phpCgi = Join-Path $env:PHP_DIR 'php-cgi.exe'
          & $appCmd set config -section:system.webServer/fastCgi "/+[fullPath='$phpCgi',maxInstances='1',instanceMaxRequests='100000']" /commit:apphost | Out-Null
          & $appCmd set config -section:system.webServer/fastCgi "/+[fullPath='$phpCgi'].environmentVariables.[name='PHPRC',value='$env:PHP_DIR']" /commit:apphost | Out-Null
          & $appCmd set config -section:system.webServer/fastCgi "/+[fullPath='$phpCgi'].environmentVariables.[name='PHP_FCGI_MAX_REQUESTS',value='100000']" /commit:apphost | Out-Null
          & $appCmd set config $env:SITE_NAME -section:system.webServer/handlers "/+[name='PHP-Repro-FastCGI',path='repro.php',verb='GET,HEAD,POST',modules='FastCgiModule',scriptProcessor='$phpCgi',resourceType='Either',requireAccess='Script']" /commit:apphost | Out-Null

