name: iis-pr-21710-repro

on:
  workflow_dispatch:
  push:
    branches:
      - test-pr-21710

permissions:
  contents: read

jobs:
  repro:
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Download PR artifact from php/php-windows-builder
        uses: actions/download-artifact@v4
        with:
          name: artifacts
          repository: php/php-windows-builder
          run-id: 24851804919
          path: ${{ runner.temp }}\php-pr-artifacts
          github-token: ${{ secrets.PAT }}

      - name: Reproduce on IIS with 8.5.5 and validate PR artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          function Write-Section {
            param([string] $Message)
            Write-Host ""
            Write-Host "==== $Message ===="
          }

          function Ensure-Directory {
            param([string] $Path)
            if (-not (Test-Path -LiteralPath $Path)) {
              New-Item -ItemType Directory -Path $Path | Out-Null
            }
          }

          function Enable-IisFeature {
            param([string] $Name)
            $feature = Get-WindowsOptionalFeature -Online -FeatureName $Name
            if ($feature.State -ne 'Enabled') {
              Enable-WindowsOptionalFeature -Online -FeatureName $Name -All -NoRestart | Out-Null
            }
          }

          function Ensure-Iis {
            Write-Section "Enable IIS features"
            $features = @(
              'IIS-WebServerRole',
              'IIS-WebServer',
              'IIS-CommonHttpFeatures',
              'IIS-DefaultDocument',
              'IIS-StaticContent',
              'IIS-HttpErrors',
              'IIS-HttpRedirect',
              'IIS-ApplicationDevelopment',
              'IIS-ISAPIExtensions',
              'IIS-ISAPIFilter',
              'IIS-CGI',
              'IIS-RequestFiltering'
            )

            foreach ($feature in $features) {
              Enable-IisFeature -Name $feature
            }

            Import-Module WebAdministration
            Start-Service WAS -ErrorAction SilentlyContinue
            Start-Service W3SVC -ErrorAction SilentlyContinue
          }

          function New-PhpIni {
            param(
              [string] $PhpDir,
              [string] $OpcacheDir,
              [string] $ErrorLog
            )

            Ensure-Directory $OpcacheDir
            $extensionDir = (Join-Path $PhpDir 'ext').Replace('\', '/')
            $opcacheDir = $OpcacheDir.Replace('\', '/')
            $errorLogPath = $ErrorLog.Replace('\', '/')

            $ini = @(
              '[PHP]'
              "extension_dir=""$extensionDir"""
              'date.timezone=UTC'
              'memory_limit=512M'
              'max_execution_time=120'
              'display_errors=Off'
              'log_errors=On'
              "error_log=""$errorLogPath"""
              'cgi.fix_pathinfo=1'
              ''
              'extension=bz2'
              'extension=curl'
              'extension=fileinfo'
              'extension=gd'
              'extension=mbstring'
              'extension=openssl'
              'extension=pdo_sqlite'
              'extension=sqlite3'
              'extension=zip'
              ''
              'zend_extension=opcache'
              ''
              '[opcache]'
              'opcache.enable=1'
              'opcache.enable_cli=0'
              'opcache.memory_consumption=128'
              'opcache.interned_strings_buffer=16'
              'opcache.max_accelerated_files=20000'
              "opcache.file_cache=""$opcacheDir"""
              'opcache.file_cache_only=0'
              'opcache.file_cache_consistency_checks=0'
              'opcache.jit_buffer_size=128M'
              'opcache.jit=1255'
              'opcache.jit_hot_loop=0'
              'opcache.jit_hot_func=2'
              'opcache.jit_hot_return=0'
              'opcache.jit_hot_side_exit=1'
              'opcache.jit_max_side_traces=0'
            )

            Set-Content -LiteralPath (Join-Path $PhpDir 'php.ini') -Value $ini -Encoding ASCII
          }

          function Add-FastCgiApplication {
            param(
              [string] $PhpDir,
              [string] $PhpCgi,
              [string] $AppCmd
            )

            $existing = & $AppCmd list config -section:system.webServer/fastCgi 2>$null
            if ($existing -notmatch [regex]::Escape($PhpCgi)) {
              & $AppCmd set config -section:system.webServer/fastCgi "/+[fullPath='$PhpCgi',instanceMaxRequests='10000']" /commit:apphost | Out-Null
              & $AppCmd set config -section:system.webServer/fastCgi "/+[fullPath='$PhpCgi'].environmentVariables.[name='PHPRC',value='$PhpDir']" /commit:apphost | Out-Null
              & $AppCmd set config -section:system.webServer/fastCgi "/+[fullPath='$PhpCgi'].environmentVariables.[name='PHP_FCGI_MAX_REQUESTS',value='10000']" /commit:apphost | Out-Null
            }
          }

          function Ensure-ReproSite {
            param(
              [string] $SiteName,
              [string] $SiteRoot,
              [string] $AppCmd
            )

            $existingSite = (& $AppCmd list site $SiteName /text:name 2>$null)
            if (-not $existingSite) {
              & $AppCmd add site "/name:$SiteName" "/bindings:http/*:8085:" "/physicalPath:$SiteRoot" | Out-Null
            }

            & $AppCmd set config $SiteName -section:system.webServer/handlers /accessPolicy:Read,Script /commit:apphost | Out-Null
            & $AppCmd set config $SiteName -section:system.webServer/defaultDocument "/+files.[value='index.php']" /commit:apphost | Out-Null
          }

          function Set-ReproPhp {
            param(
              [string] $SiteName,
              [string] $AppPool,
              [string] $PhpDir,
              [string] $AppCmd
            )

            $phpCgi = Join-Path $PhpDir 'php-cgi.exe'
            Add-FastCgiApplication -PhpDir $PhpDir -PhpCgi $phpCgi -AppCmd $AppCmd

            if (-not (& $AppCmd list apppool $AppPool /text:name 2>$null)) {
              & $AppCmd add apppool "/name:$AppPool" | Out-Null
            }

            & $AppCmd set app "/app.name:$SiteName/" "/applicationPool:$AppPool" | Out-Null

            $handlers = & $AppCmd list config $SiteName -section:system.webServer/handlers 2>$null
            if ($handlers -match 'name="PHP-FastCGI"') {
              & $AppCmd set config $SiteName -section:system.webServer/handlers "/-[name='PHP-FastCGI']" /commit:apphost | Out-Null
            }

            & $AppCmd set config $SiteName -section:system.webServer/handlers "/+[name='PHP-FastCGI',path='*.php',verb='GET,HEAD,POST',modules='FastCgiModule',scriptProcessor='$phpCgi',resourceType='Either',requireAccess='Script']" /commit:apphost | Out-Null
            Restart-WebAppPool -Name $AppPool
          }

          function Wait-Url {
            param(
              [string] $Url,
              [int] $TimeoutSec = 60
            )

            $deadline = (Get-Date).AddSeconds($TimeoutSec)
            do {
              try {
                $response = Invoke-WebRequest -UseBasicParsing -Uri $Url -TimeoutSec 15
                if ($response.StatusCode -eq 200) {
                  return $response
                }
              } catch {
              }
              Start-Sleep -Seconds 2
            } while ((Get-Date) -lt $deadline)

            throw "Timed out waiting for $Url"
          }

          function Get-PhpCrashEvents {
            param(
              [datetime] $Since,
              [string] $PhpDir
            )

            $phpCgi = [regex]::Escape((Join-Path $PhpDir 'php-cgi.exe'))
            $phpDll = [regex]::Escape((Join-Path $PhpDir 'php8.dll'))

            Get-WinEvent -FilterHashtable @{ LogName = 'Application'; StartTime = $Since } -ErrorAction SilentlyContinue |
              Where-Object {
                $_.ProviderName -in @('Application Error', 'Windows Error Reporting') -and
                ($_.Message -match $phpCgi -or $_.Message -match $phpDll)
              }
          }

          function Invoke-JitProbePhase {
            param(
              [string] $Name,
              [string] $BaseUrl,
              [string] $PhpDir,
              [string] $Path = 'probe.php',
              [int] $Loops = 12
            )

            Write-Section "Run $Name JIT probe"
            $marker = Get-Date
            $failures = 0
            $status500 = 0
            $timeouts = 0
            $unexpectedSample = $null

            foreach ($i in 1..$Loops) {
              try {
                $response = Invoke-WebRequest -UseBasicParsing -Uri "$BaseUrl/$Path?run=$i" -TimeoutSec 10 -Headers @{ 'Cache-Control' = 'no-cache' }
                if ($response.StatusCode -ge 500) {
                  $status500++
                } elseif ($response.Content -notmatch '^OK\s*$') {
                  $failures++
                  if (-not $unexpectedSample) {
                    $sample = $response.Content
                    if ($sample.Length -gt 240) {
                      $sample = $sample.Substring(0, 240)
                    }
                    $unexpectedSample = $sample.Replace("`r", '\r').Replace("`n", '\n')
                  }
                }
              } catch {
                $message = $_.Exception.Message
                $response = $_.Exception.Response
                if ($response -and [int] $response.StatusCode -ge 500) {
                  $status500++
                } elseif ($message -match 'timed out|Timeout') {
                  $timeouts++
                  $failures++
                  if (-not $unexpectedSample) {
                    $unexpectedSample = $message
                  }
                } else {
                  $failures++
                  if (-not $unexpectedSample) {
                    $unexpectedSample = $message
                  }
                }
              }
            }

            $events = @(Get-PhpCrashEvents -Since $marker -PhpDir $PhpDir)
            $summary = [pscustomobject]@{
              Name        = $Name
              Requests    = $Loops
              Failures    = $failures
              Status500   = $status500
              Timeouts    = $timeouts
              CrashEvents = $events.Count
              Sample      = $unexpectedSample
            }

            $summary | ConvertTo-Json -Compress | Write-Host
            if ($events.Count -gt 0) {
              $events | Select-Object -First 3 | ForEach-Object {
                Write-Host $_.Message
              }
            }

            return $summary
          }

          Write-Section "Prepare directories"
          $root = Join-Path $env:RUNNER_TEMP 'pr-21710-repro'
          $downloads = Join-Path $root 'downloads'
          $logs = Join-Path $root 'logs'
          $siteRoot = Join-Path $root 'site'
          $officialPhpDir = Join-Path $root 'php-8.5.5-nts'
          $artifactPhpDir = Join-Path $root 'php-pr-artifact'
          $officialOpcache = Join-Path $root 'opcache-855'
          $artifactOpcache = Join-Path $root 'opcache-pr'
          $officialErrorLog = Join-Path $logs 'php-855-errors.log'
          $artifactErrorLog = Join-Path $logs 'php-pr-errors.log'
          $appCmd = Join-Path $env:windir 'System32\inetsrv\appcmd.exe'
          $siteName = 'PhpJitRepro'
          $baseUrl = 'http://127.0.0.1:8085'

          @($root, $downloads, $logs, $siteRoot) | ForEach-Object { Ensure-Directory $_ }

          Ensure-Iis

          Write-Section "Download PHP 8.5.5 NTS"
          $officialPhpZip = Join-Path $downloads 'php-8.5.5-nts-Win32-vs17-x64.zip'
          Invoke-WebRequest -UseBasicParsing -Uri 'https://windows.php.net/downloads/releases/php-8.5.5-nts-Win32-vs17-x64.zip' -OutFile $officialPhpZip
          Expand-Archive -LiteralPath $officialPhpZip -DestinationPath $officialPhpDir -Force

          Write-Section "Extract PR artifact PHP"
          $artifactInnerZip = Get-ChildItem -LiteralPath (Join-Path $env:RUNNER_TEMP 'php-pr-artifacts') -File |
            Where-Object { $_.Name -match '^php-\d+\.\d+\.\d+.*-nts-Win32-vs17-x64\.zip$' } |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if (-not $artifactInnerZip) {
            throw 'Could not find the NTS x64 PHP zip in the downloaded artifact.'
          }
          Write-Host "Using PR artifact zip: $($artifactInnerZip.Name)"
          Expand-Archive -LiteralPath $artifactInnerZip.FullName -DestinationPath $artifactPhpDir -Force

          New-PhpIni -PhpDir $officialPhpDir -OpcacheDir $officialOpcache -ErrorLog $officialErrorLog
          New-PhpIni -PhpDir $artifactPhpDir -OpcacheDir $artifactOpcache -ErrorLog $artifactErrorLog

          Write-Section "Generate simple IIS repro pages"

          $healthPhp = @(
            '<?php'
            "header('Content-Type: text/plain');"
            "echo 'ok', PHP_EOL;"
            "echo 'php=', PHP_VERSION, PHP_EOL;"
            "echo 'sapi=', PHP_SAPI, PHP_EOL;"
            "echo 'bz2=', extension_loaded('bz2') ? '1' : '0', PHP_EOL;"
            "echo 'sqlite3=', extension_loaded('sqlite3') ? '1' : '0', PHP_EOL;"
            "echo 'opcache=', extension_loaded('Zend OPcache') ? '1' : '0', PHP_EOL;"
          )
          Set-Content -LiteralPath (Join-Path $siteRoot 'codex-health.php') -Value $healthPhp -Encoding ASCII

          $indexPhp = @(
            '<?php'
            "header('Content-Type: text/plain');"
            "echo 'PHP JIT repro site', PHP_EOL;"
            "echo 'health=/codex-health.php', PHP_EOL;"
            "echo 'probe=/probe.php', PHP_EOL;"
            "echo 'probe_complex=/probe-complex.php', PHP_EOL;"
          )
          Set-Content -LiteralPath (Join-Path $siteRoot 'index.php') -Value $indexPhp -Encoding ASCII

          $jitProbePhp = @(
            '<?php'
            'class C {'
            '    public $x = true;'
            '    public function __get($name) { return null; }'
            '    public function getX() { return $this->x; }'
            '}'
            ''
            '$o1 = new C;'
            '$o2 = new C;'
            '$o2->x = false;'
            '$o3 = new C;'
            'unset($o3->x);'
            '$a = [$o1, $o2, $o3];'
            ''
            'for ($i = 0; $i < 64; $i++) {'
            '    $m = $a[$i % 3];'
            '    $m->getX();'
            '    $m->getX();'
            '}'
            ''
            "header('Content-Type: text/plain');"
            "echo 'OK';"
          )
          Set-Content -LiteralPath (Join-Path $siteRoot 'probe.php') -Value $jitProbePhp -Encoding ASCII

          $jitComplexProbePhp = @(
            '<?php'
            'class Base'
            '{'
            '    public $incrementing = true;'
            ''
            '    public function __get($name) { return null; }'
            ''
            '    public function getIncrementing() { return $this->incrementing; }'
            ''
            '    public function getCasts(): array'
            '    {'
            '        if ($this->getIncrementing()) {'
            "            return ['id' => 'int'];"
            '        }'
            '        return [];'
            '    }'
            ''
            '    public function hasCast(string $key): bool'
            '    {'
            '        return array_key_exists($key, $this->getCasts());'
            '    }'
            '}'
            ''
            'class ChildA extends Base {}'
            'class ChildB extends Base {}'
            'class ChildC extends Base { public $incrementing = false; }'
            ''
            '$classes = [ChildA::class, ChildB::class, ChildC::class];'
            ''
            'for ($round = 0; $round < 5; $round++) {'
            '    for ($i = 0; $i < 1000; $i++) {'
            '        $m = new $classes[$i % 3]();'
            '        $m->getIncrementing();'
            '        $m->getCasts();'
            "        $m->hasCast('id');"
            '    }'
            '}'
            ''
            'for ($i = 0; $i < 3000; $i++) {'
            '    $m = new $classes[$i % 3]();'
            '    if ($i % 7 === 0) {'
            '        unset($m->incrementing);'
            '    }'
            '    @$m->getIncrementing();'
            '    @$m->getCasts();'
            "    @$m->hasCast('id');"
            '}'
            ''
            "header('Content-Type: text/plain');"
            "echo 'OK';"
          )
          Set-Content -LiteralPath (Join-Path $siteRoot 'probe-complex.php') -Value $jitComplexProbePhp -Encoding ASCII

          Write-Section "Grant IIS write access"
          & icacls $root '/grant' 'IIS_IUSRS:(OI)(CI)M' '/T' '/C' | Out-Null
          Get-ChildItem -LiteralPath $siteRoot | Select-Object Name,Length | Format-Table -AutoSize | Out-String | Write-Host

          Ensure-ReproSite -SiteName $siteName -SiteRoot $siteRoot -AppCmd $appCmd

          Set-ReproPhp -SiteName $siteName -AppPool 'Php855Pool' -PhpDir $officialPhpDir -AppCmd $appCmd
          $health855 = Wait-Url -Url "$baseUrl/codex-health.php" -TimeoutSec 90
          Write-Host $health855.Content
          $baselineProbe = Invoke-JitProbePhase -Name 'php-8.5.5-nts-jit-probe' -BaseUrl $baseUrl -PhpDir $officialPhpDir -Path 'probe.php' -Loops 12
          $baselineComplexProbe = Invoke-JitProbePhase -Name 'php-8.5.5-nts-jit-complex-probe' -BaseUrl $baseUrl -PhpDir $officialPhpDir -Path 'probe-complex.php' -Loops 6

          Set-ReproPhp -SiteName $siteName -AppPool 'PhpPr21710Pool' -PhpDir $artifactPhpDir -AppCmd $appCmd
          $healthPr = Wait-Url -Url "$baseUrl/codex-health.php" -TimeoutSec 90
          Write-Host $healthPr.Content
          $artifactProbe = Invoke-JitProbePhase -Name 'pr-artifact-jit-probe' -BaseUrl $baseUrl -PhpDir $artifactPhpDir -Path 'probe.php' -Loops 12
          $artifactComplexProbe = Invoke-JitProbePhase -Name 'pr-artifact-jit-complex-probe' -BaseUrl $baseUrl -PhpDir $artifactPhpDir -Path 'probe-complex.php' -Loops 6

          Write-Section "Assertions"
          $baselineProbeFailed = ($baselineProbe.CrashEvents -gt 0) -or ($baselineProbe.Failures -gt 0) -or ($baselineProbe.Status500 -gt 0) -or ($baselineProbe.Timeouts -gt 0)
          $baselineComplexProbeFailed = ($baselineComplexProbe.CrashEvents -gt 0) -or ($baselineComplexProbe.Failures -gt 0) -or ($baselineComplexProbe.Status500 -gt 0) -or ($baselineComplexProbe.Timeouts -gt 0)
          $baselineFailed = $baselineProbeFailed -or $baselineComplexProbeFailed
          $artifactPassed = ($artifactProbe.CrashEvents -eq 0) -and ($artifactProbe.Failures -eq 0) -and ($artifactProbe.Status500 -eq 0) -and ($artifactProbe.Timeouts -eq 0) -and ($artifactComplexProbe.CrashEvents -eq 0) -and ($artifactComplexProbe.Failures -eq 0) -and ($artifactComplexProbe.Status500 -eq 0) -and ($artifactComplexProbe.Timeouts -eq 0)

          "Baseline probe: $($baselineProbe | ConvertTo-Json -Compress)" | Tee-Object -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Baseline complex probe: $($baselineComplexProbe | ConvertTo-Json -Compress)" | Tee-Object -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Artifact probe: $($artifactProbe | ConvertTo-Json -Compress)" | Tee-Object -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Artifact complex probe: $($artifactComplexProbe | ConvertTo-Json -Compress)" | Tee-Object -FilePath $env:GITHUB_STEP_SUMMARY -Append

          if (-not $baselineFailed) {
            throw "PHP 8.5.5 NTS did not reproduce the IIS workload failure in this run."
          }

          if (-not $artifactPassed) {
            throw "The PR artifact did not stay clean under the same IIS probe workload."
          }

          Write-Section "Done"
          Write-Host "Observed the expected behavior: 8.5.5 failed, PR artifact passed."
