name: Test PDO Firebird from builder artifacts

on:
  push:
    branches:
      - test-fbclient-update
    paths:
      - .github/workflows/windows-pdo-firebird-artifact-test.yml
      - .github/scripts/run-pdo-firebird-tests.ps1
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: pdo-firebird-artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-pdo-firebird:
    name: PHP ${{ matrix.build.php-version }} ${{ matrix.arch }} ${{ matrix.ts }}
    runs-on: windows-2022
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        build:
          - php-version: '8.2'
            run-id: '24567620587'
          - php-version: '8.3'
            run-id: '24567637235'
          - php-version: '8.4'
            run-id: '24567657672'
          - php-version: '8.5'
            run-id: '24567668885'
        arch:
          - x64
          - x86
        ts:
          - ts
          - nts

    steps:
      - name: Checkout test branch
        uses: actions/checkout@v6

      - name: Clone php-windows-builder
        shell: pwsh
        run: |
          git clone --depth 1 --branch master https://github.com/shivammathur/php-windows-builder.git php-windows-builder
          git -C php-windows-builder rev-parse HEAD

      - name: Download builder artifact bundle
        uses: actions/download-artifact@v4
        with:
          name: artifacts
          path: builder-artifacts
          repository: shivammathur/php-windows-builder
          run-id: ${{ matrix.build.run-id }}
          github-token: ${{ secrets.PAT != '' && secrets.PAT || github.token }}

      - name: Show artifact contents
        shell: pwsh
        run: |
          Get-ChildItem -Path builder-artifacts -File |
            Sort-Object Name |
            Format-Table Name, Length -AutoSize

      - name: Run PDO Firebird tests
        shell: pwsh
        run: |
          $artifactsDirectory = Join-Path $env:GITHUB_WORKSPACE 'builder-artifacts'
          $builderRoot = Join-Path $env:GITHUB_WORKSPACE 'php-windows-builder'

          .github\scripts\run-pdo-firebird-tests.ps1 `
            -PhpVersion '${{ matrix.build.php-version }}' `
            -Arch '${{ matrix.arch }}' `
            -Ts '${{ matrix.ts }}' `
            -ArtifactsDirectory $artifactsDirectory `
            -BuilderRoot $builderRoot

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdo-firebird-results-${{ matrix.build.php-version }}-${{ matrix.arch }}-${{ matrix.ts }}
          path: results/*
          if-no-files-found: warn
