name: Test PDO Firebird from builder artifacts

on:
  push:
    branches:
      - test-fbclient-update
    paths:
      - .github/workflows/windows-pdo-firebird-artifact-test.yml
      - .github/scripts/install-manual-release-php.ps1
      - .github/scripts/run-pdo-firebird-tests.ps1
      - .github/scripts/run-pdo-firebird-released-tests.ps1
      - .github/scripts/sync-pdo-firebird-autocommit-test.ps1
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: pdo-firebird-artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-pdo-firebird:
    name: PHP ${{ matrix.build.php-version }} ${{ matrix.arch }} ${{ matrix.ts }}
    runs-on: windows-2022
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        build:
          - php-version: '8.2'
            run-id: '24567620587'
            fbclient-run-id: '24567578490'
            fbclient-artifact-prefix: 'fbclient-3.0.13-vs16'
            firebird-tag: 'v3.0.13'
            firebird-package-base: 'Firebird-3.0.13.33818-0'
          - php-version: '8.3'
            run-id: '24567637235'
            fbclient-run-id: '24567578490'
            fbclient-artifact-prefix: 'fbclient-3.0.13-vs16'
            firebird-tag: 'v3.0.13'
            firebird-package-base: 'Firebird-3.0.13.33818-0'
          - php-version: '8.4'
            run-id: '24567657672'
            fbclient-run-id: '24567588928'
            fbclient-artifact-prefix: 'fbclient-4.0.7-vs17'
            firebird-tag: 'v4.0.7'
            firebird-package-base: 'Firebird-4.0.7.3271-0'
          - php-version: '8.5'
            run-id: '24567668885'
            fbclient-run-id: '24567588928'
            fbclient-artifact-prefix: 'fbclient-4.0.7-vs17'
            firebird-tag: 'v4.0.7'
            firebird-package-base: 'Firebird-4.0.7.3271-0'
        arch:
          - x64
          - x86
        ts:
          - ts
          - nts

    steps:
      - name: Checkout test branch
        uses: actions/checkout@v6

      - name: Clone php-windows-builder
        shell: pwsh
        run: |
          git clone --depth 1 --branch master https://github.com/shivammathur/php-windows-builder.git php-windows-builder
          git -C php-windows-builder rev-parse HEAD

      - name: Download builder artifact bundle
        uses: actions/download-artifact@v4
        with:
          name: artifacts
          path: builder-artifacts
          repository: shivammathur/php-windows-builder
          run-id: ${{ matrix.build.run-id }}
          github-token: ${{ secrets.PAT != '' && secrets.PAT || github.token }}

      - name: Download fbclient artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ format('{0}-{1}', matrix.build.fbclient-artifact-prefix, matrix.arch) }}
          path: fbclient-artifacts
          repository: winlibs/winlib-builder
          run-id: ${{ matrix.build.fbclient-run-id }}
          github-token: ${{ secrets.PAT != '' && secrets.PAT || github.token }}

      - name: Show artifact contents
        shell: pwsh
        run: |
          Get-ChildItem -Path builder-artifacts -File |
            Sort-Object Name |
            Format-Table Name, Length -AutoSize
          Get-ChildItem -Path fbclient-artifacts -Recurse -File |
            Sort-Object FullName |
            Format-Table FullName, Length -AutoSize

      - name: Run PDO Firebird tests
        shell: pwsh
        run: |
          $artifactsDirectory = Join-Path $env:GITHUB_WORKSPACE 'builder-artifacts'
          $fbclientArtifactsDirectory = Join-Path $env:GITHUB_WORKSPACE 'fbclient-artifacts'
          $builderRoot = Join-Path $env:GITHUB_WORKSPACE 'php-windows-builder'

          .github\scripts\run-pdo-firebird-tests.ps1 `
            -PhpVersion '${{ matrix.build.php-version }}' `
            -Arch '${{ matrix.arch }}' `
            -Ts '${{ matrix.ts }}' `
            -ArtifactsDirectory $artifactsDirectory `
            -FbclientArtifactsDirectory $fbclientArtifactsDirectory `
            -FirebirdTag '${{ matrix.build.firebird-tag }}' `
            -FirebirdPackageName '${{ format('{0}-{1}.zip', matrix.build.firebird-package-base, matrix.arch == 'x64' && 'x64' || 'Win32') }}' `
            -BuilderRoot $builderRoot

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdo-firebird-results-${{ matrix.build.php-version }}-${{ matrix.arch }}-${{ matrix.ts }}
          path: results/*
          if-no-files-found: warn

  test-pdo-firebird-released:
    name: Released PHP ${{ matrix.release.php-version }} x64 ${{ matrix.ts }}
    runs-on: windows-2022
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        release:
          - php-version: '8.2'
            actual-php-version: '8.2.30'
            release-package-base: 'php-8.2.30'
            vs: 'vs16'
            fbclient-run-id: '24567578490'
            fbclient-artifact-prefix: 'fbclient-3.0.13-vs16'
            firebird-tag: 'v3.0.13'
            firebird-package-base: 'Firebird-3.0.13.33818-0'
          - php-version: '8.3'
            actual-php-version: '8.3.30'
            release-package-base: 'php-8.3.30'
            vs: 'vs16'
            fbclient-run-id: '24567578490'
            fbclient-artifact-prefix: 'fbclient-3.0.13-vs16'
            firebird-tag: 'v3.0.13'
            firebird-package-base: 'Firebird-3.0.13.33818-0'
          - php-version: '8.4'
            actual-php-version: '8.4.20'
            release-package-base: 'php-8.4.20'
            vs: 'vs17'
            fbclient-run-id: '24567588928'
            fbclient-artifact-prefix: 'fbclient-4.0.7-vs17'
            firebird-tag: 'v4.0.7'
            firebird-package-base: 'Firebird-4.0.7.3271-0'
          - php-version: '8.5'
            actual-php-version: '8.5.5'
            release-package-base: 'php-8.5.5'
            vs: 'vs17'
            fbclient-run-id: '24567588928'
            fbclient-artifact-prefix: 'fbclient-4.0.7-vs17'
            firebird-tag: 'v4.0.7'
            firebird-package-base: 'Firebird-4.0.7.3271-0'
        ts:
          - nts
          - ts

    steps:
      - name: Checkout test branch
        uses: actions/checkout@v6

      - name: Clone php-windows-builder
        shell: pwsh
        run: |
          git clone --depth 1 --branch master https://github.com/shivammathur/php-windows-builder.git php-windows-builder
          git -C php-windows-builder rev-parse HEAD

      - name: Install released PHP manually
        id: install-php
        shell: pwsh
        run: |
          $packageName = '${{ format('{0}{1}-Win32-{2}-x64.zip', matrix.release.release-package-base, matrix.ts == 'nts' && '-nts' || '', matrix.release.vs) }}'

          .github\scripts\install-manual-release-php.ps1 `
            -PackageName $packageName `
            -InstallRoot 'C:\tools\php'

      - name: Download fbclient artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ format('{0}-x64', matrix.release.fbclient-artifact-prefix) }}
          path: fbclient-artifacts
          repository: winlibs/winlib-builder
          run-id: ${{ matrix.release.fbclient-run-id }}
          github-token: ${{ secrets.PAT != '' && secrets.PAT || github.token }}

      - name: Show release PHP and artifact contents
        shell: pwsh
        run: |
          where.exe php
          php -v
          php -i | Select-String -Pattern '^PHP Version =>', '^Thread Safety =>', '^Architecture =>', '^extension_dir =>'
          Get-ChildItem -Path C:\tools\php\ext -Filter 'php_pdo*.dll' |
            Sort-Object Name |
            Format-Table Name, Length -AutoSize
          Get-ChildItem -Path fbclient-artifacts -Recurse -File |
            Sort-Object FullName |
            Format-Table FullName, Length -AutoSize

      - name: Run PDO Firebird tests against released PHP
        shell: pwsh
        run: |
          $fbclientArtifactsDirectory = Join-Path $env:GITHUB_WORKSPACE 'fbclient-artifacts'
          $builderRoot = Join-Path $env:GITHUB_WORKSPACE 'php-windows-builder'

          .github\scripts\run-pdo-firebird-released-tests.ps1 `
            -RequestedPhpVersion '${{ matrix.release.php-version }}' `
            -ActualPhpVersion '${{ matrix.release.actual-php-version }}' `
            -Ts '${{ matrix.ts }}' `
            -FbclientArtifactsDirectory $fbclientArtifactsDirectory `
            -FirebirdTag '${{ matrix.release.firebird-tag }}' `
            -FirebirdPackageName '${{ format('{0}-x64.zip', matrix.release.firebird-package-base) }}' `
            -BuilderRoot $builderRoot

      - name: Upload release test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdo-firebird-released-results-${{ matrix.release.php-version }}-${{ matrix.ts }}
          path: results/*
          if-no-files-found: warn
