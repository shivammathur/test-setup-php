name: "[Windows] Build Phalcon"

on:
  - push
  - pull_request

env:
  # All versions should be declared here
  PHALCON_VERSION: 5.10.0

jobs:
  windows:
    runs-on: windows-latest
    name: "Build Phalcon (PHP ${{ matrix.php }}-${{ matrix.ts }}-${{ matrix.arch }})"
    defaults:
      run:
        shell: cmd
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
        arch:
          - x64
          - x86
        ts:
          - nts
          - ts
        experimental: [false]
    steps:
      - name: Checkout Phalcon
        uses: actions/checkout@v4

#      - name: Extract Phalcon Version
#        shell: powershell
#        run: |
#          chcp 65001
#          $r = Select-String -Path build/phalcon/php_phalcon.h -Pattern 'PHP_PHALCON_VERSION\s+"(.*)"'
#          $s = $r.Matches[0].Groups[1]
#          echo "$s"
#          $PhalconVersion = 'PHALCON_VERSION=' + $s
#          echo $PhalconVersion >> $env:GITHUB_ENV
#
#      - name: Setup PHP
#        id: setup-php
#        uses: php/setup-php-sdk@v0.11
#        with:
#          version: ${{matrix.php}}
#          arch: ${{matrix.arch}}
#          ts: ${{matrix.ts}}
#          deps: zlib

      - name: Generate build folder
        run: |
          cd build/
          php gen-build.php

      - name: Build the extension
        uses: php/php-windows-builder/extension@v1
        with:
          php-version: ${{ matrix.php-version }}
          arch: ${{ matrix.arch }}
          ts: ${{ matrix.ts }}

