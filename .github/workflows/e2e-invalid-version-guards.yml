name: E2E - Invalid Version Guards
on:
  push:
    branches:
      - e2e-regression-workflows
  workflow_dispatch:
permissions:
  contents: read
jobs:
  invalid-inputs:
    name: Invalid ${{ matrix.case.label }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15-intel
          - windows-2022
        case:
          - label: shell metachar
            payload: ';id'
          - label: command substitution
            payload: '$(id)'
          - label: unsupported 4.x alias
            payload: '4.x'
          - label: command sentinel
            payload: '8.4;touch $GITHUB_WORKSPACE/setup-php-version-ran'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP with invalid direct input
        id: setup
        continue-on-error: true
        uses: shivammathur/setup-php@develop
        with:
          php-version: ${{ matrix.case.payload }}

      - name: Assert invalid input failed
        shell: bash
        run: |
          [[ '${{ steps.setup.outcome }}' == 'failure' ]] || {
            echo "Expected setup to fail for invalid direct input"
            exit 1
          }
          [[ -z '${{ steps.setup.outputs.php-version }}' ]] || {
            echo "Expected no php-version output for invalid direct input"
            exit 1
          }
          [[ ! -e "$GITHUB_WORKSPACE/setup-php-version-ran" ]] || {
            echo "Invalid php-version input executed a sentinel command"
            exit 1
          }

  invalid-repository-sources:
    name: Invalid ${{ matrix.label }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: '.php-version'
            source: php-version-file
            payload: '$0'
          - label: '.php-version 4.x'
            source: php-version-file
            payload: '4.x'
          - label: '.tool-versions injection'
            source: tool-versions
            payload: 'php 8.4.2;touch $GITHUB_WORKSPACE/setup-php-version-ran'
            php-version-file: .tool-versions
          - label: 'custom php-version-file'
            source: custom-php-version-file
            payload: '$$'
            php-version-file: custom-php-version
          - label: 'custom php-version-file 4.x'
            source: custom-php-version-file
            payload: '4.x'
            php-version-file: custom-php-version
          - label: composer.lock
            source: composer-lock
            payload: '`w`'
          - label: composer.lock 4.x
            source: composer-lock
            payload: '4.x'
          - label: composer.json
            source: composer-json
            payload: bogus
          - label: composer.json 4.x
            source: composer-json
            payload: '4.x'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Stage invalid repository source
        run: |
          rm -f .php-version .tool-versions custom-php-version composer.json composer.lock
          case '${{ matrix.source }}' in
            php-version-file)
              printf '%s\n' '${{ matrix.payload }}' > .php-version
              ;;
            tool-versions)
              printf '%s\n' '${{ matrix.payload }}' > .tool-versions
              ;;
            custom-php-version-file)
              printf '%s\n' '${{ matrix.payload }}' > custom-php-version
              ;;
            composer-lock)
              printf '{ "platform-overrides": { "php": "%s" } }\n' '${{ matrix.payload }}' > composer.lock
              ;;
            composer-json)
              printf '{ "config": { "platform": { "php": "%s" } } }\n' '${{ matrix.payload }}' > composer.json
              ;;
          esac

      - name: Setup PHP with invalid repository source
        id: setup
        continue-on-error: true
        uses: shivammathur/setup-php@develop
        with:
          php-version-file: ${{ matrix.php-version-file }}

      - name: Assert invalid repository source failed
        run: |
          [[ '${{ steps.setup.outcome }}' == 'failure' ]] || {
            echo "Expected setup to fail for invalid repository source"
            exit 1
          }
          [[ -z '${{ steps.setup.outputs.php-version }}' ]] || {
            echo "Expected no php-version output for invalid repository source"
            exit 1
          }
          [[ ! -e "$GITHUB_WORKSPACE/setup-php-version-ran" ]] || {
            echo "Invalid repository version source executed a sentinel command"
            exit 1
          }
