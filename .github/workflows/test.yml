name: 'Runner Test'
on: [push]
jobs:
  run:
    strategy:
      matrix:
        os: [windows-latest]
        php: [7.4, 8.0, 8.1, 8.2, 8.3, 8.4, 8.5]
    runs-on: ${{ matrix.os }}
    name: Test
    steps:
    - uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        extensions: amqp
    - run: |
        php -v
        php -m
        php -r "echo phpversion('amqp');"
        php --ri amqp
        
        
