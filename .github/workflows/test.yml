name: Runner
on: [push]
jobs:
  e2e-tests:
    name: Run
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    steps:
      - run: |
          cat >"/tmp/brew.curlrc" <<'EOF'
          --connect-timeout 1
          --max-time 5
          --speed-time 2
          --speed-limit 1000000000
          EOF
      - name: Test
        env:
          HOMEBREW_CURLRC: /tmp/brew.curlrc
        run: |
          brew install --only-dependencies php
