name: Runner
on: [push]
jobs:
  e2e-tests:
    name: Run
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, ubuntu-22.04, ubuntu-22.04-arm, macos-14, macos-15-intel, windows-latest]
        php: [8.3, 8.4, 8.5]
    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools:
      - name: Test
        if: ${{ !startsWith(${{ matrix.os }}, 'windows') }}
        run: |
          a=$(php -v | head) || true
          echo "::warning::$a"
      - name: Test
        if: ${{ startsWith(${{ matrix.os }}, 'windows') }}
        run: |
          $a = (php -v - Split '\n')[0]
          echo "::warning::$a"
