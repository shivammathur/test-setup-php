name: Runner
on: [push]
jobs:
  runner:
    name: runner
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-latest]
    steps:
      # Test 1: Phar type tools with exact versions
      - run: |
          mkdir aa
          mkdir bb
          c=$(pwd)
          echo $c/aa >> $GITHUB_PATH
          echo $c/bb >> $GITHUB_PATH
      - run: |
          echo $PATH || true
          echo $env:PATH || true
