name: Runner
on: [push]
jobs:
  e2e-tests:
    name: Run
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
        dc: [1, 2, 4, 6, 8, 10]
    steps:
      - name: Test
        env:
          HOMEBREW_DOWNLOAD_CONCURRENCY: ${{ matrix.dc }}
        run: |
          brew config
          brew fetch --deps --force-bottle --verbose --debug php
          brew install --only-dependencies --verbose --debug php
          brew install --verbose --debug php
