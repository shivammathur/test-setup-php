name: Runner
on: [push]
jobs:
  runner:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        php: [8.5, 8.6]
        exclude:
          - php: 8.6
            os: windows-latest
    steps:
      - uses: shivammathur/setup-php@v2  
        with:
          php-version: ${{ matrix.php }}
          extensions: redis
      - run: |
          php -v
          php --ri redis    

