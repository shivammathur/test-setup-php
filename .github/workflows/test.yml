name: Runner
on:
  push:
jobs:
  run:
    runs-on: ubuntu-24.04
    container: shivammathur/node:php-${{ matrix.php-version }}-24.04-${{ matrix.arch }}
    strategy:
      matrix:
        arch: ["amd64", "arm64v8"]
    steps:
      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      - run: |
          php -v
        
