name: Runner
on:
  push:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        php: [8.4, 8.5]
        os: [ubuntu-latest]
    steps:
      - name: Set up PHP
        uses: shivammathur/setup-php@verbose
        with:
          php-version: ${{ matrix.php }}
          extensions: apcu, pecl_http, ssh2, uopz, uuid
      - run: |
          php -v
          php -m
