name: Runner
on: [push]
jobs:
  e2e-tests:
    name: E2E Tests - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            image: ubuntu:24.04
          - os: ubuntu-24.04-arm
            image: arm64v8/ubuntu:24.04
          - os: ubuntu-24.04
            image: ubuntu:22.04
          - os: ubuntu-24.04-arm
            image: arm64v8/ubuntu:22.04
    steps:
      # Test 1: Phar type tools with exact versions
      - run: |
          echo $PATH || true
          echo $env:PATH || true
      - uses: actions/setup-node@v6
        with:
          node-version: '18'
      - name: Setup PHP with phar tools
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: >-
            phpstan:1.12.0,
            psalm:5.26.0,
            php-cs-fixer:3.64.0,
            phpcs:3.10.3,
            phpmd:2.15.0,
            parallel-lint:1.4.0,
            cs2pr:1.8.2
      - name: Test PHPStan 1.12.0
        run: |
          phpstan --version
          php -r "if(strpos(shell_exec('phpstan --version 2>&1'), '1.12.0')===false) exit(1);"

      - name: Test Psalm 5.26.0
        run: |
          psalm --version
          php -r "if(strpos(shell_exec('psalm --version 2>&1'), '5.26.0')===false) exit(1);"

      - name: Test PHP-CS-Fixer 3.64.0
        run: |
          php-cs-fixer --version
          php -r "if(strpos(shell_exec('php-cs-fixer --version 2>&1'), '3.64.0')===false) exit(1);"

      - name: Test PHPCS 3.10.3
        run: |
          phpcs --version
          php -r "if(strpos(shell_exec('phpcs --version 2>&1'), '3.10.3')===false) exit(1);"

      - name: Test PHPMD 2.15.0
        run: |
          phpmd --version
          php -r "if(strpos(shell_exec('phpmd --version 2>&1'), '2.15.0')===false) exit(1);"

      - name: Test Parallel-Lint 1.4.0
        run: |
          parallel-lint --version
          php -r "if(strpos(shell_exec('parallel-lint --version 2>&1'), '1.4.0')===false) exit(1);"

      - name: Test CS2PR 1.8.2
        run: |
          cs2pr -V
          php -r "if(strpos(shell_exec('cs2pr -V 2>&1'), '1.8.2')===false) exit(1);"

      # Test 2: Composer type tools
      - name: Setup PHP with composer tools
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: >-
            rector:1.2.0,
            behat:3.28.0,
            phinx:0.16.10
      - name: Test Rector 1.2.0
        run: |
          echo $PATH || true
          echo $env:PATH || true
          rector --version
          php -r "if(strpos(shell_exec('rector --version 2>&1'), '1.2.0')===false) exit(1);"

      - name: Test Behat 3.28.0
        run: |
          behat --version
          php -r "if(strpos(shell_exec('behat --version 2>&1'), '3.28.0')===false) exit(1);"

      - name: Test Phinx 0.16.10
        run: |
          phinx --version
          php -r "if(strpos(shell_exec('phinx --version 2>&1'), '0.16.10')===false) exit(1);"

      # Test 3: Custom-function tools
      - name: Setup PHP with custom-function tools
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: >-
            composer:2.7.9,
            phpunit:11.3.0,
            deployer:7.4.1,
            phive:0.15.3
      - name: Test Composer 2.7.9
        run: |
          composer --version
          php -r "if(strpos(shell_exec('composer --version 2>&1'), '2.7.9')===false) exit(1);"

      - name: Test PHPUnit 11.3.0
        run: |
          phpunit --version
          php -r "if(strpos(shell_exec('phpunit --version 2>&1'), '11.3.0')===false) exit(1);"

      - name: Test Deployer 7.4.1
        run: |
          deployer --version
          php -r "if(strpos(shell_exec('deployer --version 2>&1'), '7.4.1')===false) exit(1);"

      - name: Test Phive 0.15.3
        run: |
          phive --version
          php -r "if(strpos(shell_exec('phive --version 2>&1'), '0.15.3')===false) exit(1);"

      # Test 4: WP-CLI (Unix only)
      - name: Setup PHP with WP-CLI
        if: runner.os != 'Windows'
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: wp-cli:2.11.0

      - name: Test WP-CLI 2.11.0
        if: runner.os != 'Windows'
        run: |
          wp --version --allow-root
          php -r "if(strpos(shell_exec('wp --version --allow-root 2>&1'), '2.11.0')===false) exit(1);"

      # Test 5: Latest version resolution
      - name: Setup PHP with latest tool versions
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: >-
            composer,
            phpunit,
            phpstan,
            php-cs-fixer
      - name: Test tools installed (latest)
        run: |
          composer --version
          phpunit --version
          phpstan --version
          php-cs-fixer --version
      # Test 6: Semver resolution (major.minor)
      - name: Setup PHP with major.minor versions
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: >-
            phpstan:1.12,
            phpunit:11.3,
            psalm:5.26
      - name: Test PHPStan resolves 1.12.x
        run: |
          phpstan --version
          php -r "if(strpos(shell_exec('phpstan --version 2>&1'), '1.12.32')===false) exit(1);"

      - name: Test PHPUnit resolves 11.3.x
        run: |
          phpunit --version
          php -r "if(strpos(shell_exec('phpunit --version 2>&1'), '11.3.6')===false) exit(1);"

      - name: Test Psalm resolves 5.26.x
        run: |
          psalm --version
          php -r "if(strpos(shell_exec('psalm --version 2>&1'), '5.26.1')===false) exit(1);"

      # Test 7: Composer channels
      - name: Setup PHP with composer stable
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: composer:stable

      - name: Test Composer stable channel
        run: composer --version

      - name: Setup PHP with composer 2
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: composer:2

      - name: Test Composer 2 channel
        run: |
          composer --version
          php -r "if(strpos(shell_exec('composer --version 2>&1'), 'Composer version 2')===false) exit(1);"

      # Test 8: Tool aliases
      - name: Setup PHP with tool aliases
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: >-
            phpdoc:3.5.0,
            ecs:12.3.0
      - name: Test phpDocumentor 3.5.0 (alias - phpdoc)
        run: |
          phpdoc --version
          php -r "if(strpos(shell_exec('phpdoc --version 2>&1'), '3.5.0')===false) exit(1);"

      - name: Test Easy Coding Standard 12.3.0 (alias - ecs)
        run: |
          ecs --version
          php -r "if(strpos(shell_exec('ecs --version 2>&1'), '12.3.0')===false) exit(1);"

      # Test 9: User/repo format for composer tools
      - name: Setup PHP with user/repo tools
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: laravel/pint:1.18.0

      - name: Test Pint 1.18.0 (user/repo format)
        run: |
          pint --version
          php -r "if(strpos(shell_exec('pint --version 2>&1'), '1.18.0')===false) exit(1);"

      # Test 10: Dev tools (Unix only)
      - name: Setup PHP with dev tools
        if: runner.os != 'Windows'
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: php-config, phpize

      - name: Test php-config
        if: runner.os != 'Windows'
        run: php-config --version

      - name: Test phpize
        if: runner.os != 'Windows'
        run: phpize --version

      # Test 11: PECL (Unix only)
      - name: Setup PHP with PECL
        if: runner.os != 'Windows'
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: pecl

      - name: Test PECL
        if: runner.os != 'Windows'
        run: pecl version

      # Test 12: Partial version resolution (major and major.minor)
      - name: Setup PHP with partial version tools
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: >-
            phpunit:10,
            phpstan:2.1,
            psalm:6,
            deployer:7.5,
            phpcs:3.13
      - name: Test PHPUnit 10.5.x (major version)
        run: |
          phpunit --version
          php -r "if(strpos(shell_exec('phpunit --version 2>&1'), '10.5.60')===false) exit(1);"

      - name: Test PHPStan 2.1.x (major.minor version)
        run: |
          echo $PATH || true
          echo $env:PATH || true
          phpstan --version
          php -r "if(strpos(shell_exec('phpstan --version 2>&1'), '2.1.36')===false) exit(1);"

      - name: Test Psalm 6.x (major version)
        run: |
          psalm --version
          php -r "if(strpos(shell_exec('psalm --version 2>&1'), '6.14.3')===false) exit(1);"

      - name: Test Deployer 7.5.x (major.minor version)
        run: |
          deployer --version
          php -r "if(strpos(shell_exec('deployer --version 2>&1'), '7.5.12')===false) exit(1);"

      - name: Test PHPCS 3.13.x (major.minor version)
        run: |
          phpcs --version
          php -r "if(strpos(shell_exec('phpcs --version 2>&1'), '3.13.5')===false) exit(1);"

      # Test 13: Castor (custom-function)
      - name: Setup PHP with Castor
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: castor:0.18.0

      - name: Test Castor 0.18.0
        run: |
          castor --version
          php -r "if(strpos(shell_exec('castor --version 2>&1'), '0.18.0')===false) exit(1);"

      # Test 14: Phing (custom-function)
      - name: Setup PHP with Phing
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: phing:3.0.1

      - name: Test Phing 3.0.1
        run: |
          phing -v
          php -r "if(strpos(shell_exec('phing -v 2>&1'), '3.0.1')===false) exit(1);"

      # Test 15: PHPCPD (custom-function using phpunit handler)
      - name: Setup PHP with PHPCPD
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: phpcpd:6.0.3

      - name: Test PHPCPD 6.0.3
        run: |
          phpcpd --version
          php -r "if(strpos(shell_exec('phpcpd --version 2>&1'), '6.0.3')===false) exit(1);"

      # Test 16: fetch_latest tools
      - name: Setup PHP with fetch_latest tool
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: php-cs-fixer:3.64

      - name: Test PHP-CS-Fixer 3.64.x (fetch_latest)
        run: |
          php-cs-fixer --version
          php -r "if(strpos(shell_exec('php-cs-fixer --version 2>&1'), '3.64.0')===false) exit(1);"

      # Test 17: Multiple tools in single input
      - name: Setup PHP with multiple tools
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: composer:2.7.9, phpunit:11.3.0, phpstan:1.12.0, php-cs-fixer:3.64.0, psalm:5.26.0

      - name: Verify all tools installed with exact versions
        run: |
          composer --version
          phpunit --version
          phpstan --version
          php-cs-fixer --version
          psalm --version
          php -r "if(strpos(shell_exec('composer --version 2>&1'), '2.7.9')===false) exit(1);"
          php -r "if(strpos(shell_exec('phpunit --version 2>&1'), '11.3.0')===false) exit(1);"
          php -r "if(strpos(shell_exec('phpstan --version 2>&1'), '1.12.0')===false) exit(1);"
          php -r "if(strpos(shell_exec('php-cs-fixer --version 2>&1'), '3.64.0')===false) exit(1);"
          php -r "if(strpos(shell_exec('psalm --version 2>&1'), '5.26.0')===false) exit(1);"
      # Test 18: Box tool (phar type)
      - name: Setup PHP with Box
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: box:4.6.2

      - name: Test Box 4.6.2
        run: |
          box --version
          php -r "if(strpos(shell_exec('box --version 2>&1'), '4.6.2')===false) exit(1);"

      # Test 19: Infection tool (phar type)
      - name: Setup PHP with Infection
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: infection:0.29.6

      - name: Test Infection 0.29.6
        run: |
          infection --version
          php -r "if(strpos(shell_exec('infection --version 2>&1'), '0.29.6')===false) exit(1);"

      # Test 20: Deployer alias (dep command)
      - name: Setup PHP with Deployer for alias test
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: deployer:7.5.0

      - name: Test Deployer aliases (deployer and dep)
        run: |
          deployer --version
          dep --version
          php -r "if(strpos(shell_exec('deployer --version 2>&1'), '7.5.0')===false) exit(1);"
          php -r "if(strpos(shell_exec('dep --version 2>&1'), '7.5.0')===false) exit(1);"

      # Test 21: Cache hit verification (re-install same tool)
      - name: Setup PHP with same phpstan version (cache hit)
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: phpstan:1.12.0

      - name: Test PHPStan 1.12.0 (from cache)
        run: |
          phpstan --version
          php -r "if(strpos(shell_exec('phpstan --version 2>&1'), '1.12.0')===false) exit(1);"

      # Test 22: Codeception (scoped tool with alias)
      - name: Setup PHP with Codeception
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: codeception:5.1.2

      - name: Test Codeception aliases (codecept and codeception)
        run: |
          codecept --version
          codeception --version
          php -r "if(strpos(shell_exec('codecept --version 2>&1'), '5.1.2')===false) exit(1);"
          php -r "if(strpos(shell_exec('codeception --version 2>&1'), '5.1.2')===false) exit(1);"

      # Test 23: Tool cache symlinks
      - name: Verify tool cache symlinks exist (Unix)
        if: runner.os != 'Windows'
        run: |
          ls -la "$RUNNER_TOOL_CACHE/setup-php/tools/" || true
          test -L "$RUNNER_TOOL_CACHE/setup-php/tools/phpstan" || echo "Symlink not found"

      # Test 24: phpDocumentor aliases
      - name: Setup PHP with phpDocumentor
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: phpDocumentor:3.5.0

      - name: Test phpDocumentor aliases (phpdoc and phpdocumentor)
        run: |
          phpdoc --version
          phpdocumentor --version
          php -r "if(strpos(shell_exec('phpdoc --version 2>&1'), '3.5.0')===false) exit(1);"
          php -r "if(strpos(shell_exec('phpdocumentor --version 2>&1'), '3.5.0')===false) exit(1);"

      # Test 25: Verify setup-node PATH preserved
      - name: Test node still accessible
        run: |
          echo "$PATH"
          which node || where node
          node --version
