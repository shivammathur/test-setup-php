name: Runner
on:
  push:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3, 8.4, 8.5, 8.6]
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
      - uses: shivammathur/setup-php@develop
        with:
          php-version: ${{ matrix.php }}          
      - run: |
          php -v
          php -m
        
