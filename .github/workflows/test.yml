name: Runner
on: [push]
jobs:
  runner:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        php: [8.3, 8.4, 8.5, 8.6]
    steps:
      - uses: shivammathur/setup-php@more-verbose
        with:
          php-version: ${{ matrix.php }}
      - run: |
          php -v
          php -m
