name: Runner
on: [push]
jobs:
  e2e-tests:
    name: Run
    runs-on: ${{ matrix.os }}    
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-15-intel]
        tag: [develop, test-brew]
    steps:
      - name: SetUp PHP
        id: setup-php
        uses: shivammathur/setup-php@${{ matrix.tag }}
        with:
          php-version: 8.5
