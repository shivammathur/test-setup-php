name: Runner
on:
  push:
jobs:
  run:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      fail-fast: false
      matrix:
        operating-system: [macos-latest, macos-15-intel]
        php: [5.6, 7.0, 7.1, 7.2, 7.3, 7.4, 8.0 8.1, 8.2, 8.3, 8.5, 8.6]
    steps:
    - uses: shivammathur/setup-php@develop
      with:
        php-version: ${{ matrix.php }}
    - run: |
        php -v
        
