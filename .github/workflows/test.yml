name: Runner
on: [push]
jobs:
  e2e-tests:
    name: Run
    runs-on: ${{ matrix.os }}    
    strategy:
      fail-fast: false
      matrix:
        os: [macos-13, macos-14, macos-15, macos-26, macos-latest, ubuntu-22.04, ubuntu-24.04, ubuntu-latest, ubuntu-22.04-arm, ubuntu-24.04-arm]
    steps:
      - run: php -v || true
