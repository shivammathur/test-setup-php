name: Runner
on: [push]
jobs:
  e2e-tests:
    name: E2E Tests - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
        php: [5.6, 7.0,7.1,7.2,7.3,7.4,8.0,8.1,8.2,8.3,8.4,8.5,8.6]
    steps:
      # Test 1: Phar type tools with exact versions
      - name: Setup PHP with phar tools
        uses: shivammathur/setup-php@develop
        with:
          php-version: ${{ matrix.php }}
        env:  
          phpts: ts
      - name: Test
        run: |          
          echo "::info::$(php -r "echo ZEND_THREAD_SAFE;")"
