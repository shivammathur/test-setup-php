name: Runner workflow
on:
  push:
jobs:
  runner:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      fail-fast: false
      matrix:
        operating-system: [ubuntu-latest]
        php: ['8.2', '8.3', '8.4', '8.5', '8.6']
    steps:
      - run: sudo apt install libkrb5-dev -y
      - name: Install PHP
        uses: shivammathur/setup-php@verbose
        with:
          php-version: ${{ matrix.php }}
          extensions: krb5
      - run: php -v && php -m
  
