name: Runner
on: [push]
jobs:
  e2e-tests:
    name: Run
    runs-on: ${{ matrix.os }}    
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    steps:
      - uses: shivammathur/setup-php@develop
        with:
          php-version: 8.5
          extensions: maxminddb, interbase
      - run: php -v && php -m
