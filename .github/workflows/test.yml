name: Runner
on: [push]
jobs:
  e2e-tests:
    name: Run
    runs-on: ${{ matrix.os }}    
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]
    steps:
      - run: php -v || true
      - run: |
          curl -fsSL https://zerobrew.rs/install | bash
          zb install php
      - run: php -v || true
