name: Runner
on:
  push:
jobs:
  run:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      fail-fast: false
      matrix:
        operating-system: [macos-latest, windows-latest]
    steps:
    - uses: shivammathur/setup-php@develop
      with:
        php-version: 8.5
        extensions: ibm_db2, pdo_ibm
    - uses: mxschmitt/action-tmate@v3.23
    - run: php -v && php -m    
        
