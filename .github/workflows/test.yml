name: Runner
on: [push]
jobs:
  e2e-tests:
    name: Run
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest,ubuntu-24.04,ubuntu-22.04,ubuntu-24.04-arm,ubuntu-22.04-arm,windows-2025,windows-latest,windows-2022,macos-26,macos-latest,macos-15-intel,macos-14,macos-15,macos-13]
    steps:
      - name: Test
        run: |
          php -v || true
