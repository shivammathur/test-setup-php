name: Runner
on:
  push:
jobs:
  run:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      fail-fast: false
      matrix:
        operating-system: [windows-latest]
        php: [8.5, 8.6]
    steps:
    - uses: shivammathur/setup-php@develop
      with:
        php-version: ${{ matrix.php }}
    - run: |
        php -v
        
