name: Source extensions workflow
on:
  push:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: shivammathur/setup-php@develop
        with:
          php-version: 8.1
          tools: behat:3.20, infection:0.20.x, churn:1.5, flex:v2, phan:4.0, php-cs-fixer:3.4, phpcs:3.5.x, phpcbf:3.5, phpcpd:v6.x, phpDocumentor:3.1, phpspec:7.2, phpstan:0.12, phpmd:2.9, cs2pr:1.4, phpunit:9.5, phpunit-bridge:5, phpunit-polyfills:1.0, psalm:4.4, phing:2.x, phinx:0.12, phive:0.14, deployer:v6, composer:2.0.x, symfony-cli, vapor-cli:1.11
      - run: vapor -V    
