name: ondrej-only extensions

on:
  push:

jobs:
  extensions:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3, 8.4, 8.5]
    env:
      fail-fast: false
    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@verbose
        with:
          php-version: ${{ matrix.php }}
          extensions: http, yar, solr, scoutapm, oauth

      - name: Report which extensions loaded
        run: |
          php -v
          php -m
