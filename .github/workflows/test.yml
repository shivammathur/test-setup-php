name: 'Runner Test'
on: [push]
jobs:
  run:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    name: Test
    steps:
    - run: |
          Function Add-OciDB {
              <#
              .SYNOPSIS
                  Add OCI DB.
              #>
              [OutputType()]
              param(
              )
              begin {
                  $installDir = 'C:\oracle\product\21c'
                  $setupDir = 'C:\tools\oracle-setup'
                  $workingDir = 'C:\tools\oracle'
          
                  $dbPassword = 'oracle'
                  $dbPort = '1521'
                  $dbEmExpressPort = '5550'
                  $dbCharset = 'AL32UTF8'
                  $dbDomain = 'localdomain'
          
                  $dbZipFile = 'OracleXE213_Win64.zip'
                  $dbUrl = 'https://download.oracle.com/otn-pub/otn_software/db-express/OracleXE213_Win64.zip'
              }
              process {
                  Add-Type -Assembly "System.IO.Compression.Filesystem"
                  @(
                      $workingDir,
                      $setupDir,
                      "$setupDir\temp",
                      $installDir
                  ) | ForEach-Object {
                      New-Item -ItemType Directory -Path $_ -Force | Out-Null
                  }
          
                  Get-File -Url $dbUrl -OutFile $dbZipFile
                  $rspContent = @(
                      "INSTALLDIR=$installDir\"
                      "PASSWORD=$dbPassword"
                      "LISTENER_PORT=$dbPort"
                      "EMEXPRESS_PORT=$dbEmExpressPort"
                      "CHAR_SET=$dbCharset"
                      "DB_DOMAIN=$dbDomain"
                  )
                  $argumentList = @(
                      '/s'
                      "/v`"RSP_FILE=$setupDir\OracleServerInstall.rsp`""
                      "/v`"/L*v $setupDir\OracleServerSetup.log`""
                      '/v"/qn"'
                  )
                  if (Get-Command 7z -ErrorAction SilentlyContinue) {
                      7z x $dbZipFile "-o$setupDir" -y | Out-Null
                  } else {
                      [System.IO.Compression.ZipFile]::ExtractToDirectory($dbZipFile, $setupDir)
                  }
                  $rspContent | Set-Content -Path $setupDir\OracleServerInstall.rsp
          
                  $oldEnv = @{
                      TMPDIR = $env:TMPDIR
                      TMP    = $env:TMP
                      TEMP   = $env:TEMP
                  }
          
                  try {
                      $env:TMPDIR = "$setupDir\temp"
                      $env:TMP    = "$setupDir\temp"
                      $env:TEMP   = "$setupDir\temp"
          
                      Start-Process -FilePath $setupDir\setup.exe -ArgumentList $argumentList -WorkingDirectory $workingDir -NoNewWindow -Wait
                  }
                  finally {
                      $env:TMPDIR = $oldEnv.TMPDIR
                      $env:TMP    = $oldEnv.TMP
                      $env:TEMP   = $oldEnv.TEMP
                  }
          
                  Add-Path -PathItem "$oracleHome\bin"
                  $env:ORACLE_HOME="$installDir\dbhomeXE"
              }
              end {
              }
          }
          Add-OciDB
          
          $ErrorActionPreference = 'Stop'

          # Ensure sqlplus is available
          $sqlplusCmd = Get-Command sqlplus.exe -ErrorAction SilentlyContinue
          if (-not $sqlplusCmd) {
            $candidate = Join-Path $env:ORACLE_HOME 'bin\sqlplus.exe'
            if (-not (Test-Path $candidate)) {
              throw "sqlplus.exe not found. ORACLE_HOME=$env:ORACLE_HOME"
            }
            $env:PATH = (Split-Path $candidate) + ';' + $env:PATH
          }

          # Parse PDO DSN: oci:dbname=host:port/service;charset=...
          if ($env:PDO_OCI_TEST_DSN -notmatch 'dbname=([^;]+)') {
            throw "Could not parse PDO_OCI_TEST_DSN: $env:PDO_OCI_TEST_DSN"
          }
          $db = $Matches[1]
          $connect = ($db -like '//*') ? $db : "//$db"
          $conn = "$($env:PDO_OCI_TEST_USER)/$($env:PDO_OCI_TEST_PASS)@$connect"

          # Wait for DB to accept connections
          for ($i = 1; $i -le 60; $i++) {
            $out = & sqlplus.exe -L -s $conn @"
            whenever sqlerror exit 1
            set heading off feedback off pagesize 0 verify off echo off
            select 'OK' from dual;
            exit
            "@ 2>&1

            if ($LASTEXITCODE -eq 0 -and ($out -match '\bOK\b')) { break }

            Start-Sleep -Seconds 5
            if ($i -eq 60) { throw "Oracle didn't become ready. Last output:`n$out" }
          }

          # List tables + check for TEST
          & sqlplus.exe -L -s $conn @"
          set pagesize 50000 linesize 200 trimspool on
          
          prompt
          prompt === CURRENT USER ===
          set heading on
          col "USER" format a30
          select user as "USER" from dual;
          
          prompt
          prompt === USER_TABLES (tables in current schema) ===
          col table_name format a50
          select table_name from user_tables order by table_name;
          
          prompt
          prompt === TEST table check (unquoted Oracle identifiers are UPPERCASE) ===
          col TEST_EXISTS format a10
          select case
                   when exists (select 1 from user_tables where table_name = 'TEST') then 'YES'
                   else 'NO'
                 end as TEST_EXISTS
          from dual;
          
          prompt
          prompt === TEST across ALL_TABLES (any visible schema) ===
          col owner format a20
          col table_name format a50
          select owner, table_name
          from all_tables
          where table_name = 'TEST'
          order by owner;
          
          exit
          "@
        
