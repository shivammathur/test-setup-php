name: Runner
on: [push]
jobs:
  runner:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: shivammathur/setup-php@v2  
        with:
          php-version: 5.6
          extensions: redis
      - run: |
          php -v
          php --ri redis    

