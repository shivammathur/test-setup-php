name: Runner
on:
  push:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        php: [8.6]
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
      - uses: shivammathur/setup-php@develop
        with:
          php-version: ${{ matrix.php }}
          extensions: decimal, excimer, gearman, gnupg, grpc, http, lz4, mailparse, maxminddb, mcrypt, oauth, opentelemetry, pq, protobuf, psr, raphf, rdkafka, smbclient, solr, ssh2, uopz, uploadprogress, uuid, xhprof, xlswriter, xmlrpc, zstd
      - run: |
          php -v
          php -m
        
