name: Runner
on:
  push:
jobs:
  run:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      fail-fast: false
      matrix:
        operating-system: [ubuntu-latest, macos-latest]
    steps:
    - uses: shivammathur/setup-php@develop
      with:
        php-version: 8.5
        extensions: amqp, pdo_oci, geos, sqlsrv, pdo_sqlsrv
        
