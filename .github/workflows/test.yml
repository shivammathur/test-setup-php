name: Runner
on: [push]
jobs:
  runner:
    name: runner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '12'
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer
          coverage: none
      - name: Tool versions
        run: |
          which node
          node --version
