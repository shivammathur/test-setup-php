name: Test PHP packages
on:
  push:
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
    steps:
      - uses: shivammathur/setup-php@v2
        continue-on-error: true
        with:
          php-version: 8.5.5

      - uses: shivammathur/setup-php@v2
        continue-on-error: true
        with:
          php-version: '8.5-debug'

      - uses: shivammathur/setup-php@v2
        continue-on-error: true
        with:
          php-version: '8.5.0-debug'

