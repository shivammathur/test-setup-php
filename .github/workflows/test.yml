name: Runner

on: [push]

jobs:
  test:
    runs-on: macos-26
    steps:
      - name: Install MacPorts (pkg)
        shell: bash
        run: |
          url="https://distfiles.macports.org/MacPorts/MacPorts-2.11.5-26-Tahoe.pkg"
          curl -fsSL $url -o /tmp/MacPorts.pkg

          sudo installer -pkg /tmp/MacPorts.pkg -target /

          # Ensure MacPorts is on PATH for subsequent steps
          echo "/opt/local/bin"  >> "$GITHUB_PATH"
          echo "/opt/local/sbin" >> "$GITHUB_PATH"

          port version
          sudo port -N selfupdate

      - name: Test
        run: |
          sudo port -N install php84
          sudo port -N install php83

          echo "port select help:"
          port help select || true

          echo "Available php select entries:"
          port select --list php

          echo "Explicit form"
          sudo port select --set php php84

          which php
          php -v | head -n 1

          echo "Shorthand form"
          sudo port select php php83

          which php
          php -v | head -n 1
