
name: Runner
on:
  push:
jobs:
  run:
    runs-on: macos-15
    steps:
      - run: brew config
      - run: sudo xcode-select -s /Applications/Xcode_26.1.1.app
      - run: softwareupdate --install "$(softwareupdate --list 2>/dev/null | grep -Eo '(Command Line Tools.*)' | head -1)"
      - run: brew config
      - run: |
          brew tap shivammathur/php
          brew install -svd php@8.6
