name: Runner
on:
  push:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        php: [8.5]
        os: [ubuntu-22.04]
    steps:
      - name: Set up PHP
        uses: buildrush/setup-php@v1
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
      - run: |
          php -v
          composer -V
