name: Runner workflow
on:
  push:
jobs:
  tests:
    name: "Unit Tests (PHP)"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        php-version:
          - "8.1"
          - "8.2"
          - "8.3"
          - "8.4"
          - "8.5"

    steps:
      - name: "Install PHP with extensions"
        uses: shivammathur/setup-php@develop
        with:
          php-version: ${{ matrix.php-version }}
          coverage: pcov

      - run: |    
          php -r "if(! extension_loaded('pcov')) {throw new Exception('pcov not found');}"
      
  
