name: ondrej-only extensions

on:
  push:

jobs:
  extensions:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3, 8.4, 8.5]
    env:
      fail-fast: false
    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@verbose
        with:
          php-version: ${{ matrix.php }}
          extensions: http, yar, solr, scoutapm, oauth
        env:
          update: true

      - name: Report which extensions loaded
        run: |
          php -v
          php -m
          php -r "if(! extension_loaded('http')) {throw new Exception('http not found');}"
          php -r "if(! extension_loaded('yar')) {throw new Exception('yar not found');}"
          php -r "if(! extension_loaded('solr')) {throw new Exception('solr not found');}"
          php -r "if(! extension_loaded('scoutapm')) {throw new Exception('scoutapm not found');}"
          php -r "if(! extension_loaded('oauth')) {throw new Exception('oauth not found');}"
