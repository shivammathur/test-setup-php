
name: Runner
on: [push]
jobs:
  runner:
    name: runner
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    steps:
      # Test 1: Phar type tools with exact versions
      - run: |
          mkdir aa
          mkdir bb
          Function Add-Path {
            param(
              [string]$PathItem
            )
            if("$env:PATH;".contains("$PathItem;")) {
              return
            }
            Add-Content -Path $env:GITHUB_ENV -Value "PATH=$env:PATH;$PathItem" 
          }
          $c = (Get-Location).Path
          Add-Path $c\aa
          Add-Path $c\bb          
      - run: |
          echo $env:PATH || true
