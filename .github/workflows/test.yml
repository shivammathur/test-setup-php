name: Runner
on: [push]
jobs:
  one:
    name: Run
    runs-on: ${{ matrix.os }}    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: shivammathur/setup-php@more-verbose
        with:
          php-version: 8.0
          tools: vapor-cli:1.11
      - run: |
          php -v
          php -m
          vapor -V || true
