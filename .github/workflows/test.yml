name: Runner workflow
on:
  push:
jobs:
  runner:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: [ubuntu-26.04, ubuntu-24.04, ubuntu-22.04, ubuntu-26.04-arm, ubuntu-24.04-arm, ubuntu-22.04-arm]
        php: ['8.6']
    steps:
      - name: Install PHP
        uses: shivammathur/setup-php@2.37.2
        with:
          php-version: ${{ matrix.php }}
      - run: php -v    
  
