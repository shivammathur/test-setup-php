name: workflow.yml
on:
  push:

jobs:
  test:
    name: PHP
    runs-on: ubuntu-latest
    steps:
      - name: Setup extension cache environment
        id: extension-cache
        uses: shivammathur/cache-extensions@1.14.2
        with:
          php-version: "8.4"
          extensions: "redis, zstd"
          key: extensions-cache-v1

      - name: Cache extensions
        uses: actions/cache@v4
        with:
          path: ${{ steps.extension-cache.outputs.dir }}
          key: ${{ steps.extension-cache.outputs.key }}
          restore-keys: ${{ steps.extension-cache.outputs.key }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: "redis, zstd"
