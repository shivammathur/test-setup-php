name: Runner
on: [push]
jobs:
  runner:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
    steps:
      - run: |
          Install-Module -Name BuildPhpExtension -Repository PSGallery -Force -Scope CurrentUser
          Invoke-PhpBuildExtension -ExtensionUrl https://pecl.php.net/package/redis `
                         -ExtensionRef 6.3.0 `
                         -PhpVersion 8.4 `
                         -Arch x64 `
                         -Ts nts `
                         -Args "--enable-redis --enable-redis-session --enable-redis-igbinary"
      - run: |
          php -v
          php -m
      - uses: mxschmitt/action-tmate@v3.23


