name: Test
on:
  push:
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04]
    steps:
    - name: Show CPU
      run: |
        uname -m
        lscpu
        grep -m1 '^flags' /proc/cpuinfo

    - name: Check x86-64-v3 CPU flags
      shell: bash
      run: |
        required=(
          sse3 ssse3 sse4_1 sse4_2 popcnt cx16
          avx avx2 bmi1 bmi2 f16c fma movbe osxsave
        )

        flags="$(grep -m1 '^flags' /proc/cpuinfo)"

        missing=0
        for f in "${required[@]}"; do
          if ! grep -qw "$f" <<< "$flags"; then
            echo "missing: $f"
            missing=1
          fi
        done

        if grep -qw lzcnt <<< "$flags" || grep -qw abm <<< "$flags"; then
          :
        else
          echo "missing: lzcnt/abm"
          missing=1
        fi

        if [ "$missing" -eq 0 ]; then
          echo "x86-64-v3 appears supported"
        else
          echo "x86-64-v3 not supported on this runner"
          exit 1
        fi

    - name: Compile and run x86-64-v3 test
      run: |
        cat > /tmp/v3.c <<'EOF'
        #include <immintrin.h>
        #include <stdio.h>

        int main(void) {
            __m256i a = _mm256_set1_epi32(1);
            __m256i b = _mm256_set1_epi32(2);
            __m256i c = _mm256_add_epi32(a, b);
            int out[8];
            _mm256_storeu_si256((__m256i *)out, c);
            printf("%d\n", out[0]);
            return out[0] == 3 ? 0 : 1;
        }
        EOF

        gcc -O2 -march=x86-64-v3 /tmp/v3.c -o /tmp/v3
        /tmp/v3
