
name: Runner
on:
  push:
jobs:
  run:
    runs-on: macos-15
    steps:
      - run: brew config
      - run: sudo xcode-select -s /Applications/Xcode_26.1.1.app
      - run: brew update
      - name: Test
        env:
          HOMEBREW_DOWNLOAD_CONCURRENCY: 30
        run: |
          brew tap shivammathur/php
          brew install --only-dependencies php@8.6
