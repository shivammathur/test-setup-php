      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        php: [8.3, 8.4, 8.5]
    steps:
      - run: |
          curl -Iv https://www.php.net
          curl -vvv https://www.php.net
