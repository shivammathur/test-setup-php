name: Runner
on: [ push]

jobs:
  php:
    runs-on: macos-latest
    steps:
      - run: |
          DOMAIN="pear.php.net"
          REQ_PATH="/install-pear-nozlib.phar"
          UPSTREAM_URL="https://pear.php.net/install-pear-nozlib.phar"
          
          BASE="/usr/local/pear-mirror"
          CACHE_DIR="$BASE/cache"
          CERT_DIR="$BASE/certs"
          DATA_DIR="$BASE/caddy-data"
          CADDYFILE="$BASE/Caddyfile"
          SYNC_SCRIPT="$BASE/sync.zsh"
          PID_FILE="$BASE/caddy.pid"
          
          CACHED_FILE="$CACHE_DIR/install-pear-nozlib.phar"
          
          HOSTS_BEGIN="# pear-mirror begin"
          HOSTS_END="# pear-mirror end"
          
          PLIST_CADDY="/Library/LaunchDaemons/com.pear-mirror.caddy.plist"
          PLIST_SYNC="/Library/LaunchDaemons/com.pear-mirror.sync.plist"
          
          log() { /usr/bin/printf '%s\n' "==> $*"; }
          err() { /usr/bin/printf '%s\n' "ERROR: $*" >&2; }
          
          need() { command -v "$1" >/dev/null 2>&1 || { err "Missing command: $1"; exit 1; }; }
          
          ensure_brew() {
            if ! command -v brew >/dev/null 2>&1; then
              err "Homebrew not found."
              exit 1
            fi
          }
          
          ensure_pkg() {
            local pkg="$1"
            if ! brew list --formula "$pkg" >/dev/null 2>&1; then
              log "Installing $pkg..."
              brew install "$pkg"
            else
              log "$pkg already installed."
            fi
          }
          
          sudo_write_file() {
            local path="$1"
            local content="$2"
            log "Writing $path"
            /usr/bin/printf "%s\n" "$content" | /usr/bin/sudo /usr/bin/tee "$path" >/dev/null
          }
          
          hosts_install_block() {
            # Add a clearly delimited block so we can temporarily remove it during sync
            if /usr/bin/grep -qF -- "$HOSTS_BEGIN" /etc/hosts; then
              log "/etc/hosts block already present."
              return
            fi
          
            log "Adding /etc/hosts block for $DOMAIN -> localhost"
            /usr/bin/sudo /bin/sh -c "
              /usr/bin/printf '\n%s\n127.0.0.1 %s\n::1 %s\n%s\n' \
                '$HOSTS_BEGIN' '$DOMAIN' '$DOMAIN' '$HOSTS_END' >> /etc/hosts
            "
          }
          
          hosts_remove_block() {
            if ! /usr/bin/grep -qF -- "$HOSTS_BEGIN" /etc/hosts; then
              return
            fi
            log "Temporarily removing /etc/hosts pear-mirror block"
            # Delete inclusive range between markers
            /usr/bin/sudo /usr/bin/sed -i '' "/^$(printf '%s' "$HOSTS_BEGIN" | /usr/bin/sed 's/[.[\*^$(){}+?|\\/]/\\&/g')\$/,/^$(printf '%s' "$HOSTS_END" | /usr/bin/sed 's/[.[\*^$(){}+?|\\/]/\\&/g')\$/d" /etc/hosts
          }
          
          make_dirs_and_perms() {
            log "Preparing directories under $BASE"
            /usr/bin/sudo /bin/mkdir -p "$CACHE_DIR" "$CERT_DIR" "$DATA_DIR"
            /usr/bin/sudo /usr/sbin/chown -R "$USER":staff "$BASE"
          }
          
          make_sync_script() {
            log "Creating sync script at $SYNC_SCRIPT"
            local content
            content="#!/usr/bin/env zsh
          set -euo pipefail
          
          DOMAIN=\"$DOMAIN\"
          URL=\"$UPSTREAM_URL\"
          
          BASE=\"$BASE\"
          CACHE_DIR=\"$CACHE_DIR\"
          DST=\"$CACHED_FILE\"
          TMP=\"\${DST}.tmp\"
          
          HOSTS_BEGIN=\"$HOSTS_BEGIN\"
          HOSTS_END=\"$HOSTS_END\"
          
          # Remove hosts override so we hit the real upstream
          if /usr/bin/grep -qF -- \"\$HOSTS_BEGIN\" /etc/hosts; then
            /usr/bin/sed -i '' \"/^\\\$(printf '%s' \\\"\$HOSTS_BEGIN\\\" | /usr/bin/sed 's/[.[\\\\*^\\\$(){}+?|\\\\\\\\/]/\\\\\\\\&/g')\\\$/,/^\\\$(printf '%s' \\\"\$HOSTS_END\\\" | /usr/bin/sed 's/[.[\\\\*^\\\$(){}+?|\\\\\\\\/]/\\\\\\\\&/g')\\\$/d\" /etc/hosts
            removed=1
          else
            removed=0
          fi
          
          cleanup() {
            # Restore hosts override
            if [[ \"\$removed\" == \"1\" ]]; then
              /usr/bin/printf '\\n%s\\n127.0.0.1 %s\\n::1 %s\\n%s\\n' \"\$HOSTS_BEGIN\" \"\$DOMAIN\" \"\$DOMAIN\" \"\$HOSTS_END\" >> /etc/hosts
            fi
          }
          trap cleanup EXIT
          
          /bin/mkdir -p \"\$CACHE_DIR\"
          
          # Download to temp
          /usr/bin/curl -fsSL \\
            --retry 12 --retry-delay 2 --retry-all-errors \\
            --connect-timeout 20 --max-time 1200 \\
            -o \"\$TMP\" \"\$URL\"
          
          # Validate: reject HTML-ish, require PHAR stub marker
          info=\$(/usr/bin/file -b \"\$TMP\" || true)
          
          if /bin/echo \"\$info\" | /usr/bin/grep -Eiq 'html|xml|json|text'; then
            /bin/rm -f \"\$TMP\"
            /usr/bin/printf '%s\\n' \"Invalid download (looks like text/markup): \$info\" >&2
            exit 1
          fi
          
          if ! /usr/bin/grep -a -m 1 -q '__HALT_COMPILER' \"\$TMP\"; then
            /bin/rm -f \"\$TMP\"
            /usr/bin/printf '%s\\n' \"Invalid download (missing PHAR stub marker). file: \$info\" >&2
            exit 1
          fi
          
          # Replace atomically
          /bin/mv -f \"\$TMP\" \"\$DST\"
           /bin/chmod 644 \"\$DST\" || true
          exit 0
          "
            sudo_write_file "$SYNC_SCRIPT" "$content"
            /usr/bin/sudo /bin/chmod 755 "$SYNC_SCRIPT"
          }
          
          make_caddyfile() {
            log "Creating Caddyfile at $CADDYFILE"
            local content
            content="https://$DOMAIN {
            bind 127.0.0.1 ::1
            tls $CERT_DIR/pear.pem $CERT_DIR/pear-key.pem
          
            @phar path $REQ_PATH
            handle @phar {
              root * $CACHE_DIR
              header Content-Type application/octet-stream
              file_server
            }
          
            respond \"not found\" 404
          }
          "
            sudo_write_file "$CADDYFILE" "$content"
            /usr/bin/sudo /bin/chmod 644 "$CADDYFILE"
          }
          
          mkcert_setup() {
            local mkcert_path
            mkcert_path="$(command -v mkcert)"
            [[ -n "$mkcert_path" ]] || { err "mkcert not found"; exit 1; }
          
            log "Installing mkcert local CA (may prompt)..."
            "$mkcert_path" -install
          
            log "Generating local TLS cert for $DOMAIN"
            "$mkcert_path" -cert-file "$CERT_DIR/pear.pem" -key-file "$CERT_DIR/pear-key.pem" "$DOMAIN"
          }
          
          caddy_start_ci() {
            local caddy_path
            caddy_path="$(command -v caddy)"
            [[ -n "$caddy_path" ]] || { err "caddy not found"; exit 1; }
          
            # Stop any previous instance
            if [[ -f "$PID_FILE" ]]; then
              local oldpid
              oldpid="$(/bin/cat "$PID_FILE" 2>/dev/null || true)"
              if [[ -n "${oldpid:-}" ]] && /bin/kill -0 "$oldpid" >/dev/null 2>&1; then
                log "Stopping previous Caddy pid $oldpid"
                /usr/bin/sudo /bin/kill "$oldpid" >/dev/null 2>&1 || true
              fi
              /usr/bin/sudo /bin/rm -f "$PID_FILE" || true
            fi
          
            log "Starting Caddy (CI mode) on :443"
            /usr/bin/sudo /usr/bin/env HOME="$DATA_DIR" XDG_DATA_HOME="$DATA_DIR" \
              "$caddy_path" run --config "$CADDYFILE" --adapter caddyfile \
              >>/tmp/pear-mirror-caddy.log 2>>/tmp/pear-mirror-caddy.err.log &
          
            /usr/bin/sudo /bin/sh -c "echo \$! > '$PID_FILE'"
          
            # Wait for it to listen
            for i in {1..30}; do
              if /usr/bin/sudo /usr/sbin/lsof -nP -iTCP:443 -sTCP:LISTEN >/dev/null 2>&1; then
                log "Caddy is listening on 443"
                return 0
              fi
              /bin/sleep 0.2
            done
          
            err "Caddy did not start. Tail logs:"
            /usr/bin/tail -n 100 /tmp/pear-mirror-caddy.err.log || true
            exit 1
          }
          
          install_launchd_local() {
            local caddy_path
            caddy_path="$(command -v caddy)"
            [[ -n "$caddy_path" ]] || { err "caddy not found"; exit 1; }
          
            log "Installing launchd daemon for Caddy (local mode)"
            sudo_write_file "$PLIST_CADDY" "<?xml version=\"1.0\" encoding=\"UTF-8\"?>
          <!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">
          <plist version=\"1.0\">
          <dict>
            <key>Label</key><string>com.pear-mirror.caddy</string>
            <key>ProgramArguments</key>
            <array>
              <string>$caddy_path</string>
              <string>run</string>
              <string>--config</string>
              <string>$CADDYFILE</string>
              <string>--adapter</string>
              <string>caddyfile</string>
            </array>
            <key>EnvironmentVariables</key>
            <dict>
              <key>HOME</key><string>$DATA_DIR</string>
              <key>XDG_DATA_HOME</key><string>$DATA_DIR</string>
            </dict>
            <key>RunAtLoad</key><true/>
            <key>KeepAlive</key><true/>
            <key>StandardOutPath</key><string>/var/log/pear-mirror-caddy.log</string>
            <key>StandardErrorPath</key><string>/var/log/pear-mirror-caddy.err.log</string>
          </dict>
          </plist>"
            /usr/bin/sudo /bin/chmod 644 "$PLIST_CADDY"
          
            log "Installing launchd daemon for weekly sync (Sunday 03:00 + on boot)"
            sudo_write_file "$PLIST_SYNC" "<?xml version=\"1.0\" encoding=\"UTF-8\"?>
          <!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">
          <plist version=\"1.0\">
          <dict>
            <key>Label</key><string>com.pear-mirror.sync</string>
            <key>ProgramArguments</key>
            <array>
              <string>$SYNC_SCRIPT</string>
            </array>
            <key>RunAtLoad</key><true/>
            <key>StartCalendarInterval</key>
            <dict>
              <key>Weekday</key><integer>1</integer>
              <key>Hour</key><integer>3</integer>
              <key>Minute</key><integer>0</integer>
            </dict>
            <key>StandardOutPath</key><string>/var/log/pear-mirror-sync.log</string>
            <key>StandardErrorPath</key><string>/var/log/pear-mirror-sync.err.log</string>
          </dict>
          </plist>"
            /usr/bin/sudo /bin/chmod 644 "$PLIST_SYNC"
          
            # Load (best-effort)
            /usr/bin/sudo /bin/launchctl bootout system "$PLIST_CADDY" >/dev/null 2>&1 || true
            /usr/bin/sudo /bin/launchctl bootout system "$PLIST_SYNC"  >/dev/null 2>&1 || true
            /usr/bin/sudo /bin/launchctl bootstrap system "$PLIST_CADDY"
            /usr/bin/sudo /bin/launchctl bootstrap system "$PLIST_SYNC"
          }
          
          sync_now() {
            log "Syncing from $UPSTREAM_URL (will FAIL if upstream fails)"
            /usr/bin/sudo "$SYNC_SCRIPT"
          }
          
          test_now() {
            /usr/bin/curl -Iv "$UPSTREAM_URL" || true
            /usr/bin/curl -fsSL -o /tmp/test.phar "$UPSTREAM_URL"
            /usr/bin/file /tmp/test.phar
            /bin/ls -lh /tmp/test.phar
          }
          
          setup_common() {
            need /usr/bin/sudo
            need /usr/bin/curl
            need /usr/bin/file
            need /usr/bin/grep
            need /usr/bin/tee
            need /usr/bin/sed
            need /usr/sbin/lsof
          
            ensure_brew
            ensure_pkg "mkcert"
            ensure_pkg "caddy"
          
            make_dirs_and_perms
            mkcert_setup
          
            make_sync_script
            # First sync BEFORE we install hosts override (so it must come from real upstream)
            sync_now
          
            make_caddyfile
            hosts_install_block
          }
          
          mode_ci() {
            setup_common
            caddy_start_ci
          
            log "CI mode ready. Verify:"
            /usr/bin/curl -fsSL -o /tmp/test.phar "$UPSTREAM_URL"
            /usr/bin/file /tmp/test.phar
          }
          
          mode_local() {
            setup_common
            install_launchd_local
          
            log "Local mode installed. If Caddy doesn't come up, check:"
            log "  sudo tail -n 200 /var/log/pear-mirror-caddy.err.log"
          }
          
          case "${1:-ci}" in
            ci)    mode_ci ;;
            local) mode_local ;;
            sync)  sync_now ;;
            test)  test_now ;;
            *)
              err "Usage: $0 [ci|local|sync|test]"
              exit 2
              ;;
          esac
      - run: |
          curl -Iv https://pear.php.net/install-pear-nozlib.phar
          curl -o /tmp/pear.phar -sL https://pear.php.net/install-pear-nozlib.phar

