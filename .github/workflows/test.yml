name: Runner
on: [push]
jobs:
  e2e-tests:
    name: Run
    runs-on: ${{ matrix.os }}    
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        php: [8.3, 8.4, 8.5]
    steps:
      - run: |
          Install-Module -Name PhpManager -Repository PSGallery -Force -Scope CurrentUser
          Install-Php -Version ${{ matrix.php }} -Architecture x86 -ThreadSafe 0 -Path C:\tools\php -TimeZone UTC -AddToPath User -Force
          Install-PhpExtension mongodb -Version 2.2.0
      - run: |
          php -v
          php --ri mongodb
