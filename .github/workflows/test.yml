name: Runner
on: [push]
jobs:
  runner:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        php: [5.6, 7.0, 7.1, 7.2, 7.3, 7.4, 8.0, 8.1, 8.2, 8.3, 8.4, 8.5, 8.6]
    steps:
      - uses: shivammathur/setup-php@v2  
        with:
          php-version: ${{ matrix.php }}
          extensions: redis
        env:
          use_package_cache: false
      - run: |
          php -v
          php --ri redis    

