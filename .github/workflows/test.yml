name: Runner
on: [push]
jobs:
  runner:
    name: runner
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, ubuntu-22.04, ubuntu-22.04-arm, windows-latest, macos-latest]
    steps:
      - name: Test
        run: |          
          echo $PATH
      - name: Test
        if: startsWith("${{ matrix.os }}", "windows")
        run: |          
          echo $env:PATH
