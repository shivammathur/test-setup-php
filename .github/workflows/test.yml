name: Test
on:
  push:
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04]
    steps:
    - name: Show CPU
      run: |
        uname -m
        lscpu
        grep -m1 '^flags' /proc/cpuinfo

    - name: Check x86-64-v3 support
      shell: bash
      run: |
        flags="$(grep -m1 '^flags' /proc/cpuinfo | cut -d: -f2-)"
    
        has() {
          grep -qw "$1" <<< "$flags"
        }
    
        missing=()
    
        require() {
          if ! has "$1"; then
            missing+=("$1")
          fi
        }
    
        require_any() {
          local name="$1"
          shift
    
          for f in "$@"; do
            if has "$f"; then
              return 0
            fi
          done
    
          missing+=("$name")
        }
    
        # x86-64-v2 baseline features
        require_any "sse3/pni" sse3 pni
        require ssse3
        require sse4_1
        require sse4_2
        require popcnt
        require cx16
        require lahf_lm
    
        # x86-64-v3 features
        require avx
        require avx2
        require bmi1
        require bmi2
        require f16c
        require fma
        require movbe
        require xsave
        require_any "lzcnt/abm" lzcnt abm
    
        if [ "${#missing[@]}" -eq 0 ]; then
          echo "x86-64-v3 supported"
        else
          echo "x86-64-v3 not supported"
          printf 'Missing: %s\n' "${missing[@]}"
          exit 1
        fi

    - name: Check x86-64-v4 support
      shell: bash
      run: |
        flags="$(grep -m1 '^flags' /proc/cpuinfo | cut -d: -f2-)"
    
        for f in avx512f avx512bw avx512cd avx512dq avx512vl; do
          if ! grep -qw "$f" <<< "$flags"; then
            echo "x86-64-v4 not supported, missing: $f"
            exit 1
          fi
        done
    
        echo "x86-64-v4 supported"
  
    - name: Compile and run x86-64-v3 test
      run: |
        cat > /tmp/v3.c <<'EOF'
        #include <immintrin.h>
        #include <stdio.h>

        int main(void) {
            __m256i a = _mm256_set1_epi32(1);
            __m256i b = _mm256_set1_epi32(2);
            __m256i c = _mm256_add_epi32(a, b);
            int out[8];
            _mm256_storeu_si256((__m256i *)out, c);
            printf("%d\n", out[0]);
            return out[0] == 3 ? 0 : 1;
        }
        EOF

        gcc -O2 -march=x86-64-v3 /tmp/v3.c -o /tmp/v3
        /tmp/v3
