name: Runner
on: [ push]

jobs:
  php:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ 5.6, 7.0, 7.1,7.2,7.3,7.4, 8.0]
    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php }}"
          extensions: intl-78.2
      - run: php -v && php --ri intl    
