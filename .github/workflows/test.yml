name: 'Runner Test'
on: [push]
jobs:
  run:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        php: [8.1, 8.2, 8.3, 8.4, 8.5]
    runs-on: ${{ matrix.os }}
    name: Test
    steps:
    - uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
    - run: php -v
        
        
