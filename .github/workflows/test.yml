name: Test
on:
  push:
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04]
        php: [8.2, 8.3, 8.4, 8.5, 8.6]
        debug: [true, false]
        ts: [nts, zts]
    steps:
     -  uses: shivammathur/setup-php@verbose
        with:
          php-version: ${{ matrix.php }}
          extensions: pspell, enchant
          tools: composer:v2
          coverage: none
     -  run: php -v && php -m && php -i
