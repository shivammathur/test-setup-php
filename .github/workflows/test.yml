name: Runner workflow
on:
  push:
jobs:
  runner:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Install PHP
        uses: shivammathur/setup-php@2.37.2
        with:
          php-version: 8.5
  
