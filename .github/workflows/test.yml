name: Runner
on: [push]
jobs:
  runner:
    name: runner
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    steps:
      # Test 1: Phar type tools with exact versions
      - run: |
          mkdir aa
          mkdir bb
          Add-Content 'aa' -Path $env:GITHUB_PATH -Encoding utf8
          Add-Content 'bb' -Path $env:GITHUB_PATH -Encoding utf8
      - run: |
          echo $env:PATH || true
