name: Runner
on: [push]
jobs:
  e2e-tests:
    name: E2E Tests - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-latest]
    steps:
      # Test 1: Phar type tools with exact versions
      - name: Setup PHP with phar tools
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: >-
            phpstan:1.12.0,
            psalm:5.26.0,
            php-cs-fixer:3.64.0,
            phpcs:3.10.3,
            phpmd:2.15.0,
            parallel-lint:1.4.0,
            cs2pr:1.8.2

      - name: Test PHPStan 1.12.0
        shell: bash
        run: |
          v=$(phpstan --version)
          echo "Installed - $v"
          echo "Expected - 1.12.0"
          echo "$v" | grep -q "1\.12\.0" || { echo "FAIL - Expected 1.12.0, got - $v"; exit 1; }

      - name: Test Psalm 5.26.0
        shell: bash
        run: |
          v=$(psalm --version)
          echo "Installed - $v"
          echo "Expected - 5.26.0"
          echo "$v" | grep -q "5\.26\.0" || { echo "FAIL - Expected 5.26.0, got - $v"; exit 1; }

      - name: Test PHP-CS-Fixer 3.64.0
        shell: bash
        run: |
          v=$(php-cs-fixer --version)
          echo "Installed - $v"
          echo "Expected - 3.64.0"
          echo "$v" | grep -q "3\.64\.0" || { echo "FAIL - Expected 3.64.0, got - $v"; exit 1; }

      - name: Test PHPCS 3.10.3
        shell: bash
        run: |
          v=$(phpcs --version)
          echo "Installed - $v"
          echo "Expected - 3.10.3"
          echo "$v" | grep -q "3\.10\.3" || { echo "FAIL - Expected 3.10.3, got - $v"; exit 1; }

      - name: Test PHPMD 2.15.0
        shell: bash
        run: |
          v=$(phpmd --version)
          echo "Installed - $v"
          echo "Expected - 2.15.0"
          echo "$v" | grep -q "2\.15\.0" || { echo "FAIL - Expected 2.15.0, got - $v"; exit 1; }

      - name: Test Parallel-Lint 1.4.0
        shell: bash
        run: |
          v=$(parallel-lint --version)
          echo "Installed - $v"
          echo "Expected - 1.4.0"
          echo "$v" | grep -q "1\.4\.0" || { echo "FAIL - Expected 1.4.0, got - $v"; exit 1; }

      - name: Test CS2PR 1.8.2
        shell: bash
        run: |
          v=$(cs2pr -V)
          echo "Installed - $v"
          echo "Expected - 1.8.2"
          echo "$v" | grep -q "1\.8\.2" || { echo "FAIL - Expected 1.8.2, got - $v"; exit 1; }

      # Test 2: Composer type tools
      - name: Setup PHP with composer tools
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: >-
            rector:1.2.0,
            behat:3.28.0,
            phinx:0.16.10

      - name: Test Rector 1.2.0
        shell: bash
        run: |
          v=$(rector --version)
          echo "Installed - $v"
          echo "Expected - 1.2.0"
          echo "$v" | grep -q "1\.2\.0" || { echo "FAIL - Expected 1.2.0, got - $v"; exit 1; }

      - name: Test Behat 3.28.0
        shell: bash
        run: |
          v=$(behat --version)
          echo "Installed - $v"
          echo "Expected - 3.28.0"
          echo "$v" | grep -q "3\.28\.0" || { echo "FAIL - Expected 3.28.0, got - $v"; exit 1; }

      - name: Test Phinx 0.16.10
        shell: bash
        run: |
          v=$(phinx --version)
          echo "Installed - $v"
          echo "Expected - 0.16.10"
          echo "$v" | grep -q "0\.16\.10" || { echo "FAIL - Expected 0.16.10, got - $v"; exit 1; }

      # Test 3: Custom-function tools
      - name: Setup PHP with custom-function tools
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: >-
            composer:2.7.9,
            phpunit:11.3.0,
            deployer:7.4.1,
            phive:0.15.3

      - name: Test Composer 2.7.9
        shell: bash
        run: |
          v=$(composer --version 2>&1)
          echo "Installed - $v"
          echo "Expected - 2.7.9"
          echo "$v" | grep -q "2\.7\.9" || { echo "FAIL - Expected 2.7.9, got - $v"; exit 1; }

      - name: Test PHPUnit 11.3.0
        shell: bash
        run: |
          v=$(phpunit --version)
          echo "Installed - $v"
          echo "Expected - 11.3.0"
          echo "$v" | grep -q "11\.3\.0" || { echo "FAIL - Expected 11.3.0, got - $v"; exit 1; }

      - name: Test Deployer 7.4.1
        shell: bash
        run: |
          v=$(dep --version)
          echo "Installed - $v"
          echo "Expected - 7.4.1"
          echo "$v" | grep -q "7\.4\.1" || { echo "FAIL - Expected 7.4.1, got - $v"; exit 1; }

      - name: Test Phive 0.15.3
        shell: bash
        run: |
          v=$(phive --version)
          echo "Installed - $v"
          echo "Expected - 0.15.3"
          echo "$v" | grep -q "0\.15\.3" || { echo "FAIL - Expected 0.15.3, got - $v"; exit 1; }

      # Test 4: WP-CLI (Unix only)
      - name: Setup PHP with WP-CLI
        if: runner.os != 'Windows'
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: wp-cli:2.11.0

      - name: Test WP-CLI 2.11.0
        if: runner.os != 'Windows'
        shell: bash
        run: |
          v=$(wp --version)
          echo "Installed - $v"
          echo "Expected - 2.11.0"
          echo "$v" | grep -q "2\.11\.0" || { echo "FAIL - Expected 2.11.0, got - $v"; exit 1; }

      # Test 5: Latest version resolution
      - name: Setup PHP with latest tool versions
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: >-
            composer,
            phpunit,
            phpstan,
            php-cs-fixer

      - name: Test tools installed (latest)
        run: |
          composer --version
          phpunit --version
          phpstan --version
          php-cs-fixer --version

      # Test 6: Semver resolution (major.minor)
      - name: Setup PHP with major.minor versions
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: >-
            phpstan:1.12,
            phpunit:11.3,
            psalm:5.26

      - name: Test PHPStan resolves 1.12.x
        shell: bash
        run: |
          v=$(phpstan --version)
          echo "Installed - $v"
          echo "Expected - 1.12.x"
          echo "$v" | grep -q "1\.12\." || { echo "FAIL - Expected 1.12.x, got - $v"; exit 1; }

      - name: Test PHPUnit resolves 11.3.x
        shell: bash
        run: |
          v=$(phpunit --version)
          echo "Installed - $v"
          echo "Expected - 11.3.x"
          echo "$v" | grep -q "11\.3\." || { echo "FAIL - Expected 11.3.x, got - $v"; exit 1; }

      - name: Test Psalm resolves 5.26.x
        shell: bash
        run: |
          v=$(psalm --version)
          echo "Installed - $v"
          echo "Expected - 5.26.x"
          echo "$v" | grep -q "5\.26\." || { echo "FAIL - Expected 5.26.x, got - $v"; exit 1; }

      # Test 7: Composer channels
      - name: Setup PHP with composer stable
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: composer:stable

      - name: Test Composer stable channel
        run: composer --version

      - name: Setup PHP with composer 2
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: composer:2

      - name: Test Composer 2 channel
        shell: bash
        run: |
          composer --version
          composer --version 2>&1 | grep -q "Composer version 2" || { echo "FAIL: Expected Composer version 2.x"; exit 1; }

      # Test 8: Tool aliases
      - name: Setup PHP with tool aliases
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: >-
            phpdoc:3.5.0,
            ecs:12.3.0

      - name: Test phpDocumentor 3.5.0 (alias - phpdoc)
        shell: bash
        run: |
          v=$(phpdoc --version)
          echo "Installed - $v"
          echo "Expected - 3.5.0"
          echo "$v" | grep -q "3\.5\.0" || { echo "FAIL - Expected 3.5.0, got - $v"; exit 1; }

      - name: Test Easy Coding Standard 12.3.0 (alias - ecs)
        shell: bash
        run: |
          v=$(ecs --version)
          echo "Installed - $v"
          echo "Expected - 12.3.0"
          echo "$v" | grep -q "12\.3\.0" || { echo "FAIL - Expected 12.3.0, got - $v"; exit 1; }

      # Test 9: User/repo format for composer tools
      - name: Setup PHP with user/repo tools
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: laravel/pint:1.18.0

      - name: Test Pint 1.18.0 (user/repo format)
        shell: bash
        run: |
          v=$(pint --version)
          echo "Installed - $v"
          echo "Expected - 1.18.0"
          echo "$v" | grep -q "1\.18\.0" || { echo "FAIL - Expected 1.18.0, got - $v"; exit 1; }

      # Test 10: Dev tools (Unix only)
      - name: Setup PHP with dev tools
        if: runner.os != 'Windows'
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: php-config, phpize

      - name: Test php-config
        if: runner.os != 'Windows'
        run: php-config --version

      - name: Test phpize
        if: runner.os != 'Windows'
        run: phpize --version

      # Test 11: PECL (Unix only)
      - name: Setup PHP with PECL
        if: runner.os != 'Windows'
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: pecl

      - name: Test PECL
        if: runner.os != 'Windows'
        run: pecl version

      # Test 12: Partial version resolution (major and major.minor)
      - name: Setup PHP with partial version tools
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: >-
            phpunit:10,
            phpstan:2.1,
            psalm:6,
            deployer:7.5,
            phpcs:3.13

      - name: Test PHPUnit 10.5.60 (major version)
        shell: bash
        run: |
          v=$(phpunit --version)
          echo "Installed - $v"
          echo "Expected - 10.5.60"
          echo "$v" | grep -q "10\.5\.60" || { echo "FAIL - Expected 10.5.60, got - $v"; exit 1; }

      - name: Test PHPStan 2.1.35 (major.minor version)
        shell: bash
        run: |
          echo "$PATH"
          v=$(phpstan --version)
          echo "Installed - $v"
          echo "Expected - 2.1.35"
          echo "$v" | grep -q "2\.1\.35" || { echo "FAIL - Expected 2.1.35, got - $v"; exit 1; }

      - name: Test Psalm 6.14.3 (major version)
        shell: bash
        run: |
          v=$(psalm --version)
          echo "Installed - $v"
          echo "Expected - 6.14.3"
          echo "$v" | grep -q "6\.14\.3" || { echo "FAIL - Expected 6.14.3, got - $v"; exit 1; }

      - name: Test Deployer 7.5.12 (major.minor version)
        shell: bash
        run: |
          v=$(dep --version)
          echo "Installed - $v"
          echo "Expected - 7.5.12"
          echo "$v" | grep -q "7\.5\.12" || { echo "FAIL - Expected 7.5.12, got - $v"; exit 1; }

      - name: Test PHPCS 3.13.5 (major.minor version)
        shell: bash
        run: |
          v=$(phpcs --version)
          echo "Installed - $v"
          echo "Expected - 3.13.5"
          echo "$v" | grep -q "3\.13\.5" || { echo "FAIL - Expected 3.13.5, got - $v"; exit 1; }

      # Test 13: Castor (custom-function)
      - name: Setup PHP with Castor
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: castor:0.18.0

      - name: Test Castor 0.18.0
        shell: bash
        run: |
          v=$(castor --version)
          echo "Installed - $v"
          echo "Expected - 0.18.0"
          echo "$v" | grep -q "0\.18\.0" || { echo "FAIL - Expected 0.18.0, got - $v"; exit 1; }

      # Test 14: Phing (custom-function)
      - name: Setup PHP with Phing
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: phing:3.0.1

      - name: Test Phing 3.0.1
        shell: bash
        run: |
          v=$(phing -v)
          echo "Installed - $v"
          echo "Expected - 3.0.1"
          echo "$v" | grep -q "3\.0\.1" || { echo "FAIL - Expected 3.0.1, got - $v"; exit 1; }

      # Test 15: PHPCPD (custom-function using phpunit handler)
      - name: Setup PHP with PHPCPD
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: phpcpd:6.0.3

      - name: Test PHPCPD 6.0.3
        shell: bash
        run: |
          v=$(phpcpd --version)
          echo "Installed - $v"
          echo "Expected - 6.0.3"
          echo "$v" | grep -q "6\.0\.3" || { echo "FAIL - Expected 6.0.3, got - $v"; exit 1; }

      # Test 16: fetch_latest tools
      - name: Setup PHP with fetch_latest tool
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: php-cs-fixer:3.64

      - name: Test PHP-CS-Fixer 3.64.x (fetch_latest)
        shell: bash
        run: |
          v=$(php-cs-fixer --version)
          echo "Installed - $v"
          echo "Expected - 3.64.x"
          echo "$v" | grep -qE "3\.64\.[0-9]+" || { echo "FAIL - Expected 3.64.x, got - $v"; exit 1; }

      # Test 17: Multiple tools in single input
      - name: Setup PHP with multiple tools
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: composer:2.7.9, phpunit:11.3.0, phpstan:1.12.0, php-cs-fixer:3.64.0, psalm:5.26.0

      - name: Verify all tools installed with exact versions
        shell: bash
        run: |
          v=$(composer --version 2>&1); echo "Installed - $v"; echo "Expected - 2.7.9"; echo "$v" | grep -q "2\.7\.9" || { echo "FAIL - Expected 2.7.9, got - $v"; exit 1; }
          v=$(phpunit --version); echo "Installed - $v"; echo "Expected - 11.3.0"; echo "$v" | grep -q "11\.3\.0" || { echo "FAIL - Expected 11.3.0, got - $v"; exit 1; }
          v=$(phpstan --version); echo "Installed - $v"; echo "Expected - 1.12.0"; echo "$v" | grep -q "1\.12\.0" || { echo "FAIL - Expected 1.12.0, got - $v"; exit 1; }
          v=$(php-cs-fixer --version); echo "Installed - $v"; echo "Expected - 3.64.0"; echo "$v" | grep -q "3\.64\.0" || { echo "FAIL - Expected 3.64.0, got - $v"; exit 1; }
          v=$(psalm --version); echo "Installed - $v"; echo "Expected - 5.26.0"; echo "$v" | grep -q "5\.26\.0" || { echo "FAIL - Expected 5.26.0, got - $v"; exit 1; }

      # Test 18: Box tool (phar type)
      - name: Setup PHP with Box
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: box:4.6.2

      - name: Test Box 4.6.2
        shell: bash
        run: |
          v=$(box --version)
          echo "Installed - $v"
          echo "Expected - 4.6.2"
          echo "$v" | grep -q "4\.6\.2" || { echo "FAIL - Expected 4.6.2, got - $v"; exit 1; }

      # Test 19: Infection tool (phar type)
      - name: Setup PHP with Infection
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: infection:0.29.6

      - name: Test Infection 0.29.6
        shell: bash
        run: |
          v=$(infection --version)
          echo "Installed - $v"
          echo "Expected - 0.29.6"
          echo "$v" | grep -q "0\.29\.6" || { echo "FAIL - Expected 0.29.6, got - $v"; exit 1; }
