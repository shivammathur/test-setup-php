name: Runner
on: [push]
jobs:
  runner:
    name: runner
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-latest]
    steps:
      # Test 1: Phar type tools with exact versions
      - run: which ls
      - name: Setup PHP
        uses: shivammathur/setup-php@develop
        with:
          php-version: '8.3'
          tools: composer  
      - run: |
          php -v
          which php
          composer -V
          echo $PATH || true
          echo $env:PATH || true
