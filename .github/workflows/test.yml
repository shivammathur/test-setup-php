name: Runner
on:
  push:

jobs:
  test:
    strategy:
      matrix:
        php: [7.4, 8.1, 8.2, 8.3, 8.4, 8.5, 8.6]
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: shivammathur/setup-php@verbose
        with:
           php-version: ${{ matrix.php }}
      - run: php -v && php -m
        
