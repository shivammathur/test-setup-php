name: Runner
on:
  push:
jobs:
  run:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      fail-fast: false
      matrix:
        operating-system: [macos-15-intel, macos-26]
    steps:
    - run: |
        extension=redis
        brew tap shivammathur/php          
        brew tap shivammathur/extensions
        if [ "$extension" = "redis" ]; then
            formula="phpredis"
            brew remove phpredis@$version || true
            brew remove igbinary@$version || true
            brew remove msgpack@$version || true
        fi
        brew reinstall shivammathur/extensions/$formula@$version
        
