name: Runner
on: [push]
jobs:
    runner:
      runs-on: ${{ matrix.os }}
      strategy:        
        matrix:
          os: [ubuntu-24.04]
      steps:
        - name: Setup PHP
          uses: shivammathur/setup-php@v2
          with:
            php-version: '8.3'
            tools: deployer
  
        - uses: mxschmitt/action-tmate@v3.23
