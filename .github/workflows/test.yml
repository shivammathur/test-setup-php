name: Test
on:
  push:
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04]
        php: [5.6, 7.0, 7.1, 7.2, 7.3, 7.4, 8.0, 8.1, 8.2, 8.3, 8.4, 8.5, 8.6]
        debug: [true, false]
        ts: [nts, zts]
    steps:
    - uses: shivammathur/setup-php@verbose
      with:
        php-version: ${{ matrix.php }}        
      env:
        debug: ${{ matrix.debug }}
        phpts: ${{ matrix.ts }}
    - run: php -v && php -m && php -i    
