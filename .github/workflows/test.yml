name: Runner
on: [push]
jobs:
  e2e-tests:
    name: Run
    runs-on: ${{ matrix.os }}    
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    steps:
      - uses: actions/checkout@v5
        with:
          repository: shivammathur/homebrew-extensions
      - run: brew tap shivammathur/extensions
      - uses: mxschmitt/action-tmate@v3.23
