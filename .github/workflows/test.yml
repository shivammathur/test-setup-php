name: Runner
on: [push]
jobs:
  e2e-tests:
    name: Run
    runs-on: ${{ matrix.os }}    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    container: ubuntu:24.04
    steps:
      - name: Setup PHP with composer
        uses: shivammathur/setup-php@verbose
        with:
          php-version: 8.2
          tools: composer:2.8.9
        env:
          runner: self-hosted
      - run: php -v || true
