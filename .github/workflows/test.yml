name: Runner
on: [push]
jobs:
  e2e-tests:
    name: Run
    runs-on: ${{ matrix.os }}    
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025-vs2026]
    steps:
      - name: Test
        uses: shivammathur/setup-php@verbose
        with:
          php-version: 8.5
      - run: php -v && php -m 
