name: Runner
on:
  push:
jobs:
  run:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      fail-fast: false
      matrix:
        operating-system: [ubuntu-22.04, ubuntu-24.04]
        php: [8.3]
    steps:
    - name: "Install PHP"
      uses: shivammathur/setup-php@develop
      with:
        php-version: ${{ matrix.php }}
        extensions: zephir_parser
    - run: php -v && php -m
