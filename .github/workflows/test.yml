
name: Runner
on:
  push:
jobs:
  run:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        php: [8.4, 8.5]
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
      - uses: shivammathur/setup-php@more-verbose
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
      - run: php -v    
