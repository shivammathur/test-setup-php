name: Runner
on: [ push]

jobs:
  php:
    runs-on: macos-latest
    steps:
      - run: |
          DOMAIN="pear.php.net"
          REQ_PATH="/install-pear-nozlib.phar"
          
          # Source-of-truth for syncing the cached file:
          MIRROR_URL="https://setup-php.com/install-pear-nozlib.phar"
          
          BASE="/usr/local/pear-mirror"
          CACHE_DIR="$BASE/cache"
          CERT_DIR="$BASE/certs"
          CADDYFILE="$BASE/Caddyfile"
          SYNC_SCRIPT="$BASE/sync.zsh"
          
          CACHED_FILE="$CACHE_DIR/install-pear-nozlib.phar"
          
          PLIST_CADDY="/Library/LaunchDaemons/com.pear-mirror.caddy.plist"
          PLIST_SYNC="/Library/LaunchDaemons/com.pear-mirror.sync.plist"
          
          log() { /usr/bin/printf '%s\n' "==> $*"; }
          err() { /usr/bin/printf '%s\n' "ERROR: $*" >&2; }
          
          need() { command -v "$1" >/dev/null 2>&1 || { err "Missing command: $1"; exit 1; }; }
          
          ensure_brew() {
            if ! command -v brew >/dev/null 2>&1; then
              err "Homebrew not found. Install Homebrew, then re-run."
              exit 1
            fi
          }
          
          ensure_pkg() {
            local pkg="$1"
            if ! brew list --formula "$pkg" >/dev/null 2>&1; then
              log "Installing $pkg..."
              brew install "$pkg"
            else
              log "$pkg already installed."
            fi
          }
          
          sudo_write_file() {
            local path="$1"
            local content="$2"
            log "Writing $path"
            /usr/bin/printf "%s\n" "$content" | /usr/bin/sudo /usr/bin/tee "$path" >/dev/null
          }
          
          append_hosts_if_missing() {
            local entry="$1"
            if ! /usr/bin/grep -qF -- "$entry" /etc/hosts; then
              log "Adding /etc/hosts entry: $entry"
              /usr/bin/sudo /bin/sh -c "/usr/bin/printf '\n%s\n' '$entry' >> /etc/hosts"
            else
              log "/etc/hosts already contains: $entry"
            fi
          }
          
          bootstrap_daemon() {
            local plist="$1"
            /usr/bin/sudo /bin/launchctl bootout system "$plist" >/dev/null 2>&1 || true
            /usr/bin/sudo /bin/launchctl bootstrap system "$plist"
          }
          
          status() {
            /bin/launchctl print system/com.pear-mirror.caddy >/dev/null 2>&1 \
              && log "Caddy: loaded" || log "Caddy: not loaded"
            /bin/launchctl print system/com.pear-mirror.sync >/dev/null 2>&1 \
              && log "Sync : loaded" || log "Sync : not loaded"
            if [[ -f "$CACHED_FILE" ]]; then
              log "Cache: present ($CACHED_FILE)"
              /bin/ls -lh "$CACHED_FILE" || true
              /usr/bin/file "$CACHED_FILE" || true
            else
              log "Cache: missing ($CACHED_FILE)"
            fi
          }
          
          make_sync_script() {
            log "Creating sync script at $SYNC_SCRIPT"
            /usr/bin/sudo /bin/mkdir -p "$CACHE_DIR"
            /usr/bin/sudo /usr/sbin/chown -R root:wheel "$BASE"
            /usr/bin/sudo /bin/chmod 755 "$BASE" "$CACHE_DIR" || true
          
            local content
            content="#!/usr/bin/env zsh
          set -euo pipefail
          
          CACHE_DIR=\"$CACHE_DIR\"
          DST=\"$CACHED_FILE\"
          TMP=\"\${DST}.tmp\"
          URL=\"$MIRROR_URL\"
          
          mkdir -p \"\$CACHE_DIR\"
          
          # Download to temp first
          /usr/bin/curl -fsSL \\
            --retry 12 --retry-delay 2 --retry-all-errors \\
            --connect-timeout 10 --max-time 1200 \\
            -o \"\$TMP\" \"\$URL\"
          
          # Validate with 'file' BEFORE replacing the existing cache
          info=\$(/usr/bin/file -b \"\$TMP\" || true)
          
          # Require 'phar' to appear in file(1) description (case-insensitive)
          if /bin/echo \"\$info\" | /usr/bin/grep -Eiq 'phar'; then
            /bin/mv -f \"\$TMP\" \"\$DST\"
            /usr/bin/chmod 644 \"\$DST\" || true
            exit 0
          fi
          
          # Invalid download -> do NOT overwrite existing file
          /bin/rm -f \"\$TMP\"
          /usr/bin/printf '%s\n' \"Invalid file type (not phar): \$info\" >&2
          exit 1
          "
            sudo_write_file "$SYNC_SCRIPT" "$content"
            /usr/bin/sudo /bin/chmod 755 "$SYNC_SCRIPT"
          }
          
          make_caddyfile() {
            log "Creating Caddyfile at $CADDYFILE"
            local content
            content="https://$DOMAIN {
            bind 127.0.0.1 ::1
          
            tls $CERT_DIR/pear.pem $CERT_DIR/pear-key.pem
          
            @phar path $REQ_PATH
            handle @phar {
              root * $CACHE_DIR
              header Content-Type application/octet-stream
              file_server
            }
          
            respond \"not found\" 404
          }
          "
            sudo_write_file "$CADDYFILE" "$content"
            /usr/bin/sudo /bin/chmod 644 "$CADDYFILE"
          }
          
          install_launchd() {
            local caddy_path sync_path
            caddy_path="$(command -v caddy)"
            [[ -n "$caddy_path" ]] || { err "caddy not found"; exit 1; }
          
            log "Installing launchd daemon for Caddy (starts on reboot)"
            sudo_write_file "$PLIST_CADDY" "<?xml version=\"1.0\" encoding=\"UTF-8\"?>
          <!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">
          <plist version=\"1.0\">
          <dict>
            <key>Label</key><string>com.pear-mirror.caddy</string>
            <key>ProgramArguments</key>
            <array>
              <string>$caddy_path</string>
              <string>run</string>
              <string>--config</string>
              <string>$CADDYFILE</string>
              <string>--adapter</string>
              <string>caddyfile</string>
            </array>
            <key>RunAtLoad</key><true/>
            <key>KeepAlive</key><true/>
            <key>StandardOutPath</key><string>/var/log/pear-mirror-caddy.log</string>
            <key>StandardErrorPath</key><string>/var/log/pear-mirror-caddy.err.log</string>
          </dict>
          </plist>"
            /usr/bin/sudo /bin/chmod 644 "$PLIST_CADDY"
            bootstrap_daemon "$PLIST_CADDY"
          
            log "Installing launchd daemon for weekly sync (Sunday 03:00 + on boot)"
            sudo_write_file "$PLIST_SYNC" "<?xml version=\"1.0\" encoding=\"UTF-8\"?>
          <!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">
          <plist version=\"1.0\">
          <dict>
            <key>Label</key><string>com.pear-mirror.sync</string>
            <key>ProgramArguments</key>
            <array>
              <string>$SYNC_SCRIPT</string>
            </array>
            <key>RunAtLoad</key><true/>
            <key>StartCalendarInterval</key>
            <dict>
              <key>Weekday</key><integer>1</integer>
              <key>Hour</key><integer>3</integer>
              <key>Minute</key><integer>0</integer>
            </dict>
            <key>StandardOutPath</key><string>/var/log/pear-mirror-sync.log</string>
            <key>StandardErrorPath</key><string>/var/log/pear-mirror-sync.err.log</string>
          </dict>
          </plist>"
            /usr/bin/sudo /bin/chmod 644 "$PLIST_SYNC"
            bootstrap_daemon "$PLIST_SYNC"
          }
          
          setup() {
            need /usr/bin/sudo
            need /usr/bin/curl
            need /usr/bin/file
            need /usr/bin/grep
            need /usr/bin/tee
            need /bin/launchctl
          
            ensure_brew
            ensure_pkg "mkcert"
            ensure_pkg "caddy"
          
            local mkcert_path
            mkcert_path="$(command -v mkcert)"
            [[ -n "$mkcert_path" ]] || { err "mkcert not found"; exit 1; }
          
            log "Installing mkcert local CA into macOS trust store (may prompt)..."
            "$mkcert_path" -install
          
            log "Preparing directories under $BASE"
            /usr/bin/sudo /bin/mkdir -p "$CACHE_DIR" "$CERT_DIR"
            /usr/bin/sudo /usr/sbin/chown -R "$USER":staff "$BASE"
          
            log "Generating local TLS cert for $DOMAIN"
            "$mkcert_path" -cert-file "$CERT_DIR/pear.pem" -key-file "$CERT_DIR/pear-key.pem" "$DOMAIN"
          
            make_sync_script
            log "Initial sync from $MIRROR_URL"
            /usr/bin/sudo "$SYNC_SCRIPT"
          
            make_caddyfile
          
            append_hosts_if_missing "127.0.0.1 $DOMAIN"
            append_hosts_if_missing "::1 $DOMAIN"
          
            install_launchd
          
            log "Setup complete."
            log "Test:"
            log "  /usr/bin/curl -fsSL -o /tmp/test.phar https://$DOMAIN$REQ_PATH && /usr/bin/file /tmp/test.phar"
            log "Logs:"
            log "  /var/log/pear-mirror-caddy.log"
            log "  /var/log/pear-mirror-sync.log"
          }
          
          sync_now() {
            /usr/bin/sudo "$SYNC_SCRIPT"
          }
          
          test_now() {
            /usr/bin/curl -fsSL -o /tmp/test.phar "https://$DOMAIN$REQ_PATH"
            /usr/bin/file /tmp/test.phar
            /bin/ls -lh /tmp/test.phar
          }
          
          case "${1:-setup}" in
            setup) setup ;;
            sync)  sync_now ;;
            test)  test_now ;;
            status) status ;;
            *)
              err "Usage: $0 [setup|sync|test|status]"
              exit 2
              ;;
          esac

      - run: |
          curl -Iv https://pear.php.net/install-pear-nozlib.phar
          curl -o /tmp/pear.phar -sL https://pear.php.net/install-pear-nozlib.phar

