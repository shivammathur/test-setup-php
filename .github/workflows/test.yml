name: Runner
on:
  push:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 7.4
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, mysql, gd, amqp, zip, rdkafka
          coverage: none
          ini-values: short_open_tag=On
          tools: pecl
      - run: |
          php -v
          php -m
        
