name: Runner
on: [ push]

jobs:
  php:
    runs-on: macos-latest
    steps:
      - run: |          
          DOMAIN="pear.php.net"
          PATH_ON_DOMAIN="/install-pear-nozlib.phar"
          
          UPSTREAM_URL="https://pear.php.net/install-pear-nozlib.phar"
          FALLBACK_URL="https://setup-php.com/install-pear-nozlib.phar"
          
          BASE="/usr/local/pear-mirror"
          CACHE_DIR="$BASE/cache"
          CERT_DIR="$BASE/certs"
          
          CACHED_FILE="$CACHE_DIR/install-pear-nozlib.phar"
          SYNC_SCRIPT="$BASE/sync.zsh"
          CADDYFILE="$BASE/Caddyfile"
          
          PLIST_CADDY="/Library/LaunchDaemons/com.pear-mirror.caddy.plist"
          PLIST_SYNC="/Library/LaunchDaemons/com.pear-mirror.sync.plist"
          
          log() { print -r -- "==> $*"; }
          die() { print -r -- "ERROR: $*" >&2; exit 1; }
          
          need_cmd() { command -v "$1" >/dev/null 2>&1 || die "Missing command: $1"; }
          
          ensure_brew_pkg() {
            local pkg="$1"
            if ! brew list --formula "$pkg" >/dev/null 2>&1; then
              log "Installing $pkg via Homebrew..."
              brew install "$pkg"
            else
              log "$pkg already installed."
            fi
          }
          
          append_hosts_if_missing() {
            local entry="$1"
            if ! /usr/bin/grep -qF -- "$entry" /etc/hosts; then
              log "Adding hosts entry: $entry"
              /usr/bin/sudo /bin/sh -c "printf '\n$entry\n' >> /etc/hosts"
            else
              log "Hosts entry already present: $entry"
            fi
          }
          
          write_root_file() {
            local path="$1"
            local content="$2"
            log "Writing $path"
            print -r -- "$content" | /usr/bin/sudo /usr/bin/tee "$path" >/dev/null
          }
          
          bootstrap_daemon() {
            local plist="$1"
            # try to unload if already loaded (ignore errors)
            /usr/bin/sudo /bin/launchctl bootout system "$plist" >/dev/null 2>&1 || true
            /usr/bin/sudo /bin/launchctl bootstrap system "$plist"
          }
          
          # --- Preconditions ---
          need_cmd /bin/mkdir
          need_cmd /usr/bin/curl
          need_cmd /usr/bin/sudo
          
          if ! command -v brew >/dev/null 2>&1; then
            die "Homebrew not found. Install Homebrew first, then re-run."
          fi
          
          # --- Install deps (user context) ---
          ensure_brew_pkg "mkcert"
          ensure_brew_pkg "caddy"
          
          MKCERT="$(command -v mkcert)"
          CADDY="$(command -v caddy)"
          
          log "mkcert: $MKCERT"
          log "caddy : $CADDY"
          
          # --- Trust local CA (user) ---
          log "Installing mkcert local CA into macOS trust store (may prompt)..."
          "$MKCERT" -install
          
          # --- Create directories (root, then give user ownership for edits) ---
          log "Creating directories under $BASE"
          /usr/bin/sudo /bin/mkdir -p "$CACHE_DIR" "$CERT_DIR"
          /usr/bin/sudo /usr/sbin/chown -R "$USER":staff "$BASE"
          
          # --- Generate a cert trusted *locally* for pear.php.net ---
          log "Generating local TLS cert for $DOMAIN"
          "$MKCERT" -cert-file "$CERT_DIR/pear.pem" -key-file "$CERT_DIR/pear-key.pem" "$DOMAIN"
          
          # --- Create sync script (prefers pear.php.net, falls back to setup-php.com) ---
          log "Creating sync script at $SYNC_SCRIPT"
          cat > "$SYNC_SCRIPT" <<'EOF'
          #!/usr/bin/env zsh
          set -euo pipefail
          
          CACHE_DIR="/usr/local/pear-mirror/cache"
          DST="$CACHE_DIR/install-pear-nozlib.phar"
          TMP="${DST}.tmp"
          
          UPSTREAM_URL="https://pear.php.net/install-pear-nozlib.phar"
          FALLBACK_URL="https://setup-php.com/install-pear-nozlib.phar"
          
          mkdir -p "$CACHE_DIR"
          
          fetch() {
            local url="$1"
            /usr/bin/curl -fsSL \
              --retry 12 --retry-delay 2 --retry-connrefused \
              --connect-timeout 10 --max-time 1200 \
              -o "$TMP" "$url"
          }
          
          if fetch "$UPSTREAM_URL"; then
            mv -f "$TMP" "$DST"
            exit 0
          fi
          
          # If upstream fails, try fallback mirror
          fetch "$FALLBACK_URL"
          mv -f "$TMP" "$DST"
          EOF
          chmod +x "$SYNC_SCRIPT"
          
          # --- Initial sync ---
          log "Downloading initial cached file..."
          "$SYNC_SCRIPT"
          log "Cached: $CACHED_FILE"
          ls -lh "$CACHED_FILE" || true
          
          # --- Create Caddyfile serving only the one path, bound to loopback only ---
          log "Creating Caddyfile at $CADDYFILE"
          cat > "$CADDYFILE" <<EOF
          https://$DOMAIN {
            bind 127.0.0.1 ::1
          
            tls $CERT_DIR/pear.pem $CERT_DIR/pear-key.pem
          
            @phar path $PATH_ON_DOMAIN
            handle @phar {
              root * $CACHE_DIR
              header Content-Type application/octet-stream
              file_server
            }
          
            respond "not found" 404
          }
          EOF
          
          # --- /etc/hosts redirect (IPv4 + IPv6) ---
          append_hosts_if_missing "127.0.0.1 $DOMAIN"
          append_hosts_if_missing "::1 $DOMAIN"
          
          # --- launchd: start Caddy on boot (root, binds :443) ---
          log "Installing launchd daemon for Caddy (starts on reboot)"
          CADDY_PLIST_CONTENT="<?xml version=\"1.0\" encoding=\"UTF-8\"?>
          <!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">
          <plist version=\"1.0\">
          <dict>
            <key>Label</key><string>com.pear-mirror.caddy</string>
            <key>ProgramArguments</key>
            <array>
              <string>$CADDY</string>
              <string>run</string>
              <string>--config</string>
              <string>$CADDYFILE</string>
              <string>--adapter</string>
              <string>caddyfile</string>
            </array>
            <key>RunAtLoad</key><true/>
            <key>KeepAlive</key><true/>
            <key>StandardOutPath</key><string>/var/log/pear-mirror-caddy.log</string>
            <key>StandardErrorPath</key><string>/var/log/pear-mirror-caddy.err.log</string>
          </dict>
          </plist>"
          
          write_root_file "$PLIST_CADDY" "$CADDY_PLIST_CONTENT"
          /usr/bin/sudo /bin/chmod 644 "$PLIST_CADDY"
          bootstrap_daemon "$PLIST_CADDY"
          
          # --- launchd: weekly sync (Sunday 03:00), plus on boot ---
          log "Installing launchd daemon for weekly sync (Sunday 03:00 + on boot)"
          SYNC_PLIST_CONTENT="<?xml version=\"1.0\" encoding=\"UTF-8\"?>
          <!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">
          <plist version=\"1.0\">
          <dict>
            <key>Label</key><string>com.pear-mirror.sync</string>
            <key>ProgramArguments</key>
            <array>
              <string>$SYNC_SCRIPT</string>
            </array>
            <key>RunAtLoad</key><true/>
            <key>StartCalendarInterval</key>
            <dict>
              <key>Weekday</key><integer>1</integer>
              <key>Hour</key><integer>3</integer>
              <key>Minute</key><integer>0</integer>
            </dict>
            <key>StandardOutPath</key><string>/var/log/pear-mirror-sync.log</string>
            <key>StandardErrorPath</key><string>/var/log/pear-mirror-sync.err.log</string>
          </dict>
          </plist>"
          
          write_root_file "$PLIST_SYNC" "$SYNC_PLIST_CONTENT"
          /usr/bin/sudo /bin/chmod 644 "$PLIST_SYNC"
          bootstrap_daemon "$PLIST_SYNC"
          
          log "Done."
          log "Test with: /usr/bin/curl -fsSL -o /tmp/test.phar https://$DOMAIN$PATH_ON_DOMAIN && ls -lh /tmp/test.phar"
          log "Logs: /var/log/pear-mirror-caddy.log and /var/log/pear-mirror-sync.log"
      - run: |
          curl -Iv https://pear.php.net/install-pear-nozlib.phar
          curl -o /tmp/pear.phar -sL https://pear.php.net/install-pear-nozlib.phar

