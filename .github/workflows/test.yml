name: 'Runner Test'
on: [push]
jobs:
  run:
    runs-on: windows-latest
    name: Test
    steps:
    - uses: actions/checkout@v6
      with:
        repository: xdebug/xdebug
    - run: |
        mkdir C:\build
        $currentDirectory = (Get-Location).Path
        Copy-Item -Path "$currentDirectory\*" -Destination C:\build -Recurse -Force
