name: Runner
on: [push]
jobs:
  runner:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
        php: [7.3, 7.4, 8.0, 8.1, 8.2, 8.3, 8.4, 8.5]
    steps:
      - uses: shivammathur/setup-php@more-verbose
        with:
          php-version: ${{ matrix.php }}
          extensions: redis
      - run: |
          php -v
          php --ri redis

