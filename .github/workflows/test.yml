name: Runner
on: [push]
jobs:
  runner:
    name: runner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '12'
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer
      - run: echo "/usr/local/bin" >> $GITHUB_PATH    
      - name: Tool versions
        run: |
          echo "$PATH"
          /usr/local/bin/node --version || true
          which node
          node --version
