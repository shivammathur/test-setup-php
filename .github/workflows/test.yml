name: Runner
on: [push]
jobs:
  one:
    name: Run
    runs-on: ${{ matrix.os }}    
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-15-intel]
    steps:
      - name: SetUp PHP
        id: setup-php
        uses: shivammathur/setup-php@develop
        with:
          php-version: 5.6
  two:
    name: Run
    runs-on: ${{ matrix.os }}    
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-15-intel]
    steps:
      - name: SetUp PHP
        id: setup-php
        uses: shivammathur/setup-php@test-brew
        with:
          php-version: 5.6
