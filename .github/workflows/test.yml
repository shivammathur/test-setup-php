name: Test PHP packages
on:
  push:
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26, macos-latest]
        php: [5.6, 7.0, 7.2, 7.4, 8.1, 8.3, 8.5, 8.6]
    steps:
      - uses: shivammathur/setup-php@verbose
        with:
          php-version: ${{ matrix.php }}

