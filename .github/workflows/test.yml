
name: Runner
on:
  push:
jobs:
  run:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    steps:
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
      - run: php -v && php -m
      - run: php --ri curl
      - name: Test
        shell: php {0}
        run: |
          <?php
          $ch = curl_init();
          curl_setopt($ch, CURLOPT_URL, "https://downloads.php.net/~windows/php-sdk/deps/series/packages-8.5-vs17-x64-staging.txt");
          curl_setopt($ch, CURLOPT_RETURNTRANSFER, true);
          $response = curl_exec($ch);
          
          if (curl_errno($ch)) {
              echo 'Curl error: ' . curl_error($ch);
          } else {
              echo $response;
          }
          curl_close($ch);
          ?>
          
