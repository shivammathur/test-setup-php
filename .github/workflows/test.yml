name: Runner workflow
on:
  push:
jobs:
  run:
    name: Run
    runs-on: ${{ matrix.operating-system }}
    strategy:
      fail-fast: false
      matrix:
        operating-system: [ubuntu-26.04, ubuntu-24.04, ubuntu-22.04, ubuntu-26.04-arm, ubuntu-24.04-arm, ubuntu-22.04-arm]
        php-versions: ['8.6']
    steps:
      - name: Setup PHP with extensions and custom config
        uses: shivammathur/setup-php@v2
        env:
          php-version: ${{ matrix.php-versions }}

      - name: Testing PHP version
        run: |
          php -v
          php -m
