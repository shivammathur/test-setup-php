name: Runner
on: [ push]

jobs:
  php:
    runs-on: windows-latest
    steps:
      - run: |
          Install-Module -Name BuildPhpExtension -Repository PSGallery -Force -Scope CurrentUser
          Invoke-PhpBuildExtension -ExtensionUrl https://github.com/remicollet/php-xpass `
                         -ExtensionRef master `
                         -PhpVersion 8.4 `
                         -Arch x64 `
                         -Ts nts `
                         -Args "--enable-xpass"
      - if: failure()
        uses: mxschmitt/action-tmate@v3.23                  

