name: Audit PHP Ubuntu cache

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  PHP_EXTENSIONS: curl, gd, imagick, intl, mbstring, mysqli, pdo_mysql, pdo_pgsql, zip

jobs:
  cache-low:
    name: PHP ${{ matrix.php }} ${{ matrix.variant.build }} ${{ matrix.variant.ts }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
          - ubuntu-26.04
          - ubuntu-22.04-arm
          - ubuntu-24.04-arm
          - ubuntu-26.04-arm
        php:
          - '5.6'
          - '7.0'
          - '7.1'
          - '7.2'
          - '7.3'
          - '7.4'
          - '8.0'
        variant:
          - build: release
            debug: 'false'
            ts: nts
          - build: release
            debug: 'false'
            ts: zts
          - build: debug
            debug: 'true'
            ts: nts
          - build: debug
            debug: 'true'
            ts: zts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record runner package baseline
        run: |
          mkdir -p "$RUNNER_TEMP/cache-audit"
          dpkg-query -W -f='${binary:Package}\t${Version}\n' | sort > "$RUNNER_TEMP/cache-audit/baseline.tsv"
          . /etc/os-release
          {
            echo "runner=${{ matrix.os }}"
            echo "ubuntu=$VERSION_ID"
            echo "codename=$VERSION_CODENAME"
            echo "arch=$(dpkg --print-architecture)"
            echo "php=${{ matrix.php }}"
            echo "build=${{ matrix.variant.build }}"
            echo "ts=${{ matrix.variant.ts }}"
          } | tee "$RUNNER_TEMP/cache-audit/context.env"

      - name: Setup PHP
        uses: shivammathur/setup-php@master
        env:
          debug: ${{ matrix.variant.debug }}
          phpts: ${{ matrix.variant.ts }}
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.PHP_EXTENSIONS }}
          coverage: none
          tools: none

      - name: Audit cache package integrity
        if: always()
        run: bash "$GITHUB_WORKSPACE/.github/workflows/scripts/audit-cache.sh"

      - name: Test runtime extensions
        run: bash "$GITHUB_WORKSPACE/.github/workflows/scripts/test-runtime.sh"

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ matrix.os }}-${{ matrix.php }}-${{ matrix.variant.build }}-${{ matrix.variant.ts }}
          path: ${{ runner.temp }}/cache-audit
          if-no-files-found: error

  cache-high:
    name: PHP ${{ matrix.php }} ${{ matrix.variant.build }} ${{ matrix.variant.ts }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
          - ubuntu-26.04
          - ubuntu-22.04-arm
          - ubuntu-24.04-arm
          - ubuntu-26.04-arm
        php:
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'
          - '8.6'
        variant:
          - build: release
            debug: 'false'
            ts: nts
          - build: release
            debug: 'false'
            ts: zts
          - build: debug
            debug: 'true'
            ts: nts
          - build: debug
            debug: 'true'
            ts: zts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record runner package baseline
        run: |
          mkdir -p "$RUNNER_TEMP/cache-audit"
          dpkg-query -W -f='${binary:Package}\t${Version}\n' | sort > "$RUNNER_TEMP/cache-audit/baseline.tsv"
          . /etc/os-release
          {
            echo "runner=${{ matrix.os }}"
            echo "ubuntu=$VERSION_ID"
            echo "codename=$VERSION_CODENAME"
            echo "arch=$(dpkg --print-architecture)"
            echo "php=${{ matrix.php }}"
            echo "build=${{ matrix.variant.build }}"
            echo "ts=${{ matrix.variant.ts }}"
          } | tee "$RUNNER_TEMP/cache-audit/context.env"

      - name: Setup PHP
        uses: shivammathur/setup-php@master
        env:
          debug: ${{ matrix.variant.debug }}
          phpts: ${{ matrix.variant.ts }}
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.PHP_EXTENSIONS }}
          coverage: none
          tools: none

      - name: Audit cache package integrity
        if: always()
        run: bash "$GITHUB_WORKSPACE/.github/workflows/scripts/audit-cache.sh"

      - name: Test runtime extensions
        run: bash "$GITHUB_WORKSPACE/.github/workflows/scripts/test-runtime.sh"

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ matrix.os }}-${{ matrix.php }}-${{ matrix.variant.build }}-${{ matrix.variant.ts }}
          path: ${{ runner.temp }}/cache-audit
          if-no-files-found: error
