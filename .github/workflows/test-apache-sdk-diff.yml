name: Test Apache SDK Delta
run-name: Test Apache SDK delta

on:
  push:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

env:
  WINLIBS_APACHE_RUN_ID: "24624419180"
  WINLIBS_APACHE_ARTIFACT: "apache-2.4.66-vs17-x64"
  PHP_SDK_APACHE_URL: "https://downloads.php.net/~windows/php-sdk/deps/vs17/x64/apache-2.4.43-vs17-x64.zip"
  APACHE_LOUNGE_VERSION: "2.4.66"
  APACHE_LOUNGE_BUILD: "251206"
  APACHE_LOUNGE_TOOLSET: "VS17"
  APACHE_PORT: "8080"
  APACHE_SSL_PORT: "8443"

jobs:
  compare-sdk-packages:
    name: ${{ matrix.package.name }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: Current php-sdk Apache
            key: release
          - name: New winlibs Apache
            key: ours

    steps:
      - name: Download new winlibs Apache artifact
        if: matrix.package.key == 'ours'
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WINLIBS_APACHE_ARTIFACT }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: winlibs/winlib-builder
          run-id: ${{ env.WINLIBS_APACHE_RUN_ID }}
          path: external/ours

      - name: Setup MSVC development environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Run Apache SDK runtime probes
        shell: pwsh
        env:
          TEST_PACKAGE_KEY: ${{ matrix.package.key }}
        run: |
          $ErrorActionPreference = 'Stop'

          function Assert-True {
            param(
              [bool] $Condition,
              [string] $Message
            )

            if (-not $Condition) {
              throw $Message
            }
          }

          function Download-File {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Url,
              [Parameter(Mandatory = $true)]
              [string] $Path
            )

            & curl.exe --fail --location --silent --show-error --output $Path $Url
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to download $Url"
            }

            if (-not (Test-Path $Path)) {
              throw "Downloaded file is missing: $Path"
            }

            $global:LASTEXITCODE = 0
          }

          function Wait-ForUrl {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Url,
              [int] $ExpectedStatusCode = 200,
              [switch] $SkipCertificateCheck,
              [int] $Retries = 30
            )

            for ($attempt = 1; $attempt -le $Retries; $attempt++) {
              try {
                if ($SkipCertificateCheck) {
                  $response = Invoke-WebRequest -Uri $Url -SkipHttpErrorCheck -SkipCertificateCheck -TimeoutSec 5
                } else {
                  $response = Invoke-WebRequest -Uri $Url -SkipHttpErrorCheck -TimeoutSec 5
                }

                if ([int] $response.StatusCode -eq $ExpectedStatusCode) {
                  return $response
                }
              } catch {
              }

              Start-Sleep -Seconds 1
            }

            throw "Timed out waiting for $Url to return HTTP $ExpectedStatusCode"
          }

          function Resolve-LibraryName {
            param(
              [Parameter(Mandatory = $true)]
              [string] $LibRoot,
              [Parameter(Mandatory = $true)]
              [string[]] $Candidates
            )

            foreach ($candidate in $Candidates) {
              if (Test-Path (Join-Path $LibRoot $candidate)) {
                return $candidate
              }
            }

            return $Candidates[0]
          }

          function Build-ApacheModule {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Name,
              [AllowEmptyString()]
              [Parameter(Mandatory = $true)]
              [string[]] $SourceLines,
              [Parameter(Mandatory = $true)]
              [string] $IncludeRoot,
              [Parameter(Mandatory = $true)]
              [string] $LibRoot,
              [string[]] $LinkLibraries = @(),
              [Parameter(Mandatory = $true)]
              [string] $OutputDir
            )

            $sourcePath = Join-Path $OutputDir "mod_$Name.c"
            $modulePath = Join-Path $OutputDir "mod_$Name.so"
            $logPath = Join-Path $OutputDir "$Name.build.log"

            Set-Content -Path $sourcePath -Value ($SourceLines -join "`r`n") -Encoding ascii

            $linkArgs = @(
              '/link',
              '/NOLOGO',
              '/DLL',
              "/OUT:$modulePath",
              "/LIBPATH:$LibRoot",
              'libhttpd.lib',
              'libapr-1.lib',
              'libaprutil-1.lib'
            ) + $LinkLibraries

            $output = & cl.exe /nologo /W3 /MD /LD /I"$IncludeRoot" "$sourcePath" @linkArgs 2>&1
            $output | Set-Content -Path $logPath -Encoding utf8

            $success = ($LASTEXITCODE -eq 0) -and (Test-Path $modulePath)
            $global:LASTEXITCODE = 0

            return [pscustomobject]@{
              Success = $success
              ModulePath = $modulePath
              LogPath = $logPath
            }
          }

          $packageKey = $env:TEST_PACKAGE_KEY
          $packageName = if ($packageKey -eq 'ours') { 'New winlibs Apache' } else { 'Current php-sdk Apache' }
          $workspace = Join-Path $env:RUNNER_TEMP "apache-sdk-delta-$packageKey"
          $logsDir = Join-Path $workspace 'logs'
          $buildDir = Join-Path $workspace 'build'
          $releaseZip = Join-Path $workspace 'apache-release.zip'
          $releaseRoot = Join-Path $workspace 'release'
          $apacheZip = Join-Path $workspace 'apache-lounge.zip'
          $apacheExtractRoot = Join-Path $workspace 'apache-extract'
          $apacheInstallRoot = 'C:\Apache24'
          $packageRoot = if ($packageKey -eq 'ours') {
            Join-Path $env:GITHUB_WORKSPACE 'external\ours'
          } else {
            $releaseRoot
          }

          if (Test-Path $workspace) {
            Remove-Item -Path $workspace -Recurse -Force
          }

          New-Item -Path $logsDir -ItemType Directory -Force | Out-Null
          New-Item -Path $buildDir -ItemType Directory -Force | Out-Null
          Remove-Item -Path $apacheInstallRoot -Recurse -Force -ErrorAction SilentlyContinue

          if ($packageKey -eq 'release') {
            Download-File -Url $env:PHP_SDK_APACHE_URL -Path $releaseZip
            Expand-Archive -Path $releaseZip -DestinationPath $releaseRoot -Force
          }

          $includeRoot = Join-Path $packageRoot 'include\apache2_4'
          $libRoot = Join-Path $packageRoot 'lib\apache2_4'

          Assert-True -Condition (Test-Path $includeRoot) -Message "Apache include root missing: $includeRoot"
          Assert-True -Condition (Test-Path $libRoot) -Message "Apache lib root missing: $libRoot"

          $apacheUrl = "https://www.apachelounge.com/download/VS17/binaries/httpd-$($env:APACHE_LOUNGE_VERSION)-$($env:APACHE_LOUNGE_BUILD)-Win64-$($env:APACHE_LOUNGE_TOOLSET).zip"
          Download-File -Url $apacheUrl -Path $apacheZip
          Expand-Archive -Path $apacheZip -DestinationPath $apacheExtractRoot -Force

          $extractedApacheRoot = Get-ChildItem -Path $apacheExtractRoot -Directory -Recurse |
            Where-Object {
              $_.Name -eq 'Apache24' -and
              (Test-Path (Join-Path $_.FullName 'bin\httpd.exe'))
            } |
            Select-Object -First 1 -ExpandProperty FullName

          Assert-True -Condition ([bool] $extractedApacheRoot) -Message "Unable to find Apache24 in extracted Apache Lounge archive"

          Copy-Item -Path $extractedApacheRoot -Destination $apacheInstallRoot -Recurse -Force

          $apacheRoot = $apacheInstallRoot
          $httpdExe = Join-Path $apacheRoot 'bin\httpd.exe'
          $httpdConf = Join-Path $apacheRoot 'conf\httpd.conf'
          $apacheModulesDir = Join-Path $apacheRoot 'modules'
          $port = [int] $env:APACHE_PORT
          $sslPort = [int] $env:APACHE_SSL_PORT
          $opensslExe = Join-Path $apacheRoot 'bin\openssl.exe'
          $opensslConfig = Join-Path $apacheRoot 'conf\openssl-test.cnf'
          $sslCert = Join-Path $apacheRoot 'conf\server.crt'
          $sslKey = Join-Path $apacheRoot 'conf\server.key'
          $apacheHtdocs = Join-Path $apacheRoot 'htdocs'
          $testResults = New-Object System.Collections.Generic.List[object]
          $mismatches = New-Object System.Collections.Generic.List[string]
          $httpdProcess = $null

          function Add-TestResult {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Suite,
              [Parameter(Mandatory = $true)]
              [string] $Name,
              [Parameter(Mandatory = $true)]
              [string] $Status,
              [string] $Details = ''
            )

            $script:testResults.Add([pscustomobject]@{
              PackageKey = $script:packageKey
              PackageName = $script:packageName
              Suite = $Suite
              Name = $Name
              Status = $Status
              Details = $Details
            }) | Out-Null

            $statusLabel = switch ($Status) {
              'passed' { 'PASS' }
              'failed' { 'FAIL' }
              'skipped' { 'SKIP' }
              default { $Status.ToUpperInvariant() }
            }

            if ([string]::IsNullOrWhiteSpace($Details)) {
              Write-Host "[$statusLabel] $Suite :: $Name"
            } else {
              Write-Host "[$statusLabel] $Suite :: $Name :: $Details"
            }
          }

          function Assert-Test {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Suite,
              [Parameter(Mandatory = $true)]
              [string] $Name,
              [Parameter(Mandatory = $true)]
              [bool] $Condition,
              [Parameter(Mandatory = $true)]
              [string] $Message,
              [string] $SuccessDetails = '',
              [string] $FailureDetails = ''
            )

            if ($Condition) {
              Add-TestResult -Suite $Suite -Name $Name -Status 'passed' -Details $SuccessDetails
              return
            }

            $details = if ([string]::IsNullOrWhiteSpace($FailureDetails)) { $Message } else { $FailureDetails }
            Add-TestResult -Suite $Suite -Name $Name -Status 'failed' -Details $details
            $script:mismatches.Add($Message) | Out-Null
          }

          function Add-SkippedTest {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Suite,
              [Parameter(Mandatory = $true)]
              [string] $Name,
              [string] $Reason = ''
            )

            Add-TestResult -Suite $Suite -Name $Name -Status 'skipped' -Details $Reason
          }

          function Invoke-TestAction {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Suite,
              [Parameter(Mandatory = $true)]
              [string] $Name,
              [Parameter(Mandatory = $true)]
              [scriptblock] $Action,
              [string] $SuccessDetails = ''
            )

            try {
              $result = & $Action
              Add-TestResult -Suite $Suite -Name $Name -Status 'passed' -Details $SuccessDetails
              return $result
            } catch {
              Add-TestResult -Suite $Suite -Name $Name -Status 'failed' -Details $_.Exception.Message
              $script:mismatches.Add("$Name failed: $($_.Exception.Message)") | Out-Null
              return $null
            }
          }

          function Get-TestStats {
            param(
              [Parameter(Mandatory = $true)]
              [object[]] $Results
            )

            [pscustomobject]@{
              package_key = $script:packageKey
              package_name = $script:packageName
              total = @($Results).Count
              passed = @($Results | Where-Object Status -eq 'passed').Count
              failed = @($Results | Where-Object Status -eq 'failed').Count
              skipped = @($Results | Where-Object Status -eq 'skipped').Count
            }
          }

          Assert-True -Condition (Test-Path $opensslExe) -Message "Apache Lounge openssl.exe is missing: $opensslExe"

          @(
            '[req]',
            'default_bits = 2048',
            'prompt = no',
            'default_md = sha256',
            'distinguished_name = req_distinguished_name',
            'x509_extensions = v3_req',
            '',
            '[req_distinguished_name]',
            'CN = 127.0.0.1',
            '',
            '[v3_req]',
            'subjectAltName = @alt_names',
            '',
            '[alt_names]',
            'DNS.1 = localhost',
            'IP.1 = 127.0.0.1'
          ) | Set-Content -Path $opensslConfig -Encoding ascii

          $opensslOutput = & $opensslExe 'req' '-x509' '-newkey' 'rsa:2048' '-sha256' '-nodes' '-keyout' $sslKey '-out' $sslCert '-days' '1' '-config' $opensslConfig '-extensions' 'v3_req' 2>&1
          $opensslOutput | Set-Content -Path (Join-Path $logsDir 'openssl.log') -Encoding utf8
          Assert-True -Condition ($LASTEXITCODE -eq 0) -Message 'OpenSSL certificate generation failed'
          $global:LASTEXITCODE = 0
          Assert-True -Condition (Test-Path $sslCert) -Message "Generated SSL certificate is missing: $sslCert"
          Assert-True -Condition (Test-Path $sslKey) -Message "Generated SSL private key is missing: $sslKey"

          $headerChecks = @(
            @{ Name = 'http_ssl.h'; Path = 'http_ssl.h'; Expected = @{ ours = $true; release = $false } },
            @{ Name = 'nghttp2/nghttp2ver.h'; Path = 'nghttp2/nghttp2ver.h'; Expected = @{ ours = $true; release = $false } },
            @{ Name = 'brotli/encode.h'; Path = 'brotli/encode.h'; Expected = @{ ours = $true; release = $false } },
            @{ Name = 'curl/curl.h'; Path = 'curl/curl.h'; Expected = @{ ours = $true; release = $false } }
          )

          foreach ($headerCheck in $headerChecks) {
            $actual = Test-Path (Join-Path $includeRoot $headerCheck.Path)
            $expected = [bool] $headerCheck.Expected[$packageKey]
            Assert-Test -Suite 'package-surface' -Name "header::$($headerCheck.Name)" -Condition ($actual -eq $expected) -Message "Header $($headerCheck.Name) expected $expected but got $actual" -SuccessDetails "expected=$expected actual=$actual" -FailureDetails "expected=$expected actual=$actual"
          }

          $libraryChecks = @(
            @{ Name = 'nghttp2'; Candidates = @('nghttp2.lib'); Expected = @{ ours = $true; release = $false } },
            @{ Name = 'brotli'; Candidates = @('brotlienc.lib'); Expected = @{ ours = $true; release = $false } },
            @{ Name = 'curl'; Candidates = @('curl.lib', 'libcurl.lib', 'libcurl_imp.lib'); Expected = @{ ours = $true; release = $false } }
          )

          foreach ($libraryCheck in $libraryChecks) {
            $found = $false
            $details = @()
            foreach ($candidate in $libraryCheck.Candidates) {
              $present = Test-Path (Join-Path $libRoot $candidate)
              $details += "$candidate=$present"
              if ($present) {
                $found = $true
              }
            }

            $expected = [bool] $libraryCheck.Expected[$packageKey]
            $detailText = $details -join ', '
            Assert-Test -Suite 'package-surface' -Name "library::$($libraryCheck.Name)" -Condition ($found -eq $expected) -Message "Library set $($libraryCheck.Name) expected $expected but got $found" -SuccessDetails $detailText -FailureDetails $detailText
          }

          $curlLibrary = Resolve-LibraryName -LibRoot $libRoot -Candidates @('libcurl_imp.lib', 'libcurl.lib', 'curl.lib')
          $brotliLibraries = @('brotlienc.lib')
          if (Test-Path (Join-Path $libRoot 'brotlicommon.lib')) {
            $brotliLibraries += 'brotlicommon.lib'
          }

          Set-Content -Path (Join-Path $logsDir 'selection.txt') -Value @(
            "package_key=$packageKey"
            "package_root=$packageRoot"
            "include_root=$includeRoot"
            "lib_root=$libRoot"
            "apache_root=$apacheRoot"
            "apache_url=$apacheUrl"
            "http_port=$port"
            "ssl_port=$sslPort"
            "curl_library=$curlLibrary"
            "brotli_libraries=$($brotliLibraries -join ',')"
          ) -Encoding ascii

          $baselineSource = @(
            '#include "httpd.h"',
            '#include "http_config.h"',
            '#include "http_protocol.h"',
            '#include "http_request.h"',
            '#include <string.h>',
            '',
            'static int sdk_baseline_handler(request_rec *r)',
            '{',
            '    if (!r->handler || strcmp(r->handler, "sdk-baseline") != 0) {',
            '        return DECLINED;',
            '    }',
            '',
            '    ap_set_content_type(r, "text/plain");',
            '    ap_rputs("sdk_baseline_ok\n", r);',
            '    return OK;',
            '}',
            '',
            'static void sdk_baseline_register_hooks(apr_pool_t *p)',
            '{',
            '    ap_hook_handler(sdk_baseline_handler, NULL, NULL, APR_HOOK_MIDDLE);',
            '}',
            '',
            'module AP_MODULE_DECLARE_DATA sdk_baseline_module = {',
            '    STANDARD20_MODULE_STUFF,',
            '    NULL,',
            '    NULL,',
            '    NULL,',
            '    NULL,',
            '    NULL,',
            '    sdk_baseline_register_hooks',
            '};'
          )

          $httpSslSource = @(
            '#include "httpd.h"',
            '#include "http_config.h"',
            '#include "http_protocol.h"',
            '#include "http_request.h"',
            '#include "http_ssl.h"',
            '#include <string.h>',
            '',
            'static int sdk_httpssl_handler(request_rec *r)',
            '{',
            '    int is_ssl = 0;',
            '    const char *ssl_protocol = NULL;',
            '',
            '    if (!r->handler || strcmp(r->handler, "sdk-http-ssl") != 0) {',
            '        return DECLINED;',
            '    }',
            '',
            '    is_ssl = ap_ssl_conn_is_ssl(r->connection);',
            '    ssl_protocol = ap_ssl_var_lookup(r->pool, r->server, r->connection, r, "SSL_PROTOCOL");',
            '    if (!ssl_protocol) {',
            '        ssl_protocol = "none";',
            '    }',
            '',
            '    ap_set_content_type(r, "text/plain");',
            '    ap_rprintf(r, "ssl_conn_is_ssl=%d\nssl_protocol=%s\n", is_ssl, ssl_protocol);',
            '    return OK;',
            '}',
            '',
            'static void sdk_httpssl_register_hooks(apr_pool_t *p)',
            '{',
            '    ap_hook_handler(sdk_httpssl_handler, NULL, NULL, APR_HOOK_MIDDLE);',
            '}',
            '',
            'module AP_MODULE_DECLARE_DATA sdk_httpssl_module = {',
            '    STANDARD20_MODULE_STUFF,',
            '    NULL,',
            '    NULL,',
            '    NULL,',
            '    NULL,',
            '    NULL,',
            '    sdk_httpssl_register_hooks',
            '};'
          )

          $extrasSource = @(
            '#define NGHTTP2_NO_SSIZE_T 1',
            '#include "httpd.h"',
            '#include "http_config.h"',
            '#include "http_protocol.h"',
            '#include "http_request.h"',
            '#include "apr_strings.h"',
            '#include <nghttp2/nghttp2.h>',
            '#include <nghttp2/nghttp2ver.h>',
            '#include <brotli/encode.h>',
            '#include <curl/curl.h>',
            '#include <stdio.h>',
            '#include <stdlib.h>',
            '#include <string.h>',
            '',
            'typedef struct sdk_buffer_t {',
            '    char data[2048];',
            '    size_t size;',
            '} sdk_buffer_t;',
            '',
            'static const char *sdk_get_name_arg(request_rec *r)',
            '{',
            '    const char *args = r->args;',
            '    const char *needle = "name=";',
            '    const char *start = NULL;',
            '    const char *end = NULL;',
            '',
            '    if (!args) {',
            '        return "world";',
            '    }',
            '',
            '    start = strstr(args, needle);',
            '    if (!start) {',
            '        return "world";',
            '    }',
            '',
            '    start += strlen(needle);',
            "    end = strchr(start, 38);",
            '    if (!end) {',
            '        end = start + strlen(start);',
            '    }',
            '',
            '    if (end == start) {',
            '        return "world";',
            '    }',
            '',
            '    return apr_pstrndup(r->pool, start, (apr_size_t)(end - start));',
            '}',
            '',
            'static size_t sdk_curl_write(char *ptr, size_t size, size_t nmemb, void *userdata)',
            '{',
            '    sdk_buffer_t *buffer = (sdk_buffer_t *)userdata;',
            '    size_t total = size * nmemb;',
            '    size_t available = sizeof(buffer->data) - buffer->size - 1;',
            '',
            '    if (total > available) {',
            '        total = available;',
            '    }',
            '',
            '    if (total > 0) {',
            '        memcpy(buffer->data + buffer->size, ptr, total);',
            '        buffer->size += total;',
            '        buffer->data[buffer->size] = 0;',
            '    }',
            '',
            '    return size * nmemb;',
            '}',
            '',
            'static int sdk_extras_handler(request_rec *r)',
            '{',
            '    const nghttp2_info *nghttp2_info = NULL;',
            '    curl_version_info_data *curl_info = NULL;',
            '    const char *name = NULL;',
            '    const char *nghttp2_proto = "null";',
            '    const char *nghttp2_version_text = "null";',
            '    const char *curl_version = "null";',
            '    const char *curl_status = "not-run";',
            '    unsigned int curl_version_num = LIBCURL_VERSION_NUM;',
            '    BROTLI_BOOL brotli_ok;',
            '    uint8_t compressed[1024];',
            '    size_t compressed_size = sizeof(compressed);',
            '    CURL *curl = NULL;',
            '    CURLcode curl_code = CURLE_OK;',
            '    long curl_http_code = 0;',
            '    int curl_body_has_ssl = 0;',
            '    int curl_body_has_tls = 0;',
            '    sdk_buffer_t curl_buffer = {{0}, 0};',
            '    char curl_url[256];',
            '',
            '    if (!r->handler || strcmp(r->handler, "sdk-extras") != 0) {',
            '        return DECLINED;',
            '    }',
            '',
            '    name = sdk_get_name_arg(r);',
            '',
            '    nghttp2_info = nghttp2_version(0);',
            '    if (nghttp2_info) {',
            '        if (nghttp2_info->version_str) {',
            '            nghttp2_version_text = nghttp2_info->version_str;',
            '        }',
            '        if (nghttp2_info->proto_str) {',
            '            nghttp2_proto = nghttp2_info->proto_str;',
            '        }',
            '    }',
            '',
            '    brotli_ok = BrotliEncoderCompress(',
            '        BROTLI_DEFAULT_QUALITY,',
            '        BROTLI_DEFAULT_WINDOW,',
            '        BROTLI_MODE_GENERIC,',
            '        strlen(name),',
            '        (const uint8_t *)name,',
            '        &compressed_size,',
            '        compressed',
            '    );',
            '    if (!brotli_ok) {',
            '        return HTTP_INTERNAL_SERVER_ERROR;',
            '    }',
            '',
            '    curl_info = curl_version_info(CURLVERSION_NOW);',
            '    if (curl_info) {',
            '        if (curl_info->version) {',
            '            curl_version = curl_info->version;',
            '        }',
            '        curl_version_num = curl_info->version_num;',
            '    }',
            '',
            '    if (curl_global_init(CURL_GLOBAL_DEFAULT) != CURLE_OK) {',
            '        return HTTP_INTERNAL_SERVER_ERROR;',
            '    }',
            '',
            "    if (_snprintf(curl_url, sizeof(curl_url), `"https://127.0.0.1:$sslPort/sdk-http-ssl`") < 0) {",
            '        curl_global_cleanup();',
            '        return HTTP_INTERNAL_SERVER_ERROR;',
            '    }',
            '',
            '    curl = curl_easy_init();',
            '    if (!curl) {',
            '        curl_global_cleanup();',
            '        return HTTP_INTERNAL_SERVER_ERROR;',
            '    }',
            '',
            '    curl_easy_setopt(curl, CURLOPT_URL, curl_url);',
            '    curl_easy_setopt(curl, CURLOPT_SSL_VERIFYPEER, 0L);',
            '    curl_easy_setopt(curl, CURLOPT_SSL_VERIFYHOST, 0L);',
            '    curl_easy_setopt(curl, CURLOPT_FOLLOWLOCATION, 1L);',
            '    curl_easy_setopt(curl, CURLOPT_TIMEOUT_MS, 5000L);',
            '    curl_easy_setopt(curl, CURLOPT_WRITEFUNCTION, sdk_curl_write);',
            '    curl_easy_setopt(curl, CURLOPT_WRITEDATA, &curl_buffer);',
            '    curl_code = curl_easy_perform(curl);',
            '    if (curl_code == CURLE_OK) {',
            '        curl_status = "ok";',
            '        curl_easy_getinfo(curl, CURLINFO_RESPONSE_CODE, &curl_http_code);',
            '        curl_body_has_ssl = strstr(curl_buffer.data, "ssl_conn_is_ssl=1") != NULL;',
            '        curl_body_has_tls = strstr(curl_buffer.data, "ssl_protocol=TLS") != NULL;',
            '    } else {',
            '        curl_status = curl_easy_strerror(curl_code);',
            '    }',
            '',
            '    curl_easy_cleanup(curl);',
            '    curl_global_cleanup();',
            '',
            '    ap_set_content_type(r, "text/plain");',
            '    ap_rprintf(r, "name=%s\n", name);',
            '    ap_rprintf(r, "nghttp2_proto=%s\n", nghttp2_proto);',
            '    ap_rprintf(r, "nghttp2_version=%s\n", nghttp2_version_text);',
            '    ap_rprintf(r, "nghttp2_version_num=%d\n", NGHTTP2_VERSION_NUM);',
            '    ap_rprintf(r, "brotli_ok=%d\n", brotli_ok ? 1 : 0);',
            '    ap_rprintf(r, "brotli_encoder_version=%u\n", BrotliEncoderVersion());',
            '    ap_rprintf(r, "brotli_size=%u\n", (unsigned int)compressed_size);',
            '    ap_rprintf(r, "curl_status=%s\n", curl_status);',
            '    ap_rprintf(r, "curl_http_code=%ld\n", curl_http_code);',
            '    ap_rprintf(r, "curl_body_has_ssl=%d\n", curl_body_has_ssl);',
            '    ap_rprintf(r, "curl_body_has_tls=%d\n", curl_body_has_tls);',
            '    ap_rprintf(r, "curl_version=%s\n", curl_version);',
            '    ap_rprintf(r, "curl_version_num=%u\n", curl_version_num);',
            '    return OK;',
            '}',
            '',
            'static void sdk_extras_register_hooks(apr_pool_t *p)',
            '{',
            '    ap_hook_handler(sdk_extras_handler, NULL, NULL, APR_HOOK_MIDDLE);',
            '}',
            '',
            'module AP_MODULE_DECLARE_DATA sdk_extras_module = {',
            '    STANDARD20_MODULE_STUFF,',
            '    NULL,',
            '    NULL,',
            '    NULL,',
            '    NULL,',
            '    NULL,',
            '    sdk_extras_register_hooks',
            '};'
          )

          $moduleBuilds = @(
            @{
              Name = 'sdk_baseline'
              Expected = @{ ours = $true; release = $true }
              Source = $baselineSource
              LinkLibraries = @()
            },
            @{
              Name = 'sdk_httpssl'
              Expected = @{ ours = $true; release = $false }
              Source = $httpSslSource
              LinkLibraries = @()
            },
            @{
              Name = 'sdk_extras'
              Expected = @{ ours = $true; release = $false }
              Source = $extrasSource
              LinkLibraries = @('nghttp2.lib') + $brotliLibraries + @($curlLibrary)
            }
          )

          $buildResults = @{}

          foreach ($moduleBuild in $moduleBuilds) {
            $buildResult = Build-ApacheModule -Name $moduleBuild.Name -SourceLines $moduleBuild.Source -IncludeRoot $includeRoot -LibRoot $libRoot -LinkLibraries $moduleBuild.LinkLibraries -OutputDir $buildDir
            $buildResults[$moduleBuild.Name] = $buildResult
            if (Test-Path $buildResult.LogPath) {
              Copy-Item -Path $buildResult.LogPath -Destination (Join-Path $logsDir "$($moduleBuild.Name).build.log") -Force
            }
            $expected = [bool] $moduleBuild.Expected[$packageKey]
            Assert-Test -Suite 'module-build' -Name $moduleBuild.Name -Condition ($buildResult.Success -eq $expected) -Message "Module build $($moduleBuild.Name) expected $expected but got $($buildResult.Success)" -SuccessDetails "expected=$expected actual=$($buildResult.Success)" -FailureDetails "expected=$expected actual=$($buildResult.Success)"
          }

          Assert-True -Condition $buildResults['sdk_baseline'].Success -Message 'Baseline Apache module did not build'

          Copy-Item -Path $buildResults['sdk_baseline'].ModulePath -Destination (Join-Path $apacheModulesDir 'mod_sdk_baseline.so') -Force
          if ($buildResults['sdk_httpssl'].Success) {
            Copy-Item -Path $buildResults['sdk_httpssl'].ModulePath -Destination (Join-Path $apacheModulesDir 'mod_sdk_httpssl.so') -Force
          }
          if ($buildResults['sdk_extras'].Success) {
            Copy-Item -Path $buildResults['sdk_extras'].ModulePath -Destination (Join-Path $apacheModulesDir 'mod_sdk_extras.so') -Force
          }

          $apacheRootConfigPath = $apacheRoot -replace '\\', '/'
          $apacheHtdocsConfigPath = $apacheHtdocs -replace '\\', '/'
          $httpdConfig = Get-Content -Path $httpdConf -Raw
          $httpdConfig = $httpdConfig -replace '(?i)c:/Apache24(?:-(?:32|64))?', $apacheRootConfigPath
          $httpdConfig = $httpdConfig -replace '(?m)^[ \t]*Define SRVROOT.*\r?$', "Define SRVROOT `"$apacheRootConfigPath`""
          $httpdConfig = $httpdConfig -replace '(?m)^[ \t]*ServerRoot.*\r?$', "ServerRoot `"$apacheRootConfigPath`""
          $httpdConfig = $httpdConfig -replace '(?m)^Listen 80\r?$', "Listen $port"
          $httpdConfig = $httpdConfig -replace '(?m)^#?ServerName .+\r?$', "ServerName 127.0.0.1:$port"

          $customConfig = @()

          if ($httpdConfig -notmatch '(?m)^[ \t]*LoadModule\s+socache_shmcb_module\s+') {
            $customConfig += 'LoadModule socache_shmcb_module "modules/mod_socache_shmcb.so"'
          }

          if ($httpdConfig -notmatch '(?m)^[ \t]*LoadModule\s+ssl_module\s+') {
            $customConfig += 'LoadModule ssl_module "modules/mod_ssl.so"'
          }

          $customConfig += @(
            "Listen $sslPort",
            "SSLSessionCache `"shmcb:${apacheRootConfigPath}/logs/ssl_scache(512000)`"",
            'SSLSessionCacheTimeout 300',
            'LoadModule sdk_baseline_module "modules/mod_sdk_baseline.so"',
            '<Location /sdk-baseline>',
            '    SetHandler sdk-baseline',
            '</Location>'
          )

          if ($buildResults['sdk_httpssl'].Success) {
            $customConfig += @(
              'LoadModule sdk_httpssl_module "modules/mod_sdk_httpssl.so"',
              '<Location /sdk-http-ssl>',
              '    SetHandler sdk-http-ssl',
              '</Location>'
            )
          }

          if ($buildResults['sdk_extras'].Success) {
            $customConfig += @(
              'LoadModule sdk_extras_module "modules/mod_sdk_extras.so"',
              '<Location /sdk-extras>',
                '    SetHandler sdk-extras',
              '</Location>'
            )
          }

          $customConfig += @(
            "<VirtualHost _default_:$sslPort>",
            "    ServerName 127.0.0.1:$sslPort",
            "    DocumentRoot `"$apacheHtdocsConfigPath`"",
            '    SSLEngine on',
            "    SSLCertificateFile `"$($sslCert -replace '\\', '/')`"",
            "    SSLCertificateKeyFile `"$($sslKey -replace '\\', '/')`"",
            '</VirtualHost>'
          )

          $httpdConfig += "`r`n" + ($customConfig -join "`r`n") + "`r`n"
          Set-Content -Path $httpdConf -Value $httpdConfig -Encoding ascii
          Set-Content -Path (Join-Path $logsDir 'httpd.conf') -Value $httpdConfig -Encoding ascii
          ($httpdConfig -split "\r?\n" | Select-Object -First 80 | ForEach-Object -Begin { $lineNumber = 1 } -Process {
            '{0:D3}: {1}' -f $lineNumber, $_
            $lineNumber++
          }) | Set-Content -Path (Join-Path $logsDir 'httpd-head.txt') -Encoding ascii

          try {
            $configTest = Invoke-TestAction -Suite 'apache-runtime' -Name 'httpd config test' -Action {
              $configOutput = & $httpdExe '-d' $apacheRoot '-f' $httpdConf '-t' 2>&1
              $configOutput | Set-Content -Path (Join-Path $logsDir 'httpd-configtest.txt') -Encoding utf8
              if ($LASTEXITCODE -ne 0) {
                $global:LASTEXITCODE = 0
                throw 'Apache config test failed'
              }

              $global:LASTEXITCODE = 0
              return $configOutput
            }

            $moduleList = $null
            if ($null -ne $configTest) {
              $moduleList = Invoke-TestAction -Suite 'apache-runtime' -Name 'httpd module list' -Action {
                $moduleOutput = & $httpdExe '-d' $apacheRoot '-f' $httpdConf '-M' 2>&1
                $moduleOutput | Set-Content -Path (Join-Path $logsDir 'httpd-modules.txt') -Encoding utf8
                if ($LASTEXITCODE -ne 0) {
                  $global:LASTEXITCODE = 0
                  throw 'Apache module list failed'
                }

                $global:LASTEXITCODE = 0
                return $moduleOutput
              }
            } else {
              Add-SkippedTest -Suite 'apache-runtime' -Name 'httpd module list' -Reason 'Skipped because the config test failed'
            }

            if ($null -ne $moduleList) {
              $moduleListText = $moduleList -join "`n"
              Assert-Test -Suite 'apache-runtime' -Name 'baseline module loaded' -Condition ($moduleListText -match 'sdk_baseline_module \(shared\)') -Message 'Baseline module was not loaded by Apache'

              if ($buildResults['sdk_httpssl'].Success) {
                Assert-Test -Suite 'apache-runtime' -Name 'ssl module loaded' -Condition ($moduleListText -match 'sdk_httpssl_module \(shared\)') -Message 'SSL feature module was not loaded by Apache'
              } else {
                Add-SkippedTest -Suite 'apache-runtime' -Name 'ssl module loaded' -Reason 'Skipped because the SSL feature module was not expected to build'
              }

              if ($buildResults['sdk_extras'].Success) {
                Assert-Test -Suite 'apache-runtime' -Name 'extras module loaded' -Condition ($moduleListText -match 'sdk_extras_module \(shared\)') -Message 'Extras feature module was not loaded by Apache'
              } else {
                Add-SkippedTest -Suite 'apache-runtime' -Name 'extras module loaded' -Reason 'Skipped because the extras feature module was not expected to build'
              }

              $httpdProcess = Invoke-TestAction -Suite 'apache-runtime' -Name 'httpd process starts' -Action {
                $process = Start-Process -FilePath $httpdExe -ArgumentList @('-d', $apacheRoot, '-f', $httpdConf, '-X') -WorkingDirectory (Join-Path $apacheRoot 'bin') -PassThru
                if ($null -eq $process) {
                  throw 'Apache process did not start'
                }

                return $process
              }
            } else {
              Add-SkippedTest -Suite 'apache-runtime' -Name 'baseline module loaded' -Reason 'Skipped because the module list did not run'
              Add-SkippedTest -Suite 'apache-runtime' -Name 'ssl module loaded' -Reason 'Skipped because the module list did not run'
              Add-SkippedTest -Suite 'apache-runtime' -Name 'extras module loaded' -Reason 'Skipped because the module list did not run'
              Add-SkippedTest -Suite 'apache-runtime' -Name 'httpd process starts' -Reason 'Skipped because the module list did not run'
            }

            if ($null -ne $httpdProcess) {
              $baselineResponse = Invoke-TestAction -Suite 'endpoint' -Name 'GET /sdk-baseline' -Action {
                $response = Wait-ForUrl -Url "http://127.0.0.1:$port/sdk-baseline"
                $response.Content | Set-Content -Path (Join-Path $logsDir 'baseline.txt') -Encoding utf8
                return $response
              }

              if ($null -ne $baselineResponse) {
                Assert-Test -Suite 'endpoint' -Name 'baseline payload' -Condition ($baselineResponse.Content.Trim() -eq 'sdk_baseline_ok') -Message 'Baseline Apache endpoint returned unexpected output'
              } else {
                Add-SkippedTest -Suite 'endpoint' -Name 'baseline payload' -Reason 'Skipped because the baseline request failed'
              }

              if ($buildResults['sdk_httpssl'].Success) {
                $sslResponse = Invoke-TestAction -Suite 'endpoint' -Name 'GET /sdk-http-ssl over HTTP' -Action {
                  $response = Wait-ForUrl -Url "http://127.0.0.1:$port/sdk-http-ssl"
                  $response.Content | Set-Content -Path (Join-Path $logsDir 'sdk-http-ssl.txt') -Encoding utf8
                  return $response
                }

                if ($null -ne $sslResponse) {
                  Assert-Test -Suite 'endpoint' -Name 'http ssl reports plain transport' -Condition ($sslResponse.Content -match 'ssl_conn_is_ssl=0') -Message 'HTTP SSL Apache endpoint did not report a non-SSL connection'
                  Assert-Test -Suite 'endpoint' -Name 'http ssl protocol field for plain transport' -Condition ($sslResponse.Content -match '(?m)^ssl_protocol=(none)?$') -Message 'HTTP SSL Apache endpoint reported an unexpected protocol value for plain HTTP'
                } else {
                  Add-SkippedTest -Suite 'endpoint' -Name 'http ssl reports plain transport' -Reason 'Skipped because the HTTP SSL request failed'
                  Add-SkippedTest -Suite 'endpoint' -Name 'http ssl protocol field for plain transport' -Reason 'Skipped because the HTTP SSL request failed'
                }

                $sslSecureResponse = Invoke-TestAction -Suite 'endpoint' -Name 'GET /sdk-http-ssl over HTTPS' -Action {
                  $response = Wait-ForUrl -Url "https://127.0.0.1:$sslPort/sdk-http-ssl" -SkipCertificateCheck
                  $response.Content | Set-Content -Path (Join-Path $logsDir 'sdk-http-ssl-https.txt') -Encoding utf8
                  return $response
                }

                if ($null -ne $sslSecureResponse) {
                  Assert-Test -Suite 'endpoint' -Name 'https ssl reports encrypted transport' -Condition ($sslSecureResponse.Content -match 'ssl_conn_is_ssl=1') -Message 'HTTPS SSL Apache endpoint did not report an encrypted connection'
                  Assert-Test -Suite 'endpoint' -Name 'https ssl reports tls protocol' -Condition ($sslSecureResponse.Content -match 'ssl_protocol=TLS') -Message 'HTTPS SSL Apache endpoint did not report a TLS protocol'
                } else {
                  Add-SkippedTest -Suite 'endpoint' -Name 'https ssl reports encrypted transport' -Reason 'Skipped because the HTTPS SSL request failed'
                  Add-SkippedTest -Suite 'endpoint' -Name 'https ssl reports tls protocol' -Reason 'Skipped because the HTTPS SSL request failed'
                }
              } else {
                $sslMissingResponse = Invoke-TestAction -Suite 'endpoint' -Name 'GET /sdk-http-ssl over HTTP returns 404' -Action {
                  $response = Wait-ForUrl -Url "http://127.0.0.1:$port/sdk-http-ssl" -ExpectedStatusCode 404
                  $response.Content | Set-Content -Path (Join-Path $logsDir 'sdk-http-ssl-missing.txt') -Encoding utf8
                  return $response
                }
                $sslMissingSecureResponse = Invoke-TestAction -Suite 'endpoint' -Name 'GET /sdk-http-ssl over HTTPS returns 404' -Action {
                  $response = Wait-ForUrl -Url "https://127.0.0.1:$sslPort/sdk-http-ssl" -ExpectedStatusCode 404 -SkipCertificateCheck
                  $response.Content | Set-Content -Path (Join-Path $logsDir 'sdk-http-ssl-https-missing.txt') -Encoding utf8
                  return $response
                }
              }

              if ($buildResults['sdk_extras'].Success) {
                $extrasResponse = Invoke-TestAction -Suite 'endpoint' -Name 'GET /sdk-extras' -Action {
                  $response = Wait-ForUrl -Url "http://127.0.0.1:$port/sdk-extras?name=world"
                  $response.Content | Set-Content -Path (Join-Path $logsDir 'sdk-extras.txt') -Encoding utf8
                  return $response
                }

                if ($null -ne $extrasResponse) {
                  Assert-Test -Suite 'endpoint' -Name 'extras echoes query argument' -Condition ($extrasResponse.Content -match '(?m)^name=world$') -Message 'Apache extras endpoint did not echo the expected query argument'
                  Assert-Test -Suite 'endpoint' -Name 'extras reports nghttp2 protocol' -Condition ($extrasResponse.Content -match '(?m)^nghttp2_proto=h2$') -Message 'Apache extras endpoint did not report the nghttp2 protocol id'
                  Assert-Test -Suite 'endpoint' -Name 'extras reports nghttp2 version string' -Condition ($extrasResponse.Content -match '(?m)^nghttp2_version=.+$') -Message 'Apache extras endpoint did not report the nghttp2 version string'
                  Assert-Test -Suite 'endpoint' -Name 'extras reports nghttp2 version number' -Condition ($extrasResponse.Content -match '(?m)^nghttp2_version_num=[1-9]\d*$') -Message 'Apache extras endpoint did not report the nghttp2 version number'
                  Assert-Test -Suite 'endpoint' -Name 'extras reports successful brotli compression' -Condition ($extrasResponse.Content -match '(?m)^brotli_ok=1$') -Message 'Apache extras endpoint did not report successful Brotli compression'
                  Assert-Test -Suite 'endpoint' -Name 'extras reports brotli encoder version' -Condition ($extrasResponse.Content -match '(?m)^brotli_encoder_version=[1-9]\d*$') -Message 'Apache extras endpoint did not report the Brotli encoder version'
                  Assert-Test -Suite 'endpoint' -Name 'extras reports brotli payload size' -Condition ($extrasResponse.Content -match '(?m)^brotli_size=[1-9]\d*$') -Message 'Apache extras endpoint did not report a compressed Brotli payload size'
                  Assert-Test -Suite 'endpoint' -Name 'extras completes libcurl https request' -Condition ($extrasResponse.Content -match '(?m)^curl_status=ok$') -Message 'Apache extras endpoint did not complete the libcurl HTTPS request'
                  Assert-Test -Suite 'endpoint' -Name 'extras gets http 200 from https probe' -Condition ($extrasResponse.Content -match '(?m)^curl_http_code=200$') -Message 'Apache extras endpoint did not receive an HTTP 200 from the HTTPS probe'
                  Assert-Test -Suite 'endpoint' -Name 'extras sees ssl state in https probe body' -Condition ($extrasResponse.Content -match '(?m)^curl_body_has_ssl=1$') -Message 'Apache extras endpoint did not observe SSL state in the HTTPS probe body'
                  Assert-Test -Suite 'endpoint' -Name 'extras sees tls state in https probe body' -Condition ($extrasResponse.Content -match '(?m)^curl_body_has_tls=1$') -Message 'Apache extras endpoint did not observe TLS protocol details in the HTTPS probe body'
                  Assert-Test -Suite 'endpoint' -Name 'extras reports curl version string' -Condition ($extrasResponse.Content -match '(?m)^curl_version=.+$') -Message 'Apache extras endpoint did not report the curl version string'
                  Assert-Test -Suite 'endpoint' -Name 'extras reports curl version number' -Condition ($extrasResponse.Content -match '(?m)^curl_version_num=[1-9]\d*$') -Message 'Apache extras endpoint did not report the curl version number'
                } else {
                  @(
                    'extras echoes query argument',
                    'extras reports nghttp2 protocol',
                    'extras reports nghttp2 version string',
                    'extras reports nghttp2 version number',
                    'extras reports successful brotli compression',
                    'extras reports brotli encoder version',
                    'extras reports brotli payload size',
                    'extras completes libcurl https request',
                    'extras gets http 200 from https probe',
                    'extras sees ssl state in https probe body',
                    'extras sees tls state in https probe body',
                    'extras reports curl version string',
                    'extras reports curl version number'
                  ) | ForEach-Object {
                    Add-SkippedTest -Suite 'endpoint' -Name $_ -Reason 'Skipped because the extras request failed'
                  }
                }
              } else {
                [void] (Invoke-TestAction -Suite 'endpoint' -Name 'GET /sdk-extras returns 404' -Action {
                  $response = Wait-ForUrl -Url "http://127.0.0.1:$port/sdk-extras?name=world" -ExpectedStatusCode 404
                  $response.Content | Set-Content -Path (Join-Path $logsDir 'sdk-extras-missing.txt') -Encoding utf8
                  return $response
                })
              }
            } else {
              Add-SkippedTest -Suite 'endpoint' -Name 'GET /sdk-baseline' -Reason 'Skipped because Apache did not start'
              Add-SkippedTest -Suite 'endpoint' -Name 'baseline payload' -Reason 'Skipped because Apache did not start'

              if ($buildResults['sdk_httpssl'].Success) {
                @(
                  'GET /sdk-http-ssl over HTTP',
                  'http ssl reports plain transport',
                  'http ssl protocol field for plain transport',
                  'GET /sdk-http-ssl over HTTPS',
                  'https ssl reports encrypted transport',
                  'https ssl reports tls protocol'
                ) | ForEach-Object {
                  Add-SkippedTest -Suite 'endpoint' -Name $_ -Reason 'Skipped because Apache did not start'
                }
              } else {
                @(
                  'GET /sdk-http-ssl over HTTP returns 404',
                  'GET /sdk-http-ssl over HTTPS returns 404'
                ) | ForEach-Object {
                  Add-SkippedTest -Suite 'endpoint' -Name $_ -Reason 'Skipped because Apache did not start'
                }
              }

              if ($buildResults['sdk_extras'].Success) {
                @(
                  'GET /sdk-extras',
                  'extras echoes query argument',
                  'extras reports nghttp2 protocol',
                  'extras reports nghttp2 version string',
                  'extras reports nghttp2 version number',
                  'extras reports successful brotli compression',
                  'extras reports brotli encoder version',
                  'extras reports brotli payload size',
                  'extras completes libcurl https request',
                  'extras gets http 200 from https probe',
                  'extras sees ssl state in https probe body',
                  'extras sees tls state in https probe body',
                  'extras reports curl version string',
                  'extras reports curl version number'
                ) | ForEach-Object {
                  Add-SkippedTest -Suite 'endpoint' -Name $_ -Reason 'Skipped because Apache did not start'
                }
              } else {
                Add-SkippedTest -Suite 'endpoint' -Name 'GET /sdk-extras returns 404' -Reason 'Skipped because Apache did not start'
              }
            }

            $errorLog = Join-Path $apacheRoot 'logs\error.log'
            if (Test-Path $errorLog) {
              Copy-Item -Path $errorLog -Destination (Join-Path $logsDir 'error.log') -Force
              $errorLogContent = Get-Content -Path $errorLog -Raw
              Assert-Test -Suite 'apache-runtime' -Name 'error log is clean' -Condition ($errorLogContent -notmatch 'Syntax error|Cannot load|error while loading|Fatal') -Message 'Apache error log contains a startup or runtime failure'
            } else {
              Add-SkippedTest -Suite 'apache-runtime' -Name 'error log is clean' -Reason 'Skipped because Apache did not create an error log'
            }
          } finally {
            if ($null -ne $httpdProcess -and -not $httpdProcess.HasExited) {
              Stop-Process -Id $httpdProcess.Id -Force -ErrorAction SilentlyContinue
            }
          }

          $stats = Get-TestStats -Results $testResults
          $summaryLines = @(
            "## $packageName",
            '',
            "| Passed | Failed | Skipped | Total |",
            "| --- | --- | --- | --- |",
            "| $($stats.passed) | $($stats.failed) | $($stats.skipped) | $($stats.total) |",
            '',
            '| Suite | Test | Status | Details |',
            '| --- | --- | --- | --- |'
          )

          foreach ($result in $testResults) {
            $summaryLines += "| $($result.Suite) | $($result.Name) | $($result.Status) | $($result.Details) |"
          }

          Write-Host "Test totals for ${packageName}: passed=$($stats.passed) failed=$($stats.failed) skipped=$($stats.skipped) total=$($stats.total)"
          $summaryLines -join "`n" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          $testResults | ConvertTo-Json -Depth 5 | Set-Content -Path (Join-Path $logsDir 'test-results.json') -Encoding utf8
          $stats | ConvertTo-Json -Depth 5 | Set-Content -Path (Join-Path $logsDir 'test-stats.json') -Encoding utf8

          if ($mismatches.Count -gt 0) {
            $mismatches | Set-Content -Path (Join-Path $logsDir 'mismatches.txt') -Encoding utf8
            throw ($mismatches -join "`n")
          }

          $global:LASTEXITCODE = 0

      - name: Upload probe logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: apache-sdk-delta-${{ matrix.package.key }}
          path: ${{ runner.temp }}/apache-sdk-delta-${{ matrix.package.key }}/logs

  summarize-test-results:
    name: Overall Test Summary
    if: always()
    needs: compare-sdk-packages
    runs-on: ubuntu-latest

    steps:
      - name: Download probe logs
        uses: actions/download-artifact@v8
        with:
          pattern: apache-sdk-delta-*
          path: artifacts
          merge-multiple: false

      - name: Summarize overall test stats
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $artifactDirs = Get-ChildItem -Path artifacts -Directory | Sort-Object Name
          $allResults = New-Object System.Collections.Generic.List[object]
          $packageStats = New-Object System.Collections.Generic.List[object]

          foreach ($artifactDir in $artifactDirs) {
            $statsPath = Join-Path $artifactDir.FullName 'test-stats.json'
            $resultsPath = Join-Path $artifactDir.FullName 'test-results.json'

            if (Test-Path $statsPath) {
              $stats = Get-Content -Path $statsPath -Raw | ConvertFrom-Json
              $packageStats.Add($stats) | Out-Null
            }

            if (Test-Path $resultsPath) {
              foreach ($result in @(Get-Content -Path $resultsPath -Raw | ConvertFrom-Json)) {
                $allResults.Add($result) | Out-Null
              }
            }
          }

          $overall = [pscustomobject]@{
            total = @($allResults).Count
            passed = @($allResults | Where-Object Status -eq 'passed').Count
            failed = @($allResults | Where-Object Status -eq 'failed').Count
            skipped = @($allResults | Where-Object Status -eq 'skipped').Count
          }

          $summaryLines = @(
            '## Overall Apache SDK Test Summary',
            '',
            '| Passed | Failed | Skipped | Total |',
            '| --- | --- | --- | --- |',
            "| $($overall.passed) | $($overall.failed) | $($overall.skipped) | $($overall.total) |",
            '',
            '| Package | Passed | Failed | Skipped | Total |',
            '| --- | --- | --- | --- | --- |'
          )

          foreach ($stats in $packageStats) {
            $summaryLines += "| $($stats.package_name) | $($stats.passed) | $($stats.failed) | $($stats.skipped) | $($stats.total) |"
          }

          $summaryLines += ''
          $summaryLines += '| Package | Suite | Test | Status | Details |'
          $summaryLines += '| --- | --- | --- | --- | --- |'

          foreach ($result in $allResults) {
            $summaryLines += "| $($result.PackageName) | $($result.Suite) | $($result.Name) | $($result.Status) | $($result.Details) |"
          }

          Write-Host "Overall test totals: passed=$($overall.passed) failed=$($overall.failed) skipped=$($overall.skipped) total=$($overall.total)"
          $summaryLines -join "`n" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
