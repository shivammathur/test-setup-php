name: Validate PHP master PGO baseline on Windows

on:
  workflow_dispatch:
    inputs:
      validation-mode:
        description: Validation mode to run
        required: false
        default: script
      php-artifact-run-id:
        description: Previous workflow run ID with php-master-msvc-pgo-build artifact for script mode
        required: false
        default: "23933265170"
      builder-repository:
        description: GitHub repository for php-windows-builder
        required: false
        default: shivammathur/php-windows-builder
      builder-ref:
        description: Git reference for php-windows-builder
        required: false
        default: codex/pgo-case-revival
      php-sdk-repository:
        description: GitHub repository for php-sdk-binary-tools
        required: false
        default: shivammathur/php-sdk-binary-tools
      php-sdk-ref:
        description: Git reference for php-sdk-binary-tools
        required: false
        default: codex/pgo-case-revival
      pgo-cases:
        description: Comma-separated PGO cases to validate
        required: false
        default: symfony_demo

permissions:
  contents: read

jobs:
  validate-pgo-scripts:
    name: Validate PHP SDK PGO init/up/down
    if: ${{ inputs['validation-mode'] != 'build' }}
    runs-on: windows-2022
    timeout-minutes: 90
    env:
      PHP_ARTIFACT_RUN_ID: ${{ inputs['php-artifact-run-id'] }}
      SDK_REPOSITORY: ${{ inputs['php-sdk-repository'] }}
      SDK_REF: ${{ inputs['php-sdk-ref'] }}
      PGO_CASES: ${{ inputs['pgo-cases'] }}
    steps:
      - name: Checkout php-sdk-binary-tools
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SDK_REPOSITORY }}
          ref: ${{ env.SDK_REF }}
          path: php-sdk

      - name: Download PHP runtime artifact
        uses: actions/download-artifact@v4
        with:
          name: php-master-msvc-pgo-build
          path: C:\php-master-msvc-pgo
          repository: ${{ github.repository }}
          run-id: ${{ env.PHP_ARTIFACT_RUN_ID }}
          github-token: ${{ github.token }}

      - name: Prepare PHP runtime
        shell: pwsh
        run: |
          $phpExe = Get-ChildItem 'C:\php-master-msvc-pgo' -Filter php.exe -Recurse | Select-Object -First 1 -ExpandProperty FullName
          $phpCgi = Get-ChildItem 'C:\php-master-msvc-pgo' -Filter php-cgi.exe -Recurse | Select-Object -First 1 -ExpandProperty FullName

          if ([string]::IsNullOrWhiteSpace($phpExe) -or !(Test-Path $phpExe)) {
            throw 'Could not find php.exe in downloaded artifact'
          }

          if ([string]::IsNullOrWhiteSpace($phpCgi) -or !(Test-Path $phpCgi)) {
            throw 'Could not find php-cgi.exe in downloaded artifact'
          }

          $phpDir = Split-Path -Parent $phpExe
          $extDir = Join-Path $phpDir 'ext'
          if (Test-Path $extDir) {
            Copy-Item -Path (Join-Path $extDir 'php_*.dll') -Destination $phpDir -Force
          }

          function Find-ExtensionPath {
            param(
              [string]$SearchDir,
              [string]$FileName
            )

            $candidates = @(
              (Join-Path $SearchDir "ext\$FileName"),
              (Join-Path $SearchDir $FileName)
            )

            foreach ($candidate in $candidates) {
              if (Test-Path $candidate) {
                return $candidate
              }
            }

            $found = Get-ChildItem $SearchDir -Filter $FileName -Recurse | Select-Object -First 1 -ExpandProperty FullName
            if (![string]::IsNullOrWhiteSpace($found)) {
              return $found
            }

            throw "Missing required extension $FileName under $SearchDir"
          }

          $runnerIni = Join-Path $env:RUNNER_TEMP 'pgo-runner.ini'
          $extensions = @(
            'php_curl.dll',
            'php_fileinfo.dll',
            'php_intl.dll',
            'php_mbstring.dll',
            'php_mysqli.dll',
            'php_openssl.dll',
            'php_pdo_mysql.dll',
            'php_pdo_sqlite.dll',
            'php_sqlite3.dll',
            'php_zip.dll'
          )

          $lines = @(
            'date.timezone=UTC',
            'display_errors=1',
            'error_reporting=E_ALL',
            'memory_limit=1G'
          )

          foreach ($extension in $extensions) {
            $path = (Find-ExtensionPath -SearchDir $phpDir -FileName $extension) -replace '\\', '/'
            $lines += "extension=""$path"""
          }

          Set-Content -Path $runnerIni -Value $lines

          "PHP_ROOT=$phpDir" >> $env:GITHUB_ENV
          "RUNNER_INI=$runnerIni" >> $env:GITHUB_ENV

      - name: Smoke test runtime
        shell: pwsh
        run: |
          $meta = & "$env:PHP_ROOT\php.exe" -n -r "echo PHP_VERSION, ' ', PHP_ZTS ? 'TS' : 'NTS';"
          if ($LASTEXITCODE -ne 0) {
            throw 'PHP runtime smoke test failed'
          }

          $extensions = & "$env:PHP_ROOT\php.exe" -c $env:RUNNER_INI -r "echo (int)extension_loaded('curl'), (int)extension_loaded('mbstring'), (int)extension_loaded('intl'), (int)extension_loaded('pdo_mysql'), (int)extension_loaded('sqlite3');"
          if ($LASTEXITCODE -ne 0 -or $extensions -ne '11111') {
            throw "Runner ini did not load required extensions: $extensions"
          }

          Write-Host $meta

      - name: Run PGO script validation
        shell: pwsh
        env:
          COMPOSER_MEMORY_LIMIT: -1
        run: |
          Set-Location $env:PHP_ROOT
          $env:PHP_SDK_ROOT_PATH = Join-Path $env:GITHUB_WORKSPACE 'php-sdk'
          $env:PHP_SDK_PGO_TEST_PHP_ROOT = $env:PHP_ROOT
          $sdkBin = Join-Path $env:GITHUB_WORKSPACE 'php-sdk\bin'
          $sdkMsys = Join-Path $env:GITHUB_WORKSPACE 'php-sdk\msys2\usr\bin'
          $env:PATH = "$sdkBin;$sdkMsys;$env:PHP_ROOT;$env:PATH"

          $script = Join-Path $env:RUNNER_TEMP 'validate-pgo.php'
          $scriptContent = @'
          <?php
          require getenv('PHP_SDK_ROOT_PATH') . DIRECTORY_SEPARATOR . 'lib' . DIRECTORY_SEPARATOR . 'php' . DIRECTORY_SEPARATOR . 'autoload.php';

          $cases = array_values(array_filter(array_map('trim', explode(',', getenv('PGO_CASES') ?: ''))));
          $commands = array(
              array('init', false),
              array('up', false),
              array('down', true),
          );

          foreach ($commands as $command) {
              [$name, $force] = $command;
              echo "Running {$name}\n";
              $controller = new SDK\Build\PGO\Controller($name, null, $cases ?: null);
              $controller->handle($force);
          }
          '@
          Set-Content -Path $script -Value $scriptContent

          & "$env:PHP_ROOT\php.exe" -c $env:RUNNER_INI $script
          if ($LASTEXITCODE -ne 0) {
            throw 'PGO script validation failed'
          }

      - name: Write script validation summary
        shell: pwsh
        run: |
          $lines = @(
            '# Windows PHP SDK PGO script validation',
            '',
            ('- PHP artifact run: {0}' -f $env:PHP_ARTIFACT_RUN_ID),
            ('- PHP SDK: {0}@{1}' -f $env:SDK_REPOSITORY, $env:SDK_REF),
            ('- PGO cases: {0}' -f $env:PGO_CASES)
          )

          Set-Content -Path $env:GITHUB_STEP_SUMMARY -Value $lines

  build-msvc-pgo-validation:
    name: Validate PHP master baseline (MSVC+PGO)
    if: ${{ inputs['validation-mode'] == 'build' }}
    runs-on: windows-2022
    timeout-minutes: 150
    env:
      BUILDER_REPOSITORY: ${{ inputs['builder-repository'] }}
      BUILDER_REF: ${{ inputs['builder-ref'] }}
      PHP_SDK_REPOSITORY: ${{ inputs['php-sdk-repository'] }}
      PHP_SDK_REF: ${{ inputs['php-sdk-ref'] }}
      PGO_CASES: ${{ inputs['pgo-cases'] }}
    steps:
      - name: Checkout php-windows-builder
        uses: actions/checkout@v6
        with:
          repository: ${{ env.BUILDER_REPOSITORY }}
          ref: ${{ env.BUILDER_REF }}
          path: php-windows-builder

      - name: Build PHP master with php-windows-builder
        uses: ./php-windows-builder/php
        with:
          php-version: master
          arch: x64
          ts: ts
          php-sdk-repository: ${{ env.PHP_SDK_REPOSITORY }}
          php-sdk-ref: ${{ env.PHP_SDK_REF }}
          pgo-cases: ${{ env.PGO_CASES }}
          github-token: ${{ github.token }}

      - name: Prepare baseline artifact
        shell: pwsh
        run: |
          $zip = Get-ChildItem artifacts -Filter 'php-*.zip' |
            Where-Object { $_.Name -notmatch 'src|devel|debug|test' } |
            Sort-Object Name |
            Select-Object -First 1

          if ($null -eq $zip) {
            throw 'Could not find a baseline runtime zip in artifacts/'
          }

          $extractDir = Join-Path $env:RUNNER_TEMP 'baseline-extract'
          $dest = Join-Path $env:RUNNER_TEMP 'php-master-msvc-pgo'

          if (Test-Path $extractDir) {
            Remove-Item $extractDir -Recurse -Force
          }

          if (Test-Path $dest) {
            Remove-Item $dest -Recurse -Force
          }

          Expand-Archive -LiteralPath $zip.FullName -DestinationPath $extractDir -Force

          $phpExe = Get-ChildItem $extractDir -Filter php.exe -Recurse | Select-Object -First 1
          if ($null -eq $phpExe) {
            throw "Could not find php.exe after extracting $($zip.Name)"
          }

          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          Copy-Item -Path (Join-Path $phpExe.Directory.FullName '*') -Destination $dest -Recurse -Force

      - name: Smoke test baseline build
        shell: pwsh
        run: |
          $php = Join-Path $env:RUNNER_TEMP 'php-master-msvc-pgo\php.exe'
          $meta = & $php -n -r "echo PHP_VERSION, ' ', PHP_ZTS ? 'TS' : 'NTS';"
          if ($LASTEXITCODE -ne 0) {
            throw 'Baseline PHP smoke test failed'
          }

          Write-Host $meta

      - name: Write build validation summary
        shell: pwsh
        run: |
          $lines = @(
            '# Windows PGO build validation',
            '',
            ('- Builder: {0}@{1}' -f $env:BUILDER_REPOSITORY, $env:BUILDER_REF),
            ('- PHP SDK: {0}@{1}' -f $env:PHP_SDK_REPOSITORY, $env:PHP_SDK_REF),
            ('- PGO cases: {0}' -f $env:PGO_CASES)
          )

          Set-Content -Path $env:GITHUB_STEP_SUMMARY -Value $lines

      - name: Upload baseline build
        uses: actions/upload-artifact@v4
        with:
          name: php-master-msvc-pgo-build
          path: ${{ runner.temp }}/php-master-msvc-pgo
          if-no-files-found: error
