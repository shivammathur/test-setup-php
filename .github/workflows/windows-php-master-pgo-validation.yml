name: Validate PHP master PGO baseline on Windows

on:
  workflow_dispatch:
    inputs:
      validation-mode:
        description: Validation mode to run
        required: false
        default: script
      php-artifact-run-id:
        description: Previous workflow run ID with php-master-msvc-pgo-build artifact for script mode
        required: false
        default: "23937578806"
      builder-repository:
        description: GitHub repository for php-windows-builder
        required: false
        default: shivammathur/php-windows-builder
      builder-ref:
        description: Git reference for php-windows-builder
        required: false
        default: codex/pgo-case-revival
      php-sdk-repository:
        description: GitHub repository for php-sdk-binary-tools
        required: false
        default: shivammathur/php-sdk-binary-tools
      php-sdk-ref:
        description: Git reference for php-sdk-binary-tools
        required: false
        default: codex/pgo-case-revival
      validation-cases:
        description: Comma-separated PGO cases to validate before any build starts
        required: false
        default: pgo01org,symfony_demo,cli
      pgo-cases:
        description: Comma-separated PGO cases to use for the full PGO build
        required: false
        default: pgo01org,symfony_demo,cli
      pgo-default-cases:
        description: Comma-separated PGO cases to use for the default training scenario
        required: false
        default: pgo01org,symfony_demo,cli
      pgo-cache-cases:
        description: Comma-separated PGO cases to use for the cache training scenario
        required: false
        default: cli

permissions:
  contents: read

jobs:
  validate-pgo-scripts:
    name: Validate PHP SDK PGO scripts and workloads
    if: ${{ inputs['validation-mode'] == 'script' || inputs['validation-mode'] == 'build' }}
    runs-on: windows-2022
    timeout-minutes: 90
    env:
      PHP_ARTIFACT_RUN_ID: ${{ inputs['php-artifact-run-id'] }}
      SDK_REPOSITORY: ${{ inputs['php-sdk-repository'] }}
      SDK_REF: ${{ inputs['php-sdk-ref'] }}
      VALIDATION_CASES: ${{ inputs['validation-cases'] }}
    steps:
      - name: Checkout php-sdk-binary-tools
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SDK_REPOSITORY }}
          ref: ${{ env.SDK_REF }}
          path: php-sdk

      - name: Download PHP runtime artifact
        uses: actions/download-artifact@v4
        with:
          name: php-master-msvc-pgo-build
          path: C:\php-master-msvc-pgo
          repository: ${{ github.repository }}
          run-id: ${{ env.PHP_ARTIFACT_RUN_ID }}
          github-token: ${{ github.token }}

      - name: Prepare PHP runtime
        shell: pwsh
        run: |
          $phpExe = Get-ChildItem 'C:\php-master-msvc-pgo' -Filter php.exe -Recurse | Select-Object -First 1 -ExpandProperty FullName
          $phpCgi = Get-ChildItem 'C:\php-master-msvc-pgo' -Filter php-cgi.exe -Recurse | Select-Object -First 1 -ExpandProperty FullName

          if ([string]::IsNullOrWhiteSpace($phpExe) -or !(Test-Path $phpExe)) {
            throw 'Could not find php.exe in downloaded artifact'
          }

          if ([string]::IsNullOrWhiteSpace($phpCgi) -or !(Test-Path $phpCgi)) {
            throw 'Could not find php-cgi.exe in downloaded artifact'
          }

          $phpDir = Split-Path -Parent $phpExe
          $extDir = Join-Path $phpDir 'ext'
          if (Test-Path $extDir) {
            Copy-Item -Path (Join-Path $extDir 'php_*.dll') -Destination $phpDir -Force
          }

          function Find-ExtensionPath {
            param(
              [string]$SearchDir,
              [string]$FileName
            )

            $candidates = @(
              (Join-Path $SearchDir "ext\$FileName"),
              (Join-Path $SearchDir $FileName)
            )

            foreach ($candidate in $candidates) {
              if (Test-Path $candidate) {
                return $candidate
              }
            }

            $found = Get-ChildItem $SearchDir -Filter $FileName -Recurse | Select-Object -First 1 -ExpandProperty FullName
            if (![string]::IsNullOrWhiteSpace($found)) {
              return $found
            }

            throw "Missing required extension $FileName under $SearchDir"
          }

          $runnerIni = Join-Path $env:RUNNER_TEMP 'pgo-runner.ini'
          $extensions = @(
            'php_curl.dll',
            'php_fileinfo.dll',
            'php_intl.dll',
            'php_mbstring.dll',
            'php_mysqli.dll',
            'php_openssl.dll',
            'php_pdo_mysql.dll',
            'php_pdo_sqlite.dll',
            'php_sqlite3.dll',
            'php_zip.dll'
          )

          $lines = @(
            'date.timezone=UTC',
            'display_errors=1',
            'error_reporting=E_ALL',
            'memory_limit=1G'
          )

          foreach ($extension in $extensions) {
            $path = (Find-ExtensionPath -SearchDir $phpDir -FileName $extension) -replace '\\', '/'
            $lines += "extension=""$path"""
          }

          Set-Content -Path $runnerIni -Value $lines

          "PHP_ROOT=$phpDir" >> $env:GITHUB_ENV
          "RUNNER_INI=$runnerIni" >> $env:GITHUB_ENV

      - name: Smoke test runtime
        shell: pwsh
        run: |
          $meta = & "$env:PHP_ROOT\php.exe" -n -r "echo PHP_VERSION, ' ', PHP_ZTS ? 'TS' : 'NTS';"
          if ($LASTEXITCODE -ne 0) {
            throw 'PHP runtime smoke test failed'
          }

          $extensions = & "$env:PHP_ROOT\php.exe" -c $env:RUNNER_INI -r "echo (int)extension_loaded('curl'), (int)extension_loaded('mbstring'), (int)extension_loaded('intl'), (int)extension_loaded('pdo_mysql'), (int)extension_loaded('sqlite3');"
          if ($LASTEXITCODE -ne 0 -or $extensions -ne '11111') {
            throw "Runner ini did not load required extensions: $extensions"
          }

          Write-Host $meta

      - name: Setup MSVC environment
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          if (!(Test-Path $vswhere)) {
            throw "vswhere.exe not found at $vswhere"
          }

          $installPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if ([string]::IsNullOrWhiteSpace($installPath)) {
            throw 'Could not determine a Visual Studio installation path'
          }

          $vsDevCmd = Join-Path $installPath 'Common7\Tools\VsDevCmd.bat'
          if (!(Test-Path $vsDevCmd)) {
            throw "VsDevCmd.bat not found at $vsDevCmd"
          }

          $envFile = Join-Path $env:RUNNER_TEMP 'vsdevcmd-env.txt'
          cmd /c "`"$vsDevCmd`" -arch=amd64 -host_arch=amd64 >nul && set" > $envFile

          Get-Content $envFile | ForEach-Object {
            if ($_ -match '^(.*?)=(.*)$') {
              "$($matches[1])=$($matches[2])" >> $env:GITHUB_ENV
            }
          }

      - name: Run PGO script validation
        shell: pwsh
        env:
          COMPOSER_MEMORY_LIMIT: -1
        run: |
          Set-Location $env:PHP_ROOT
          $env:PHP_SDK_ROOT_PATH = Join-Path $env:GITHUB_WORKSPACE 'php-sdk'
          $env:PHP_SDK_PGO_TEST_PHP_ROOT = $env:PHP_ROOT
          $sdkBin = Join-Path $env:GITHUB_WORKSPACE 'php-sdk\bin'
          $sdkMsys = Join-Path $env:GITHUB_WORKSPACE 'php-sdk\msys2\usr\bin'
          $env:PATH = "$sdkBin;$sdkMsys;$env:PHP_ROOT;$env:PATH"

          $script = Join-Path $env:RUNNER_TEMP 'validate-pgo.php'
          $scriptContent = @'
          <?php
          error_reporting(E_ALL);
          ini_set('display_errors', '1');

          set_error_handler(static function (int $severity, string $message, string $file, int $line) : bool {
              throw new ErrorException($message, 0, $severity, $file, $line);
          });

          require getenv('PHP_SDK_ROOT_PATH') . DIRECTORY_SEPARATOR . 'lib' . DIRECTORY_SEPARATOR . 'php' . DIRECTORY_SEPARATOR . 'autoload.php';

          $cases = array_values(array_filter(array_map('trim', explode(',', getenv('VALIDATION_CASES') ?: ''))));
          $depsDir = getenv('PGO_DEPS_DIR');
          $phpExe = getenv('VALIDATION_PHP_EXE');
          $runnerIni = getenv('RUNNER_INI');

          if (!$depsDir) {
              throw new RuntimeException('PGO_DEPS_DIR is not set');
          }
          if (!$phpExe || !is_file($phpExe)) {
              throw new RuntimeException('VALIDATION_PHP_EXE is not set or does not exist');
          }
          if (!$runnerIni || !is_file($runnerIni)) {
              throw new RuntimeException('RUNNER_INI is not set or does not exist');
          }
          if (!is_dir($depsDir) && !mkdir($depsDir, 0777, true) && !is_dir($depsDir)) {
              throw new RuntimeException("Failed to create deps dir {$depsDir}");
          }

          SDK\Config::setDepsLocalPath($depsDir);
          $warningRegex = '/(^|\R)(PHP )?(Warning|Deprecated|Notice|Fatal error|Parse error)\b/i';

          $runPhpScript = static function (string $scriptPath) use ($phpExe, $runnerIni, $warningRegex) : void {
              $command = sprintf('"%s" -c "%s" "%s" 2>&1', $phpExe, $runnerIni, $scriptPath);
              exec($command, $lines, $exitCode);

              $output = trim(implode(PHP_EOL, $lines));
              echo "Executing CLI workload: {$scriptPath}\n";
              if ('' !== $output) {
                  echo $output, "\n";
              }

              if (0 !== $exitCode) {
                  throw new RuntimeException("CLI workload {$scriptPath} exited with {$exitCode}");
              }

              if (preg_match($warningRegex, $output)) {
                  throw new RuntimeException("CLI workload {$scriptPath} emitted PHP warnings or errors");
              }
          };

          $probeUrl = static function (string $url) use ($warningRegex) : void {
              $ch = curl_init($url);
              curl_setopt($ch, CURLOPT_CONNECTTIMEOUT, 30);
              curl_setopt($ch, CURLOPT_FOLLOWLOCATION, true);
              curl_setopt($ch, CURLOPT_RETURNTRANSFER, true);
              curl_setopt($ch, CURLOPT_TIMEOUT, 60);
              curl_setopt($ch, CURLOPT_USERAGENT, 'PHP-SDK validation');

              $body = curl_exec($ch);
              if (false === $body) {
                  $error = curl_error($ch);
                  if (PHP_VERSION_ID < 80500) {
                      curl_close($ch);
                  }
                  throw new RuntimeException("Failed to fetch {$url}: {$error}");
              }

              $status = (int) curl_getinfo($ch, CURLINFO_HTTP_CODE);
              $effectiveUrl = (string) curl_getinfo($ch, CURLINFO_EFFECTIVE_URL);
              if (PHP_VERSION_ID < 80500) {
                  curl_close($ch);
              }

              echo "Fetched {$effectiveUrl} [{$status}]\n";

              if ($status < 200 || $status >= 400) {
                  throw new RuntimeException("Unexpected HTTP status {$status} for {$effectiveUrl}");
              }

              if (preg_match($warningRegex, $body)) {
                  throw new RuntimeException("HTTP response for {$effectiveUrl} contains PHP warnings or errors");
              }
          };

          try {
              $initController = new SDK\Build\PGO\Controller('init', null, $cases ?: null);
              echo "Running init\n";
              $initController->handle(false);

              $downController = new SDK\Build\PGO\Controller('down', null, $cases ?: null);

              try {
                  $upController = new SDK\Build\PGO\Controller('up', null, $cases ?: null);
                  echo "Running up\n";
                  $upController->handle(false);

                  foreach ($cases as $case) {
                      $jobFile = getenv('PHP_SDK_ROOT_PATH')
                          . DIRECTORY_SEPARATOR . 'pgo'
                          . DIRECTORY_SEPARATOR . 'work'
                          . DIRECTORY_SEPARATOR . 'job'
                          . DIRECTORY_SEPARATOR . $case . '.txt';
                      if (!is_file($jobFile)) {
                          throw new RuntimeException("Expected training job file {$jobFile} was not created");
                      }

                      $urls = array_values(array_filter(array_map('trim', file($jobFile, FILE_IGNORE_NEW_LINES | FILE_SKIP_EMPTY_LINES) ?: array())));
                      if (empty($urls)) {
                          throw new RuntimeException("Training job file {$jobFile} is empty");
                      }

                      $caseConfigFile = getenv('PHP_SDK_ROOT_PATH')
                          . DIRECTORY_SEPARATOR . 'pgo'
                          . DIRECTORY_SEPARATOR . 'cases'
                          . DIRECTORY_SEPARATOR . $case
                          . DIRECTORY_SEPARATOR . 'phpsdk_pgo.json';
                      $caseConfig = is_file($caseConfigFile) ? json_decode((string)file_get_contents($caseConfigFile), true) : array();
                      $caseType = is_array($caseConfig) && isset($caseConfig['type']) ? strtolower((string)$caseConfig['type']) : 'web';

                      if ('cli' === $caseType) {
                          foreach ($urls as $command) {
                              if (!is_file($command)) {
                                  throw new RuntimeException("CLI training command target {$command} does not exist");
                              }

                              $runPhpScript($command);
                          }
                      } else {
                          foreach ($urls as $url) {
                              $probeUrl($url);
                          }
                      }
                  }
              } finally {
                  echo "Running down\n";
                  $downController->handle(true);
              }
          } catch (Throwable $throwable) {
              fwrite(STDERR, (string) $throwable . PHP_EOL);
              exit(1);
          }
          '@
          Set-Content -Path $script -Value $scriptContent

          $depsDir = Join-Path $env:RUNNER_TEMP 'php-sdk-pgo-deps'
          New-Item -ItemType Directory -Path $depsDir -Force | Out-Null
          $env:PGO_DEPS_DIR = $depsDir
          $env:VALIDATION_PHP_EXE = Join-Path $env:PHP_ROOT 'php.exe'
          $env:PHP_SDK_VS = 'vs17'
          $env:PHP_RMTOOLS_PHP_BUILD_BRANCH = 'master'

          $validationLog = Join-Path $env:RUNNER_TEMP 'pgo-validation.log'
          $output = & "$env:PHP_ROOT\php.exe" -c $env:RUNNER_INI $script 2>&1
          $exitCode = $LASTEXITCODE
          $outputText = if ($null -eq $output) { '' } else { ($output | Out-String) }
          Set-Content -Path $validationLog -Value $outputText
          if (![string]::IsNullOrWhiteSpace($outputText)) {
            Write-Host $outputText.TrimEnd()
          }
          Write-Host "Validation exit code: $exitCode"

          if ($exitCode -ne 0) {
            throw "PGO script validation failed with exit code $exitCode"
          }

          $warningPatterns = @(
            'PHP Warning',
            'PHP Deprecated',
            'PHP Notice',
            'PHP Fatal',
            'Parse error',
            'WARNING:'
          )

          foreach ($pattern in $warningPatterns) {
            if ($outputText -match [regex]::Escape($pattern)) {
              throw "PGO script validation emitted warning output matching '$pattern'"
            }
          }

          if ($outputText -notmatch 'Running down') {
            throw 'PGO script validation did not reach the cleanup phase'
          }

      - name: Write script validation summary
        shell: pwsh
        run: |
          $lines = @(
            '# Windows PHP SDK PGO script validation',
            '',
            ('- PHP artifact run: {0}' -f $env:PHP_ARTIFACT_RUN_ID),
            ('- PHP SDK: {0}@{1}' -f $env:SDK_REPOSITORY, $env:SDK_REF),
            ('- Validation cases: {0}' -f $env:VALIDATION_CASES),
            ('- Build cases: {0}' -f '${{ inputs['pgo-cases'] }}')
          )

          Set-Content -Path $env:GITHUB_STEP_SUMMARY -Value $lines

  build-msvc-pgo-validation:
    name: Validate PHP master baseline (MSVC+PGO)
    if: ${{ inputs['validation-mode'] == 'build' && needs.validate-pgo-scripts.result == 'success' }}
    needs:
      - validate-pgo-scripts
    runs-on: windows-2022
    timeout-minutes: 150
    env:
      BUILDER_REPOSITORY: ${{ inputs['builder-repository'] }}
      BUILDER_REF: ${{ inputs['builder-ref'] }}
      PHP_SDK_REPOSITORY: ${{ inputs['php-sdk-repository'] }}
      PHP_SDK_REF: ${{ inputs['php-sdk-ref'] }}
      PGO_CASES: ${{ inputs['pgo-cases'] }}
      PGO_DEFAULT_CASES: ${{ inputs['pgo-default-cases'] }}
      PGO_CACHE_CASES: ${{ inputs['pgo-cache-cases'] }}
    steps:
      - name: Checkout php-windows-builder
        uses: actions/checkout@v6
        with:
          repository: ${{ env.BUILDER_REPOSITORY }}
          ref: ${{ env.BUILDER_REF }}
          path: php-windows-builder

      - name: Build PHP master with php-windows-builder
        uses: ./php-windows-builder/php
        env:
          PHP_SDK_PGO_DEFAULT_CASES: ${{ env.PGO_DEFAULT_CASES }}
          PHP_SDK_PGO_CACHE_CASES: ${{ env.PGO_CACHE_CASES }}
        with:
          php-version: master
          arch: x64
          ts: ts
          php-sdk-repository: ${{ env.PHP_SDK_REPOSITORY }}
          php-sdk-ref: ${{ env.PHP_SDK_REF }}
          pgo-cases: ${{ env.PGO_CASES }}
          pgo-default-cases: ${{ env.PGO_DEFAULT_CASES }}
          pgo-cache-cases: ${{ env.PGO_CACHE_CASES }}
          github-token: ${{ github.token }}

      - name: Prepare baseline artifact
        shell: pwsh
        run: |
          $zip = Get-ChildItem artifacts -Filter 'php-*.zip' |
            Where-Object { $_.Name -notmatch 'src|devel|debug|test' } |
            Sort-Object Name |
            Select-Object -First 1

          if ($null -eq $zip) {
            throw 'Could not find a baseline runtime zip in artifacts/'
          }

          $extractDir = Join-Path $env:RUNNER_TEMP 'baseline-extract'
          $dest = Join-Path $env:RUNNER_TEMP 'php-master-msvc-pgo'

          if (Test-Path $extractDir) {
            Remove-Item $extractDir -Recurse -Force
          }

          if (Test-Path $dest) {
            Remove-Item $dest -Recurse -Force
          }

          Expand-Archive -LiteralPath $zip.FullName -DestinationPath $extractDir -Force

          $phpExe = Get-ChildItem $extractDir -Filter php.exe -Recurse | Select-Object -First 1
          if ($null -eq $phpExe) {
            throw "Could not find php.exe after extracting $($zip.Name)"
          }

          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          Copy-Item -Path (Join-Path $phpExe.Directory.FullName '*') -Destination $dest -Recurse -Force

      - name: Smoke test baseline build
        shell: pwsh
        run: |
          $php = Join-Path $env:RUNNER_TEMP 'php-master-msvc-pgo\php.exe'
          $meta = & $php -n -r "echo PHP_VERSION, ' ', PHP_ZTS ? 'TS' : 'NTS';"
          if ($LASTEXITCODE -ne 0) {
            throw 'Baseline PHP smoke test failed'
          }

          Write-Host $meta

      - name: Write build validation summary
        shell: pwsh
        run: |
          $lines = @(
            '# Windows PGO build validation',
            '',
            ('- Builder: {0}@{1}' -f $env:BUILDER_REPOSITORY, $env:BUILDER_REF),
            ('- PHP SDK: {0}@{1}' -f $env:PHP_SDK_REPOSITORY, $env:PHP_SDK_REF),
            ('- PGO cases: {0}' -f $env:PGO_CASES)
          )

          Set-Content -Path $env:GITHUB_STEP_SUMMARY -Value $lines

      - name: Upload baseline build
        uses: actions/upload-artifact@v4
        with:
          name: php-master-msvc-pgo-build
          path: ${{ runner.temp }}/php-master-msvc-pgo
          if-no-files-found: error
