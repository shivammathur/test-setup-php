name: HTTP workflow
on:
  push:
env:
  key: cache-v3-2.37.0
  extensions: http
jobs:
  run:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      fail-fast: false
      matrix:
        operating-system: [ubuntu-22.04, windows-latest, macos-15-intel]
        php-versions: ['5.6', '7.0', '7.1', '7.2', '7.3', '7.4', '8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
    name: PHP ${{ matrix.php-versions }} Test on ${{ matrix.operating-system }}
    steps:
      - name: Resolve extensions
        id: resolve
        shell: bash
        run: |
          extensions=''
          if [[ "${{ matrix.php-versions }}" != "5.6" && "${{ matrix.php-versions }}" != "7.0" ]]; then
            extensions='${{ env.extensions }}'
          fi
          echo "extensions=$extensions" >> "$GITHUB_OUTPUT"

      - name: Setup cache environment
        id: extcache
        if: steps.resolve.outputs.extensions != ''
        uses: shivammathur/cache-extensions@1.14.1
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: ${{ steps.resolve.outputs.extensions }}
          key: ${{ env.key }}

      - name: Cache extensions
        if: steps.resolve.outputs.extensions != ''
        uses: actions/cache@v5.0.3
        with:
          path: ${{ steps.extcache.outputs.dir }}
          key: ${{ steps.extcache.outputs.key }}
          restore-keys: ${{ steps.extcache.outputs.key }}

      - name: Install PHP
        uses: shivammathur/setup-php@develop
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: ${{ steps.resolve.outputs.extensions }}

      - name: Testing PHP version
        run: php -v

      - name: Testing Extensions
        if: matrix.operating-system == 'windows-latest'
        run: |
          php -m
          php -r "if(phpversion()>=7.1 && ! extension_loaded('http')) {throw new Exception('http not found');}"
          php -r "if(phpversion()>=7.1 && ! extension_loaded('raphf')) {throw new Exception('raphf not found');}"
          php -r "if(phpversion()>=7.1 && phpversion()<=7.4 && ! extension_loaded('propro')) {throw new Exception('propro not found');}"

      - name: Testing Extensions
        if: matrix.operating-system != 'windows-latest'
        run: |
          php -m
          php -r "if(phpversion()>=7.1 && ! extension_loaded('http')) {throw new Exception('http not found');}"
          php -r "if(phpversion()>=7.1 && ! extension_loaded('raphf')) {throw new Exception('raphf not found');}"
          php -r "if(phpversion()>=7.1 && phpversion()<=7.4 && ! extension_loaded('propro')) {throw new Exception('propro not found');}"
