name: Check runner library deps

on:
  push:
    branches:
      - verify-runner-library-deps-20260615
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-22.04
          - ubuntu-24.04
          - ubuntu-26.04
          - ubuntu-22.04-arm
          - ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check library dependency packages
        run: bash install.sh
