name: Setup PHP video demo

on:
  workflow_dispatch:
  push:
    branches:
      - test-video

jobs:
  demo:
    name: PHP 8.5 on ubuntu-24.04
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, mbstring, mysqli, pdo_mysql, pdo_pgsql, redis, xdebug
          tools: composer:v2, phpunit, php-cs-fixer, phpcs, phpstan
          coverage: xdebug

      - name: Test PHP
        run: |
          php -v
          sleep 2
