name: Setup PHP video demo

on:
  workflow_dispatch:
  push:
    branches:
      - test-video

jobs:
  demo:
    name: PHP 8.5 on ubuntu-24.04
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: ./.github/actions/setup-php-slow

      - name: Test PHP
        run: |
          php -v
          sleep 2
