name: Setup PHP video demo

on:
  workflow_dispatch:
  push:
    branches:
      - test-video

jobs:
  demo:
    name: PHP 8.5 on ubuntu-24.04
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Show installed runtimes
        run: |
          php -v
          composer --version

      - name: Keep the run visible for the recording
        run: sleep 20
