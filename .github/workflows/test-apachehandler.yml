              $cookieReadResponse = Invoke-TestAction -Suite 'php-runtime' -Name 'read cookie through PHP' -Action {
                $response = Invoke-WebRequestWithRetry -Uri "http://127.0.0.1:$port/cookie.php" -WebSession $cookieSession
                $response.Content | Set-Content -Path (Join-Path $logsDir 'cookie-read.json') -Encoding utf8
                return $response
              }

              if ($null -ne $cookieReadResponse) {
                $cookiePayload = Convert-TestJson -Suite 'php-runtime' -Name 'cookie read response returns JSON' -Content $cookieReadResponse.Content
                if ($null -ne $cookiePayload) {
                  Assert-Test -Suite 'php-runtime' -Name 'cookie round-trips through apache2handler' -Condition ($cookiePayload.cookie -eq 'chocolate') -Message "Unexpected cookie value: $($cookiePayload.cookie)"
                } else {
                  Add-SkippedTest -Suite 'php-runtime' -Name 'cookie round-trips through apache2handler' -Reason 'Skipped because the cookie read response was not valid JSON'
                }
              } else {
                Add-SkippedTest -Suite 'php-runtime' -Name 'cookie read response returns JSON' -Reason 'Skipped because the cookie read request failed'
                Add-SkippedTest -Suite 'php-runtime' -Name 'cookie round-trips through apache2handler' -Reason 'Skipped because the cookie read request failed'
              }

              $sessionFirstResponse = Invoke-TestAction -Suite 'php-runtime' -Name 'start PHP session' -Action {
                $response = Invoke-WebRequestWithRetry -Uri "http://127.0.0.1:$port/session.php?message=apache-session" -WebSession $sessionState
                $response.Content | Set-Content -Path (Join-Path $logsDir 'session-first.json') -Encoding utf8
                return $response
              }

              $sessionSecondResponse = Invoke-TestAction -Suite 'php-runtime' -Name 'resume PHP session' -Action {
                $response = Invoke-WebRequestWithRetry -Uri "http://127.0.0.1:$port/session.php" -WebSession $sessionState
                $response.Content | Set-Content -Path (Join-Path $logsDir 'session-second.json') -Encoding utf8
                return $response
              }

              if ($null -ne $sessionFirstResponse) {
                $sessionFirstPayload = Convert-TestJson -Suite 'php-runtime' -Name 'session start response returns JSON' -Content $sessionFirstResponse.Content
                if ($null -ne $sessionFirstPayload) {
                  Assert-Test -Suite 'php-runtime' -Name 'session initializes count' -Condition ([int] $sessionFirstPayload.count -eq 1) -Message "Unexpected initial session count: $($sessionFirstPayload.count)"
                  Assert-Test -Suite 'php-runtime' -Name 'session stores message' -Condition ($sessionFirstPayload.message -eq 'apache-session') -Message "Unexpected initial session message: $($sessionFirstPayload.message)"
                } else {
                  Add-SkippedTest -Suite 'php-runtime' -Name 'session initializes count' -Reason 'Skipped because the session start response was not valid JSON'
                  Add-SkippedTest -Suite 'php-runtime' -Name 'session stores message' -Reason 'Skipped because the session start response was not valid JSON'
                }
              } else {
                Add-SkippedTest -Suite 'php-runtime' -Name 'session start response returns JSON' -Reason 'Skipped because the first session request failed'
                Add-SkippedTest -Suite 'php-runtime' -Name 'session initializes count' -Reason 'Skipped because the first session request failed'
                Add-SkippedTest -Suite 'php-runtime' -Name 'session stores message' -Reason 'Skipped because the first session request failed'
              }

              if ($null -ne $sessionSecondResponse) {
                $sessionSecondPayload = Convert-TestJson -Suite 'php-runtime' -Name 'session resume response returns JSON' -Content $sessionSecondResponse.Content
                if ($null -ne $sessionSecondPayload) {
                  Assert-Test -Suite 'php-runtime' -Name 'session persists count across requests' -Condition ([int] $sessionSecondPayload.count -eq 2) -Message "Unexpected resumed session count: $($sessionSecondPayload.count)"
                  Assert-Test -Suite 'php-runtime' -Name 'session persists message across requests' -Condition ($sessionSecondPayload.message -eq 'apache-session') -Message "Unexpected resumed session message: $($sessionSecondPayload.message)"
                } else {
                  Add-SkippedTest -Suite 'php-runtime' -Name 'session persists count across requests' -Reason 'Skipped because the session resume response was not valid JSON'
                  Add-SkippedTest -Suite 'php-runtime' -Name 'session persists message across requests' -Reason 'Skipped because the session resume response was not valid JSON'
                }
              } else {
                Add-SkippedTest -Suite 'php-runtime' -Name 'session resume response returns JSON' -Reason 'Skipped because the second session request failed'
                Add-SkippedTest -Suite 'php-runtime' -Name 'session persists count across requests' -Reason 'Skipped because the second session request failed'
                Add-SkippedTest -Suite 'php-runtime' -Name 'session persists message across requests' -Reason 'Skipped because the second session request failed'
              }

              $statusResponse = Invoke-TestAction -Suite 'php-runtime' -Name 'GET /status.php' -Action {
                $response = Invoke-WebRequestWithRetry -Uri "http://127.0.0.1:$port/status.php" -ExpectedStatusCode 418
                $response.Content | Set-Content -Path (Join-Path $logsDir 'status.json') -Encoding utf8
                return $response
              }

              if ($null -ne $statusResponse) {
                Assert-Test -Suite 'php-runtime' -Name 'PHP status header is present' -Condition (@($statusResponse.Headers['X-Status-Test']) -contains 'ok') -Message 'Expected PHP status header was missing'
                $statusPayload = Convert-TestJson -Suite 'php-runtime' -Name 'status response returns JSON' -Content $statusResponse.Content
                if ($null -ne $statusPayload) {
                  Assert-Test -Suite 'php-runtime' -Name 'PHP can emit custom HTTP status' -Condition ([int] $statusPayload.status -eq 418) -Message "Unexpected PHP status code: $($statusPayload.status)"
                  Assert-Test -Suite 'php-runtime' -Name 'apache_response_headers sees status probe header' -Condition ($statusPayload.response_probe -eq 'status') -Message "Unexpected apache_response_headers probe value: $($statusPayload.response_probe)"
                } else {
                  Add-SkippedTest -Suite 'php-runtime' -Name 'PHP can emit custom HTTP status' -Reason 'Skipped because the status response was not valid JSON'
                  Add-SkippedTest -Suite 'php-runtime' -Name 'apache_response_headers sees status probe header' -Reason 'Skipped because the status response was not valid JSON'
                }
              } else {
                Add-SkippedTest -Suite 'php-runtime' -Name 'status response returns JSON' -Reason 'Skipped because the status request failed'
                Add-SkippedTest -Suite 'php-runtime' -Name 'PHP status header is present' -Reason 'Skipped because the status request failed'
                Add-SkippedTest -Suite 'php-runtime' -Name 'PHP can emit custom HTTP status' -Reason 'Skipped because the status request failed'
                Add-SkippedTest -Suite 'php-runtime' -Name 'apache_response_headers sees status probe header' -Reason 'Skipped because the status request failed'
              }

              $httpsResponse = Invoke-TestAction -Suite 'php-runtime' -Name 'GET /https.php over HTTPS' -Action {
                $response = Invoke-WebRequestWithRetry -Uri "https://127.0.0.1:$sslPort/https.php" -SkipCertificateCheck
                $response.Content | Set-Content -Path (Join-Path $logsDir 'https.json') -Encoding utf8
                return $response
              }

              if ($null -ne $httpsResponse) {
                $httpsPayload = Convert-TestJson -Suite 'php-runtime' -Name 'HTTPS response returns JSON' -Content $httpsResponse.Content
                if ($null -ne $httpsPayload) {
                  Assert-Test -Suite 'php-runtime' -Name 'HTTPS flag reaches PHP' -Condition ($httpsPayload.https -eq 'on') -Message "Unexpected HTTPS flag: $($httpsPayload.https)"
                  Assert-Test -Suite 'php-runtime' -Name 'HTTPS request scheme is reported' -Condition ($httpsPayload.request_scheme -eq 'https') -Message "Unexpected HTTPS request scheme: $($httpsPayload.request_scheme)"
                  Assert-Test -Suite 'php-runtime' -Name 'HTTPS port is reported' -Condition ($httpsPayload.server_port -eq "$sslPort") -Message "Unexpected HTTPS server port: $($httpsPayload.server_port)"
                  Assert-Test -Suite 'php-runtime' -Name 'SSL protocol reaches PHP' -Condition (($httpsPayload.ssl_protocol -as [string]).StartsWith('TLS')) -Message "Unexpected SSL protocol: $($httpsPayload.ssl_protocol)"
                  Assert-Test -Suite 'php-runtime' -Name 'SSL cipher reaches PHP' -Condition (($httpsPayload.ssl_cipher -as [string]).Length -gt 0) -Message 'SSL cipher was not reported to PHP'
                } else {
                  @(
                    'HTTPS flag reaches PHP',
                    'HTTPS request scheme is reported',
                    'HTTPS port is reported',
                    'SSL protocol reaches PHP',
                    'SSL cipher reaches PHP'
                  ) | ForEach-Object {
                    Add-SkippedTest -Suite 'php-runtime' -Name $_ -Reason 'Skipped because the HTTPS response was not valid JSON'
                  }
                }
              } else {
                @(
                  'HTTPS response returns JSON',
                  'HTTPS flag reaches PHP',
                  'HTTPS request scheme is reported',
                  'HTTPS port is reported',
                  'SSL protocol reaches PHP',
                  'SSL cipher reaches PHP'
                ) | ForEach-Object {
                  Add-SkippedTest -Suite 'php-runtime' -Name $_ -Reason 'Skipped because the HTTPS request failed'
                }
              }
            } else {
              @(
                'GET /health.php',
                'health header present',
                'health returns JSON',
                'health uses apache2handler',
                'health reports expected PHP major.minor',
                'health reports expected Apache version',
                'health reports server software',
                'apache_get_modules is available',
                'apache_get_modules reports modules',
                'health echoes query parameter',
                'health reports GET request method',
                'Apache SetEnv reaches PHP',
                'HEAD /head.php',
                'HEAD response header present',
                'GET /static.txt',
                'static file content matches',
                'GET /app/ directory index',
                'directory index returns JSON',
                'directory index resolves to PHP',
                'directory index preserves request URI',
                'GET /pathinfo.php with PATH_INFO',
                'PATH_INFO response returns JSON',
                'PATH_INFO is reported',
                'PHP_SELF includes PATH_INFO',
                'GET rewritten route',
                'rewrite response returns JSON',
                'rewrite route reaches PHP index',
                'rewrite preserves query string values',
                'rewrite keeps request URI',
                'POST form data to /echo.php',
                'form response returns JSON',
                'form POST method is reported',
                'form POST body round-trips',
                'apache_request_headers sees custom header',
                'getallheaders sees custom header',
                'authorization header reaches PHP',
                'apache_request_headers function is available',
                'apache_response_headers function is available',
                'apache_response_headers sees PHP response headers',
                'Apache environment reaches echo.php',
                'POST JSON to /echo.php',
                'JSON echo response returns JSON',
                'JSON payload name round-trips',
                'JSON payload value round-trips',
                'raw request body length matches',
                'raw request body hash matches',
                'POST multipart upload to /echo.php',
                'upload response returns JSON',
                'uploaded form note round-trips',
                'upload file name matches',
                'upload file size matches',
                'upload file hash matches',
                'upload completes without PHP upload error',
                'set cookie through PHP',
                'read cookie through PHP',
                'cookie read response returns JSON',
                'cookie round-trips through apache2handler',
                'start PHP session',
                'resume PHP session',
                'session start response returns JSON',
                'session initializes count',
                'session stores message',
                'session resume response returns JSON',
                'session persists count across requests',
                'session persists message across requests',
                'GET /status.php',
                'PHP status header is present',
                'status response returns JSON',
                'PHP can emit custom HTTP status',
                'apache_response_headers sees status probe header',
                'GET /https.php over HTTPS',
                'HTTPS response returns JSON',
                'HTTPS flag reaches PHP',
                'HTTPS request scheme is reported',
                'HTTPS port is reported',
                'SSL protocol reaches PHP',
                'SSL cipher reaches PHP'
              ) | ForEach-Object {
                Add-SkippedTest -Suite 'php-runtime' -Name $_ -Reason 'Skipped because Apache did not start'
              }
            }

            $errorLog = Join-Path $apacheRoot 'logs\error.log'
            if (Test-Path $errorLog) {
              Copy-Item -Path $errorLog -Destination (Join-Path $logsDir 'error.log') -Force
              $errorLogContent = Get-Content -Path $errorLog -Raw
              Assert-Test -Suite 'apache-runtime' -Name 'Apache error log is clean' -Condition ($errorLogContent -notmatch 'PHP Fatal|Syntax error|Cannot load|error while loading|Fatal') -Message 'Apache error log contains a startup or runtime failure'
            } else {
              Add-SkippedTest -Suite 'apache-runtime' -Name 'Apache error log is clean' -Reason 'Skipped because Apache did not create an error log'
            }

            $phpErrorLog = Join-Path $apacheRoot 'logs\php-errors.log'
            if (Test-Path $phpErrorLog) {
              Copy-Item -Path $phpErrorLog -Destination (Join-Path $logsDir 'php-errors.log') -Force
              $phpErrorContent = Get-Content -Path $phpErrorLog -Raw
              Assert-Test -Suite 'php-runtime' -Name 'PHP error log is clean' -Condition ($phpErrorContent -notmatch 'Fatal error|Parse error') -Message 'PHP error log contains a fatal or parse error'
            } else {
              Add-SkippedTest -Suite 'php-runtime' -Name 'PHP error log is clean' -Reason 'Skipped because PHP did not create an error log'
            }
          } catch {
            $_ | Format-List * -Force | Out-String | Tee-Object -FilePath (Join-Path $logsDir 'exception.txt') | Write-Host
            throw
          } finally {
            if ($null -ne $httpdProcess -and -not $httpdProcess.HasExited) {
              Stop-Process -Id $httpdProcess.Id -Force -ErrorAction SilentlyContinue
            }
          }

          $stats = Get-TestStats -Results $testResults
          $summaryLines = @(
            "## $suiteName",
            '',
            '| Passed | Failed | Skipped | Total |',
            '| --- | --- | --- | --- |',
            "| $($stats.passed) | $($stats.failed) | $($stats.skipped) | $($stats.total) |",
            '',
            '| Suite | Test | Status | Details |',
            '| --- | --- | --- | --- |'
          )

          foreach ($result in $testResults) {
            $summaryLines += "| $($result.Suite) | $($result.Name) | $($result.Status) | $($result.Details) |"
          }

          Write-Host "Test totals for ${suiteName}: passed=$($stats.passed) failed=$($stats.failed) skipped=$($stats.skipped) total=$($stats.total)"
          $summaryLines -join "`n" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          $testResults | ConvertTo-Json -Depth 5 | Set-Content -Path (Join-Path $logsDir 'test-results.json') -Encoding utf8
          $stats | ConvertTo-Json -Depth 5 | Set-Content -Path (Join-Path $logsDir 'test-stats.json') -Encoding utf8

          if ($mismatches.Count -gt 0) {
            $mismatches | Set-Content -Path (Join-Path $logsDir 'mismatches.txt') -Encoding utf8
            throw ($mismatches -join "`n")
          }

          $global:LASTEXITCODE = 0

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apachehandler-${{ matrix.source }}-php${{ matrix.php.version }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/apachehandler-${{ matrix.source }}-${{ matrix.php.version }}-${{ matrix.arch }}/logs

  summarize-test-results:
    name: Overall Test Summary
    if: always()
    needs: test-apachehandler
    runs-on: ubuntu-latest

    steps:
      - name: Download validation logs
        uses: actions/download-artifact@v4
        with:
          pattern: apachehandler-*
          path: artifacts
          merge-multiple: false

      - name: Summarize overall integration stats
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $artifactDirs = Get-ChildItem -Path artifacts -Directory | Sort-Object Name
          $allResults = New-Object System.Collections.Generic.List[object]
          $suiteStats = New-Object System.Collections.Generic.List[object]

          foreach ($artifactDir in $artifactDirs) {
            $statsPath = Join-Path $artifactDir.FullName 'test-stats.json'
            $resultsPath = Join-Path $artifactDir.FullName 'test-results.json'

            if (Test-Path $statsPath) {
              $stats = Get-Content -Path $statsPath -Raw | ConvertFrom-Json
              $suiteStats.Add($stats) | Out-Null
            }

            if (Test-Path $resultsPath) {
              foreach ($result in @(Get-Content -Path $resultsPath -Raw | ConvertFrom-Json)) {
                $allResults.Add($result) | Out-Null
              }
            }
          }

          $allResultItems = @($allResults.ToArray())
          $suiteStatItems = @($suiteStats.ToArray())

          $overall = [pscustomobject]@{
            total = $allResultItems.Count
            passed = @($allResultItems | Where-Object { $_.Status -eq 'passed' }).Count
            failed = @($allResultItems | Where-Object { $_.Status -eq 'failed' }).Count
            skipped = @($allResultItems | Where-Object { $_.Status -eq 'skipped' }).Count
          }

          $summaryLines = @(
            '## Overall Apache + PHP Integration Summary',
            '',
            '| Passed | Failed | Skipped | Total |',
            '| --- | --- | --- | --- |',
            "| $($overall.passed) | $($overall.failed) | $($overall.skipped) | $($overall.total) |",
            '',
            '| Suite | Passed | Failed | Skipped | Total |',
            '| --- | --- | --- | --- | --- |'
          )

          foreach ($stats in $suiteStatItems) {
            $summaryLines += "| $($stats.suite_name) | $($stats.passed) | $($stats.failed) | $($stats.skipped) | $($stats.total) |"
          }

          $summaryLines += ''
          $summaryLines += '| Suite | Category | Test | Status | Details |'
          $summaryLines += '| --- | --- | --- | --- | --- |'

          foreach ($result in $allResultItems) {
            $summaryLines += "| $($result.SuiteName) | $($result.Suite) | $($result.Name) | $($result.Status) | $($result.Details) |"
          }

          Write-Host "Overall integration totals: passed=$($overall.passed) failed=$($overall.failed) skipped=$($overall.skipped) total=$($overall.total)"
          $summaryLines -join "`n" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
