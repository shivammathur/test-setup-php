                $healthPayload = Convert-TestJson -Suite 'php-runtime' -Name 'health returns JSON' -Content $healthResponse.Content
                if ($null -ne $healthPayload) {
                  Assert-Test -Suite 'php-runtime' -Name 'health uses apache2handler' -Condition ($healthPayload.sapi -eq 'apache2handler') -Message "Unexpected SAPI: $($healthPayload.sapi)"
                  Assert-Test -Suite 'php-runtime' -Name 'health reports expected PHP major.minor' -Condition ($healthPayload.php_major_minor -eq $phpVersion) -Message "Unexpected PHP version: $($healthPayload.php_major_minor)"
                  Assert-Test -Suite 'php-runtime' -Name 'health reports expected Apache version' -Condition ($healthPayload.apache_version -like "Apache/$($env:APACHE_VERSION)*") -Message "Unexpected Apache version: $($healthPayload.apache_version)"
                  Assert-Test -Suite 'php-runtime' -Name 'health reports server software' -Condition ($healthPayload.server_software -like "Apache/$($env:APACHE_VERSION)*") -Message "Unexpected server software: $($healthPayload.server_software)"
                  Assert-Test -Suite 'php-runtime' -Name 'apache_get_modules is available' -Condition ([bool] $healthPayload.apache_get_modules_available) -Message 'apache_get_modules() was not available in apache2handler'
                  Assert-Test -Suite 'php-runtime' -Name 'apache_get_modules reports modules' -Condition ([int] $healthPayload.apache_module_count -gt 0) -Message 'apache_get_modules() returned no modules'
