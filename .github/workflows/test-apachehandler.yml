name: Test Apache Handler
run-name: Test Apache handler compatibility

on:
  push:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

env:
  APACHE_VERSION: "2.4.66"
  APACHE_LOUNGE_BUILD: "251206"
  APACHE_LOUNGE_TOOLSET: "VS17"
  APACHE_PORT: "8080"

jobs:
  test-apachehandler:
    name: ${{ matrix.source }} PHP ${{ matrix.php.version }} ${{ matrix.arch }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86]
        source: [built, release]
        php:
          - version: "8.2"
            vs: "vs16"
            source_run_id: "24624728893"
          - version: "8.3"
            vs: "vs16"
            source_run_id: "24624728900"
          - version: "8.4"
            vs: "vs17"
            source_run_id: "24624728891"
          - version: "8.5"
            vs: "vs17"
            source_run_id: "24624728959"

    steps:
      - name: Download built PHP artifacts
        if: matrix.source == 'built'
        uses: actions/download-artifact@v8
        with:
          name: artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: shivammathur/php-windows-builder
          run-id: ${{ matrix.php.source_run_id }}
          path: external/source-artifacts

      - name: Run Apache handler validation
        shell: pwsh
        env:
          TEST_SOURCE: ${{ matrix.source }}
          TEST_PHP_VERSION: ${{ matrix.php.version }}
          TEST_VS: ${{ matrix.php.vs }}
          TEST_ARCH: ${{ matrix.arch }}
        run: |
          $ErrorActionPreference = 'Stop'

          function Assert-True {
            param(
              [bool] $Condition,
              [string] $Message
            )

            if (-not $Condition) {
              throw $Message
            }
          }

          function Wait-ForUrl {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Url,
              [int] $Retries = 30
            )

            for ($attempt = 1; $attempt -le $Retries; $attempt++) {
              try {
                return Invoke-WebRequest -Uri $Url -UseBasicParsing -TimeoutSec 5
              } catch {
                Start-Sleep -Seconds 1
              }
            }

            throw "Timed out waiting for $Url"
          }

          function Download-File {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Url,
              [Parameter(Mandatory = $true)]
              [string] $Path
            )

            & curl.exe --fail --location --silent --show-error --output $Path $Url

            if ($LASTEXITCODE -ne 0) {
              throw "Failed to download $Url"
            }

            if (-not (Test-Path $Path)) {
              throw "Downloaded file is missing: $Path"
            }

            $fileInfo = Get-Item -Path $Path
            if ($fileInfo.Length -lt 1MB) {
              throw "Downloaded file was unexpectedly small ($($fileInfo.Length) bytes): $Url"
            }

            return $fileInfo.Length
          }

          $source = $env:TEST_SOURCE
          $phpVersion = $env:TEST_PHP_VERSION
          $expectedVs = $env:TEST_VS
          $arch = $env:TEST_ARCH
          $port = [int] $env:APACHE_PORT
          $apacheArch = if ($arch -eq 'x64') { 'Win64' } else { 'Win32' }
          $workspace = Join-Path $env:RUNNER_TEMP "apachehandler-$source-$phpVersion-$arch"
          $logsDir = Join-Path $workspace 'logs'
          $apacheExtractRoot = Join-Path $workspace 'apache-extract'
          $apacheInstallRoot = 'C:\Apache24'
          $apacheRoot = $null
          $siteDir = $null
          $phpRoot = 'C:\php'
          $httpdExe = $null
          $httpdConf = $null
          $apacheUrl = "https://www.apachelounge.com/download/VS17/binaries/httpd-$($env:APACHE_VERSION)-$($env:APACHE_LOUNGE_BUILD)-$apacheArch-$($env:APACHE_LOUNGE_TOOLSET).zip"
          $apacheZip = Join-Path $workspace 'apache.zip'
          $phpZip = $null
          $httpdProcess = $null

          New-Item -ItemType Directory -Force -Path $logsDir | Out-Null
          Remove-Item $apacheExtractRoot -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $apacheInstallRoot -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $phpRoot -Recurse -Force -ErrorAction SilentlyContinue

          try {
            if ($source -eq 'built') {
              $artifactDir = Join-Path $env:GITHUB_WORKSPACE 'external\source-artifacts'
              $phpZip = Get-ChildItem -Path $artifactDir -Filter 'php-*.zip' -File |
                Where-Object {
                  $_.Name -match "^php-.+-Win32-v[sc]\d+-$arch\.zip$" -and
                  $_.Name -match "-$expectedVs-$arch\.zip$" -and
                  $_.Name -notmatch '-nts-' -and
                  $_.Name -notmatch '^php-(debug-pack|devel-pack|test-pack|src)'
                } |
                Sort-Object Name |
                Select-Object -First 1

              if ($null -eq $phpZip) {
                throw "Unable to find a thread-safe $arch PHP package in $artifactDir"
              }

              $phpZip = $phpZip.FullName
            } else {
              $phpZip = Join-Path $workspace 'php-release.zip'
              $releaseUrl = "https://windows.php.net/downloads/releases/latest/php-$phpVersion-Win32-$expectedVs-$arch-latest.zip"
              $phpReleaseSize = Download-File -Url $releaseUrl -Path $phpZip
            }

            $selection = @(
              "source=$source"
              "php_version=$phpVersion"
              "arch=$arch"
              "expected_vs=$expectedVs"
              "apache_url=$apacheUrl"
              "php_zip=$phpZip"
            )
            if ($source -eq 'release') {
              $selection += "php_zip_size=$phpReleaseSize"
            }
            Set-Content -Path (Join-Path $logsDir 'selection.txt') -Value $selection -Encoding ascii

            Write-Host "Checkpoint: download Apache"
            $apacheZipSize = Download-File -Url $apacheUrl -Path $apacheZip
            Add-Content -Path (Join-Path $logsDir 'selection.txt') -Value "apache_zip_size=$apacheZipSize" -Encoding ascii
            New-Item -ItemType Directory -Force -Path $apacheExtractRoot | Out-Null
            Expand-Archive -Path $apacheZip -DestinationPath $apacheExtractRoot -Force

            $extractedApacheRoot = Get-ChildItem -Path $apacheExtractRoot -Directory -Recurse |
              Where-Object {
                $_.Name -eq 'Apache24' -and
                (Test-Path (Join-Path $_.FullName 'bin\httpd.exe'))
              } |
              Select-Object -First 1 -ExpandProperty FullName

            if (-not $extractedApacheRoot) {
              throw "Unable to find Apache24 in extracted archive under $apacheExtractRoot"
            }

            Copy-Item -Path $extractedApacheRoot -Destination $apacheInstallRoot -Recurse -Force

            $apacheRoot = $apacheInstallRoot
            $siteDir = Join-Path $apacheRoot 'htdocs'
            $httpdExe = Join-Path $apacheRoot 'bin\httpd.exe'
            $httpdConf = Join-Path $apacheRoot 'conf\httpd.conf'

            Add-Content -Path (Join-Path $logsDir 'selection.txt') -Value "extracted_apache_root=$extractedApacheRoot" -Encoding ascii
            Add-Content -Path (Join-Path $logsDir 'selection.txt') -Value "apache_root=$apacheRoot" -Encoding ascii
            Write-Host "Checkpoint: Apache extracted"

            Expand-Archive -Path $phpZip -DestinationPath $phpRoot -Force
            Write-Host "Checkpoint: PHP extracted"

            $phpIni = @(
              '[PHP]'
              'display_errors=On'
              'error_reporting=E_ALL'
              'log_errors=On'
              'date.timezone=UTC'
              'extension_dir="C:/php/ext"'
              "error_log=""$($apacheRoot -replace '\\', '/')/logs/php-errors.log"""
            ) -join "`r`n"
            Set-Content -Path (Join-Path $phpRoot 'php.ini') -Value $phpIni -Encoding ascii

            $healthScript = @(
              '<?php'
              "header('Content-Type: application/json');"
              "header('X-PHP-Apache-Test: ok');"
              "`$modules = function_exists('apache_get_modules') ? apache_get_modules() : [];"
              'echo json_encode(['
              "    'php_version' => PHP_VERSION,"
              "    'php_major_minor' => PHP_MAJOR_VERSION . '.' . PHP_MINOR_VERSION,"
              "    'sapi' => PHP_SAPI,"
              "    'apache_version' => function_exists('apache_get_version') ? apache_get_version() : null,"
              "    'php_module_loaded' => in_array('php_module', `$modules, true),"
              "    'server_software' => `$_SERVER['SERVER_SOFTWARE'] ?? null,"
              "    'request_method' => `$_SERVER['REQUEST_METHOD'] ?? null,"
              "    'query_name' => `$_GET['name'] ?? null,"
              "    'post_name' => `$_POST['name'] ?? null,"
              '], JSON_THROW_ON_ERROR);'
            ) -join "`r`n"
            Set-Content -Path (Join-Path $siteDir 'health.php') -Value $healthScript -Encoding ascii
            Set-Content -Path (Join-Path $siteDir 'static.txt') -Value 'apache static ok' -Encoding ascii

            $apacheRootConfigPath = $apacheRoot -replace '\\', '/'
            $httpdConfig = Get-Content -Path $httpdConf -Raw
            $httpdConfig = $httpdConfig -replace '(?i)c:/Apache24(?:-(?:32|64))?', $apacheRootConfigPath
            $httpdConfig = $httpdConfig -replace '(?m)^[ \t]*Define SRVROOT.*\r?$', "Define SRVROOT `"$apacheRootConfigPath`""
            $httpdConfig = $httpdConfig -replace '(?m)^[ \t]*ServerRoot.*\r?$', "ServerRoot `"$apacheRootConfigPath`""
            $httpdConfig = $httpdConfig -replace '(?m)^Listen 80\r?$', "Listen $port"
            $httpdConfig = $httpdConfig -replace '(?m)^#?ServerName .+\r?$', "ServerName 127.0.0.1:$port"
            $httpdConfig = $httpdConfig -replace '(?m)^DirectoryIndex .+\r?$', 'DirectoryIndex index.php index.html'

            if ($httpdConfig -notmatch '(?m)^LoadFile "c:/php/php8ts\.dll"$') {
              $httpdConfig += "`r`nLoadFile `"c:/php/php8ts.dll`""
            }

            if ($httpdConfig -notmatch '(?m)^LoadModule php_module "c:/php/php8apache2_4\.dll"$') {
              $httpdConfig += "`r`nLoadModule php_module `"c:/php/php8apache2_4.dll`""
            }

            if ($httpdConfig -notmatch '(?m)^PHPIniDir "C:/php"$') {
              $httpdConfig += "`r`nPHPIniDir `"C:/php`""
            }

            if ($httpdConfig -notmatch '(?m)^AddType application/x-httpd-php \.php$') {
              $httpdConfig += "`r`nAddType application/x-httpd-php .php"
            }

            Set-Content -Path $httpdConf -Value $httpdConfig -Encoding ascii
            Set-Content -Path (Join-Path $logsDir 'httpd.conf') -Value $httpdConfig -Encoding ascii
            ($httpdConfig -split "\r?\n" | Select-Object -First 60 | ForEach-Object -Begin { $lineNumber = 1 } -Process {
              '{0:D3}: {1}' -f $lineNumber, $_
              $lineNumber++
            }) | Set-Content -Path (Join-Path $logsDir 'httpd-head.txt') -Encoding ascii

            Write-Host "Checkpoint: Apache config prepared"
            $configTest = & $httpdExe '-d' $apacheRoot '-f' $httpdConf '-t' 2>&1
            $configTest | Tee-Object -FilePath (Join-Path $logsDir 'httpd-configtest.txt')
            Assert-True -Condition ($LASTEXITCODE -eq 0) -Message 'Apache config test failed'

            $moduleList = & $httpdExe '-d' $apacheRoot '-f' $httpdConf '-M' 2>&1
            $moduleList | Tee-Object -FilePath (Join-Path $logsDir 'httpd-modules.txt')
            Assert-True -Condition ($LASTEXITCODE -eq 0) -Message 'Apache module list failed'
            Assert-True -Condition (($moduleList -join "`n") -match 'php_module \(shared\)') -Message 'php_module was not loaded by Apache'

            $httpdProcess = Start-Process -FilePath $httpdExe -ArgumentList @('-d', $apacheRoot, '-f', $httpdConf, '-X') -WorkingDirectory (Join-Path $apacheRoot 'bin') -PassThru
            Write-Host "Checkpoint: Apache started"

            $getResponse = Wait-ForUrl -Url "http://127.0.0.1:$port/health.php?name=world"
            $getResponse.Content | Set-Content -Path (Join-Path $logsDir 'health-get.json') -Encoding utf8
            Assert-True -Condition ($getResponse.StatusCode -eq 200) -Message 'GET request did not return HTTP 200'
            Assert-True -Condition (@($getResponse.Headers['X-PHP-Apache-Test']) -contains 'ok') -Message 'Expected Apache handler response header was missing'

            $getPayload = $getResponse.Content | ConvertFrom-Json
            Assert-True -Condition ($getPayload.sapi -eq 'apache2handler') -Message "Unexpected SAPI: $($getPayload.sapi)"
            Assert-True -Condition ($getPayload.php_major_minor -eq $phpVersion) -Message "Unexpected PHP version: $($getPayload.php_major_minor)"
            Assert-True -Condition ($getPayload.apache_version -like "Apache/$($env:APACHE_VERSION)*") -Message "Unexpected Apache version: $($getPayload.apache_version)"
            Assert-True -Condition ($getPayload.server_software -like "Apache/$($env:APACHE_VERSION)*") -Message "Unexpected server software: $($getPayload.server_software)"
            Assert-True -Condition ($getPayload.query_name -eq 'world') -Message 'Query string did not round-trip through Apache'

            $postResponse = Invoke-WebRequest -Uri "http://127.0.0.1:$port/health.php?name=world" -Method Post -Body @{ name = 'apache' } -UseBasicParsing
            $postResponse.Content | Set-Content -Path (Join-Path $logsDir 'health-post.json') -Encoding utf8
            Assert-True -Condition ($postResponse.StatusCode -eq 200) -Message 'POST request did not return HTTP 200'

            $postPayload = $postResponse.Content | ConvertFrom-Json
            Assert-True -Condition ($postPayload.request_method -eq 'POST') -Message "Unexpected request method: $($postPayload.request_method)"
            Assert-True -Condition ($postPayload.post_name -eq 'apache') -Message 'POST body did not round-trip through Apache'

            $staticResponse = Invoke-WebRequest -Uri "http://127.0.0.1:$port/static.txt" -UseBasicParsing
            $staticResponse.Content | Set-Content -Path (Join-Path $logsDir 'static.txt') -Encoding utf8
            Assert-True -Condition ($staticResponse.Content.Trim() -eq 'apache static ok') -Message 'Static content was not served correctly'

            $errorLog = Join-Path $apacheRoot 'logs\error.log'
            if (Test-Path $errorLog) {
              Copy-Item $errorLog (Join-Path $logsDir 'error.log') -Force
              $errorLogContent = Get-Content -Path $errorLog -Raw
              Assert-True -Condition ($errorLogContent -notmatch 'PHP Fatal|Syntax error|Cannot load|error while loading') -Message 'Apache error log contains a startup or runtime failure'
            }

            $phpErrorLog = Join-Path $apacheRoot 'logs\php-errors.log'
            if (Test-Path $phpErrorLog) {
              Copy-Item $phpErrorLog (Join-Path $logsDir 'php-errors.log') -Force
              $phpErrorContent = Get-Content -Path $phpErrorLog -Raw
              Assert-True -Condition ($phpErrorContent -notmatch 'Fatal error|Parse error') -Message 'PHP error log contains a fatal or parse error'
            }
          } catch {
            $_ | Format-List * -Force | Out-String | Tee-Object -FilePath (Join-Path $logsDir 'exception.txt') | Write-Host
            throw
          } finally {
            if ($null -ne $httpdProcess -and -not $httpdProcess.HasExited) {
              Stop-Process -Id $httpdProcess.Id -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: apachehandler-${{ matrix.source }}-php${{ matrix.php.version }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/apachehandler-${{ matrix.source }}-${{ matrix.php.version }}-${{ matrix.arch }}/logs
