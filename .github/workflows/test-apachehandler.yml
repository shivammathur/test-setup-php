              'AcceptPathInfo On',
              'EnableSendfile Off',
              'SetEnv APACHE_TEST_ENV from-apache',
              "Listen $sslPort",
              "SSLSessionCache `"shmcb:${apacheRootConfigPath}/logs/ssl_scache(512000)`"",
              'SSLSessionCacheTimeout 300',
              "<Directory `"$siteDirConfigPath`">",
              '    Options Indexes FollowSymLinks',
              '    AllowOverride All',
              '    Require all granted',
              '</Directory>',
              "<VirtualHost _default_:$sslPort>",
