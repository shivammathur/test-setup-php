name: Test Apache Handler
run-name: Test Apache handler compatibility

on:
  push:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

env:
  APACHE_VERSION: "2.4.66"
  APACHE_LOUNGE_BUILD: "251206"
  APACHE_LOUNGE_TOOLSET: "VS17"
  APACHE_PORT: "8080"
  APACHE_SSL_PORT: "8443"

jobs:
  test-apachehandler:
    name: ${{ matrix.source }} PHP ${{ matrix.php.version }} ${{ matrix.arch }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86]
        source: [built, release]
        php:
          - version: "8.2"
            vs: "vs16"
            source_run_id: "24624728893"
          - version: "8.3"
            vs: "vs16"
            source_run_id: "24624728900"
          - version: "8.4"
            vs: "vs17"
            source_run_id: "24624728891"
          - version: "8.5"
            vs: "vs17"
            source_run_id: "24624728959"

    steps:
      - name: Download built PHP artifacts
        if: matrix.source == 'built'
        uses: actions/download-artifact@v4
        with:
          name: artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: shivammathur/php-windows-builder
          run-id: ${{ matrix.php.source_run_id }}
          path: external/source-artifacts

      - name: Run Apache handler integration suite
        shell: pwsh
        env:
          TEST_SOURCE: ${{ matrix.source }}
          TEST_PHP_VERSION: ${{ matrix.php.version }}
          TEST_VS: ${{ matrix.php.vs }}
          TEST_ARCH: ${{ matrix.arch }}
        run: |
          $ErrorActionPreference = 'Stop'

          function Assert-True {
            param(
              [bool] $Condition,
              [string] $Message
            )

            if (-not $Condition) {
              throw $Message
            }
          }

          function Download-File {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Url,
              [Parameter(Mandatory = $true)]
              [string] $Path,
              [long] $MinimumSize = 1MB
            )

            & curl.exe --fail --location --silent --show-error --output $Path $Url

            if ($LASTEXITCODE -ne 0) {
              throw "Failed to download $Url"
            }

            if (-not (Test-Path $Path)) {
              throw "Downloaded file is missing: $Path"
            }

            $fileInfo = Get-Item -Path $Path
            if ($fileInfo.Length -lt $MinimumSize) {
              throw "Downloaded file was unexpectedly small ($($fileInfo.Length) bytes): $Url"
            }

            $global:LASTEXITCODE = 0
            return $fileInfo.Length
          }

          function Invoke-WebRequestWithRetry {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Uri,
              [string] $Method = 'Get',
              [object] $Body,
              [hashtable] $Headers,
              [hashtable] $Form,
              [string] $ContentType,
              [Microsoft.PowerShell.Commands.WebRequestSession] $WebSession,
              [switch] $SkipCertificateCheck,
              [int] $ExpectedStatusCode = 200,
              [int] $Retries = 30,
              [int] $TimeoutSec = 5
            )

            for ($attempt = 1; $attempt -le $Retries; $attempt++) {
              try {
                $params = @{
                  Uri = $Uri
                  Method = $Method
                  TimeoutSec = $TimeoutSec
                  SkipHttpErrorCheck = $true
                }

                if ($null -ne $Body) {
                  $params.Body = $Body
                }

                if ($null -ne $Headers) {
                  $params.Headers = $Headers
                }

                if ($null -ne $Form) {
                  $params.Form = $Form
                }

                if ($null -ne $ContentType) {
                  $params.ContentType = $ContentType
                }

                if ($null -ne $WebSession) {
                  $params.WebSession = $WebSession
                }

                if ($SkipCertificateCheck) {
                  $params.SkipCertificateCheck = $true
                }

                $response = Invoke-WebRequest @params
                if ([int] $response.StatusCode -eq $ExpectedStatusCode) {
                  return $response
                }
              } catch {
              }

              Start-Sleep -Seconds 1
            }

            throw "Timed out waiting for $Uri to return HTTP $ExpectedStatusCode"
          }

          function Get-Sha256Hex {
            param(
              [Parameter(Mandatory = $true)]
              [byte[]] $Bytes
            )

            $sha256 = [System.Security.Cryptography.SHA256]::Create()
            try {
              return (($sha256.ComputeHash($Bytes) | ForEach-Object { $_.ToString('x2') }) -join '')
            } finally {
              $sha256.Dispose()
            }
          }

          function Convert-TestJson {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Suite,
              [Parameter(Mandatory = $true)]
              [string] $Name,
              [Parameter(Mandatory = $true)]
              [AllowEmptyString()]
              [string] $Content
            )

            try {
              return $Content | ConvertFrom-Json
            } catch {
              $preview = ($Content -replace '\s+', ' ').Trim()
              if ($preview.Length -gt 160) {
                $preview = $preview.Substring(0, 160) + '...'
              }

              $detail = $_.Exception.Message
              if (-not [string]::IsNullOrWhiteSpace($preview)) {
                $detail = "$detail :: $preview"
              }

              Add-TestResult -Suite $Suite -Name $Name -Status 'failed' -Details $detail
              $script:mismatches.Add("$Name failed: response was not valid JSON") | Out-Null
              return $null
            }
          }

          $source = $env:TEST_SOURCE
          $phpVersion = $env:TEST_PHP_VERSION
          $expectedVs = $env:TEST_VS
          $arch = $env:TEST_ARCH
          $suiteName = "$source PHP $phpVersion $arch"
          $port = [int] $env:APACHE_PORT
          $sslPort = [int] $env:APACHE_SSL_PORT
          $apacheArch = if ($arch -eq 'x64') { 'Win64' } else { 'Win32' }
          $workspace = Join-Path $env:RUNNER_TEMP "apachehandler-$source-$phpVersion-$arch"
          $logsDir = Join-Path $workspace 'logs'
          $apacheExtractRoot = Join-Path $workspace 'apache-extract'
          $apacheInstallRoot = 'C:\Apache24'
          $phpRoot = 'C:\php'
          $phpDataRoot = 'C:\php-data'
          $selectionPath = Join-Path $logsDir 'selection.txt'
          $apacheUrl = "https://www.apachelounge.com/download/VS17/binaries/httpd-$($env:APACHE_VERSION)-$($env:APACHE_LOUNGE_BUILD)-$apacheArch-$($env:APACHE_LOUNGE_TOOLSET).zip"
          $apacheZip = Join-Path $workspace 'apache.zip'
          $phpZip = $null
          $apacheRoot = $null
          $siteDir = $null
          $httpdExe = $null
          $httpdConf = $null
          $httpdProcess = $null
          $testResults = New-Object System.Collections.Generic.List[object]
          $mismatches = New-Object System.Collections.Generic.List[string]

          function Add-TestResult {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Suite,
              [Parameter(Mandatory = $true)]
              [string] $Name,
              [Parameter(Mandatory = $true)]
              [string] $Status,
              [string] $Details = ''
            )

            $script:testResults.Add([pscustomobject]@{
              SuiteName = $script:suiteName
              Source = $script:source
              PhpVersion = $script:phpVersion
              Arch = $script:arch
              Suite = $Suite
              Name = $Name
              Status = $Status
              Details = $Details
            }) | Out-Null

            $statusLabel = switch ($Status) {
              'passed' { 'PASS' }
              'failed' { 'FAIL' }
              'skipped' { 'SKIP' }
              default { $Status.ToUpperInvariant() }
            }

            if ([string]::IsNullOrWhiteSpace($Details)) {
              Write-Host "[$statusLabel] $Suite :: $Name"
            } else {
              Write-Host "[$statusLabel] $Suite :: $Name :: $Details"
            }
          }

          function Assert-Test {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Suite,
              [Parameter(Mandatory = $true)]
              [string] $Name,
              [Parameter(Mandatory = $true)]
              [bool] $Condition,
              [Parameter(Mandatory = $true)]
              [string] $Message,
              [string] $SuccessDetails = '',
              [string] $FailureDetails = ''
            )

            if ($Condition) {
              Add-TestResult -Suite $Suite -Name $Name -Status 'passed' -Details $SuccessDetails
              return
            }

            $detailText = if ([string]::IsNullOrWhiteSpace($FailureDetails)) { $Message } else { $FailureDetails }
            Add-TestResult -Suite $Suite -Name $Name -Status 'failed' -Details $detailText
            $script:mismatches.Add($Message) | Out-Null
          }

          function Add-SkippedTest {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Suite,
              [Parameter(Mandatory = $true)]
              [string] $Name,
              [string] $Reason = ''
            )

            Add-TestResult -Suite $Suite -Name $Name -Status 'skipped' -Details $Reason
          }

          function Invoke-TestAction {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Suite,
              [Parameter(Mandatory = $true)]
              [string] $Name,
              [Parameter(Mandatory = $true)]
              [scriptblock] $Action,
              [string] $SuccessDetails = ''
            )

            try {
              $result = & $Action
              Add-TestResult -Suite $Suite -Name $Name -Status 'passed' -Details $SuccessDetails
              return $result
            } catch {
              Add-TestResult -Suite $Suite -Name $Name -Status 'failed' -Details $_.Exception.Message
              $script:mismatches.Add("$Name failed: $($_.Exception.Message)") | Out-Null
              return $null
            }
          }

          function Get-TestStats {
            param(
              [Parameter(Mandatory = $true)]
              [object[]] $Results
            )

            [pscustomobject]@{
              suite_name = $script:suiteName
              source = $script:source
              php_version = $script:phpVersion
              arch = $script:arch
              total = @($Results).Count
              passed = @($Results | Where-Object Status -eq 'passed').Count
              failed = @($Results | Where-Object Status -eq 'failed').Count
              skipped = @($Results | Where-Object Status -eq 'skipped').Count
            }
          }

          Remove-Item -Path $workspace -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path $apacheInstallRoot -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path $phpRoot -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path $phpDataRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $logsDir | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $phpDataRoot 'session') | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $phpDataRoot 'upload') | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $phpDataRoot 'tmp') | Out-Null

          try {
            if ($source -eq 'built') {
              $artifactDir = Join-Path $env:GITHUB_WORKSPACE 'external\source-artifacts'
              $selectedPhpZip = Get-ChildItem -Path $artifactDir -Filter 'php-*.zip' -File |
                Where-Object {
                  $_.Name -match "^php-.+-Win32-v[sc]\d+-$arch\.zip$" -and
                  $_.Name -match "-$expectedVs-$arch\.zip$" -and
                  $_.Name -notmatch '-nts-' -and
                  $_.Name -notmatch '^php-(debug-pack|devel-pack|test-pack|src)'
                } |
                Sort-Object Name |
                Select-Object -First 1

              if ($null -eq $selectedPhpZip) {
                throw "Unable to find a thread-safe $arch PHP package in $artifactDir"
              }

              $phpZip = $selectedPhpZip.FullName
              $phpZipSize = (Get-Item -Path $phpZip).Length
            } else {
              $phpZip = Join-Path $workspace 'php-release.zip'
              $releaseUrl = "https://windows.php.net/downloads/releases/latest/php-$phpVersion-Win32-$expectedVs-$arch-latest.zip"
              $phpZipSize = Download-File -Url $releaseUrl -Path $phpZip
            }

            Set-Content -Path $selectionPath -Value @(
              "suite_name=$suiteName"
              "source=$source"
              "php_version=$phpVersion"
              "arch=$arch"
              "expected_vs=$expectedVs"
              "apache_url=$apacheUrl"
              "php_zip=$phpZip"
              "php_zip_size=$phpZipSize"
            ) -Encoding ascii

            $apacheZipSize = Download-File -Url $apacheUrl -Path $apacheZip
            Add-Content -Path $selectionPath -Value "apache_zip_size=$apacheZipSize" -Encoding ascii

            New-Item -ItemType Directory -Force -Path $apacheExtractRoot | Out-Null
            Expand-Archive -Path $apacheZip -DestinationPath $apacheExtractRoot -Force

            $extractedApacheRoot = Get-ChildItem -Path $apacheExtractRoot -Directory -Recurse |
              Where-Object {
                $_.Name -eq 'Apache24' -and
                (Test-Path (Join-Path $_.FullName 'bin\httpd.exe'))
              } |
              Select-Object -First 1 -ExpandProperty FullName

            Assert-True -Condition ([bool] $extractedApacheRoot) -Message "Unable to find Apache24 in extracted archive under $apacheExtractRoot"
            Copy-Item -Path $extractedApacheRoot -Destination $apacheInstallRoot -Recurse -Force

            $apacheRoot = $apacheInstallRoot
            $siteDir = Join-Path $apacheRoot 'htdocs'
            $httpdExe = Join-Path $apacheRoot 'bin\httpd.exe'
            $httpdConf = Join-Path $apacheRoot 'conf\httpd.conf'
            $opensslExe = Join-Path $apacheRoot 'bin\openssl.exe'
            $opensslConfig = Join-Path $apacheRoot 'conf\openssl-test.cnf'
            $sslCert = Join-Path $apacheRoot 'conf\server.crt'
            $sslKey = Join-Path $apacheRoot 'conf\server.key'

            Add-Content -Path $selectionPath -Value @(
              "apache_root=$apacheRoot"
              "apache_extract_root=$extractedApacheRoot"
            ) -Encoding ascii

            Expand-Archive -Path $phpZip -DestinationPath $phpRoot -Force
            Add-Content -Path $selectionPath -Value "php_root=$phpRoot" -Encoding ascii

            Assert-True -Condition (Test-Path $opensslExe) -Message "Apache Lounge openssl.exe is missing: $opensslExe"

            $opensslConfigText = @'
          [req]
          default_bits = 2048
          prompt = no
          default_md = sha256
          distinguished_name = req_distinguished_name
          x509_extensions = v3_req

          [req_distinguished_name]
          CN = 127.0.0.1

          [v3_req]
          subjectAltName = @alt_names

          [alt_names]
          DNS.1 = localhost
          IP.1 = 127.0.0.1
          '@
            Set-Content -Path $opensslConfig -Value $opensslConfigText -Encoding ascii

            $opensslOutput = & $opensslExe 'req' '-x509' '-newkey' 'rsa:2048' '-sha256' '-nodes' '-keyout' $sslKey '-out' $sslCert '-days' '1' '-config' $opensslConfig '-extensions' 'v3_req' 2>&1
            $opensslOutput | Set-Content -Path (Join-Path $logsDir 'openssl.log') -Encoding utf8
            Assert-True -Condition ($LASTEXITCODE -eq 0) -Message 'OpenSSL certificate generation failed'
            $global:LASTEXITCODE = 0
            Assert-True -Condition (Test-Path $sslCert) -Message "Generated SSL certificate is missing: $sslCert"
            Assert-True -Condition (Test-Path $sslKey) -Message "Generated SSL private key is missing: $sslKey"

            $phpIni = @"
          [PHP]
          display_errors=Off
          log_errors=On
          error_reporting=E_ALL
          date.timezone=UTC
          extension_dir="C:/php/ext"
          error_log="$($apacheRoot -replace '\\', '/')/logs/php-errors.log"
          session.save_path="C:/php-data/session"
          upload_tmp_dir="C:/php-data/upload"
          sys_temp_dir="C:/php-data/tmp"
          session.cookie_httponly=1
          output_buffering=Off
          cgi.fix_pathinfo=1
          file_uploads=On
          post_max_size=32M
          upload_max_filesize=32M
          "@
            Set-Content -Path (Join-Path $phpRoot 'php.ini') -Value $phpIni -Encoding ascii

            $healthScript = @'
          <?php
          declare(strict_types=1);

          header('Content-Type: application/json');
          header('X-PHP-Apache-Test: ok');

          $modules = function_exists('apache_get_modules') ? apache_get_modules() : [];

          echo json_encode([
              'php_version' => PHP_VERSION,
              'php_major_minor' => PHP_MAJOR_VERSION . '.' . PHP_MINOR_VERSION,
              'sapi' => PHP_SAPI,
              'apache_version' => function_exists('apache_get_version') ? apache_get_version() : null,
              'apache_get_modules_available' => function_exists('apache_get_modules'),
              'apache_module_count' => count($modules),
              'server_software' => $_SERVER['SERVER_SOFTWARE'] ?? null,
              'request_method' => $_SERVER['REQUEST_METHOD'] ?? null,
              'query_name' => $_GET['name'] ?? null,
              'apache_test_env' => $_SERVER['APACHE_TEST_ENV'] ?? getenv('APACHE_TEST_ENV') ?: null,
          ], JSON_THROW_ON_ERROR);
          '@

            $echoScript = @'
          <?php
          declare(strict_types=1);

          function normalize_headers(array $headers): array
          {
              $normalized = [];
              foreach ($headers as $name => $value) {
                  $normalized[strtolower((string) $name)] = $value;
              }

              return $normalized;
          }

          header('Content-Type: application/json');
          header('X-Response-From-PHP: active');

          $requestHeaders = function_exists('apache_request_headers')
              ? normalize_headers(apache_request_headers())
              : (function_exists('getallheaders') ? normalize_headers(getallheaders()) : []);
          $allHeaders = function_exists('getallheaders') ? normalize_headers(getallheaders()) : [];
          $responseHeaders = function_exists('apache_response_headers') ? normalize_headers(apache_response_headers()) : [];
          $rawBody = file_get_contents('php://input');
          $decodedJson = json_decode($rawBody, true);
          $upload = $_FILES['upload'] ?? null;
          $uploadHash = null;

          if (is_array($upload) && isset($upload['tmp_name']) && is_string($upload['tmp_name']) && $upload['tmp_name'] !== '' && is_file($upload['tmp_name'])) {
              $uploadHash = hash_file('sha256', $upload['tmp_name']);
          }

          echo json_encode([
              'request_method' => $_SERVER['REQUEST_METHOD'] ?? null,
              'query_name' => $_GET['name'] ?? null,
              'query_route' => $_GET['route'] ?? null,
              'post_name' => $_POST['name'] ?? null,
              'post_note' => $_POST['note'] ?? null,
              'raw_length' => strlen($rawBody),
              'raw_sha256' => hash('sha256', $rawBody),
              'json_name' => is_array($decodedJson) ? ($decodedJson['name'] ?? null) : null,
              'json_value' => is_array($decodedJson) ? ($decodedJson['value'] ?? null) : null,
              'header_x_test' => $requestHeaders['x-test-header'] ?? null,
              'header_authorization' => $requestHeaders['authorization'] ?? null,
              'getallheaders_x_test' => $allHeaders['x-test-header'] ?? null,
              'apache_request_headers_available' => function_exists('apache_request_headers'),
              'apache_response_headers_available' => function_exists('apache_response_headers'),
              'response_header_probe' => $responseHeaders['x-response-from-php'] ?? null,
              'request_uri' => $_SERVER['REQUEST_URI'] ?? null,
              'script_name' => $_SERVER['SCRIPT_NAME'] ?? null,
              'script_filename' => $_SERVER['SCRIPT_FILENAME'] ?? null,
              'document_root' => $_SERVER['DOCUMENT_ROOT'] ?? null,
              'path_info' => $_SERVER['PATH_INFO'] ?? null,
              'php_self' => $_SERVER['PHP_SELF'] ?? null,
              'server_port' => $_SERVER['SERVER_PORT'] ?? null,
              'https' => $_SERVER['HTTPS'] ?? null,
              'request_scheme' => $_SERVER['REQUEST_SCHEME'] ?? null,
              'ssl_protocol' => $_SERVER['SSL_PROTOCOL'] ?? null,
              'apache_test_env' => $_SERVER['APACHE_TEST_ENV'] ?? getenv('APACHE_TEST_ENV') ?: null,
              'upload_name' => is_array($upload) ? ($upload['name'] ?? null) : null,
              'upload_size' => is_array($upload) ? (int) ($upload['size'] ?? 0) : 0,
              'upload_type' => is_array($upload) ? ($upload['type'] ?? null) : null,
              'upload_error' => is_array($upload) ? (int) ($upload['error'] ?? 4) : 4,
              'upload_sha256' => $uploadHash,
          ], JSON_THROW_ON_ERROR);
          '@

            $sessionScript = @'
          <?php
          declare(strict_types=1);

          header('Content-Type: application/json');
          session_start();

          if (!isset($_SESSION['count'])) {
              $_SESSION['count'] = 0;
          }

          $_SESSION['count']++;
          if (isset($_GET['message'])) {
              $_SESSION['message'] = $_GET['message'];
          }

          echo json_encode([
              'session_id' => session_id(),
              'count' => $_SESSION['count'],
              'message' => $_SESSION['message'] ?? null,
          ], JSON_THROW_ON_ERROR);
          '@

            $cookieScript = @'
          <?php
          declare(strict_types=1);

          header('Content-Type: application/json');

          if (isset($_GET['set'])) {
              setcookie('apache_cookie', (string) $_GET['set'], 0, '/');
          }

          echo json_encode([
              'cookie' => $_COOKIE['apache_cookie'] ?? null,
              'set' => $_GET['set'] ?? null,
          ], JSON_THROW_ON_ERROR);
          '@

            $statusScript = @'
          <?php
          declare(strict_types=1);

          $protocol = $_SERVER['SERVER_PROTOCOL'] ?? 'HTTP/1.1';
          header($protocol . ' 418 I am a teapot');
          header('Content-Type: application/json');
          header('X-Status-Test: ok');
          header('X-Response-Probe: status');
          http_response_code(418);

          $responseHeaders = function_exists('apache_response_headers') ? apache_response_headers() : [];
          $responseProbe = null;
          foreach ($responseHeaders as $name => $value) {
              if (strtolower((string) $name) === 'x-response-probe') {
                  $responseProbe = $value;
                  break;
              }
          }

          echo json_encode([
              'status' => http_response_code(),
              'response_probe' => $responseProbe,
          ], JSON_THROW_ON_ERROR);
          '@

            $headScript = @'
          <?php
          declare(strict_types=1);

          header('X-Head-Test: ok');
          http_response_code(204);
          '@

            $httpsScript = @'
          <?php
          declare(strict_types=1);

          header('Content-Type: application/json');

          echo json_encode([
              'https' => $_SERVER['HTTPS'] ?? null,
              'request_scheme' => $_SERVER['REQUEST_SCHEME'] ?? null,
              'server_port' => $_SERVER['SERVER_PORT'] ?? null,
              'ssl_protocol' => $_SERVER['SSL_PROTOCOL'] ?? null,
              'ssl_cipher' => $_SERVER['SSL_CIPHER'] ?? null,
          ], JSON_THROW_ON_ERROR);
          '@

            $pathInfoScript = @'
          <?php
          declare(strict_types=1);

          header('Content-Type: application/json');

          echo json_encode([
              'path_info' => $_SERVER['PATH_INFO'] ?? null,
              'php_self' => $_SERVER['PHP_SELF'] ?? null,
              'request_uri' => $_SERVER['REQUEST_URI'] ?? null,
              'script_name' => $_SERVER['SCRIPT_NAME'] ?? null,
          ], JSON_THROW_ON_ERROR);
          '@

            $directoryIndexScript = @'
          <?php
          declare(strict_types=1);

          header('Content-Type: application/json');

          echo json_encode([
              'directory_index' => true,
              'request_uri' => $_SERVER['REQUEST_URI'] ?? null,
              'script_name' => $_SERVER['SCRIPT_NAME'] ?? null,
          ], JSON_THROW_ON_ERROR);
          '@

            $rewriteIndexScript = @'
          <?php
          declare(strict_types=1);

          header('Content-Type: application/json');

          echo json_encode([
              'request_uri' => $_SERVER['REQUEST_URI'] ?? null,
              'script_name' => $_SERVER['SCRIPT_NAME'] ?? null,
              'script_filename' => basename((string) ($_SERVER['SCRIPT_FILENAME'] ?? '')),
              'route' => $_GET['route'] ?? null,
              'name' => $_GET['name'] ?? null,
          ], JSON_THROW_ON_ERROR);
          '@

            $rewriteHtaccess = @'
          RewriteEngine On
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^(.+)$ index.php?route=$1 [QSA,L]
          '@

            New-Item -ItemType Directory -Force -Path (Join-Path $siteDir 'app') | Out-Null
            New-Item -ItemType Directory -Force -Path (Join-Path $siteDir 'rewrite') | Out-Null

            Set-Content -Path (Join-Path $siteDir 'health.php') -Value $healthScript -Encoding ascii
            Set-Content -Path (Join-Path $siteDir 'echo.php') -Value $echoScript -Encoding ascii
            Set-Content -Path (Join-Path $siteDir 'session.php') -Value $sessionScript -Encoding ascii
            Set-Content -Path (Join-Path $siteDir 'cookie.php') -Value $cookieScript -Encoding ascii
            Set-Content -Path (Join-Path $siteDir 'status.php') -Value $statusScript -Encoding ascii
            Set-Content -Path (Join-Path $siteDir 'head.php') -Value $headScript -Encoding ascii
            Set-Content -Path (Join-Path $siteDir 'https.php') -Value $httpsScript -Encoding ascii
            Set-Content -Path (Join-Path $siteDir 'pathinfo.php') -Value $pathInfoScript -Encoding ascii
            Set-Content -Path (Join-Path $siteDir 'app\index.php') -Value $directoryIndexScript -Encoding ascii
            Set-Content -Path (Join-Path $siteDir 'rewrite\index.php') -Value $rewriteIndexScript -Encoding ascii
            Set-Content -Path (Join-Path $siteDir 'rewrite\.htaccess') -Value $rewriteHtaccess -Encoding ascii
            Set-Content -Path (Join-Path $siteDir 'static.txt') -Value 'apache static ok' -Encoding ascii

            $apacheRootConfigPath = $apacheRoot -replace '\\', '/'
            $siteDirConfigPath = $siteDir -replace '\\', '/'
            $httpdConfig = Get-Content -Path $httpdConf -Raw
            $httpdConfig = $httpdConfig -replace '(?i)c:/Apache24(?:-(?:32|64))?', $apacheRootConfigPath
            $httpdConfig = $httpdConfig -replace '(?m)^[ \t]*Define SRVROOT.*\r?$', "Define SRVROOT `"$apacheRootConfigPath`""
            $httpdConfig = $httpdConfig -replace '(?m)^[ \t]*ServerRoot.*\r?$', "ServerRoot `"$apacheRootConfigPath`""
            $httpdConfig = $httpdConfig -replace '(?m)^Listen 80\r?$', "Listen $port"
            $httpdConfig = $httpdConfig -replace '(?m)^#?ServerName .+\r?$', "ServerName 127.0.0.1:$port"
            $httpdConfig = $httpdConfig -replace '(?m)^[ \t]*DirectoryIndex .+\r?$', '    DirectoryIndex index.php index.html'

            $customConfig = @()

            if ($httpdConfig -notmatch '(?m)^[ \t]*LoadFile "c:/php/php8ts\.dll"$') {
              $customConfig += 'LoadFile "c:/php/php8ts.dll"'
            }

            if ($httpdConfig -notmatch '(?m)^[ \t]*LoadModule php_module "c:/php/php8apache2_4\.dll"$') {
              $customConfig += 'LoadModule php_module "c:/php/php8apache2_4.dll"'
            }

            if ($httpdConfig -notmatch '(?m)^[ \t]*LoadModule\s+rewrite_module\s+') {
              $customConfig += 'LoadModule rewrite_module "modules/mod_rewrite.so"'
            }

            if ($httpdConfig -notmatch '(?m)^[ \t]*LoadModule\s+socache_shmcb_module\s+') {
              $customConfig += 'LoadModule socache_shmcb_module "modules/mod_socache_shmcb.so"'
            }

            if ($httpdConfig -notmatch '(?m)^[ \t]*LoadModule\s+ssl_module\s+') {
