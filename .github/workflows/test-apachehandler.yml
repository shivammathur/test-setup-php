                  Assert-Test -Suite 'php-runtime' -Name 'health reports GET request method' -Condition ($healthPayload.request_method -eq 'GET') -Message "Unexpected request method: $($healthPayload.request_method)"
                  Assert-Test -Suite 'php-runtime' -Name 'Apache SetEnv reaches PHP' -Condition ($healthPayload.apache_test_env -eq 'from-apache') -Message "Unexpected Apache environment value: $($healthPayload.apache_test_env)"
