name: Benchmark PHP 8.5.4 PR 21611 on Windows

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    name: Compare PHP 8.5.4 release vs PR 21611 build
    runs-on: windows-2022
    timeout-minutes: 90
    env:
      PHP_VERSION: 8.5.4
      PHP_PR: 21611
      BENCHMARK_ITERATIONS: 5
      PHP_BUILD_CACHE_BASE_DIR: C:\build-cache
      PHP_BUILD_OBJ_DIR: C:\obj
      PHP_BUILD_CACHE_SDK_DIR: C:\build-cache\sdk
      PHP_BUILD_SDK_BRANCH: php-sdk-2.5.0
      PHP_BUILD_CRT: vs17
      PLATFORM: x64
      THREAD_SAFE: "1"
      INTRINSICS: AVX2
      CLANG_TOOLSET: "1"
    steps:
      - name: Checkout test app
        uses: actions/checkout@v6

      - name: Setup PHP 8.5.4 release
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5.4
          coverage: none
        env:
          phpts: ts

      - name: Snapshot release PHP install
        shell: pwsh
        run: |
          $releasePhp = (Get-Command php).Source
          $releaseDir = Split-Path -Parent $releasePhp
          $dest = 'C:\php-release-8.5.4-ts'

          if (Test-Path $dest) {
            Remove-Item $dest -Recurse -Force
          }

          robocopy $releaseDir $dest /E /NFL /NDL /NJH /NJS /NP | Out-Null
          if ($LASTEXITCODE -gt 7) {
            throw "robocopy failed with exit code $LASTEXITCODE"
          }

          "RELEASE_PHP=$dest\php.exe" >> $env:GITHUB_ENV
          "RELEASE_DIR=$dest" >> $env:GITHUB_ENV

      - name: Install application dependencies
        shell: pwsh
        run: |
          composer install --no-progress --prefer-dist --optimize-autoloader
          composer run-script post-install-cmd --no-interaction

      - name: Clone php-src 8.5.4
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
          git clone --depth 1 --branch "php-$env:PHP_VERSION" https://github.com/php/php-src.git php-src-pr

      - name: Apply PR 21611 patch
        shell: pwsh
        working-directory: php-src-pr
        run: |
          $patch = Join-Path $env:RUNNER_TEMP "php-pr-$env:PHP_PR.diff"
          Invoke-WebRequest "https://patch-diff.githubusercontent.com/raw/php/php-src/pull/$env:PHP_PR.diff" -OutFile $patch
          git apply --check --3way $patch
          git apply --3way $patch

      - name: Build patched PHP with clang
        shell: cmd
        working-directory: php-src-pr
        run: .github\scripts\windows\build.bat

      - name: Prepare benchmark configuration
        shell: pwsh
        run: |
          $customDir = 'C:\obj\Release_TS'
          $customPhp = Join-Path $customDir 'php.exe'

          if (!(Test-Path $customPhp)) {
            throw "Missing custom php.exe at $customPhp"
          }

          "CUSTOM_PHP=$customPhp" >> $env:GITHUB_ENV
          "CUSTOM_DIR=$customDir" >> $env:GITHUB_ENV

          $releaseIni = @"
          date.timezone=UTC
          display_errors=1
          error_reporting=E_ALL
          memory_limit=1G
          extension_dir="$($env:RELEASE_DIR -replace '\\', '/')/ext"
          extension="$($env:RELEASE_DIR -replace '\\', '/')/ext/php_mbstring.dll"
          extension="$($env:RELEASE_DIR -replace '\\', '/')/ext/php_intl.dll"
          zend_extension="$($env:RELEASE_DIR -replace '\\', '/')/ext/php_opcache.dll"
          opcache.enable=1
          opcache.enable_cli=1
          opcache.jit_buffer_size=128M
          "@

          $customIni = @"
          date.timezone=UTC
          display_errors=1
          error_reporting=E_ALL
          memory_limit=1G
          extension_dir="$($customDir -replace '\\', '/')/ext"
          extension="$($customDir -replace '\\', '/')/ext/php_mbstring.dll"
          extension="$($customDir -replace '\\', '/')/ext/php_intl.dll"
          zend_extension="$($customDir -replace '\\', '/')/ext/php_opcache.dll"
          opcache.enable=1
          opcache.enable_cli=1
          opcache.jit_buffer_size=128M
          "@

          $releaseIniPath = Join-Path $env:RUNNER_TEMP 'release-bench.ini'
          $customIniPath = Join-Path $env:RUNNER_TEMP 'custom-bench.ini'

          Set-Content -Path $releaseIniPath -Value $releaseIni
          Set-Content -Path $customIniPath -Value $customIni

          "RELEASE_INI=$releaseIniPath" >> $env:GITHUB_ENV
          "CUSTOM_INI=$customIniPath" >> $env:GITHUB_ENV

      - name: Smoke test both PHP executables
        shell: pwsh
        run: |
          & $env:RELEASE_PHP -n -r "echo PHP_VERSION, ' ', PHP_ZTS ? 'TS' : 'NTS', PHP_EOL;"
          if ($LASTEXITCODE -ne 0) {
            throw "Release PHP smoke test failed"
          }

          $customMeta = & $env:CUSTOM_PHP -n -r "echo PHP_VERSION, ' ', PHP_ZTS ? 'TS' : 'NTS', ' ', ZEND_VM_KIND;"
          if ($LASTEXITCODE -ne 0) {
            throw "Custom PHP smoke test failed"
          }

          if ($customMeta -notmatch 'ZEND_VM_KIND_TAILCALL') {
            throw "Expected ZEND_VM_KIND_TAILCALL, got: $customMeta"
          }

          Write-Host $customMeta

      - name: Run benchmarks
        shell: pwsh
        run: |
          $env:PHP_INI_SCAN_DIR = ''
          $iterations = [int]$env:BENCHMARK_ITERATIONS
          $resultsDir = Join-Path $env:RUNNER_TEMP 'benchmark-results'
          New-Item -ItemType Directory -Path $resultsDir -Force | Out-Null

          $benchmarks = @(
            @{
              Name = 'vm-jit-off'
              Args = @('-d', 'opcache.jit=off', '.github/benchmarks/vm.php', '50000')
            },
            @{
              Name = 'vm-jit-tracing'
              Args = @('-d', 'opcache.jit=tracing', '.github/benchmarks/vm.php', '50000')
            },
            @{
              Name = 'cake-bootstrap-jit-off'
              Args = @('-d', 'opcache.jit=off', '.github/benchmarks/cake_bootstrap.php', '150')
            },
            @{
              Name = 'cake-bootstrap-jit-tracing'
              Args = @('-d', 'opcache.jit=tracing', '.github/benchmarks/cake_bootstrap.php', '150')
            }
          )

          function Invoke-BenchmarkSuite {
            param(
              [string]$Label,
              [string]$PhpExe,
              [string]$IniFile,
              [string]$OutputFile
            )

            $suite = @()

            foreach ($benchmark in $benchmarks) {
              $times = @()

              for ($run = 1; $run -le $iterations; $run++) {
                $args = @('-c', $IniFile) + $benchmark.Args
                $watch = [System.Diagnostics.Stopwatch]::StartNew()
                & $PhpExe @args *> $null
                $exitCode = $LASTEXITCODE
                $watch.Stop()

                if ($exitCode -ne 0) {
                  throw "$Label failed benchmark '$($benchmark.Name)' on run $run"
                }

                $times += [Math]::Round($watch.Elapsed.TotalMilliseconds, 2)
              }

              $stats = $times | Measure-Object -Average -Minimum -Maximum
              $suite += [pscustomobject]@{
                php = $Label
                benchmark = $benchmark.Name
                runs_ms = $times
                avg_ms = [Math]::Round($stats.Average, 2)
                min_ms = [Math]::Round($stats.Minimum, 2)
                max_ms = [Math]::Round($stats.Maximum, 2)
              }
            }

            $suite | ConvertTo-Json -Depth 4 | Set-Content -Path $OutputFile
            return $suite
          }

          $releaseResults = Invoke-BenchmarkSuite -Label 'release-msvc-pgo' -PhpExe $env:RELEASE_PHP -IniFile $env:RELEASE_INI -OutputFile (Join-Path $resultsDir 'release-msvc-pgo.json')
          $customResults = Invoke-BenchmarkSuite -Label 'pr-21611-clang' -PhpExe $env:CUSTOM_PHP -IniFile $env:CUSTOM_INI -OutputFile (Join-Path $resultsDir 'pr-21611-clang.json')

          $releaseMeta = & $env:RELEASE_PHP -n -r "echo PHP_VERSION, '|', PHP_ZTS ? 'TS' : 'NTS';"
          $customMeta = & $env:CUSTOM_PHP -n -r "echo PHP_VERSION, '|', PHP_ZTS ? 'TS' : 'NTS', '|', ZEND_VM_KIND;"

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "# PHP 8.5.4 Windows benchmark"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Release: \`$releaseMeta\`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Custom: \`$customMeta\`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Iterations per benchmark: \`$iterations\`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Benchmark | Release avg (ms) | PR avg (ms) | Delta | Speedup |"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| --- | ---: | ---: | ---: | ---: |"

          foreach ($releaseResult in $releaseResults) {
            $customResult = $customResults | Where-Object benchmark -EQ $releaseResult.benchmark

            if ($null -eq $customResult) {
              throw "Missing custom result for $($releaseResult.benchmark)"
            }

            $delta = [Math]::Round((($releaseResult.avg_ms - $customResult.avg_ms) / $releaseResult.avg_ms) * 100, 2)
            $speedup = [Math]::Round($releaseResult.avg_ms / $customResult.avg_ms, 2)
            $deltaLabel = if ($delta -ge 0) { "+$delta%" } else { "$delta%" }

            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| $($releaseResult.benchmark) | $($releaseResult.avg_ms) | $($customResult.avg_ms) | $deltaLabel | ${speedup}x |"
          }

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: php-8.5.4-pr-21611-benchmarks
          path: ${{ runner.temp }}/benchmark-results
