name: Reproduce php-src issue 21697 comment on Windows

on:
  push:
    branches:
      - test-php-src-comment-21967
    paths:
      - .github/scripts/windows/test-issue-21697-comment.ps1
      - .github/workflows/windows-issue-21697-comment.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reproduce:
    name: PHP ${{ matrix.php-version }} / ${{ matrix.runtime-flavor }} / ${{ matrix.config-mode }} / ${{ matrix.opcache-profile }} / ${{ matrix.pecl-profile }}
    runs-on: windows-2022
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: '8.4.20'
            runtime-flavor: nts
            config-mode: updated
            opcache-profile: tracing-default
            web-mode: full
            pecl-profile: latest
            redis-extension: redis
            igbinary-extension: igbinary
          - php-version: '8.4.20'
            runtime-flavor: nts
            config-mode: updated
            opcache-profile: tracing-cli-hot
            web-mode: full
            pecl-profile: latest
            redis-extension: redis
            igbinary-extension: igbinary
          - php-version: '8.4.20'
            runtime-flavor: nts
            config-mode: updated
            opcache-profile: 1254-hot
            web-mode: full
            pecl-profile: latest
            redis-extension: redis
            igbinary-extension: igbinary
          - php-version: '8.4.20'
            runtime-flavor: nts
            config-mode: updated
            opcache-profile: 1254-hot-late-load
            web-mode: full
            pecl-profile: latest
            redis-extension: redis
            igbinary-extension: igbinary
          - php-version: '8.4.20'
            runtime-flavor: nts
            config-mode: updated
            opcache-profile: 1205-hot
            web-mode: full
            pecl-profile: latest
            redis-extension: redis
            igbinary-extension: igbinary
          - php-version: '8.4.20'
            runtime-flavor: nts
            config-mode: updated
            opcache-profile: 1254-hot
            web-mode: full
            pecl-profile: comment-pinned
            redis-extension: redis-6.2.0
            igbinary-extension: igbinary-3.2.16
          - php-version: '8.4.20'
            runtime-flavor: nts
            config-mode: legacy
            opcache-profile: 1254-hot
            web-mode: full
            pecl-profile: latest
            redis-extension: redis
            igbinary-extension: igbinary
          - php-version: '8.4.20'
            runtime-flavor: ts
            config-mode: updated
            opcache-profile: 1254-hot
            web-mode: builtin-only
            pecl-profile: latest
            redis-extension: redis
            igbinary-extension: igbinary
          - php-version: '8.5.5'
            runtime-flavor: nts
            config-mode: updated
            opcache-profile: tracing-default
            web-mode: full
            pecl-profile: latest
            redis-extension: redis
            igbinary-extension: igbinary
          - php-version: '8.5.5'
            runtime-flavor: nts
            config-mode: updated
            opcache-profile: tracing-cli-hot
            web-mode: full
            pecl-profile: latest
            redis-extension: redis
            igbinary-extension: igbinary
          - php-version: '8.5.5'
            runtime-flavor: nts
            config-mode: updated
            opcache-profile: 1254-hot
            web-mode: full
            pecl-profile: latest
            redis-extension: redis
            igbinary-extension: igbinary
          - php-version: '8.5.5'
            runtime-flavor: nts
            config-mode: updated
            opcache-profile: 1205-hot
            web-mode: full
            pecl-profile: latest
            redis-extension: redis
            igbinary-extension: igbinary
          - php-version: '8.5.5'
            runtime-flavor: nts
            config-mode: legacy
            opcache-profile: 1254-hot
            web-mode: full
            pecl-profile: latest
            redis-extension: redis
            igbinary-extension: igbinary
          - php-version: '8.5.5'
            runtime-flavor: ts
            config-mode: updated
            opcache-profile: 1254-hot
            web-mode: builtin-only
            pecl-profile: latest
            redis-extension: redis
            igbinary-extension: igbinary

    steps:
      - name: Checkout test app
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          ini-file: none
          extensions: none, openssl, curl, intl, mbstring, exif, fileinfo, gd, gettext, pgsql, pdo_pgsql, soap, ${{ matrix.redis-extension }}, ${{ matrix.igbinary-extension }}
          coverage: none
        env:
          phpts: ${{ matrix.runtime-flavor }}

      - name: Replace fallback runtime with the requested official Windows build
        shell: pwsh
        env:
          REQUESTED_PHP_VERSION: ${{ matrix.php-version }}
          REQUESTED_RUNTIME_FLAVOR: ${{ matrix.runtime-flavor }}
        run: |
          $requestedVersion = $env:REQUESTED_PHP_VERSION
          $runtimeFlavor = $env:REQUESTED_RUNTIME_FLAVOR
          $actualVersion = & php -n -r "echo PHP_VERSION;"
          $actualFlavor = & php -n -r "echo PHP_ZTS ? 'ts' : 'nts';"
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to read the installed PHP runtime details'
          }

          if ($actualVersion -eq $requestedVersion -and $actualFlavor -eq $runtimeFlavor) {
            Write-Host "setup-php already installed PHP $requestedVersion ($runtimeFlavor)"
            exit 0
          }

          $phpDir = Split-Path -Parent (Get-Command php).Source
          $extDir = Join-Path $phpDir 'ext'
          $backupDir = Join-Path $env:RUNNER_TEMP "php-pecl-backup-$requestedVersion"
          $extractDir = Join-Path $env:RUNNER_TEMP "php-$requestedVersion-extract"
          $runtimeSegment = if ($runtimeFlavor -eq 'ts') { '' } else { '-nts' }
          $zipName = "php-$requestedVersion${runtimeSegment}-Win32-vs17-x64.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP $zipName
          $zipUrl = "https://downloads.php.net/~windows/releases/archives/$zipName"
          $peclExtensions = @('php_redis.dll', 'php_igbinary.dll')

          New-Item -ItemType Directory -Path $backupDir -Force | Out-Null
          foreach ($extension in $peclExtensions) {
            $source = Join-Path $extDir $extension
            if (Test-Path $source) {
              Copy-Item -Path $source -Destination (Join-Path $backupDir $extension) -Force
            }
          }

          if (Test-Path $extractDir) {
            Remove-Item -Path $extractDir -Recurse -Force
          }

          Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath
          Expand-Archive -LiteralPath $zipPath -DestinationPath $extractDir -Force
          Copy-Item -Path (Join-Path $extractDir '*') -Destination $phpDir -Recurse -Force

          foreach ($extension in $peclExtensions) {
            $source = Join-Path $backupDir $extension
            if (Test-Path $source) {
              Copy-Item -Path $source -Destination (Join-Path $extDir $extension) -Force
            }
          }

          $resolvedVersion = & php -n -r "echo PHP_VERSION;"
          $resolvedFlavor = & php -n -r "echo PHP_ZTS ? 'ts' : 'nts';"
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to read the PHP runtime details after replacing the runtime'
          }

          if ($resolvedVersion -ne $requestedVersion -or $resolvedFlavor -ne $runtimeFlavor) {
            throw "Expected PHP $requestedVersion ($runtimeFlavor) after the runtime replacement, got $resolvedVersion ($resolvedFlavor)"
          }

      - name: Show resolved PHP runtime
        shell: pwsh
        run: |
          $php = (Get-Command php).Source
          $phpCgi = (Get-Command php-cgi).Source

          Write-Host "php: $php"
          Write-Host "php-cgi: $phpCgi"
          Write-Host ("thread-safety: {0}" -f (& $php -n -r "echo PHP_ZTS ? 'ts' : 'nts';"))

          & $php -v
          if ($LASTEXITCODE -ne 0) {
            throw 'php.exe failed to start'
          }

          & $phpCgi -v
          if ($LASTEXITCODE -ne 0) {
            throw 'php-cgi.exe failed to start'
          }

      - name: Reproduce comment config and run smoke checks
        shell: pwsh
        env:
          CONFIG_MODE: ${{ matrix.config-mode }}
          OPCACHE_PROFILE: ${{ matrix.opcache-profile }}
          PHP_VERSION_UNDER_TEST: ${{ matrix.php-version }}
          WEB_MODE: ${{ matrix.web-mode }}
        run: |
          .\.github\scripts\windows\test-issue-21697-comment.ps1 `
            -ConfigMode $env:CONFIG_MODE `
            -OpcacheProfile $env:OPCACHE_PROFILE `
            -WebMode $env:WEB_MODE `
            -PhpVersionUnderTest $env:PHP_VERSION_UNDER_TEST

      - name: Upload reproduction artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-21697-comment-${{ matrix.php-version }}-${{ matrix.runtime-flavor }}-${{ matrix.config-mode }}-${{ matrix.opcache-profile }}-${{ matrix.pecl-profile }}
          path: ${{ runner.temp }}/issue-21697-comment
          if-no-files-found: warn
