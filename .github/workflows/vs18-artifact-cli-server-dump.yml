name: VS18 Source Test CLI Server Dump

on:
  push:
    branches:
      - feature/vs18-cli-server-dump-repro
  workflow_dispatch:
    inputs:
      run_id:
        description: php-windows-builder run id containing the build artifacts
        required: true
        default: '26068816066'
      build_artifact_name:
        description: Artifact name containing the PHP build zips
        required: true
        default: artifacts
      baseline_results_artifact_name:
        description: Artifact name containing the original failing test logs
        required: true
        default: test-results-x86-ts-opcache-php
      builder_branch:
        description: php-windows-builder branch containing the VS18 harness
        required: true
        default: vs18-test
      builder_ref:
        description: php-windows-builder ref to use
        required: true
        default: 15d92c3
      php_src_repository:
        description: php-src repository to source tests from
        required: true
        default: shivammathur/php-src
      php_src_ref:
        description: php-src ref to source tests from
        required: true
        default: add-vs18-support-master
      libs_build_runs:
        description: Comma-separated list of winlibs/winlib-builder run IDs
        required: false
        default: ''
      arch:
        description: Target architecture
        required: true
        default: x86
      ts:
        description: Thread safety flavor
        required: true
        default: ts
      opcache:
        description: Opcache mode
        required: true
        default: opcache
      test_type:
        description: Test suite type
        required: true
        default: php
      debug_filter:
        description: CLI-server tests to arm with the listener
        required: true
        default: bug67198
      fail_if_no_dump:
        description: Mark the workflow failed if no dump was captured
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  actions: read

jobs:
  repro:
    runs-on: windows-2025-vs2026
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RUN_ID: ${{ github.event.inputs.run_id || '26068816066' }}
      BUILD_ARTIFACT_NAME: ${{ github.event.inputs.build_artifact_name || 'artifacts' }}
      BASELINE_RESULTS_ARTIFACT_NAME: ${{ github.event.inputs.baseline_results_artifact_name || 'test-results-x86-ts-opcache-php' }}
      BUILDER_BRANCH: ${{ github.event.inputs.builder_branch || 'vs18-test' }}
      BUILDER_REF: ${{ github.event.inputs.builder_ref || '15d92c3' }}
      PHP_SRC_REPOSITORY: ${{ github.event.inputs.php_src_repository || 'shivammathur/php-src' }}
      PHP_SRC_REF: ${{ github.event.inputs.php_src_ref || 'add-vs18-support-master' }}
      LIBS_BUILD_RUNS: ${{ github.event.inputs.libs_build_runs || '' }}
      PHP_ARCH: ${{ github.event.inputs.arch || 'x86' }}
      PHP_TS: ${{ github.event.inputs.ts || 'ts' }}
      PHP_OPCACHE: ${{ github.event.inputs.opcache || 'opcache' }}
      PHP_TEST_TYPE: ${{ github.event.inputs.test_type || 'php' }}
      DEBUG_FILTER: ${{ github.event.inputs.debug_filter || 'bug67198' }}
      FAIL_IF_NO_DUMP: ${{ github.event.inputs.fail_if_no_dump || 'true' }}
    steps:
      - name: Configure PHP source line endings
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout repro repo
        uses: actions/checkout@v6

      - name: Checkout php-windows-builder
        uses: actions/checkout@v6
        with:
          repository: shivammathur/php-windows-builder
          ref: ${{ env.BUILDER_BRANCH }}
          path: builder
          fetch-depth: 0

      - name: Pin php-windows-builder commit
        shell: pwsh
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:BUILDER_REF)) {
            git -C builder checkout $env:BUILDER_REF
          }

      - name: Download build artifacts
        shell: pwsh
        run: |
          gh run download $env:RUN_ID -R shivammathur/php-windows-builder -n $env:BUILD_ARTIFACT_NAME -D .
          Get-ChildItem -Path $PWD -Filter 'php-*.zip' -File | Select-Object Name, Length | Format-Table -AutoSize

      - name: Download baseline results
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -Path baseline-results -ItemType Directory -Force | Out-Null
          gh run download $env:RUN_ID -R shivammathur/php-windows-builder -n $env:BASELINE_RESULTS_ARTIFACT_NAME -D baseline-results

      - name: Get Cache Key
        id: cache-key
        shell: pwsh
        run: |
          $artifactDirectory = $(pwd).Path
          $zip = Get-ChildItem -Path $artifactDirectory -Filter 'php-*.zip' -File |
            Where-Object { $_.Name -match "^php-(.+?)-(?:nts-)?Win32-v[sc]\d+-$env:PHP_ARCH\.zip$" } |
            Select-Object -First 1
          if ($null -eq $zip) {
            throw "Unable to determine PHP version from build artifacts in $artifactDirectory"
          }
          $phpVersion = [regex]::Match($zip.Name, '^php-(.+?)-(?:nts-)?Win32-v[sc]\d+-').Groups[1].Value

          Import-Module (Join-Path $(pwd).Path '\builder\php\BuildPhp') -Force
          $cacheInfo = Get-DepsCacheInfo -PhpVersion $phpVersion -Arch $env:PHP_ARCH -LibsBuildRuns $env:LIBS_BUILD_RUNS -IncludeDefaultRunsKey
          Set-Content -Path packages.txt -Value ($cacheInfo.Packages -join "`n")
          Add-Content -Value "php-version=$phpVersion" -Path $env:GITHUB_OUTPUT
          Add-Content -Value "cache-key=$($cacheInfo.CacheKey)" -Path $env:GITHUB_OUTPUT
          Add-Content -Value "cache-dir=$($cacheInfo.CacheDir)" -Path $env:GITHUB_OUTPUT

      - name: Cache Deps
        id: cache-deps
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: ${{ steps.cache-key.outputs.cache-dir }}
          key: ${{ steps.cache-key.outputs.cache-key }}-${{ hashFiles('packages.txt') }}

      - name: Enable PHP crash dumps
        shell: pwsh
        continue-on-error: true
        run: |
          $dumpDir = Join-Path $(pwd).Path "crash-dumps-$env:PHP_ARCH-$env:PHP_TS-$env:PHP_OPCACHE-$env:PHP_TEST_TYPE"
          New-Item -Path $dumpDir -ItemType Directory -Force | Out-Null
          foreach ($imageName in @('php.exe', 'php-cli-server.exe')) {
            $key = "HKCU:\Software\Microsoft\Windows\Windows Error Reporting\LocalDumps\$imageName"
            New-Item -Path $key -Force | Out-Null
            New-ItemProperty -Path $key -Name DumpFolder -Value $dumpDir -PropertyType ExpandString -Force | Out-Null
            New-ItemProperty -Path $key -Name DumpCount -Value 8 -PropertyType DWord -Force | Out-Null
            New-ItemProperty -Path $key -Name DumpType -Value 2 -PropertyType DWord -Force | Out-Null
          }
          Write-Host "PHP crash dumps: $dumpDir"
          try {
            $toolDir = Join-Path $env:RUNNER_TEMP 'procdump'
            New-Item -Path $toolDir -ItemType Directory -Force | Out-Null
            $zip = Join-Path $toolDir 'procdump.zip'
            Invoke-WebRequest -Uri 'https://download.sysinternals.com/files/Procdump.zip' -OutFile $zip
            Expand-Archive -Path $zip -DestinationPath $toolDir -Force
            $procdump = @(
              (Join-Path $toolDir 'procdump64.exe'),
              (Join-Path $toolDir 'procdump.exe')
            ) | Where-Object { Test-Path -Path $_ } | Select-Object -First 1
            if ($null -ne $procdump) {
              & $procdump -accepteula -mp -i $dumpDir | Out-Host
            }
          } catch {
            Write-Warning "Unable to enable ProcDump postmortem dumps: $_"
          }

      - name: Install CLI server listener
        shell: pwsh
        run: |
          .\scripts\install-vs18-cli-server-listener.ps1 `
            -BuilderRepoPath (Join-Path $PWD 'builder') `
            -DebugFilter $env:DEBUG_FILTER

      - name: Test PHP
        shell: pwsh
        continue-on-error: true
        env:
          DEPS_DIR: ${{ steps.cache-key.outputs.cache-dir }}
          DEPS_CACHE_HIT: ${{ steps.cache-deps.outputs.cache-hit }}
          LIBS_BUILD_RUNS: ${{ env.LIBS_BUILD_RUNS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_PHP_CLI_SERVER_DEBUG_FILTER: ${{ env.DEBUG_FILTER }}
        run: |
          Import-Module (Join-Path $(pwd).Path '\builder\php\BuildPhp') -Force
          Invoke-PhpTests -PhpVersion ${{ steps.cache-key.outputs.php-version }} `
                          -Arch $env:PHP_ARCH `
                          -Ts $env:PHP_TS `
                          -Opcache $env:PHP_OPCACHE `
                          -TestType $env:PHP_TEST_TYPE `
                          -SourceRepository $env:PHP_SRC_REPOSITORY `
                          -SourceRef $env:PHP_SRC_REF

      - name: Inspect PHP crash dumps
        if: always()
        shell: pwsh
        continue-on-error: true
        run: |
          $dumpDir = Join-Path $(pwd).Path "crash-dumps-$env:PHP_ARCH-$env:PHP_TS-$env:PHP_OPCACHE-$env:PHP_TEST_TYPE"
          $testLog = Join-Path $(pwd).Path "test-$env:PHP_ARCH-$env:PHP_TS-$env:PHP_OPCACHE-$env:PHP_TEST_TYPE.log"
          $procdump = @(
            (Join-Path $env:RUNNER_TEMP 'procdump\procdump64.exe'),
            (Join-Path $env:RUNNER_TEMP 'procdump\procdump.exe')
          ) | Where-Object { Test-Path -Path $_ } | Select-Object -First 1
          if ($null -ne $procdump) {
            & $procdump -accepteula -u | Out-Host
          }
          $dumps = @(Get-ChildItem -Path $dumpDir -Filter '*.dmp' -File -Recurse -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 8)
          if ($dumps.Count -eq 0) {
            Write-Host 'No PHP crash dumps found.'
            exit 0
          }

          $debuggerArch = if ($env:PHP_ARCH -eq 'x86') { 'x86' } else { 'x64' }
          $debugger = @(
            (Get-Command cdb.exe -ErrorAction SilentlyContinue).Source,
            "$(${env:ProgramFiles(x86)})\Windows Kits\10\Debuggers\$debuggerArch\cdb.exe",
            "$env:ProgramFiles\Windows Kits\10\Debuggers\$debuggerArch\cdb.exe",
            "$(${env:ProgramFiles(x86)})\Windows Kits\10\Debuggers\x64\cdb.exe",
            "$env:ProgramFiles\Windows Kits\10\Debuggers\x64\cdb.exe"
          ) | Where-Object { $_ -and (Test-Path -Path $_) } | Select-Object -First 1

          $symbolDir = Join-Path $dumpDir 'symbols'
          $symbolPaths = New-Object System.Collections.Generic.List[string]
          $debugPack = Get-ChildItem -Path $(pwd).Path -Filter 'php-debug-pack-*.zip' -File |
            Where-Object {
              $_.Name -match "-$env:PHP_ARCH\.zip$" -and
              (($env:PHP_TS -eq 'nts') -eq ($_.Name -match '-nts-Win32-'))
            } |
            Select-Object -First 1
          if ($null -ne $debugPack) {
            Expand-Archive -Path $debugPack.FullName -DestinationPath $symbolDir -Force
            Get-ChildItem -Path $symbolDir -Filter '*.pdb' -File -Recurse |
              Select-Object -ExpandProperty DirectoryName -Unique |
              ForEach-Object { $symbolPaths.Add($_) }
          }
          $symbolPaths.Add("srv*$(Join-Path $dumpDir 'symcache')*https://msdl.microsoft.com/download/symbols")

          $summary = @('', '===== PHP crash dumps =====')
          foreach ($dump in $dumps) {
            $summary += "Dump: $($dump.FullName) ($([Math]::Round($dump.Length / 1MB, 2)) MB)"
            if ($null -eq $debugger) {
              $summary += 'cdb.exe was not found; dump uploaded for offline analysis.'
              continue
            }

            $stackFile = Join-Path $dumpDir ($dump.BaseName + '.stack.txt')
            $debugOutput = & $debugger -z $dump.FullName -y ($symbolPaths -join ';') -c '!analyze -v; .ecxr; kpn; q' 2>&1 | Out-String -Width 300
            Set-Content -Path $stackFile -Value $debugOutput
            $summary += "Stack: $stackFile"
            $summary += $debugOutput
          }

          $summaryText = $summary -join "`n"
          Write-Host $summaryText
          Add-Content -Path $testLog -Value $summaryText

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: test-results-${{ env.PHP_ARCH }}-${{ env.PHP_TS }}-${{ env.PHP_OPCACHE }}-${{ env.PHP_TEST_TYPE }}
          path: |
            test-${{ env.PHP_ARCH }}-${{ env.PHP_TS }}-${{ env.PHP_OPCACHE }}-${{ env.PHP_TEST_TYPE }}.xml
            test-${{ env.PHP_ARCH }}-${{ env.PHP_TS }}-${{ env.PHP_OPCACHE }}-${{ env.PHP_TEST_TYPE }}.log
            crash-dumps-${{ env.PHP_ARCH }}-${{ env.PHP_TS }}-${{ env.PHP_OPCACHE }}-${{ env.PHP_TEST_TYPE }}/**
            baseline-results/**

      - name: Fail if no dump was captured
        if: always() && env.FAIL_IF_NO_DUMP == 'true'
        shell: pwsh
        run: |
          $dumpDir = Join-Path $(pwd).Path "crash-dumps-$env:PHP_ARCH-$env:PHP_TS-$env:PHP_OPCACHE-$env:PHP_TEST_TYPE"
          $dumps = @(Get-ChildItem -Path $dumpDir -Filter '*.dmp' -File -Recurse -ErrorAction SilentlyContinue)
          if ($dumps.Count -eq 0) {
            throw 'No crash dump was captured.'
          }
