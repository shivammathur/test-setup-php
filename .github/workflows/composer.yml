name: Attempt to restore removed IE feature

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  feature-restore:
    name: IE feature restore / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025-vs2026]

    steps:
      - name: Checkout diagnostic branch
        uses: actions/checkout@v6

      - name: Inventory and attempt supported IE installation paths
        shell: pwsh
        run: ./scripts/attempt-ie-feature-restore.ps1 -OutputDirectory results

      - name: Upload feature restore diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ie-feature-restore-${{ matrix.os }}
          path: results
          if-no-files-found: error
