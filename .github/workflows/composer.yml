name: Stress COM automation with exact failing artifacts

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare-exact-artifacts:
    name: Prepare exact php-windows-builder artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Download and select x86 artifacts from failing run
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          mkdir exact
          gh api repos/shivammathur/php-windows-builder/actions/artifacts/8244423670/zip > original.zip
          unzip -j original.zip \
            'php-8.6.0-dev-nts-Win32-vs18-x86.zip' \
            'php-8.6.0-dev-Win32-vs18-x86.zip' \
            'php-test-pack-8.6.0-dev.zip' \
            -d exact
          sha256sum exact/*

      - name: Upload selected artifacts
        uses: actions/upload-artifact@v7
        with:
          name: exact-x86-php
          path: exact
          if-no-files-found: error

  stress:
    name: stress / ${{ matrix.os }} / ${{ matrix.thread-safety }}
    needs: prepare-exact-artifacts
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025-vs2026]
        thread-safety: [nts, ts]

    steps:
      - name: Checkout diagnostic branch
        uses: actions/checkout@v6

      - name: Download exact x86 artifacts
        uses: actions/download-artifact@v8
        with:
          name: exact-x86-php
          path: exact

      - name: Extract PHP and tests
        id: php
        shell: pwsh
        run: |
          $threadPart = if ('${{ matrix.thread-safety }}' -eq 'nts') { '-nts' } else { '' }
          Expand-Archive -Path "exact/php-8.6.0-dev${threadPart}-Win32-vs18-x86.zip" -DestinationPath php
          Expand-Archive -Path exact/php-test-pack-8.6.0-dev.zip -DestinationPath php-tests
          $phpDir = (Resolve-Path php).Path
          $testDir = (Resolve-Path php-tests).Path
          @(
            '[PHP]'
            "extension_dir=$phpDir\ext"
            'extension=php_com_dotnet.dll'
            'display_errors=1'
            'error_reporting=-1'
          ) | Set-Content -Path "$phpDir\php.ini" -Encoding ASCII
          "php-dir=$phpDir" | Add-Content -Path $env:GITHUB_OUTPUT
          "test-dir=$testDir" | Add-Content -Path $env:GITHUB_OUTPUT
          & "$phpDir\php.exe" --version

      - name: Capture system diagnostics
        shell: pwsh
        run: ./scripts/diagnose-system.ps1 -OutputDirectory results

      - name: Run serial, parallel, COM-suite, and loaded stress scenarios
        shell: pwsh
        run: |
          ./scripts/run-com-stress.ps1 `
            -PhpDirectory '${{ steps.php.outputs.php-dir }}' `
            -TestPackDirectory '${{ steps.php.outputs.test-dir }}' `
            -OutputDirectory results

      - name: Upload stress results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stress-${{ matrix.os }}-${{ matrix.thread-safety }}
          path: results
          if-no-files-found: error

  full-harness:
    name: full harness / windows-2025-vs2026 / ${{ matrix.thread-safety }}
    needs: prepare-exact-artifacts
    runs-on: windows-2025-vs2026
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        thread-safety: [nts, ts]

    steps:
      - name: Checkout diagnostic branch
        uses: actions/checkout@v6

      - name: Checkout exact php-windows-builder revision
        uses: actions/checkout@v6
        with:
          repository: shivammathur/php-windows-builder
          ref: 7bebc7aff39268142ba333afdd82205341d12246
          path: builder

      - name: Download exact x86 artifacts
        uses: actions/download-artifact@v8
        with:
          name: exact-x86-php
          path: exact

      - name: Run php-windows-builder extension harness
        continue-on-error: true
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          LIBS_BUILD_RUNS: 29138064666,29136397714,29135514456,29136462937
        run: |
          Copy-Item exact/* .
          Import-Module (Join-Path $(pwd).Path 'builder\php\BuildPhp') -Force
          Invoke-PhpTests -PhpVersion 8.6.0-dev `
                          -Arch x86 `
                          -Ts '${{ matrix.thread-safety }}' `
                          -Opcache nocache `
                          -TestType ext `
                          -SourceRepository php/php-src `
                          -SourceRef master

      - name: Upload full harness results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: full-harness-${{ matrix.thread-safety }}
          path: |
            test-x86-${{ matrix.thread-safety }}-nocache-ext.xml
            test-x86-${{ matrix.thread-safety }}-nocache-ext.log
          if-no-files-found: warn
