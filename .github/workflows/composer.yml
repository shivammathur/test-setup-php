name: Probe Windows runner COM capacity

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare-exact-artifacts:
    name: Prepare exact php-windows-builder artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Download exact x86 NTS artifact from failing run
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          mkdir exact
          gh api repos/shivammathur/php-windows-builder/actions/artifacts/8244423670/zip > original.zip
          unzip -j original.zip \
            'php-8.6.0-dev-nts-Win32-vs18-x86.zip' \
            -d exact
          sha256sum exact/*

      - name: Upload selected artifact
        uses: actions/upload-artifact@v7
        with:
          name: exact-x86-php
          path: exact
          if-no-files-found: error

  probe-runner:
    name: probe / ${{ matrix.os }} / replica-${{ matrix.replica }}
    needs: prepare-exact-artifacts
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        os: [windows-2022, windows-2025, windows-2025-vs2026]
        replica: [1, 2]

    steps:
      - name: Checkout diagnostic branch
        uses: actions/checkout@v6

      - name: Download exact x86 PHP artifact
        uses: actions/download-artifact@v8
        with:
          name: exact-x86-php
          path: exact

      - name: Extract PHP
        id: php
        shell: pwsh
        run: |
          Expand-Archive -Path exact/php-8.6.0-dev-nts-Win32-vs18-x86.zip -DestinationPath php
          $phpDir = (Resolve-Path php).Path
          @(
            '[PHP]'
            "extension_dir=$phpDir\ext"
            'extension=php_com_dotnet.dll'
            'display_errors=0'
            'log_errors=0'
            'error_reporting=-1'
          ) | Set-Content -Path "$phpDir\php.ini" -Encoding ASCII
          "php-dir=$phpDir" | Add-Content -Path $env:GITHUB_OUTPUT
          & "$phpDir\php.exe" -c "$phpDir\php.ini" --version
          & "$phpDir\php.exe" -c "$phpDir\php.ini" -m | Select-String com_dotnet

      - name: Probe hardware, load thresholds, HRESULTs, and timing
        shell: pwsh
        run: |
          ./scripts/probe-runner-capacity.ps1 `
            -PhpDirectory '${{ steps.php.outputs.php-dir }}' `
            -OutputDirectory results `
            -Replica ${{ matrix.replica }}

      - name: Upload probe results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: runner-probe-${{ matrix.os }}-${{ matrix.replica }}
          path: results
          if-no-files-found: error
