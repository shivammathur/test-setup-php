name: Validate local COM replacement server

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare-exact-artifacts:
    name: Prepare exact php-windows-builder artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Download exact x86 artifacts from failing run
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          mkdir exact
          gh api repos/shivammathur/php-windows-builder/actions/artifacts/8244423670/zip > original.zip
          unzip -j original.zip \
            'php-8.6.0-dev-nts-Win32-vs18-x86.zip' \
            'php-test-pack-8.6.0-dev.zip' \
            -d exact
          sha256sum exact/*

      - name: Upload selected artifacts
        uses: actions/upload-artifact@v7
        with:
          name: exact-x86-php-tests
          path: exact
          if-no-files-found: error

  replacement-stress:
    name: local server / ${{ matrix.os }} / replica-${{ matrix.replica }}
    needs: prepare-exact-artifacts
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        os: [windows-2022, windows-2025-vs2026]
        replica: [1, 2]

    steps:
      - name: Checkout diagnostic branch
        uses: actions/checkout@v6

      - name: Download exact artifacts
        uses: actions/download-artifact@v8
        with:
          name: exact-x86-php-tests
          path: exact

      - name: Extract exact PHP and unmodified test pack
        id: php
        shell: pwsh
        run: |
          Expand-Archive exact/php-8.6.0-dev-nts-Win32-vs18-x86.zip -DestinationPath php
          Expand-Archive exact/php-test-pack-8.6.0-dev.zip -DestinationPath php-tests
          $phpDir = (Resolve-Path php).Path
          $testDir = (Resolve-Path php-tests).Path
          @(
            '[PHP]'
            "extension_dir=$phpDir\ext"
            'extension=php_com_dotnet.dll'
            'display_errors=1'
            'error_reporting=-1'
          ) | Set-Content -Path "$phpDir\php.ini" -Encoding ASCII
          "php-dir=$phpDir" | Add-Content -Path $env:GITHUB_OUTPUT
          "test-dir=$testDir" | Add-Content -Path $env:GITHUB_OUTPUT

      - name: Build 32-bit local COM test server
        shell: pwsh
        run: ./scripts/build-com-local-server.ps1 -OutputDirectory com-local-server

      - name: Validate unmodified PHPT under saturated six-worker load
        shell: pwsh
        run: |
          ./scripts/validate-com-local-server.ps1 `
            -PhpDirectory '${{ steps.php.outputs.php-dir }}' `
            -TestPackDirectory '${{ steps.php.outputs.test-dir }}' `
            -ServerDirectory com-local-server `
            -OutputDirectory results `
            -Iterations 20

      - name: Upload local server diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: local-com-server-${{ matrix.os }}-${{ matrix.replica }}
          path: |
            com-local-server/comlocal.exe
            com-local-server/comlocal.tlb
            results
          if-no-files-found: error
