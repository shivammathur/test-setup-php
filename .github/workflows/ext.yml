name: Test ext workflow
on: [push]
env:
  key: cache-v4-2.37.0
  extensions: ast, blackfire, gd, msgpack, redis, xml, imagick, geos
jobs:
  run:
    runs-on: ${{ matrix.operating-systems }}
    strategy:
      fail-fast: false
      matrix:
        php-versions: ['5.6', '7.0', '7.1', '7.2', '7.3', '7.4', '8.0', '8.1', '8.2', '8.3', '8.4']
        operating-systems: [ubuntu-24.04, windows-latest, macos-latest, macos-15-intel]
        # Blackfire is not supported on these versions for arm64
        exclude:
          - operating-systems: macos-latest
            php-versions: '5.6'
          - operating-systems: macos-latest
            php-versions: '7.0'
          - operating-systems: macos-latest
            php-versions: '7.1'
    name: Test PHP ${{ matrix.php-versions }} on ${{ matrix.operating-systems }}
    steps:
      - name: Resolve extensions
        id: resolve
        shell: bash
        run: |
          extensions=(blackfire gd redis xml imagick)
          if [[ "${{ matrix.php-versions }}" != "5.6" && "${{ matrix.php-versions }}" != "7.0" ]]; then
            extensions=(ast "${extensions[@]}" msgpack)
          fi
          if [[ "${{ matrix.operating-systems }}" != "windows-latest" ]]; then
            extensions+=("geos")
          fi
          IFS=,
          echo "extensions=${extensions[*]}" >> "$GITHUB_OUTPUT"

      - name: Setup cache environment
        id: extcache
        uses: shivammathur/cache-extensions@1.14.1
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: ${{ steps.resolve.outputs.extensions }}
          key: ${{ env.key }}

      - name: Cache extensions
        uses: actions/cache@v5.0.3
        with:
          path: ${{ steps.extcache.outputs.dir }}
          key: ${{ steps.extcache.outputs.key }}
          restore-keys: ${{ steps.extcache.outputs.key }}

      - name: Install PHP
        uses: shivammathur/setup-php@develop
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: ${{ steps.resolve.outputs.extensions }}

      - name: Check PHP version
        run: php -v

      - name: Check ini files
        run: php --ini

      - name: Check PHP extensions
        #continue-on-error: ${{ matrix.php-versions == '8.6' }}
        shell: bash
        run: |
          extensions=",${{ steps.resolve.outputs.extensions }},"
          php -m
          php -r "if(! extension_loaded('blackfire')) {throw new Exception('blackfire not found');}";
          php -r "if(! extension_loaded('gd')) {throw new Exception('gd not found');}";
          php -r "if(! extension_loaded('redis')) {throw new Exception('redis not found');}";
          php -r "if(! extension_loaded('xml')) {throw new Exception('xml not found');}";
          if [[ "$extensions" == *",msgpack,"* ]]; then php -r "if(! extension_loaded('msgpack')) {throw new Exception('msgpack not found');}"; fi
          if [[ "$extensions" == *",ast,"* ]]; then php -r "if(! extension_loaded('ast')) {throw new Exception('ast not found');}"; fi

      - name: Check PHP extensions
        if: matrix.operating-systems != 'windows-latest'
        #continue-on-error: ${{ matrix.php-versions == '8.6' }}
        shell: bash
        run: |
          extensions=",${{ steps.resolve.outputs.extensions }},"
          php -m
          php -r "if(! extension_loaded('imagick')) {throw new Exception('imagick not found');}";
          if [[ "$extensions" == *",geos,"* ]]; then php -r "if(! extension_loaded('geos')) {throw new Exception('geos not found');}"; fi
