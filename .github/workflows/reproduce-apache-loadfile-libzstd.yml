name: Reproduce Apache PHP libzstd LoadFile issue

on:
  workflow_dispatch:
  push:
    branches:
      - test/apache-php-857-loadfile-repro

jobs:
  reproduce:
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Reproduce missing LoadFile failure
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $phpUrl = 'https://windows.php.net/downloads/releases/php-8.5.7-Win32-vs17-x64.zip'
          $apacheUrl = 'https://www.apachelounge.com/download/VS18/binaries/httpd-2.4.68-260617-Win64-VS18.zip'
          $port = 18085
          $root = Join-Path $env:RUNNER_TEMP 'apache-php-libzstd-repro'
          $apacheZip = Join-Path $root 'apache.zip'
          $phpDir = Join-Path $root 'php'
          $phpDepsDir = Join-Path $root 'php-deps-without-libzstd'
          $apacheExtract = 'C:\'
          $apacheRoot = 'C:\Apache24'
          $sevenZip = Join-Path $env:ProgramFiles '7-Zip\7z.exe'

          Remove-Item -Path $root, $apacheRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -Path $phpDir -ItemType Directory -Force | Out-Null
          if (-not (Test-Path $sevenZip)) {
            throw "Missing 7-Zip: $sevenZip"
          }

          Invoke-WebRequest -Uri $phpUrl -OutFile (Join-Path $root 'php.zip')
          Expand-Archive -Path (Join-Path $root 'php.zip') -DestinationPath $phpDir

          & curl.exe --fail --location --retry 3 --retry-delay 2 --user-agent 'Mozilla/5.0' --output $apacheZip $apacheUrl
          if ($LASTEXITCODE -ne 0) {
            throw "curl.exe failed to download Apache with exit code $LASTEXITCODE"
          }
          $apacheZipSize = (Get-Item -Path $apacheZip).Length
          Write-Host "Apache zip size: $apacheZipSize"
          if ($apacheZipSize -lt 1000000) {
            Get-Content -Path $apacheZip -TotalCount 20
            throw "Apache download is too small to be a valid binary zip: $apacheZipSize bytes"
          }
          & $sevenZip t $apacheZip -bso0 -bsp0
          if ($LASTEXITCODE -ne 0) {
            throw "Apache download is not a valid zip archive"
          }
          & $sevenZip x $apacheZip "-o$apacheExtract" -y -bso0 -bsp0
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to extract Apache zip"
          }

          $httpd = Join-Path $apacheRoot 'bin\httpd.exe'
          $conf = Join-Path $apacheRoot 'conf\httpd.conf'
          $htdocs = Join-Path $apacheRoot 'htdocs'
          $phpModule = (Join-Path $phpDir 'php8apache2_4.dll').Replace('\', '/')
          $phpIniDir = $phpDir.Replace('\', '/')
          $libzstd = (Join-Path $phpDir 'libzstd.dll').Replace('\', '/')

          foreach ($path in @($httpd, $conf, (Join-Path $phpDir 'php8apache2_4.dll'), (Join-Path $phpDir 'ext\php_curl.dll'), (Join-Path $phpDir 'libzstd.dll'))) {
            if (-not (Test-Path $path)) {
              throw "Missing expected file: $path"
            }
          }

          New-Item -Path $phpDepsDir -ItemType Directory -Force | Out-Null
          Get-ChildItem -Path $phpDir -Filter '*.dll' -File |
            Where-Object { $_.Name -ne 'libzstd.dll' } |
            Copy-Item -Destination $phpDepsDir

          function Test-PathEntryFile {
            param(
              [Parameter(Mandatory)] [string] $Entry,
              [Parameter(Mandatory)] [string] $FileName
            )

            try {
              return Test-Path -Path (Join-Path $Entry.Trim('"') $FileName)
            } catch {
              return $false
            }
          }

          $pathEntries = $env:Path -split ';' | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
          $pathEntriesWithLibzstd = $pathEntries | Where-Object { Test-PathEntryFile -Entry $_ -FileName 'libzstd.dll' }
          if ($pathEntriesWithLibzstd) {
            Write-Host 'Removing PATH entries that already provide libzstd.dll:'
            $pathEntriesWithLibzstd | ForEach-Object { Write-Host "  $_" }
          }
          Write-Host "Adding PHP dependency DLL directory without libzstd.dll: $phpDepsDir"
          $env:Path = "$phpDepsDir;" + (($pathEntries | Where-Object { -not (Test-PathEntryFile -Entry $_ -FileName 'libzstd.dll') }) -join ';')

          @"
          [PHP]
          extension_dir="$($phpIniDir)/ext"
          extension=curl
          error_reporting=E_ALL
          display_errors=On
          log_errors=On
          error_log="$($phpIniDir)/php-errors.log"
          "@ | Set-Content -Path (Join-Path $phpDir 'php.ini') -Encoding ASCII

          '<?php header("Content-Type: text/plain"); $info = curl_version(); echo $info["version"];' |
            Set-Content -Path (Join-Path $htdocs 'index.php') -Encoding ASCII

          $apacheRootConfig = $apacheRoot.Replace('\', '/')
          $htdocsConfig = $htdocs.Replace('\', '/')
          $config = Get-Content -Path $conf -Raw
          $config = $config -replace '(?m)^Define SRVROOT\s+".*"\r?$', "Define SRVROOT `"$apacheRootConfig`""
          $config = $config -replace '(?m)^ServerRoot\s+".*"\r?$', "ServerRoot `"$apacheRootConfig`""
          $config = $config -replace '(?m)^DocumentRoot\s+".*"\r?$', "DocumentRoot `"$htdocsConfig`""
          $config = $config -replace '(?m)^<Directory\s+".*/htdocs">\r?$', "<Directory `"$htdocsConfig`">"
          $config = $config -replace '(?m)^Listen\s+\d+', "Listen 127.0.0.1:$port"
          $config = $config.TrimEnd() + @"

          ServerName 127.0.0.1:$port
          LoadModule php_module "$phpModule"
          PHPIniDir "$phpIniDir"
          AddHandler application/x-httpd-php .php
          DirectoryIndex index.php index.html
          "@
          Set-Content -Path $conf -Value $config -Encoding ASCII

          function Invoke-ApachePhpRequest {
            param([Parameter(Mandatory)] [string] $Name)

            $stdout = Join-Path $root "$Name-stdout.log"
            $stderr = Join-Path $root "$Name-stderr.log"
            $pathLog = Join-Path $root "$Name-path.log"
            $success = $false
            $detail = ''
            Remove-Item -Path $stdout, $stderr, $pathLog, (Join-Path $apacheRoot 'logs\error.log'), (Join-Path $phpDir 'php-errors.log') -Force -ErrorAction SilentlyContinue

            "PATH=$env:Path" | Set-Content -Path $pathLog -Encoding ASCII
            $process = Start-Process -FilePath $httpd `
                                     -ArgumentList @('-d', $apacheRoot, '-f', $conf, '-DFOREGROUND') `
                                     -RedirectStandardOutput $stdout `
                                     -RedirectStandardError $stderr `
                                     -WindowStyle Hidden `
                                     -PassThru

            Start-Sleep -Seconds 4

            if ($process.HasExited) {
              $detail = "Apache exited with code $($process.ExitCode)"
            } else {
              try {
                $response = Invoke-WebRequest -Uri "http://127.0.0.1:$port/index.php" -UseBasicParsing -TimeoutSec 10
                $body = [string] $response.Content
                $success = $response.StatusCode -eq 200 -and $body -match '^\d+\.\d+\.\d+'
                $detail = "HTTP $($response.StatusCode): $body"
              } catch {
                $detail = "HTTP request failed: $($_.Exception.Message)"
              }
            }

            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
              Wait-Process -Id $process.Id -Timeout 10 -ErrorAction SilentlyContinue
            }

            $logFiles = @(
              $stdout,
              $stderr,
              $pathLog,
              (Join-Path $apacheRoot 'logs\error.log'),
              (Join-Path $phpDir 'php-errors.log')
            )

            $logs = foreach ($logFile in $logFiles) {
              if (Test-Path $logFile) {
                "===== $logFile ====="
                Get-Content -Path $logFile -Raw
              }
            }

            [pscustomobject] @{
              Success = $success
              Detail = $detail
              Logs = ($logs -join "`n")
            }
          }

          $withoutLoadFile = Invoke-ApachePhpRequest -Name 'without-loadfile'
          Write-Host "Without LoadFile: $($withoutLoadFile.Detail)"
          Write-Host $withoutLoadFile.Logs

          if ($withoutLoadFile.Success) {
            throw 'Apache/PHP unexpectedly worked without LoadFile libzstd.dll'
          }

          Write-Host 'Reproduced failure without LoadFile libzstd.dll.'

          $configWithLoadFile = $config -replace '(?m)^LoadModule php_module', "LoadFile `"$libzstd`"`r`nLoadModule php_module"
          Set-Content -Path $conf -Value $configWithLoadFile -Encoding ASCII

          $withLoadFile = Invoke-ApachePhpRequest -Name 'with-loadfile'
          Write-Host "With LoadFile: $($withLoadFile.Detail)"
          Write-Host $withLoadFile.Logs

          if (-not $withLoadFile.Success) {
            throw 'Apache/PHP did not work after adding LoadFile libzstd.dll'
          }

          Write-Host 'LoadFile libzstd.dll fixes the Apache/PHP curl request.'
