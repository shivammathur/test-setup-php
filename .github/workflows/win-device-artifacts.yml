name: Windows device artifact test

on:
  push:
    branches:
      - test/win-devices-artifacts-26816639133
  workflow_dispatch:
    inputs:
      run_id:
        description: php-windows-builder run id
        required: true
        default: "26823666705"
      artifact_name:
        description: Artifact name containing PHP zips
        required: true
        default: artifacts

permissions:
  actions: read
  contents: read

env:
  BUILDER_RUN_ID: ${{ github.event.inputs.run_id || '26823666705' }}
  BUILDER_ARTIFACT_NAME: ${{ github.event.inputs.artifact_name || 'artifacts' }}

jobs:
  device-paths:
    name: ${{ matrix.arch }} ${{ matrix.sapi }}
    runs-on: windows-2022
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            sapi: ts
            expected_zts: 1
            php_zip: php-8.2.32-dev-Win32-vs16-x64.zip
          - arch: x64
            sapi: nts
            expected_zts: 0
            php_zip: php-8.2.32-dev-nts-Win32-vs16-x64.zip
          - arch: x86
            sapi: ts
            expected_zts: 1
            php_zip: php-8.2.32-dev-Win32-vs16-x86.zip
          - arch: x86
            sapi: nts
            expected_zts: 0
            php_zip: php-8.2.32-dev-nts-Win32-vs16-x86.zip

    steps:
      - name: Checkout test code
        uses: actions/checkout@v4

      - name: Download PHP builder artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: shivammathur/php-windows-builder
          run-id: ${{ env.BUILDER_RUN_ID }}
          name: ${{ env.BUILDER_ARTIFACT_NAME }}
          path: artifacts

      - name: Extract PHP build
        id: php
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          $zip = Get-ChildItem artifacts -Recurse -File -Filter '${{ matrix.php_zip }}' |
            Select-Object -First 1
          if ($null -eq $zip) {
            Write-Host 'Available artifact files:'
            Get-ChildItem artifacts -Recurse -File | ForEach-Object { Write-Host $_.FullName }
            throw 'PHP zip not found: ${{ matrix.php_zip }}'
          }

          Expand-Archive -LiteralPath $zip.FullName -DestinationPath php-build -Force
          $php = Get-ChildItem php-build -Recurse -File -Filter php.exe |
            Select-Object -First 1
          if ($null -eq $php) {
            throw "php.exe not found in $($zip.FullName)"
          }

          $root = $php.Directory.FullName
          Add-Content $env:GITHUB_OUTPUT "php=$($php.FullName)"
          Add-Content $env:GITHUB_OUTPUT "root=$root"

      - name: Show PHP build
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $php = '${{ steps.php.outputs.php }}'
          $root = '${{ steps.php.outputs.root }}'
          $env:PATH = "$root;$env:PATH"
          & $php -n -v
          & $php -n -r "printf('PHP_ZTS=%d PHP_OS_FAMILY=%s PHP_BINARY=%s\n', PHP_ZTS, PHP_OS_FAMILY, PHP_BINARY);"

      - name: Run reserved device path repro
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          .\tests\run-win-device-artifact-test.ps1 `
            -Php '${{ steps.php.outputs.php }}' `
            -ExpectedZts '${{ matrix.expected_zts }}' `
            -Label '${{ matrix.arch }}-${{ matrix.sapi }}'
