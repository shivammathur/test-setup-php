name: Build apache
on:
  workflow_dispatch:
    inputs:
      version:
        description: apache/httpd ref to build
        required: true
      php:
        description: PHP version to build for
        required: true
defaults:
  run:
    shell: cmd
jobs:
  build:
    strategy:
      matrix:
        arch: [x64]
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - name: Checkout winlib-builder
        uses: actions/checkout@v5
        with:
          path: winlib-builder
          repository: shivammathur/winlib-builder

      - name: Checkout apache/httpd
        uses: actions/checkout@v5
        with:
          path: httpd
          repository: apache/httpd
          ref: ${{ github.event.inputs.version }}

      - name: Determine apache build profile
        id: httpd_profile
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $cmakeLists = Get-Content -Path (Join-Path $env:GITHUB_WORKSPACE 'httpd\CMakeLists.txt') -Raw
          $supportsPcre2 = $cmakeLists -match 'FIND_PACKAGE\(PCRE2'
          $sslEngineInitPath = Join-Path $env:GITHUB_WORKSPACE 'httpd\modules\ssl\ssl_engine_init.c'
          $supportsOpenSsl3 = $false
          if (Test-Path $sslEngineInitPath) {
              $supportsOpenSsl3 = (Get-Content -Path $sslEngineInitPath -Raw) -match 'OPENSSL_VERSION_NUMBER < 0x30000000L'
          }

          $pcrePackage = if ($supportsPcre2) { 'pcre2' } else { 'pcre' }
          $pcreLibPath = if ($supportsPcre2) { 'lib/pcre2-8.lib' } else { 'lib/pcre.lib' }
          $pcreFlags = if ($supportsPcre2) { '-DHAVE_PCRE2' } else { '' }
          $disableOpenSsl = if ($supportsOpenSsl3) { 'FALSE' } else { 'TRUE' }

          "supports_pcre2=$($supportsPcre2.ToString().ToLowerInvariant())" | Add-Content -Path $env:GITHUB_OUTPUT
          "pcre_package=$pcrePackage" | Add-Content -Path $env:GITHUB_OUTPUT
          "pcre_lib_path=$pcreLibPath" | Add-Content -Path $env:GITHUB_OUTPUT
          "pcre_flags=$pcreFlags" | Add-Content -Path $env:GITHUB_OUTPUT
          "disable_openssl=$disableOpenSsl" | Add-Content -Path $env:GITHUB_OUTPUT

      - name: Compute virtual inputs
        id: virtuals
        run: powershell winlib-builder/scripts/compute-virtuals -version ${{ github.event.inputs.php }} -arch ${{ matrix.arch }}

      - name: Setup MSVC development environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}
          toolset: ${{ steps.virtuals.outputs.toolset }}

      - name: Install Apache build dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $sharedTriplet = '${{ matrix.arch }}-windows'
          $staticTriplet = '${{ matrix.arch }}-windows-static-md'
          $sharedPackages = @(
              'apr[private-headers]',
              'apr-util[crypto]',
              'brotli',
              'curl',
              'expat',
              'jansson',
              'nghttp2',
              'openssl',
              '${{ steps.httpd_profile.outputs.pcre_package }}',
              'zlib'
          )
          $commands = @(
              "vcpkg install --triplet $sharedTriplet $($sharedPackages -join ' ')",
              "vcpkg install --triplet $staticTriplet apr apr-util expat"
          )

          foreach ($command in $commands) {
              for ($attempt = 1; $attempt -le 3; $attempt++) {
                  try {
                      Invoke-Expression $command
                      break
                  } catch {
                      if ($attempt -eq 3) {
                          throw
                      }
                      Start-Sleep -Seconds (5 * $attempt)
                  }
              }
          }

      - name: Prepare source-built dependencies
        id: deps
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          function Copy-TreeContents {
              param (
                  [Parameter(Mandatory)] [String] $source,
                  [Parameter(Mandatory)] [String] $destination
              )

              if (-not (Test-Path $source)) {
                  return
              }

              New-Item -Path $destination -ItemType Directory -Force | Out-Null
              Get-ChildItem -Path $source -Force | ForEach-Object {
                  Copy-Item -Path $_.FullName -Destination $destination -Recurse -Force
              }
          }

          $sharedTriplet = '${{ matrix.arch }}-windows'
          $staticTriplet = '${{ matrix.arch }}-windows-static-md'
          $sharedRoot = "C:/vcpkg/installed/$sharedTriplet"
          $staticRoot = "C:/vcpkg/installed/$staticTriplet"
          $depsRoot = Join-Path $env:GITHUB_WORKSPACE 'deps-install'
          $iconvConfigArch = if ('${{ matrix.arch }}' -eq 'x64') { 'x64' } else { 'Win32' }
          $pcreLibrary = Join-Path $sharedRoot '${{ steps.httpd_profile.outputs.pcre_lib_path }}'
          $curlLibrary = if (Test-Path (Join-Path $sharedRoot 'lib\libcurl_imp.lib')) {
              Join-Path $sharedRoot 'lib\libcurl_imp.lib'
          } else {
              Join-Path $sharedRoot 'lib\libcurl.lib'
          }

          $apriconvSourceRoot = Join-Path $env:GITHUB_WORKSPACE 'apr-iconv-source'
          $apriconvOutputRoot = Join-Path $env:GITHUB_WORKSPACE 'apr-iconv-install'
          $genTestChar = Join-Path $sharedRoot 'tools\apr\gen_test_char.exe'

          foreach ($path in @($depsRoot, $apriconvSourceRoot, $apriconvOutputRoot)) {
              if (Test-Path $path) {
                  Remove-Item -Path $path -Recurse -Force
              }
              New-Item -Path $path -ItemType Directory -Force | Out-Null
          }

          foreach ($path in @(
              (Join-Path $sharedRoot 'include\apr.h'),
              (Join-Path $sharedRoot 'include\arch\win32\apr_private.h'),
              (Join-Path $sharedRoot 'lib\libapr-1.lib'),
              (Join-Path $sharedRoot 'lib\libaprutil-1.lib'),
              $pcreLibrary,
              $curlLibrary,
              (Join-Path $staticRoot 'lib'),
              $genTestChar
          )) {
              if (-not (Test-Path $path)) {
                  throw "Required dependency path missing: $path"
              }
          }

          Copy-TreeContents -source (Join-Path $sharedRoot 'include') -destination (Join-Path $depsRoot 'include')
          Copy-TreeContents -source (Join-Path $sharedRoot 'lib') -destination (Join-Path $depsRoot 'lib')
          Copy-TreeContents -source (Join-Path $sharedRoot 'bin') -destination (Join-Path $depsRoot 'bin')

          $generatedAprHeader = Join-Path $depsRoot 'include\apr_escape_test_char.h'
          if (-not (Test-Path $generatedAprHeader)) {
              & $genTestChar | Out-File -FilePath $generatedAprHeader -Encoding ascii
          }

          $archive = Join-Path $env:RUNNER_TEMP 'apr-iconv.zip'
          Invoke-WebRequest -Uri 'https://archive.apache.org/dist/apr/apr-iconv-1.2.1-win32-src-r2.zip' -OutFile $archive -UseBasicParsing
          Expand-Archive -Path $archive -DestinationPath $apriconvSourceRoot -Force

          $apriconvRoot = Get-ChildItem -Path $apriconvSourceRoot -Directory | Select-Object -First 1
          if (-not $apriconvRoot) {
              throw "APR-iconv sources were not extracted to $apriconvSourceRoot"
          }

          $apriconvParent = Split-Path -Path $apriconvRoot.FullName -Parent
          $aprCompatRoot = Join-Path $apriconvParent 'apr'
          $aprCompatReleaseRoot = if ('${{ matrix.arch }}' -eq 'x64') {
              Join-Path $aprCompatRoot 'x64\Release'
          } else {
              Join-Path $aprCompatRoot 'Release'
          }
          $apriconvBuildRoot = if ('${{ matrix.arch }}' -eq 'x64') {
              Join-Path $apriconvRoot.FullName 'x64\Release'
          } else {
              Join-Path $apriconvRoot.FullName 'Release'
          }

          if (Test-Path $aprCompatRoot) {
              Remove-Item -Path $aprCompatRoot -Recurse -Force
          }
          New-Item -Path $aprCompatReleaseRoot -ItemType Directory -Force | Out-Null
          Copy-TreeContents -source (Join-Path $depsRoot 'include') -destination (Join-Path $aprCompatRoot 'include')
          Copy-Item -Path (Join-Path $depsRoot 'lib\libapr-1.lib') -Destination (Join-Path $aprCompatReleaseRoot 'libapr-1.lib') -Force

          Push-Location $apriconvRoot.FullName
          nmake /f libapriconv.mak CFG="libapriconv - $iconvConfigArch Release" RECURSE=0
          Pop-Location

          if (-not (Test-Path (Join-Path $apriconvBuildRoot 'libapriconv-1.lib'))) {
              throw "APR-iconv import library was not built in $apriconvBuildRoot"
          }

          $apriconvLibInstall = Join-Path $apriconvOutputRoot 'lib'
          $apriconvBinInstall = Join-Path $apriconvOutputRoot 'bin'
          $apriconvIncludeInstall = Join-Path $apriconvOutputRoot 'include'
          New-Item -Path $apriconvLibInstall -ItemType Directory -Force | Out-Null
          New-Item -Path $apriconvBinInstall -ItemType Directory -Force | Out-Null
          Copy-TreeContents -source (Join-Path $apriconvRoot.FullName 'include') -destination $apriconvIncludeInstall

          Get-ChildItem -Path $apriconvBuildRoot -File | ForEach-Object {
              $artifact = $_
              switch ($artifact.Extension.ToLowerInvariant()) {
                  '.lib' { Copy-Item -Path $artifact.FullName -Destination $apriconvLibInstall -Force }
                  '.exp' { Copy-Item -Path $artifact.FullName -Destination $apriconvLibInstall -Force }
                  '.dll' { Copy-Item -Path $artifact.FullName -Destination $apriconvBinInstall -Force }
                  '.pdb' { Copy-Item -Path $artifact.FullName -Destination $apriconvBinInstall -Force }
              }
          }

          "deps_root=$($depsRoot.Replace('\', '/'))" | Add-Content -Path $env:GITHUB_OUTPUT
          "static_root=$($staticRoot.Replace('\', '/'))" | Add-Content -Path $env:GITHUB_OUTPUT
          "apriconv_root=$($apriconvOutputRoot.Replace('\', '/'))" | Add-Content -Path $env:GITHUB_OUTPUT
          "curl_library=$($curlLibrary.Replace('\', '/'))" | Add-Content -Path $env:GITHUB_OUTPUT

      - name: Configure apache/httpd
        run: |
          cmake -S httpd -B build -G "Visual Studio 17 2022" -A ${{ steps.virtuals.outputs.msarch }} ^
            -T ${{ steps.virtuals.outputs.msts }} ^
            -DCMAKE_SYSTEM_VERSION=${{ steps.virtuals.outputs.winsdk }} ^
            -DCMAKE_INSTALL_PREFIX=%GITHUB_WORKSPACE%\apache-install ^
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ^
            -DAPR_INCLUDE_DIR="${{ steps.deps.outputs.deps_root }}/include" ^
            "-DAPR_LIBRARIES=${{ steps.deps.outputs.deps_root }}/lib/libapr-1.lib;${{ steps.deps.outputs.deps_root }}/lib/libaprutil-1.lib" ^
            -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=${{ steps.httpd_profile.outputs.disable_openssl }} ^
            -DPCRE_INCLUDE_DIR="${{ steps.deps.outputs.deps_root }}/include" ^
            -DPCRE_LIBRARIES="${{ steps.deps.outputs.deps_root }}/${{ steps.httpd_profile.outputs.pcre_lib_path }}" ^
            -DPCRE_CFLAGS="${{ steps.httpd_profile.outputs.pcre_flags }}" ^
            -DNGHTTP2_INCLUDE_DIR="${{ steps.deps.outputs.deps_root }}/include" ^
            -DNGHTTP2_LIBRARIES="${{ steps.deps.outputs.deps_root }}/lib/nghttp2.lib" ^
            -DBROTLI_INCLUDE_DIR="${{ steps.deps.outputs.deps_root }}/include" ^
            "-DBROTLI_LIBRARIES=${{ steps.deps.outputs.deps_root }}/lib/brotlienc.lib;${{ steps.deps.outputs.deps_root }}/lib/brotlicommon.lib" ^
            -DCURL_INCLUDE_DIR="${{ steps.deps.outputs.deps_root }}/include" ^
            -DCURL_LIBRARIES="${{ steps.deps.outputs.curl_library }}" ^
            -DJANSSON_INCLUDE_DIR="${{ steps.deps.outputs.deps_root }}/include" ^
            -DJANSSON_LIBRARIES="${{ steps.deps.outputs.deps_root }}/lib/jansson.lib" ^
            -DENABLE_MODULES=i ^
            -DINSTALL_MANUAL=ON ^
            -DINSTALL_PDB=ON

      - name: Build apache/httpd
        run: cmake --build build --config Release

      - name: Install apache/httpd
        run: cmake --install build --config Release

      - name: Package apache
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $installRoot = Join-Path $env:GITHUB_WORKSPACE 'apache-install'
          $httpdSourceRoot = Join-Path $env:GITHUB_WORKSPACE 'httpd'
          $depsRoot = '${{ steps.deps.outputs.deps_root }}'
          $staticRoot = '${{ steps.deps.outputs.static_root }}'
          $apriconvRoot = '${{ steps.deps.outputs.apriconv_root }}'
          $packageRoot = Join-Path $env:GITHUB_WORKSPACE 'install'

          if (Test-Path $packageRoot) {
              Remove-Item -Path $packageRoot -Recurse -Force
          }

          New-Item -Path $packageRoot -ItemType Directory -Force | Out-Null

          function Copy-TreeContents {
              param (
                  [Parameter(Mandatory)] [String] $source,
                  [Parameter(Mandatory)] [String] $destination
              )

              if (-not (Test-Path $source)) {
                  return
              }

              New-Item -Path $destination -ItemType Directory -Force | Out-Null
              Get-ChildItem -Path $source -Force | ForEach-Object {
                  Copy-Item -Path $_.FullName -Destination $destination -Recurse -Force
              }
          }

          Copy-TreeContents -source $installRoot -destination $packageRoot

          Get-ChildItem -Path $httpdSourceRoot -File | Where-Object {
              $_.Name -cmatch '^[A-Z][A-Z0-9._-]*$'
          } | ForEach-Object {
              $destinationName = if ($_.Extension) { $_.Name } else { "$($_.Name).txt" }
              Copy-Item -Path $_.FullName -Destination (Join-Path $packageRoot $destinationName) -Force
          }

          Copy-TreeContents -source (Join-Path $depsRoot 'include') -destination (Join-Path $packageRoot 'include\apache2_4')
          Copy-TreeContents -source (Join-Path $depsRoot 'lib') -destination (Join-Path $packageRoot 'lib\apache2_4')
          Copy-TreeContents -source (Join-Path $depsRoot 'bin') -destination (Join-Path $packageRoot 'bin')
          Copy-TreeContents -source (Join-Path $staticRoot 'lib') -destination (Join-Path $packageRoot 'lib\apache2_4')
          Copy-TreeContents -source (Join-Path $apriconvRoot 'include') -destination (Join-Path $packageRoot 'include\apache2_4')
          Copy-TreeContents -source (Join-Path $apriconvRoot 'lib') -destination (Join-Path $packageRoot 'lib\apache2_4')
          Copy-TreeContents -source (Join-Path $apriconvRoot 'bin') -destination (Join-Path $packageRoot 'bin')

          Copy-TreeContents -source (Join-Path $installRoot 'include') -destination (Join-Path $packageRoot 'include\apache2_4')
          Copy-TreeContents -source (Join-Path $installRoot 'lib') -destination (Join-Path $packageRoot 'lib\apache2_4')
          Copy-TreeContents -source (Join-Path $installRoot 'bin') -destination (Join-Path $packageRoot 'bin')
          Copy-TreeContents -source (Join-Path $installRoot 'modules') -destination (Join-Path $packageRoot 'modules')
          $cgiExamplesRoot = Join-Path $httpdSourceRoot 'docs\cgi-examples'
          $packageCgiRoot = Join-Path $packageRoot 'cgi-bin'
          if (Test-Path $cgiExamplesRoot) {
              New-Item -Path $packageCgiRoot -ItemType Directory -Force | Out-Null
              Get-ChildItem -Path $cgiExamplesRoot -File | ForEach-Object {
                  Copy-Item -Path $_.FullName -Destination (Join-Path $packageCgiRoot $_.Name) -Force
                  if (-not $_.Extension) {
                      Copy-Item -Path $_.FullName -Destination (Join-Path $packageCgiRoot "$($_.Name).pl") -Force
                  }
              }
          }

          $packageLibRoot = Join-Path $packageRoot 'lib\apache2_4'
          Get-ChildItem -Path $packageLibRoot -Filter 'lib*.lib' -File | ForEach-Object {
              $aliasName = $_.Name.Substring(3)
              $aliasTarget = Join-Path $packageLibRoot $aliasName
              if (-not (Test-Path $aliasTarget)) {
                  Copy-Item -Path $_.FullName -Destination $aliasTarget -Force
              }
          }

          foreach ($buildTree in @(
              (Join-Path 'C:/vcpkg/buildtrees/apr' '${{ matrix.arch }}-windows-rel'),
              (Join-Path 'C:/vcpkg/buildtrees/apr-util' '${{ matrix.arch }}-windows-rel')
          )) {
              if (-not (Test-Path $buildTree)) {
                  continue
              }

              Get-ChildItem -Path $buildTree -Filter *.exp -File | ForEach-Object {
                  Copy-Item -Path $_.FullName -Destination $packageLibRoot -Force
              }
          }

          $xmlCompatTarget = Join-Path $packageLibRoot 'xml.lib'
          if (-not (Test-Path $xmlCompatTarget)) {
              $xmlCompatSource = Get-ChildItem -Path $packageLibRoot -Filter '*expat*.lib' -File |
                  Sort-Object Length -Descending |
                  Select-Object -First 1
              if ($xmlCompatSource) {
                  Copy-Item -Path $xmlCompatSource.FullName -Destination $xmlCompatTarget -Force
              }
          }

          $manifest = Join-Path $packageRoot 'manifest.txt'
          Get-ChildItem -Path $packageRoot -Recurse -File |
              Sort-Object FullName |
              ForEach-Object { $_.FullName.Substring($packageRoot.Length + 1) } |
              Set-Content -Path $manifest

          Get-Content -Path $manifest

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apache-${{ github.event.inputs.version }}-${{ steps.virtuals.outputs.vs }}-${{ matrix.arch }}
          path: install
