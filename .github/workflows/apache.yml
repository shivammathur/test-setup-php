name: Test Apache

on:
  push:
  workflow_dispatch:
    inputs:
      php:
        description: PHP version to build for
        required: true
        default: "8.4"
      stability:
        description: the series stability
        required: false
        default: staging

defaults:
  run:
    shell: cmd

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        version: [2.4.43, 2.4.66]
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - name: Checkout test branch
        uses: actions/checkout@v5

      - name: Checkout winlib-builder
        uses: actions/checkout@v5
        with:
          repository: shivammathur/winlib-builder
          path: winlib-builder

      - name: Checkout apache/httpd
        uses: actions/checkout@v5
        with:
          repository: apache/httpd
          ref: ${{ matrix.version }}
          path: httpd

      - name: Compute virtual inputs
        id: virtuals
        shell: powershell
        run: winlib-builder\scripts\compute-virtuals.ps1 -version ${{ inputs.php || '8.4' }} -arch x64

      - name: Setup MSVC development environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: ${{ steps.virtuals.outputs.toolset }}

      - name: Install PCRE build dependency
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          for ($attempt = 1; $attempt -le 3; $attempt++) {
              try {
                  vcpkg install --triplet x64-windows pcre
                  exit 0
              } catch {
                  if ($attempt -eq 3) {
                      throw
                  }
                  Start-Sleep -Seconds (5 * $attempt)
              }
          }

      - name: Fetch SDK seed dependencies
        id: deps
        shell: pwsh
        env:
          PHP_VERSION: ${{ inputs.php || '8.4' }}
          SDK_VS: ${{ steps.virtuals.outputs.vs }}
        run: |
          $ErrorActionPreference = 'Stop'

          $sdkBase = 'https://downloads.php.net/~windows/php-sdk/deps'
          $seedRoot = Join-Path $env:GITHUB_WORKSPACE 'apache-seed'
          $aprSourceRoot = Join-Path $env:GITHUB_WORKSPACE 'apr-source'
          $aprBuildIncludeRaw = Join-Path $env:GITHUB_WORKSPACE 'apr-build-include'
          $diagRoot = Join-Path $env:GITHUB_WORKSPACE 'diagnostics'

          foreach ($path in @($seedRoot, $aprSourceRoot, $aprBuildIncludeRaw, $diagRoot)) {
              if (Test-Path $path) {
                  Remove-Item -Path $path -Recurse -Force
              }
              New-Item -Path $path -ItemType Directory -Force | Out-Null
          }

          $downloads = @(
              @{
                  Name = 'apache'
                  Url = "$sdkBase/$env:SDK_VS/x64/apache-2.4.43-$env:SDK_VS-x64.zip"
                  Destination = $seedRoot
              },
              @{
                  Name = 'apr-source'
                  Url = 'https://archive.apache.org/dist/apr/apr-1.7.0-win32-src.zip'
                  Destination = $aprSourceRoot
              }
          )

          foreach ($download in $downloads) {
              $archive = Join-Path $env:RUNNER_TEMP "$($download.Name).zip"
              Invoke-WebRequest -Uri $download.Url -OutFile $archive -UseBasicParsing
              Expand-Archive -Path $archive -DestinationPath $download.Destination -Force
          }

          $seedIncludeRaw = Join-Path $seedRoot 'include\apache2_4'
          $seedLibRootRaw = Join-Path $seedRoot 'lib\apache2_4'
          $aprSourceTop = Get-ChildItem -Path $aprSourceRoot -Directory | Select-Object -First 1
          $aprSourceInclude = if ($aprSourceTop) {
              Join-Path $aprSourceTop.FullName 'include'
          } else {
              Join-Path $aprSourceRoot 'include'
          }

          if (-not (Test-Path (Join-Path $seedIncludeRaw 'apr.h'))) {
              throw "APR headers were not extracted to $seedIncludeRaw"
          }
          if (-not (Test-Path (Join-Path $seedLibRootRaw 'libapr-1.lib'))) {
              throw "APR import libraries were not extracted to $seedLibRootRaw"
          }
          if (-not (Test-Path (Join-Path $aprSourceInclude 'arch\win32\apr_arch_file_io.h'))) {
              throw "APR private headers were not extracted to $aprSourceInclude"
          }

          Copy-Item -Path (Join-Path $aprSourceInclude '*') -Destination $aprBuildIncludeRaw -Recurse -Force
          Get-ChildItem -Path $seedIncludeRaw -File | Copy-Item -Destination $aprBuildIncludeRaw -Force

          Get-ChildItem -Path $seedIncludeRaw -File | ForEach-Object { $_.Name } |
              Sort-Object |
              Set-Content -Path (Join-Path $diagRoot 'seed-headers.txt')
          Get-ChildItem -Path $seedLibRootRaw -File | ForEach-Object { $_.Name } |
              Sort-Object |
              Set-Content -Path (Join-Path $diagRoot 'seed-libs.txt')
          Get-ChildItem -Path $aprBuildIncludeRaw -Recurse -File |
              ForEach-Object { $_.FullName.Substring($aprBuildIncludeRaw.Length + 1) } |
              Sort-Object |
              Set-Content -Path (Join-Path $diagRoot 'apr-build-include.txt')

          "build_include=$($aprBuildIncludeRaw.Replace('\', '/'))" | Add-Content -Path $env:GITHUB_OUTPUT
          "seed_include=$($seedIncludeRaw.Replace('\', '/'))" | Add-Content -Path $env:GITHUB_OUTPUT
          "seed_lib_root=$($seedLibRootRaw.Replace('\', '/'))" | Add-Content -Path $env:GITHUB_OUTPUT

      - name: Record PCRE layout
        shell: pwsh
        run: |
          $diagRoot = Join-Path $env:GITHUB_WORKSPACE 'diagnostics'
          Get-ChildItem -Path 'C:\vcpkg\installed\x64-windows\include' -Filter 'pcre*.h' -File |
              ForEach-Object { $_.Name } |
              Sort-Object |
              Set-Content -Path (Join-Path $diagRoot 'pcre-headers.txt')
          Get-ChildItem -Path 'C:\vcpkg\installed\x64-windows\lib' -Filter 'pcre*.lib' -File |
              ForEach-Object { $_.Name } |
              Sort-Object |
              Set-Content -Path (Join-Path $diagRoot 'pcre-libs.txt')

      - name: Configure apache/httpd
        run: |
          cmake -S httpd -B build -G "Visual Studio 17 2022" -A x64 ^
            -T ${{ steps.virtuals.outputs.msts }} ^
            -DCMAKE_SYSTEM_VERSION=${{ steps.virtuals.outputs.winsdk }} ^
            -DCMAKE_INSTALL_PREFIX=%GITHUB_WORKSPACE%\apache-install ^
            -DAPR_INCLUDE_DIR="${{ steps.deps.outputs.build_include }}" ^
            "-DAPR_LIBRARIES=${{ steps.deps.outputs.seed_lib_root }}/libapr-1.lib;${{ steps.deps.outputs.seed_lib_root }}/libaprutil-1.lib" ^
            -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=TRUE ^
            -DPCRE_INCLUDE_DIR=C:/vcpkg/installed/x64-windows/include ^
            -DPCRE_LIBRARIES=C:/vcpkg/installed/x64-windows/lib/pcre.lib ^
            -DINSTALL_MANUAL=OFF ^
            -DINSTALL_PDB=ON

      - name: Build apache/httpd
        run: cmake --build build --config Release

      - name: Install apache/httpd
        run: cmake --install build --config Release

      - name: Package SDK-style artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $installRoot = Join-Path $env:GITHUB_WORKSPACE 'apache-install'
          $seedRoot = Join-Path $env:GITHUB_WORKSPACE 'apache-seed'
          $httpdInclude = Join-Path $installRoot 'include'
          $seedInclude = Join-Path $seedRoot 'include\apache2_4'
          $seedLibRoot = Join-Path $seedRoot 'lib\apache2_4'
          $packageRoot = Join-Path $env:GITHUB_WORKSPACE 'package'
          $includeRoot = Join-Path $packageRoot 'include\apache2_4'
          $libRoot = Join-Path $packageRoot 'lib\apache2_4'
          $diagRoot = Join-Path $env:GITHUB_WORKSPACE 'diagnostics'

          if (Test-Path $packageRoot) {
              Remove-Item -Path $packageRoot -Recurse -Force
          }

          New-Item -Path $includeRoot -ItemType Directory -Force | Out-Null
          New-Item -Path $libRoot -ItemType Directory -Force | Out-Null

          foreach ($pattern in @('apr*.h', 'apu*.h', 'expat*.h')) {
              Get-ChildItem -Path $seedInclude -Filter $pattern -File -ErrorAction SilentlyContinue |
                  Copy-Item -Destination $includeRoot -Force
          }

          foreach ($header in @('api_version.h', 'iconv.h')) {
              $candidate = Join-Path $seedInclude $header
              if (Test-Path $candidate) {
                  Copy-Item -Path $candidate -Destination (Join-Path $includeRoot $header) -Force
              }
          }

          Get-ChildItem -Path $httpdInclude -Filter *.h -File |
              Where-Object { $_.Name -notin @('mod_session.h', 'mod_xml2enc.h') } |
              Copy-Item -Destination $includeRoot -Force

          foreach ($library in @(
              'apr-1.lib',
              'aprutil-1.lib',
              'libapr-1.exp',
              'libapr-1.lib',
              'libapriconv-1.exp',
              'libapriconv-1.lib',
              'libaprutil-1.exp',
              'libaprutil-1.lib',
              'xml.lib'
          )) {
              $candidate = Join-Path $seedLibRoot $library
              if (Test-Path $candidate) {
                  Copy-Item -Path $candidate -Destination (Join-Path $libRoot $library) -Force
              }
          }

          foreach ($library in @(
              'libhttpd.exp',
              'libhttpd.lib',
              'mod_dav.exp',
              'mod_dav.lib',
              'mod_proxy.lib'
          )) {
              $candidate = Join-Path $installRoot "lib\$library"
              if (Test-Path $candidate) {
                  Copy-Item -Path $candidate -Destination (Join-Path $libRoot $library) -Force
              }
          }

          $manifest = Join-Path $packageRoot 'manifest.txt'
          Get-ChildItem -Path $packageRoot -Recurse -File |
              Sort-Object FullName |
              ForEach-Object { $_.FullName.Substring($packageRoot.Length + 1) } |
              Set-Content -Path $manifest

          Get-Content -Path $manifest

          Get-ChildItem -Path $packageRoot -Recurse -File |
              ForEach-Object { $_.FullName.Substring($packageRoot.Length + 1) } |
              Sort-Object |
              Set-Content -Path (Join-Path $diagRoot 'packaged-files.txt')

      - name: Upload package artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apache-${{ matrix.version }}-${{ steps.virtuals.outputs.vs }}-x64
          path: package

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ matrix.version }}-${{ steps.virtuals.outputs.vs }}-x64
          path: diagnostics
